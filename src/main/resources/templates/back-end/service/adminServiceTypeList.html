<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>後台服務類型管理</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .page {
            width: 100%;
            max-width: 1380px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .page-subtitle {
            margin: 7px 0 0;
            color: #69727b;
            font-size: 14px;
        }

        .header-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        /* =========================
           訊息
           ========================= */

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            font-weight: 700;
        }

        .message--success {
            color: #176b45;
            background: #e8f8ef;
            border: 1px solid #b7e4ca;
        }

        .message--error {
            color: #a12622;
            background: #fff0ef;
            border: 1px solid #f3c0bd;
        }

        /* =========================
           面板
           ========================= */

        .panel {
            margin-bottom: 22px;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 15px
                    rgba(0, 0, 0, 0.04);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 17px 20px;
            border-bottom: 1px solid #e7eaee;
        }

        .panel-title {
            margin: 0;
            font-size: 20px;
        }

        .panel-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }

        .panel-description {
            color: #69727b;
            font-size: 13px;
            white-space: nowrap;
        }

        .panel-body {
            padding: 20px;
        }

        #type-list {
            scroll-margin-top: 20px;
        }

        /* =========================
           按鈕
           ========================= */

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 13px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            transition:
                    transform 0.15s ease,
                    background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn--service {
            color: #5a4acb;
            background: #efedff;
        }

        .btn--service:hover {
            background: #e1ddff;
        }

        .btn--orders {
            color: #075985;
            background: #e0f2fe;
        }

        .btn--orders:hover {
            background: #bae6fd;
        }

        .btn--primary {
            color: #ffffff;
            background: #6c5ce7;
        }

        .btn--primary:hover {
            background: #5748c8;
        }

        .btn--secondary {
            color: #4f5964;
            background: #edf0f3;
        }

        .btn--secondary:hover {
            background: #dfe4e8;
        }

        .btn--edit {
            color: #075985;
            background: #e0f2fe;
        }

        .btn--edit:hover {
            background: #bae6fd;
        }

        .btn--save {
            color: #ffffff;
            background: #0984e3;
        }

        .btn--save:hover {
            background: #0873c4;
        }

        /* =========================
           表單
           ========================= */

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #4f5964;
            font-size: 13px;
            font-weight: 800;
        }

        .form-control {
            width: 100%;
            min-height: 42px;
            padding: 9px 11px;
            color: #2d3436;
            background: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 8px;
            outline: none;
        }

        textarea.form-control {
            min-height: 86px;
            max-height: 180px;
            resize: vertical;
        }

        .form-control:focus {
            border-color: #6c5ce7;
            box-shadow:
                    0 0 0 3px
                    rgba(108, 92, 231, 0.12);
        }

        /* =========================
           新增表單
           ========================= */

        .add-form {
            display: grid;
            grid-template-columns:
                    minmax(190px, 1fr)
                    minmax(300px, 2fr)
                    auto;
            align-items: end;
            gap: 14px;
        }

        /* =========================
           查詢
           ========================= */

        .search-form {
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 9px;
        }

        .search-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .search-field label {
            color: #69727b;
            font-size: 12px;
            font-weight: 800;
        }

        .search-field input {
            width: 240px;
            height: 40px;
            padding: 0 11px;
            color: #2d3436;
            background: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 8px;
            outline: none;
        }

        .search-field input:focus {
            border-color: #8c7ae6;
            box-shadow:
                    0 0 0 3px
                    rgba(108, 92, 231, 0.12);
        }

        /* =========================
           類型卡片
           ========================= */

        .type-grid {
            display: grid;
            grid-template-columns:
                    repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        .type-card {
            padding: 18px;
            background: #f8f9fb;
            border: 1px solid #e3e6ea;
            border-radius: 12px;
        }

        .type-display {
            display: grid;
            gap: 14px;
        }

        .type-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .type-card-title {
            margin: 0;
            color: #2d3436;
            font-size: 17px;
            font-weight: 800;
            line-height: 1.5;
        }

        .type-id {
            color: #7f8790;
            font-size: 12px;
            white-space: nowrap;
        }

        .type-description {
            min-height: 44px;
            color: #69727b;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .type-card-actions {
            display: flex;
            justify-content: flex-end;
        }

        .type-edit-form {
            display: none;
            gap: 13px;
        }

        .type-card.is-editing .type-display {
            display: none;
        }

        .type-card.is-editing .type-edit-form {
            display: grid;
        }

        .type-edit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .type-edit-title {
            font-size: 15px;
            font-weight: 800;
        }

        .type-edit-actions {
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 8px;
        }

        .empty-state {
            padding: 48px 20px;
            color: #69727b;
            text-align: center;
        }

        .empty-state strong {
            color: #5a4acb;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 900px) {

            .panel-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .panel-right,
            .search-form {
                width: 100%;
                justify-content: flex-start;
            }

            .add-form {
                grid-template-columns:
                        repeat(2, minmax(0, 1fr));
            }

            .add-form .btn {
                width: fit-content;
            }
        }

        @media (max-width: 620px) {

            .header-links {
                flex-direction: column;
            }

            .header-links .btn {
                width: 100%;
            }

            .search-field,
            .search-field input {
                width: 100%;
            }

            .search-form .btn {
                flex: 1;
            }

            .add-form {
                grid-template-columns: 1fr;
            }

            .add-form .btn {
                width: 100%;
            }

            .type-edit-actions .btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>

<div class="wb-admin-layout">

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <main class="wb-admin-content">

        <div class="page">

            <!-- 頁面標題 -->
            <header class="page-header">

                <h1 class="page-title">
                    後台服務類型管理
                </h1>

                <p class="page-subtitle">
                    查詢、新增及修改會員上架服務時可選擇的服務類型
                </p>

                <div class="header-links">

                    <a class="btn btn--service"
                       th:href="@{/admin/services}">
                        前往服務管理
                    </a>

                    <a class="btn btn--orders"
                       th:href="@{/admin/services/orders}">
                        前往服務訂單管理
                    </a>

                </div>

            </header>

            <!-- 成功失敗訊息 -->
            <div class="message message--success"
                 th:if="${successMsg != null}"
                 th:text="${successMsg}">
                操作成功
            </div>

            <div class="message message--error"
                 th:if="${errorMsg != null}"
                 th:text="${errorMsg}">
                操作失敗
            </div>

            <!-- 新增服務類型 -->
            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        新增服務類型
                    </h2>

                    <span class="panel-description">
                        新增後可供會員上架服務時選擇
                    </span>

                </div>

                <div class="panel-body">

                    <form class="add-form"
                          th:action="@{/admin/service/types/add}"
                          method="post">

                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <div class="form-group">

                            <label for="newTypeName">
                                類型名稱
                            </label>

                            <input id="newTypeName"
                                   class="form-control"
                                   type="text"
                                   name="typeName"
                                   maxlength="50"
                                   placeholder="例如：運動陪伴"
                                   autocomplete="off"
                                   required>

                        </div>

                        <div class="form-group">

                            <label for="newDescription">
                                類型說明
                            </label>

                            <textarea id="newDescription"
                                      class="form-control"
                                      name="description"
                                      maxlength="255"
                                      placeholder="簡單說明這個服務類型"></textarea>

                        </div>

                        <button class="btn btn--primary"
                                type="submit">
                            新增類型
                        </button>

                    </form>

                </div>

            </section>

            <!-- 現有服務類型 -->
            <section class="panel"
                     id="type-list">

                <div class="panel-header">

                    <h2 class="panel-title">

                        <span th:if="${searched}">
                            查詢結果
                        </span>

                        <span th:if="${!searched}">
                            現有服務類型
                        </span>

                    </h2>

                    <div class="panel-right">

                        <form class="search-form"
                              th:action="@{/admin/service/types}"
                              method="get">

                            <div class="search-field">

                                <label for="keyword">
                                    類型名稱或說明
                                </label>

                                <input id="keyword"
                                       type="text"
                                       name="keyword"
                                       maxlength="50"
                                       placeholder="輸入關鍵字"
                                       autocomplete="off"
                                       th:value="${keyword}">

                            </div>

                            <button class="btn btn--primary"
                                    type="submit">
                                搜尋
                            </button>

                            <a class="btn btn--secondary"
                               th:if="${searched}"
                               th:href="@{/admin/service/types}">
                                清除
                            </a>

                        </form>

                        <span class="panel-description">

                            共

                            <strong th:text="${serviceTypeList != null
                                    ? #lists.size(serviceTypeList)
                                    : 0}">
                                0
                            </strong>

                            筆

                        </span>

                    </div>

                </div>

                <!-- 有資料 -->
                <div class="panel-body"
                     th:if="${serviceTypeList != null
                              and !#lists.isEmpty(serviceTypeList)}">

                    <div class="type-grid">

                        <article class="type-card"
                                 th:id="|type-card-${type.svcTypeID}|"
                                 th:each="type : ${serviceTypeList}">

                            <!-- 預設只顯示資料 -->
                            <div class="type-display">

                                <div class="type-card-header">

                                    <h3 class="type-card-title"
                                        th:text="${type.typeName}">
                                        陪伴聊天
                                    </h3>

                                    <span class="type-id">

                                        類型編號 #

                                        <span th:text="${type.svcTypeID}">
                                            1
                                        </span>

                                    </span>

                                </div>

                                <div class="type-description"
                                     th:text="${type.descrip != null
                                              and !#strings.isEmpty(type.descrip)
                                              ? type.descrip
                                              : '尚未填寫類型說明'}">
                                    類型說明
                                </div>

                                <div class="type-card-actions">

                                    <button class="btn btn--edit"
                                            type="button"
                                            th:onclick="|openTypeEditor(${type.svcTypeID})|">
                                        修改
                                    </button>

                                </div>

                            </div>

                            <!-- 點擊修改後才顯示 -->
                            <form class="type-edit-form"
                                  th:id="|type-edit-form-${type.svcTypeID}|"
                                  th:action="@{/admin/service/types/{serviceTypeId}/update(
                                          serviceTypeId=${type.svcTypeID}
                                  )}"
                                  method="post"
                                  onsubmit="return confirm('確定要儲存這個服務類型的修改嗎？');">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="keyword"
                                       th:value="${keyword}">

                                <div class="type-edit-header">

                                    <span class="type-edit-title">
                                        修改服務類型
                                    </span>

                                    <span class="type-id">

                                        類型編號 #

                                        <span th:text="${type.svcTypeID}">
                                            1
                                        </span>

                                    </span>

                                </div>

                                <div class="form-group">

                                    <label th:for="|typeName-${type.svcTypeID}|">
                                        類型名稱
                                    </label>

                                    <input class="form-control"
                                           type="text"
                                           name="typeName"
                                           th:id="|typeName-${type.svcTypeID}|"
                                           th:value="${type.typeName}"
                                           maxlength="50"
                                           required>

                                </div>

                                <div class="form-group">

                                    <label th:for="|description-${type.svcTypeID}|">
                                        類型說明
                                    </label>

                                    <textarea class="form-control"
                                              name="description"
                                              th:id="|description-${type.svcTypeID}|"
                                              th:text="${type.descrip}"
                                              maxlength="255"
                                              placeholder="尚未填寫類型說明"></textarea>

                                </div>

                                <div class="type-edit-actions">

                                    <button class="btn btn--secondary"
                                            type="button"
                                            th:onclick="|closeTypeEditor(${type.svcTypeID})|">
                                        取消
                                    </button>

                                    <button class="btn btn--save"
                                            type="submit">
                                        儲存修改
                                    </button>

                                </div>

                            </form>

                        </article>

                    </div>

                </div>

                <!-- 無資料 -->
                <div class="empty-state"
                     th:if="${serviceTypeList == null
                              or #lists.isEmpty(serviceTypeList)}">

                    <div th:if="${searched}">

                        查無符合「

                        <strong th:text="${keyword}">
                            關鍵字
                        </strong>

                        」的服務類型

                    </div>

                    <div th:if="${!searched}">
                        目前尚未建立服務類型
                    </div>

                </div>

            </section>

        </div>

    </main>

</div>

<script>
    function openTypeEditor(typeId) {

        document
            .querySelectorAll(".type-card.is-editing")
            .forEach(function (card) {

                if (card.id !== "type-card-" + typeId) {
                    closeTypeEditor(
                        card.id.replace("type-card-", "")
                    );
                }
            });

        const card =
                document.getElementById(
                    "type-card-" + typeId
                );

        if (!card) {
            return;
        }

        card.classList.add("is-editing");

        const nameInput =
                document.getElementById(
                    "typeName-" + typeId
                );

        if (nameInput) {
            nameInput.focus();
            nameInput.select();
        }
    }

    function closeTypeEditor(typeId) {

        const card =
                document.getElementById(
                    "type-card-" + typeId
                );

        const form =
                document.getElementById(
                    "type-edit-form-" + typeId
                );

        if (form) {
            form.reset();
        }

        if (card) {
            card.classList.remove("is-editing");
        }
    }
</script>

<script th:if="${searched}">
    window.addEventListener("load", function () {

        const typeList =
                document.getElementById("type-list");

        if (typeList) {
            typeList.scrollIntoView({
                behavior: "auto",
                block: "start"
            });
        }
    });
</script>

</body>
</html>
