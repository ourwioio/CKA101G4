<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服務檢舉列表</title>
    <link rel="stylesheet" th:href="@{/css/back-end/service/serviceReportList.css}">
    <style>
    </style>
</head>
<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->
    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側主要內容區
         ========================= -->
    <main class="wb-admin-content">
        <div class="page">

            <!-- 頁面標題區 -->
            <header class="page-header">
                <h1 class="page-title">服務檢舉列表</h1>
                <p class="page-subtitle">審核、處理會員對平台上架服務的檢舉，維護良好的交易與互動環境</p>
            </header>

            <!-- 狀態篩選 Tabs -->
            <div class="filter-buttons">
                <a th:href="@{/serviceReport/listAllServiceReport}"
                   th:classappend="${currentStatus == null} ? 'active' : ''">
                   全部檢舉
                </a>
                <a th:href="@{/serviceReport/listAllServiceReport(status='0')}"
                   th:classappend="${currentStatus != null && currentStatus == '0'} ? 'active' : ''">
                   未審核
                </a>
                <a th:href="@{/serviceReport/listAllServiceReport(status='1')}"
                   th:classappend="${currentStatus != null && currentStatus == '1'} ? 'active' : ''">
                   已審核通過
                </a>
                <a th:href="@{/serviceReport/listAllServiceReport(status='2')}"
                   th:classappend="${currentStatus != null && currentStatus == '2'} ? 'active' : ''">
                   已審核未通過
                </a>
            </div>

            <!-- 檢舉列表資料面板 -->
            <section class="panel" th:if="${!#lists.isEmpty(serviceReportListData)}">
                
                <div class="panel-header">
                    <h2 class="panel-title">檢舉紀錄清單</h2>
                </div>

                <div class="table-responsive">
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>檢舉編號</th>
                                <th>服務編號</th>
                                <th>檢舉會員</th>
                                <th>處理員工</th>
                                <th>檢舉內容</th>
                                <th>檢舉時間</th>
                                <th>處理時間</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${serviceReportListData}">
                                <td th:text="${report.serviceReportId}">1</td>
                                <td th:text="${report.service != null ? report.service.serviceId : '-'}">1</td>
                                <td th:text="${report.reporterMember != null ? report.reporterMember.memberId : '-'}">1</td>
                                <td th:text="${report.employee != null ? report.employee.employeeId : '尚未處理'}">-</td>
                                <td class="content-cell" th:text="${report.serviceReportCom}" th:title="${report.serviceReportCom}">檢舉內容...</td>
                                <td th:text="${#temporals.format(report.serviceReportTime, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                                <td th:text="${report.serviceReportHandleTime != null ? #temporals.format(report.serviceReportHandleTime, 'yyyy-MM-dd HH:mm') : '尚未處理'}">-</td>
                                <td>
                                    <!-- 動態切換質感膠囊 Badge -->
                                    <span class="status-badge"
                                          th:classappend="${report.serviceReportStatus == 0} ? 'status-pending' : (${report.serviceReportStatus == 1} ? 'status-approved' : 'status-rejected')"
                                          th:text="${report.serviceReportStatus == 0} ? '未審核' : (${report.serviceReportStatus == 1} ? '已審核通過' : '已審核未通過')">
                                        狀態
                                    </span>
                                </td>
                                <td>
                                    <!-- 保持原有的 Session 員工數據讀取，隱藏處理使其不干擾表格結構 -->
                                    <div style="display: none;">
                                        <p th:text="${session.employeeVO?.employeeId}"></p>
                                        <input type="hidden" name="employee.employeeId" th:value="${session.employeeVO?.employeeId}" />
                                    </div>
                                    
                                    <!-- 處理提交表單 -->
                                    <form th:action="@{/serviceReport/getOne_For_update}" method="post" style="display: inline-block; margin: 0;">
                                        <input type="hidden" name="serviceReportId" th:value="${report.serviceReportId}"/>
                                        <button type="submit" class="btn-process">處理</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 空狀態提示 -->
            <div class="empty-msg" th:if="${#lists.isEmpty(serviceReportListData)}">
                目前沒有任何檢舉紀錄
            </div>

        </div>
    </main>

</div>

</body>
</html>
