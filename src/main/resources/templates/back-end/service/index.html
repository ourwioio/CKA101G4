<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>服務模組後台管理</title>

    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #222;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px 32px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 8px 0 0;
            color: #cbd5e1;
        }

        main {
            padding: 24px 32px;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .nav a {
            text-decoration: none;
            background: #111827;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 22px;
        }

        .btn {
            text-decoration: none;
            display: inline-block;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 14px;
        }

        .btn.gray {
            background: #6b7280;
        }

        .btn.red {
            background: #dc2626;
        }

        .btn.green {
            background: #16a34a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f3f4f6;
            font-weight: bold;
        }

        .msg-success {
            color: #15803d;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .msg-error {
            color: #b91c1c;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .empty {
            color: #6b7280;
            padding: 16px 0;
        }

        form {
            display: inline;
        }
    </style>
</head>
<body>

<header>
    <h1>服務模組後台管理</h1>
    <p>整合管理服務類型、服務項目與服務時段</p>
</header>

<main>

    <p th:if="${successMsg}" th:text="${successMsg}" class="msg-success"></p>
    <p th:if="${errorMsg}" th:text="${errorMsg}" class="msg-error"></p>

    <div class="nav">
        <a href="#serviceTypes">服務類型</a>
        <a href="#services">服務項目</a>
        <a href="#serviceSlots">服務時段</a>
        <a th:href="@{/}">回首頁</a>
    </div>

    <!-- 服務類型 -->
    <section id="serviceTypes" class="section">
        <div class="section-header">
            <h2>服務類型 Service Type</h2>
            <a class="btn green" th:href="@{/service-types/new}">新增服務類型</a>
        </div>

        <table th:if="${serviceTypeList != null and !#lists.isEmpty(serviceTypeList)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>類型名稱</th>
                    <th>描述</th>
                    <th>模式</th>
                    <th>圖片路徑</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="type : ${serviceTypeList}">
                    <td th:text="${type.svcTypeID}"></td>
                    <td th:text="${type.typeName}"></td>
                    <td th:text="${type.descrip}"></td>
                    <td th:text="${type.typeMode == 0 ? '動態' : '靜態'}"></td>
                    <td th:text="${type.imgURL}"></td>
                    <td>
                        <a class="btn gray" th:href="@{/service-types/{id}(id=${type.svcTypeID})}">查看</a>
                        <a class="btn" th:href="@{/service-types/{id}/edit(id=${type.svcTypeID})}">修改</a>
                        <form th:action="@{/service-types/{id}/delete(id=${type.svcTypeID})}" method="post">
                            <button class="btn red" type="submit" onclick="return confirm('確定刪除此服務類型？')">
                                刪除
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${serviceTypeList == null or #lists.isEmpty(serviceTypeList)}">
            目前沒有服務類型資料
        </div>
    </section>

    <!-- 服務項目 -->
    <section id="services" class="section">
        <div class="section-header">
            <h2>服務項目 Service</h2>
            <a class="btn green" th:href="@{/services/new}">新增服務</a>
        </div>

        <table th:if="${serviceList != null and !#lists.isEmpty(serviceList)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>類型</th>
                    <th>會員ID</th>
                    <th>服務名稱</th>
                    <th>描述</th>
                    <th>費率</th>
                    <th>狀態</th>
                    <th>建立時間</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="service : ${serviceList}">
                    <td th:text="${service.serviceId}"></td>
                    <td th:text="${service.serviceTypeId}"></td>
                    <td th:text="${service.memberId}"></td>
                    <td th:text="${service.serviceName}"></td>
                    <td th:text="${service.description}"></td>
                    <td th:text="${service.hourlyRate}"></td>
                    <td th:text="${service.status == 1 ? '上架' : '下架'}"></td>
                    <td th:text="${service.createdAt}"></td>
                    <td>
                        <a class="btn gray" th:href="@{/services/{id}(id=${service.serviceId})}">查看</a>
                        <a class="btn" th:href="@{/services/{id}/edit(id=${service.serviceId})}">修改</a>
                        <form th:action="@{/services/{id}/delete(id=${service.serviceId})}" method="post">
                            <button class="btn red" type="submit" onclick="return confirm('確定刪除此服務？')">
                                刪除
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${serviceList == null or #lists.isEmpty(serviceList)}">
            目前沒有服務資料
        </div>
    </section>

    <!-- 服務時段 -->
    <section id="serviceSlots" class="section">
        <div class="section-header">
            <h2>服務時段 Service Slot</h2>
            <a class="btn green" th:href="@{/service-slots/new}">新增服務時段</a>
        </div>

        <table th:if="${serviceSlotList != null and !#lists.isEmpty(serviceSlotList)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>服務ID</th>
                    <th>開始時間</th>
                    <th>結束時間</th>
                    <th>狀態</th>
                    <th>鎖定到期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="slot : ${serviceSlotList}">
                    <td th:text="${slot.serviceSlotId}"></td>
                    <td th:text="${slot.serviceId}"></td>
                    <td th:text="${slot.startTime}"></td>
                    <td th:text="${slot.endTime}"></td>
                    <td>
                        <span th:if="${slot.slotStatus == 0}">可預約</span>
                        <span th:if="${slot.slotStatus == 1}">暫時鎖定</span>
                        <span th:if="${slot.slotStatus == 2}">已預約</span>
                    </td>
                    <td th:text="${slot.lockExpiresAt}"></td>
                    <td>
                        <a class="btn gray" th:href="@{/service-slots/{id}(id=${slot.serviceSlotId})}">查看</a>
                        <a class="btn" th:href="@{/service-slots/{id}/edit(id=${slot.serviceSlotId})}">修改</a>
                        <form th:action="@{/service-slots/{id}/delete(id=${slot.serviceSlotId})}" method="post">
                            <button class="btn red" type="submit" onclick="return confirm('確定刪除此服務時段？')">
                                刪除
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${serviceSlotList == null or #lists.isEmpty(serviceSlotList)}">
            目前沒有服務時段資料
        </div>
    </section>

</main>

</body>
</html>
