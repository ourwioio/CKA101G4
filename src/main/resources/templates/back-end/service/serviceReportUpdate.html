<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>處理服務檢舉</title>
<style>
    body {
        font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
        background: #f4f5f9;
        margin: 0;
        padding: 40px;
        color: #2d2d3a;
    }
    .container {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    h2 {
        margin-top: 0;
        margin-bottom: 24px;
        color: #4b3f9e;
    }
    .info-block {
        background: #f8f7ff;
        border: 1px solid #e6e2fb;
        border-radius: 8px;
        padding: 16px 20px;
        margin-bottom: 24px;
    }
    .info-row {
        display: flex;
        padding: 6px 0;
        font-size: 14px;
        border-bottom: 1px dashed #e6e2fb;
    }
    .info-row:last-child {
        border-bottom: none;
    }
    .info-row .label {
        width: 100px;
        color: #6c5ce7;
        font-weight: 600;
        flex-shrink: 0;
    }
    .edit-form .form-group {
        margin-bottom: 20px;
    }
    .edit-form label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
    }
    .edit-form select,
    .edit-form input[type="datetime-local"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
    }
    .edit-form select:focus,
    .edit-form input:focus {
        outline: none;
        border-color: #6c5ce7;
    }
    .error-msg {
        display: block;
        color: #b42318;
        font-size: 12px;
        margin-top: 4px;
    }
    .error-banner {
        background: #fbdada;
        color: #b42318;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .hint {
        font-size: 12px;
        color: #888;
        margin: 6px 0 0;
    }
    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
    }
    .btn-submit {
        background: #6c5ce7;
        color: #fff;
        border: none;
        padding: 10px 22px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }
    .btn-submit:hover {
        background: #5a4bd1;
    }
    .btn-cancel {
        display: inline-flex;
        align-items: center;
        padding: 10px 22px;
        border-radius: 6px;
        font-size: 14px;
        color: #6c5ce7;
        text-decoration: none;
        border: 1px solid #6c5ce7;
    }
    .btn-cancel:hover {
        background: #f8f7ff;
    }
</style>
</head>
<body>
<div class="container">
    <h2>處理服務檢舉</h2>

    <div class="info-block">
        <div class="info-row">
            <span class="label">檢舉編號</span>
            <span th:text="${serviceReportVO.serviceReportId}">1</span>
        </div>
        <div class="info-row">
            <span class="label">訂單編號</span>
            <span th:text="${serviceReportVO.serviceOrder != null ? serviceReportVO.serviceOrder.serviceOrderId : '-'}">1</span>
        </div>
        <div class="info-row">
            <span class="label">檢舉會員</span>
            <span th:text="${serviceReportVO.reporterMember != null ? serviceReportVO.reporterMember.memberId : '-'}">1</span>
        </div>
        <div class="info-row">
            <span class="label">檢舉內容</span>
            <span th:text="${serviceReportVO.serviceReportCom}">檢舉內容...</span>
        </div>
        <div class="info-row">
            <span class="label">檢舉時間</span>
            <span th:text="${#dates.format(serviceReportVO.serviceReportTime, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
        </div>
        <div class="info-row" th:if="${serviceReportVO.serviceReportHandleTime != null}">
            <span class="label">上次處理時間</span>
            <span th:text="${#dates.format(serviceReportVO.serviceReportHandleTime, 'yyyy-MM-dd HH:mm')}">-</span>
        </div>
    </div>

    <p class="error-banner" th:if="${errorMessage != null}" th:text="${errorMessage}">錯誤訊息</p>

    <form th:action="@{/serviceReport/update}" th:object="${serviceReportVO}" method="post" class="edit-form">
        <input type="hidden" th:field="*{serviceReportId}"/>

        <div class="form-group">
            <label for="status">處理狀態</label>
            <select id="status" th:field="*{serviceReportStatus}">
                <option value="0" th:if="${serviceReportVO.serviceReportStatus == 0}">未審核</option>
                <option value="1">已審核通過</option>
                <option value="2">已審核未通過</option>
            </select>
            <span class="error-msg" th:if="${#fields.hasErrors('serviceReportStatus')}" th:errors="*{serviceReportStatus}"></span>
            <p class="hint" th:if="${serviceReportVO.serviceReportStatus != 0}">此檢舉已審核過，無法改回未審核狀態</p>
        </div>

        

        <div class="form-actions">
            <button type="submit" class="btn-submit">送出處理結果</button>
            <a th:href="@{/serviceReport/listAllServiceReport}" class="btn-cancel">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
