<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>處理服務檢舉</title>
<link rel="stylesheet" th:href="@{/css/back-end/service/serviceReportUpdate.css}">
<style>
</style>
</head>
<body>
<div class="container">
    <h2>處理服務檢舉</h2>

    <div class="info-block">
        <div class="info-row">
            <span class="label">檢舉編號</span>
            <span th:text="${serviceReportVO.serviceReportId}">1</span>
        </div>
        <div class="info-row">
            <span class="label">服務編號</span>
            <button><a th:href="@{/front/services/{id}(id=${serviceReportVO.service.serviceId})}" th:text="${serviceReportVO.service != null ? serviceReportVO.service.serviceId : '-'}" target="_blank"></a></button>
            
        </div>
        <div class="info-row">
            <span class="label">檢舉會員</span>
            <span th:text="${serviceReportVO.reporterMember != null ? serviceReportVO.reporterMember.memberId : '-'}">1</span>
        </div>
        <div class="info-row">
            <span class="label">檢舉內容</span>
            <span th:text="${serviceReportVO.serviceReportCom}">檢舉內容...</span>
        </div>
        <div class="info-row">
            <span class="label">檢舉時間</span>
            <span th:text="${#temporals.format(serviceReportVO.serviceReportTime, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
        </div>
        <div class="info-row" th:if="${serviceReportVO.serviceReportHandleTime != null}">
            <span class="label">處理時間</span>
            <span th:text="${#temporals.format(serviceReportVO.serviceReportHandleTime, 'yyyy-MM-dd HH:mm')}">-</span>
        </div>
    </div>

    <p class="error-banner" th:if="${errorMessage != null}" th:text="${errorMessage}">錯誤訊息</p>

    <form th:action="@{/serviceReport/update}" th:object="${serviceReportVO}" method="post" class="edit-form">
        <input type="hidden" th:field="*{serviceReportId}"/>

        <div class="form-group">
            <label for="status">處理狀態</label>
            <select id="status" th:field="*{serviceReportStatus}">
                <option value="0" th:if="${serviceReportVO.serviceReportStatus == 0}">未審核</option>
                <option value="1">已審核通過</option>
                <option value="2">已審核未通過</option>
            </select>
            <span class="error-msg" th:if="${#fields.hasErrors('serviceReportStatus')}" th:errors="*{serviceReportStatus}"></span>
            <p class="hint" th:if="${serviceReportVO.serviceReportStatus != 0}">此檢舉已審核過，無法修改審核狀態</p>
        </div>

        

        <div class="form-actions">
            <button th:if="${serviceReportVO.serviceReportStatus == 0}" type="submit" class="btn-submit">送出處理結果</button>
            <a th:href="@{/serviceReport/listAllServiceReport}" class="btn-cancel">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
