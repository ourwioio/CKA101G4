<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>後台服務管理</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .page {
            width: min(1380px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .page-subtitle {
            margin: 7px 0 0;
            color: #69727b;
            font-size: 14px;
        }

        /* =========================
           員工資訊
           ========================= */

        .employee-panel {
            min-width: 280px;
            padding: 16px 18px;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 16px
                    rgba(0, 0, 0, 0.05);
        }

        .employee-label {
            margin-bottom: 6px;
            color: #7b838b;
            font-size: 13px;
        }

        .employee-id {
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 800;
        }

        .employee-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .employee-switch-form {
            display: flex;
            gap: 8px;
        }

        .employee-switch-form input {
            width: 105px;
            height: 38px;
            padding: 0 10px;
            border: 1px solid #d9dee5;
            border-radius: 8px;
        }

        /* =========================
           訊息
           ========================= */

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            font-weight: 700;
        }

        .message--success {
            color: #176b45;
            background: #e8f8ef;
            border: 1px solid #b7e4ca;
        }

        .message--error {
            color: #a12622;
            background: #fff0ef;
            border: 1px solid #f3c0bd;
        }

        /* =========================
           共用卡片
           ========================= */

        .panel {
            margin-bottom: 22px;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 15px
                    rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 17px 20px;
            border-bottom: 1px solid #e7eaee;
        }

        .panel-title {
            margin: 0;
            font-size: 20px;
        }

        .panel-description {
            color: #69727b;
            font-size: 13px;
        }

        .panel-body {
            padding: 20px;
        }

        /* =========================
           新增服務類型
           ========================= */

        .type-form {
            display: grid;
            grid-template-columns:
                    minmax(180px, 1fr)
                    minmax(260px, 2fr)
                    auto;
            align-items: end;
            gap: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            font-weight: 800;
        }

        .form-control {
            width: 100%;
            min-height: 42px;
            padding: 9px 11px;
            border: 1px solid #d9dee5;
            border-radius: 8px;
            background: #ffffff;
        }

        textarea.form-control {
            min-height: 42px;
            max-height: 120px;
            resize: vertical;
        }

        .form-control:focus {
            border-color: #6c5ce7;
            outline: 2px solid
                    rgba(108, 92, 231, 0.15);
        }

        /* =========================
           按鈕
           ========================= */

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 13px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            transition:
                    transform 0.15s ease,
                    background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn--primary {
            color: #ffffff;
            background: #6c5ce7;
        }

        .btn--primary:hover {
            background: #5748c8;
        }

        .btn--danger {
            color: #ffffff;
            background: #d63031;
        }

        .btn--danger:hover {
            background: #b92526;
        }

        .btn--success {
            color: #ffffff;
            background: #00a878;
        }

        .btn--success:hover {
            background: #008f66;
        }

        .btn--secondary {
            color: #4f5964;
            background: #edf0f3;
        }

        .btn--secondary:hover {
            background: #dfe4e8;
        }

        .btn--detail {
            color: #5a4acb;
            background: #efedff;
        }

        .btn--detail:hover {
            background: #e1ddff;
        }

        /* =========================
           服務類型列表
           ========================= */

        .type-grid {
            display: grid;
            grid-template-columns:
                    repeat(auto-fill, minmax(230px, 1fr));
            gap: 12px;
        }

        .type-card {
            padding: 16px;
            background: #f8f9fb;
            border: 1px solid #e3e6ea;
            border-radius: 10px;
        }

        .type-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .type-name {
            font-size: 16px;
            font-weight: 800;
        }

        .type-id {
            color: #7f8790;
            font-size: 12px;
        }

        .type-description {
            color: #69727b;
            font-size: 13px;
            line-height: 1.6;
        }

        /* =========================
           狀態標籤
           ========================= */

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .badge--active {
            color: #166534;
            background: #dcfce7;
        }

        .badge--inactive {
            color: #9a3412;
            background: #ffedd5;
        }

        .badge--archived {
            color: #475569;
            background: #e2e8f0;
        }

        .badge--disabled {
            color: #991b1b;
            background: #fee2e2;
        }

        /* =========================
           服務表格
           ========================= */

        .table-scroll {
            width: 100%;
            overflow-x: auto;
        }

        .service-table {
            width: 100%;
            min-width: 1000px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .service-table th,
        .service-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #edf0f2;
            vertical-align: middle;
            text-align: left;
            font-size: 13px;
            word-break: break-word;
        }

        .service-table th {
            color: #4f5964;
            background: #f7f8fa;
            font-weight: 800;
        }

        .service-table tbody tr:hover {
            background: #fafaff;
        }

        .service-table tbody tr:last-child td {
            border-bottom: 0;
        }

        .col-id {
            width: 75px;
        }

        .col-service {
            width: 210px;
        }

        .col-type {
            width: 140px;
        }

        .col-member {
            width: 100px;
        }

        .col-price {
            width: 120px;
        }

        .col-status {
            width: 110px;
        }

        .col-created {
            width: 150px;
        }

        .col-action {
            width: 220px;
        }

        .service-name {
            font-weight: 800;
        }

        .service-description {
            margin-top: 5px;
            color: #77808a;
            font-size: 12px;
            line-height: 1.5;

            display: -webkit-box;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .price {
            font-weight: 800;
            white-space: nowrap;
        }

        .action-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 7px;
        }

        .action-form {
            display: inline-block;
            margin: 0;
        }

        .no-action {
            color: #9aa1a8;
        }

        .empty-state {
            padding: 48px 20px;
            color: #69727b;
            text-align: center;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 1000px) {
            .type-form {
                grid-template-columns:
                        repeat(2, minmax(0, 1fr));
            }

            .type-form .btn {
                width: fit-content;
            }
        }

        @media (max-width: 800px) {
            .page-header {
                flex-direction: column;
            }

            .employee-panel {
                width: 100%;
            }
        }

        @media (max-width: 620px) {
            .page {
                width: calc(100% - 20px);
                padding-top: 16px;
            }

            .type-form {
                grid-template-columns: 1fr;
            }

            .type-form .btn {
                width: 100%;
            }

            .employee-switch-form {
                width: 100%;
            }

            .employee-switch-form input {
                flex: 1;
                width: auto;
            }
        }
    </style>
</head>

<body>

<div class="page">

    <!-- =========================
         標題與員工 Session
         ========================= -->

    <header class="page-header">

        <div>
            <h1 class="page-title">
                後台服務管理
            </h1>

            <p class="page-subtitle">
                查看平台服務、新增服務類型及停用違規服務
            </p>
        </div>

        <div class="employee-panel">

            <div class="employee-label">
                目前登入員工
            </div>

            <div class="employee-id">
                員工 #
                <span th:text="${loginEmployeeId}">
                    1001
                </span>
            </div>

            <div class="employee-actions">

                <form class="employee-switch-form"
                      th:action="@{/admin/services/fake-login}"
                      method="get">

                    <input type="number"
                           name="employeeId"
                           min="1"
                           placeholder="員工 ID"
                           required>

                    <button class="btn btn--secondary"
                            type="submit">
                        切換員工
                    </button>

                </form>

                <a class="btn btn--secondary"
                   th:href="@{/admin/services/fake-logout}">
                    重設 Session
                </a>

            </div>

        </div>

    </header>

    <!-- =========================
         成功與錯誤訊息
         ========================= -->

    <div class="message message--success"
         th:if="${successMsg != null}"
         th:text="${successMsg}">
        操作成功
    </div>

    <div class="message message--error"
         th:if="${errorMsg != null}"
         th:text="${errorMsg}">
        操作失敗
    </div>

    <!-- =========================
         新增服務類型
         ========================= -->

    <section class="panel">

        <div class="panel-header">

            <h2 class="panel-title">
                新增服務類型
            </h2>

            <span class="panel-description">
                服務類型新增後，可供會員上架服務時選擇
            </span>

        </div>

        <div class="panel-body">

            <form class="type-form"
                  th:action="@{/admin/services/types/add}"
                  method="post">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-group">

                    <label for="typeName">
                        類型名稱
                    </label>

                    <input id="typeName"
                           class="form-control"
                           type="text"
                           name="typeName"
                           maxlength="50"
                           placeholder="例如：運動陪伴"
                           required>

                </div>

                <div class="form-group">

                    <label for="description">
                        類型說明
                    </label>

                    <textarea id="description"
                              class="form-control"
                              name="description"
                              maxlength="255"
                              placeholder="簡單描述此服務類型"></textarea>

                </div>

                <button class="btn btn--primary"
                        type="submit">
                    新增類型
                </button>

            </form>

        </div>

    </section>

    <!-- =========================
         現有服務類型
         ========================= -->

    <section class="panel">

        <div class="panel-header">

            <h2 class="panel-title">
                現有服務類型
            </h2>

            <span class="panel-description">
                共
                <strong th:text="${serviceTypeList != null
                        ? #lists.size(serviceTypeList)
                        : 0}">
                    0
                </strong>
                種
            </span>

        </div>

        <div class="panel-body"
             th:if="${serviceTypeList != null
                      and !#lists.isEmpty(serviceTypeList)}">

            <div class="type-grid">

                <article class="type-card"
                         th:each="type : ${serviceTypeList}">

                    <div class="type-card__header">

                        <span class="type-name"
                              th:text="${type.typeName}">
                            運動陪伴
                        </span>

                        <span class="type-id">
                            #
                            <span th:text="${type.svcTypeID}">
                                1
                            </span>
                        </span>

                    </div>

                    <div class="type-description"
                         th:text="${type.descrip != null
                                  and !#strings.isEmpty(type.descrip)
                                  ? type.descrip
                                  : '尚未填寫類型說明'}">
                        類型說明
                    </div>

                </article>

            </div>

        </div>

        <div class="empty-state"
             th:if="${serviceTypeList == null
                      or #lists.isEmpty(serviceTypeList)}">
            目前尚未建立服務類型
        </div>

    </section>

    <!-- =========================
         全部服務
         ========================= -->

    <section class="panel">

        <div class="panel-header">

            <h2 class="panel-title">
                全部服務
            </h2>

            <span class="panel-description">
                共
                <strong th:text="${serviceList != null
                        ? #lists.size(serviceList)
                        : 0}">
                    0
                </strong>
                筆
            </span>

        </div>

        <div class="table-scroll"
             th:if="${serviceList != null
                      and !#lists.isEmpty(serviceList)}">

            <table class="service-table">

                <thead>
                <tr>
                    <th class="col-id">
                        編號
                    </th>

                    <th class="col-service">
                        服務資訊
                    </th>

                    <th class="col-type">
                        服務類型
                    </th>

                    <th class="col-member">
                        賣家
                    </th>

                    <th class="col-price">
                        每小時費率
                    </th>

                    <th class="col-status">
                        狀態
                    </th>

                    <th class="col-created">
                        建立時間
                    </th>

                    <th class="col-action">
                        操作
                    </th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="service : ${serviceList}">

                    <!-- 服務編號 -->
                    <td th:text="${service.serviceId}">
                        1
                    </td>

                    <!-- 服務名稱與說明 -->
                    <td>

                        <div class="service-name"
                             th:text="${service.serviceName != null
                                      ? service.serviceName
                                      : '未命名服務'}">
                            咖啡聊天
                        </div>

                        <div class="service-description"
                             th:text="${service.description != null
                                      and !#strings.isEmpty(service.description)
                                      ? service.description
                                      : '尚未填寫服務說明'}">
                            服務說明
                        </div>

                    </td>

                    <!-- 服務類型 -->
                    <td>

                        <span th:if="${service.serviceType != null}"
                              th:text="${service.serviceType.typeName}">
                            陪伴聊天
                        </span>

                        <span th:if="${service.serviceType == null}">
                            未分類
                        </span>

                    </td>

                    <!-- 賣家會員 -->
                    <td>
                        會員 #
                        <strong th:text="${service.memberId}">
                            1
                        </strong>
                    </td>

                    <!-- 費率 -->
                    <td class="price">
                        NT$
                        <span th:text="${#numbers.formatInteger(
                                service.hourlyRate != null
                                    ? service.hourlyRate
                                    : 0,
                                1,
                                'COMMA'
                        )}">
                            500
                        </span>
                        / 時
                    </td>

                    <!-- 狀態 -->
                    <td>

                        <span class="badge badge--inactive"
                              th:if="${service.status == 0}">
                            會員下架
                        </span>

                        <span class="badge badge--active"
                              th:if="${service.status == 1}">
                            上架中
                        </span>

                        <span class="badge badge--archived"
                              th:if="${service.status == 2}">
                            已封存
                        </span>

                        <span class="badge badge--disabled"
                              th:if="${service.status == 3}">
                            平台停用
                        </span>

                        <span class="badge badge--archived"
                              th:if="${service.status == null}">
                            未設定
                        </span>

                    </td>

                    <!-- 建立時間 -->
                    <td>

                        <span th:if="${service.createdAt != null}"
                              th:text="${#temporals.format(
                                      service.createdAt,
                                      'yyyy-MM-dd HH:mm'
                              )}">
                            2026-07-15 14:30
                        </span>

                        <span th:if="${service.createdAt == null}">
                            未紀錄
                        </span>

                    </td>

                    <!-- 操作 -->
                    <td>

                        <div class="action-group">

                            <a class="btn btn--detail"
                               th:href="@{/admin/services/{serviceId}(
                                       serviceId=${service.serviceId}
                               )}">
                                查看詳情
                            </a>

                            <!--
                                status 0：會員下架
                                status 1：上架中
                            -->
                            <form class="action-form"
                                  th:if="${service.status == 0
                                           or service.status == 1}"
                                  th:action="@{/admin/services/{serviceId}/disable(
                                          serviceId=${service.serviceId}
                                  )}"
                                  method="post"
                                  onsubmit="return confirm('確定要由平台停用這筆服務嗎？');">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <button class="btn btn--danger"
                                        type="submit">
                                    平台停用
                                </button>

                            </form>

                            <!-- status 3 才能恢復 -->
                            <form class="action-form"
                                  th:if="${service.status == 3}"
                                  th:action="@{/admin/services/{serviceId}/restore(
                                          serviceId=${service.serviceId}
                                  )}"
                                  method="post"
                                  onsubmit="return confirm('確定要恢復這筆服務上架嗎？');">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <button class="btn btn--success"
                                        type="submit">
                                    恢復上架
                                </button>

                            </form>

                            <span class="no-action"
                                  th:if="${service.status == 2}">
                                已封存，不可操作
                            </span>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <div class="empty-state"
             th:if="${serviceList == null
                      or #lists.isEmpty(serviceList)}">
            目前沒有任何服務
        </div>

    </section>

</div>

</body>
</html>
