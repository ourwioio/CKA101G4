<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>服務列表</title>
<style>
body { font-family: Arial, "Microsoft JhengHei"; padding: 24px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 8px; }
th { background: #f2f2f2; }
.error { color: red; }
.success { color: green; }
a, button { margin-right: 6px; }
</style>
</head>
<body>

<h1>服務列表</h1>

<p class="success" th:if="${successMsg}" th:text="${successMsg}"></p>
<p class="error" th:if="${errorMsg}" th:text="${errorMsg}"></p>

<p>
    <a th:href="@{/services/new}">新增服務</a> |
    <a th:href="@{/service-types}">服務類型管理</a> |
    <a th:href="@{/service-slots}">服務時段管理</a>
</p>

<h3>依服務類型篩選</h3>
<a th:href="@{/services}">全部</a>
<span th:each="type : ${serviceTypeList}">
    |
    <a th:href="@{/services/by-type/{id}(id=${type.svcTypeID})}"
       th:text="${type.typeName}">
    </a>
</span>

<hr>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>類型ID</th>
            <th>會員ID</th>
            <th>服務名稱</th>
            <th>描述</th>
            <th>費率</th>
            <th>狀態</th>
            <th>建立時間</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="service : ${serviceList}">
            <td th:text="${service.serviceId}"></td>
            <td th:text="${service.serviceTypeId}"></td>
            <td th:text="${service.memberId}"></td>
            <td th:text="${service.serviceName}"></td>
            <td th:text="${service.description}"></td>
            <td th:text="${service.hourlyRate}"></td>
            <td th:text="${service.status == 1 ? '上架' : '下架'}"></td>
            <td th:text="${service.createdAt}"></td>
            <td>
                <a th:href="@{/services/{id}(id=${service.serviceId})}">查看</a>
                <a th:href="@{/services/{id}/edit(id=${service.serviceId})}">修改</a>

                <form th:action="@{/services/{id}/delete(id=${service.serviceId})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit" onclick="return confirm('確定刪除？')">刪除</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<p th:if="${serviceList == null or #lists.isEmpty(serviceList)}">
    目前沒有服務資料
</p>

</body>
</html>
