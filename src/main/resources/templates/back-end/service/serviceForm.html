<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${mode == 'edit' ? '修改服務' : '新增服務'}">服務表單</title>
<style>
body { font-family: Arial, "Microsoft JhengHei"; padding: 24px; }
div { margin-bottom: 12px; }
label { display: inline-block; width: 100px; }
.error { color: red; margin-left: 8px; }
</style>
</head>
<body>

<h1 th:text="${mode == 'edit' ? '修改服務' : '新增服務'}"></h1>

<form th:object="${serviceRequest}"
      th:action="${mode == 'edit'} ? @{/services/{id}/edit(id=${serviceId})} : @{/services}"
      method="post">

    <div>
        <label>服務類型</label>
        <select th:field="*{serviceTypeId}">
            <option value="">請選擇</option>
            <option th:each="type : ${serviceTypeList}"
                    th:value="${type.svcTypeID}"
                    th:text="${type.typeName}">
            </option>
        </select>
        <span class="error" th:if="${errors != null and errors['serviceTypeId'] != null}"
              th:text="${errors['serviceTypeId']}"></span>
    </div>

    <div>
        <label>會員ID</label>
        <input type="number" th:field="*{memberId}">
        <span class="error" th:if="${errors != null and errors['memberId'] != null}"
              th:text="${errors['memberId']}"></span>
    </div>

    <div>
        <label>服務名稱</label>
        <input type="text" th:field="*{serviceName}">
        <span class="error" th:if="${errors != null and errors['serviceName'] != null}"
              th:text="${errors['serviceName']}"></span>
    </div>

    <div>
        <label>描述</label>
        <textarea th:field="*{description}" rows="4" cols="40"></textarea>
        <span class="error" th:if="${errors != null and errors['description'] != null}"
              th:text="${errors['description']}"></span>
    </div>

    <div>
        <label>費率</label>
        <input type="number" th:field="*{hourlyRate}">
        <span class="error" th:if="${errors != null and errors['hourlyRate'] != null}"
              th:text="${errors['hourlyRate']}"></span>
    </div>

    <div>
        <label>狀態</label>
        <select th:field="*{status}">
            <option value="">請選擇</option>
            <option value="1">上架</option>
            <option value="0">下架</option>
        </select>
        <span class="error" th:if="${errors != null and errors['status'] != null}"
              th:text="${errors['status']}"></span>
    </div>

    <button type="submit" th:text="${mode == 'edit' ? '確認修改' : '確認新增'}"></button>
    <a th:href="@{/services}">取消</a>

</form>

</body>
</html>
