<!DOCTYPE html>
<!-- 🌟 修正：Thymeleaf 官方標準命名空間網址為 http://www.thymeleaf.org -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>忘記密碼</title>
<style>
body {
	font-family: system-ui, sans-serif;
	background-color: #f3f4f6;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	margin: 0;
}

.card {
	background: white;
	padding: 30px;
	border-radius: 8px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
	width: 350px;
}

h2 {
	margin-top: 0;
	color: #1f2937;
	text-align: center;
}

p {
	color: #6b7280;
	font-size: 14px;
	text-align: center;
	margin-bottom: 25px;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
	font-size: 14px;
	color: #374151;
}

input[type="text"], input[type="email"], input[type="password"] {
	width: 100%;
	padding: 8px;
	border: 1px solid #d1d5db;
	border-radius: 4px;
	box-sizing: border-box;
}

.error-msg {
	color: #dc2626;
	font-size: 12px;
	margin-top: 5px;
	font-weight: bold;
}

.success-msg {
	color: #16a34a;
	font-size: 14px;
	margin-top: 5px;
	font-weight: bold;
	text-align: center;
	background-color: #f0fdf4;
	padding: 10px;
	border-radius: 4px;
	border: 1px solid #bbf7d0;
}

.btn-submit {
	width: 100%;
	background-color: #2563eb;
	color: white;
	border: none;
	padding: 10px;
	border-radius: 4px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 15px;
}

.btn-back {
	width: 100%;
	background-color: #e5e7eb;
	color: #4b5563;
	border: none;
	padding: 10px;
	border-radius: 4px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 8px;
	text-align: center;
	display: block;
	text-decoration: none;
	font-size: 14px;
	box-sizing: border-box;
}
</style>
</head>
<body>

	<div class="card">
		<h2>忘記密碼</h2>
		<!-- 🌟 提示文字微調，方便你測試 Gmail -->
		<p>請輸入您的員工帳號，系統將寄送重設密碼連結至您的信箱。</p>

		<!-- 成功提示區塊 -->
		<div th:if="${message}" th:text="${message}" class="success-msg" style="margin-bottom: 15px;"></div>

		<!-- 錯誤提示區塊 -->
		<div th:if="${errorMessage}" th:text="${errorMessage}" class="error-msg" style="text-align: center; margin-bottom: 15px;"></div>

		<form th:action="@{/admin/forgotPassword}" method="POST" th:if="${message == null}">

			<div class="form-group">
				<label>員工帳號 ：</label> 
				<input type="email" name="username" required placeholder="例如：yourname@webond.com">
			</div>

			<button type="submit" class="btn-submit">發送重設郵件</button>
		</form>

		<a th:href="@{/admin/login}" class="btn-back">返回登入</a>
	</div>

</body>
</html>
