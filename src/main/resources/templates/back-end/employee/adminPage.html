<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>後台管理系統</title>
</head>
<body>

    <!-- 修正：加上 padding-bottom: 15px，確保最下面會留出安全距離 -->
    <td th:fragment="sidebar" style="width: 200px; vertical-align: top; white-space: nowrap; text-align: center; height: 100%; padding: 15px 10px 15px 10px; box-sizing: border-box;">
        
        <!-- 確保高度 100% 拉滿 -->
        <div style="display: flex; flex-direction: column; height: 100%; min-height: 450px; justify-content: flex-start; box-sizing: border-box;">
            
            <!-- 上半部：管理項目項目 -->
            <div>
                <h3 style="margin-top: 10px;">後台管理系統</h3>
                <ul style="list-style: none; padding: 0; margin: 0;">
                    <li style="padding-bottom: 10px; border-bottom: 1px solid #ccc; margin-bottom: 10px;">
                        <a th:href="@{/admin/empPage}" style="text-decoration: none; color: blue;">員工管理系统</a>
                    </li>
                    <li style="padding-bottom: 10px; border-bottom: 1px solid #ccc; margin-bottom: 10px;">
                        <a th:href="@{/admin/empPermPage}" style="text-decoration: none; color: blue;">員工權限管理</a>
                    </li>
                    <li style="padding-bottom: 10px; border-bottom: 1px solid #ccc; margin-bottom: 10px;">
                        <a th:href="@{/admin/actRptList}" style="text-decoration: none; color: blue;">活動檢舉審核</a>
                    </li>
                </ul>
            </div>

            <div style="margin-top: auto; padding: 0 5px; width: 100%; box-sizing: border-box;">
                <form th:action="@{/admin/logout}" method="post" style="margin: 0; display: block; width: 100%;">
                    <!-- 修正：加回圓角 border-radius: 4px，讓獨立方塊按鈕更好看 -->
                    <button type="submit" style="width: 100%; padding: 10px 0; cursor: pointer; font-weight: bold; background-color: #dc3545; color: white; border: none; border-radius: 4px; font-size: 14px; transition: background-color 0.2s; display: block; margin: 0;"
                            onmouseover="this.style.backgroundColor='#bd2130';"
                            onmouseout="this.style.backgroundColor='#dc3545';">
                        登出系統
                    </button>
                </form>
            </div>
            
        </div>
        
        
    </td>
    
    

</body>
</html>
