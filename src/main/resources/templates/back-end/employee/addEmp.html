<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
	xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Fragment - Add Employee</title>
</head>
<body>

	<!-- ================= 新增員工燈箱內容片段 ================= -->
	<div th:fragment="addContent" class="modal-content-wrapper">

		<h3>新增員工資料</h3>

		<form th:action="@{/admin/employees/add}" method="POST"
			th:object="${addEmployeeVO}" enctype="multipart/form-data">
	<input type="hidden" name="currentPage" th:value="${currentPage}">
        <input type="hidden" name="searchEmpName" th:value="${currentEmpName}">
        <input type="hidden" name="searchRoleTitle" th:value="${currentRoleTitle}">
        <input type="hidden" name="searchEmpStatus" th:value="${currentEmpStatus}">

			<!-- 姓名 -->
			<div class="form-group">
				<label>員工姓名</label> <input type="text" th:field="*{empName}"
					class="form-control" placeholder="請輸入姓名"> <span
					th:if="${#fields.hasErrors('empName')}" th:errors="*{empName}"
					class="error-text"></span>
			</div>

			<!-- 帳號 -->
			<div class="form-group">
				<label>帳號</label> <input type="text" th:field="*{empAccount}"
					class="form-control" placeholder="請輸入英文或數字帳號"> <span
					th:if="${#fields.hasErrors('empAccount')}"
					th:errors="*{empAccount}" class="error-text"></span>
			</div>

			<!-- 密碼 -->
			<div class="form-group">
				<label>密碼</label> <input type="password" th:field="*{empPassword}"
					class="form-control" placeholder="請輸入密碼"> <span
					th:if="${#fields.hasErrors('empPassword')}"
					th:errors="*{empPassword}" class="error-text"></span>
			</div>

			<!-- 職稱 -->
			<div class="form-group">
				<label>職稱</label> <select th:field="*{roleTitle}"
					class="form-control">
					<option value="">-- 請選擇職稱 --</option>
					<option value="0">系統管理員</option>
					<option value="1">營運總監</option>
					<option value="2">客服專員</option>
					<option value="3">財務專員</option>
					<option value="4">行銷專員</option>
				</select> <span th:if="${#fields.hasErrors('roleTitle')}"
					th:errors="*{roleTitle}" class="error-text"></span>
			</div>

			<!-- 權限範圍 -->
			<div class="form-group">
				<label>權限範圍</label>
				<div class="perm-scroll-box">
					<th:block th:each="perms : ${permVO}">
						<label class="perm-label-badge"> <input type="checkbox"
							name="permIds" th:value="${perms.permId}"
							th:checked="${selectedPermIds != null && selectedPermIds.contains(perms.permId)}">
							<span th:text="${perms.permName}"></span>
						</label>
					</th:block>
				</div>
				<span th:if="${#fields.hasErrors('empPermVO')}"
					th:errors="*{empPermVO}" class="error-text"></span>
			</div>

			<!-- 員工照片 -->
			<div class="form-group">
				<label>員工照片</label>
				<!-- 保留原汁原味的上傳按鈕，與你喜歡的初始 CSS 完美對齊 -->
				<input type="file" name="upImg" accept="image/*"
					onchange="previewImage(this);" style="margin-bottom: 8px;">

				<div class="avatar-upload-box">
					<!-- 預設無圖片灰色圈 -->
					<div id="noImageCircle" class="avatar-none"
						th:style="${hasTempImg} ? 'display: none;' : 'display: flex;'">
						無</div>
					<!-- 圖片預覽：有暫存圖時，直接指向專門讀取 Session 圖片 bytes 的 Controller 路由，絕對不會有 null 轉換問題 -->
					<img id="imagePreview" alt="圖片預覽" class="avatar-img"
						th:src="${hasTempImg} ? @{/admin/employees/dbgAddImg} : ''"
						th:style="${hasTempImg} ? 'display: block;' : 'display: none;'" />
				</div>
				<span th:if="${#fields.hasErrors('empImg')}"
					th:text="${#fields.errors('empImg')}" class="error-text"> </span>
			</div>

			<!-- 操作按鈕列 -->
			<div class="modal-footer-btns">
				<button type="submit" class="btn btn-primary">確認儲存</button>
				<button type="button" class="btn btn-edit"
					onclick="closeEmpModal(); var p = document.getElementById('modalCurrentPage').value; window.location.href='/admin/employees/empPage?p=' + (p ? p : 0);">
					取消</button>
			</div>
			<input type="hidden" name="currentPage" id="modalCurrentPage" 
       th:value="${currentPage != null ? currentPage : 0}" />
		</form>
	</div>

</body>
</html>
