<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
	xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<!-- ================= 新增員工燈箱 ================= -->
	<div th:fragment="addContent">

		<h3>新增員工資料</h3>
		<form th:action="@{/admin/employees/add}" method="POST"
			th:object="${employeeVO}" enctype="multipart/form-data">
			<table border="0" cellpadding="5">
				<tr>
					<td style="white-space: nowrap;">姓名：</td>
					<td><input type="text" th:field="*{empName}"
						style="width: 100%; max-width: 250px; padding: 6px; border: 1px solid #7a7a7a !important; border-radius: 4px; box-sizing: border-box;">

						<span th:if="${#fields.hasErrors('empName')}"
						th:errors="*{empName}" class="error"
						style="color: #ff3333; font-size: 0.85rem; display: block; margin-top: 5px; font-weight: bold; text-align: left;">
					</span></td>
				</tr>



				<tr>
					<td style="white-space: nowrap;">帳號：</td>
					<td><input type="text" th:field="*{empAccount}"
						style="width: 100%; max-width: 250px; padding: 6px; border: 1px solid #7a7a7a !important; border-radius: 4px; box-sizing: border-box;"
						placeholder="請輸入英文或數字帳號"> <span
						th:if="${#fields.hasErrors('empAccount')}"
						th:errors="*{empAccount}" class="error"
						style="color: #ff3333; font-size: 0.85rem; display: block; margin-top: 5px; font-weight: bold; text-align: left;"></span>
					</td>
				</tr>

				<tr>
					<td style="white-space: nowrap;">密碼：</td>
					<td><input type="password" th:field="*{empPassword}"
						style="width: 100%; max-width: 250px; padding: 6px; border: 1px solid #7a7a7a !important; border-radius: 4px; box-sizing: border-box;"
						placeholder="請輸入密碼"> <span
						th:if="${#fields.hasErrors('empPassword')}"
						th:errors="*{empPassword}" class="error"
						style="color: #ff3333; font-size: 0.85rem; display: block; margin-top: 5px; font-weight: bold; text-align: left;"></span></td>

				</tr>

				<tr>
					<td style="white-space: nowrap;">職稱：</td>
					<td><select th:field="*{roleTitle}"
						style="width: 100%; max-width: 250px; padding: 6px; border: 1px solid #7a7a7a !important; border-radius: 4px; box-sizing: border-box;">
							<option value="">-- 請選擇職稱 --</option>
							<option value="0">系統管理員</option>
							<option value="1">營運總監</option>
							<option value="2">客服專員</option>
							<option value="3">財務專員</option>
							<option value="4">行銷專員</option>
					</select> <span th:if="${#fields.hasErrors('roleTitle')}"
						th:errors="*{roleTitle}" class="error"
						style="color: #ff3333; font-size: 0.85rem; display: block; margin-top: 5px; font-weight: bold; text-align: left;"></span></td>

				</tr>
				<tr>
					<td>權限範圍：</td>
					<td>
						<div
							style="display: flex; flex-wrap: wrap; gap: 10px; max-width: 320px; max-height: 120px; overflow-y: auto; white-space: normal; padding: 5px; border: 1px solid #e0e0e0; border-radius: 4px; background-color: #fafafa;">
							<th:block th:each="perms : ${permVO}">
								<label
									style="display: inline-flex; align-items: center; white-space: nowrap; cursor: pointer; background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 13px;">
									<input type="checkbox" name="permIds"
									th:value="${perms.permId}"
									th:checked="${selectedPermIds != null && selectedPermIds.contains(perms.permId)}"
									style="margin-right: 4px;"> <span
									th:text="${perms.permName}"></span>

								</label>
							</th:block>
						</div> <span th:if="${#fields.hasErrors('empPermVO')}"
						th:errors="*{empPermVO}" class="error"
						style="color: #ff3333; font-size: 0.85rem; display: block; margin-top: 5px; font-weight: bold; text-align: left;"></span>

					</td>
				</tr>

<tr>
    <td style="white-space: nowrap; color: black; vertical-align: top; padding-top: 8px;">員工照片：</td>
    <td>
        <input type="file" name="upImg" accept="image/*" onchange="previewImage(this);" style="margin-bottom: 12px;"><br>
        
        <div style="width: 120px; height: 120px; border: 2px dashed #a0a0a0; border-radius: 6px; padding: 4px; background-color: #fafafa; display: flex; justify-content: center; align-items: center; box-sizing: border-box;">

            <div id="noImageCircle"
                 th:style="${hasTempImg} ? 'display: none;' : 'width: 50px; height: 50px; border-radius: 50%; background-color: #e0e0e0; color: #666; font-size: 12px; line-height: 50px; text-align: center; font-weight: bold; display: block;'">
                無
            </div>

            <img id="imagePreview" alt="圖片預覽"
                 th:src="${hasTempImg} ? @{/admin/dbgAddImg} : ''"
                 th:style="${hasTempImg} ? 'width: 100%; height: 100%; object-fit: cover; border-radius: 4px; display: block;' : 'width: 100%; height: 100%; object-fit: cover; border-radius: 4px; display: none;'"
                 src="" />
        </div>
    </td>
</tr>



			</table>
			<br>
			<button type="submit">確認儲存</button>
			<button type="button"
				th:onclick="|window.location.href='@{/admin/employees/empPage}'|"
				onclick="closeEmpModal()">取消</button>
		</form>
	</div>


</body>
</html>
