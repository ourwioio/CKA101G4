<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>後台管理系統 - 員工權限管理</title>
</head>
<body
	style="text-align: center; font-family: Arial, sans-serif; padding: 20px;">


	<!-- 2. 建立大框架表格（與 empPage 寬度、結構完全一致） -->
	<table border="1" cellpadding="10" cellspacing="0"
		style="width: 100%; max-width: 1500px; table-layout: fixed; margin: 0 auto;">
		<tr>
			<!-- 【左側欄位】：直接引用主框架的 sidebar，原地取代 -->
			<td th:replace="~{back-end/employee/adminPage :: sidebar}"></td>

			<!-- 【右側欄位】：專心放你的歡迎文字 -->
			<td
				style="vertical-align: top; text-align: center; padding: 40px 20px;">

				<div style="text-align: center;">
					<h2>員工權限管理</h2>
				</div>


				<div
					style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; white-space: nowrap;">
					<button type="button"
						onclick="document.getElementById('addPerm').style.display='block'">新增權限</button>
				</div>

				<table border="1" cellpadding="5" cellspacing="0"
					style="width: 100%; white-space: nowrap;">
					<thead>
						<tr>
							<th>權限編號</th>
							<th>權限名稱</th>
							<th>權限內容</th>
							<th>員工編號</th>
							<th>授權時間</th>
							<th>修改</th>
							<th>刪除</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="permVO : ${permListData}">
							<!-- 權限編號 -->
							<td th:text="${permVO.permId}"></td>
							<!-- 權限名稱 -->
							<td th:text="${permVO.permName}"></td>
							<!-- 權限內容 -->
							<td th:text="${permVO.roleTitle}"></td>
							<!-- 員工編號 -->
							<td>
								<!-- 用一條小迴圈，走訪這個 Set 集合裡面的每一個權限物件 (ep) --> <!-- 1. 在 empPerm 後面加上 , stat，這個 stat 就會具備 .last 的判斷能力 -->
								<span th:each="empPerm, stat : ${permVO.empPermVO}"> <!-- 2. 利用 stat.last 進行三元運算：如果是最後一筆就不加任何符號，否則加上 '、' -->
									<span th:text="${empPerm.emps.employeeId}"></span> <br
									th:if="${!stat.last}" />
							</span>
							</td>
							<!-- 授權時間 -->
							<td><span th:each="empPerm, stat : ${permVO.empPermVO}">
									<span th:text="${empPerm.emps.assignedAt}"></span> <br
									th:if="${!stat.last}" />
							</span></td>


							<!-- 修改按鈕 -->
							<td align="center">
								<button type="button"
									th:onclick="openEditModal([[${empVO.empId}]],[[${empVO.empImg}]], [[${empVO.empName}]], [[${empVO.roleTitle}]],[[${empVO.empStatus}]])">
									修改</button>
							</td>

							<!-- 刪除表單按鈕 -->
							<td align="center">
								<form method="post" th:action="@{/admin/empDelete}"
									style="margin: 0px;">
									<input type="hidden" name="id" th:value="${empVO.empId}">
									<input type="submit" value="刪除" style="color: red;"
										onclick="return confirm('確定要刪除這位員工嗎？');">
								</form>
							</td>
						</tr>
					</tbody>

				</table>

				<div
					style="text-align: center; margin-top: 20px; font-family: Arial, sans-serif;">

					<!-- 1. 上一頁按鈕：只有當前頁碼大於 0 時才顯示 -->
					<a th:if="${currentPage > 0}"
						th:href="@{/emp/empAll(p=${(currentPage ?: 0) - 1})}"
						style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
						上一頁 </a>

					<!-- 2. 顯示目前分頁進度（因為 Java 頁碼從 0 開始，畫面上呈現要 +1 才是符合人類直覺的第 1 頁） -->
					<span style="margin: 0 10px; font-weight: bold; color: #555;"
						th:text="'第 ' + (${currentPage ?: 0} + 1) + ' 頁 / 共 ' + ${totalPages ?:1} + ' 頁'">
						第 1 頁 / 共 1 頁 </span>

					<!-- 3. 下一頁按鈕：只有當前頁碼小於 (總頁數 - 1) 時才顯示 -->
					<a th:if="${(currentPage ?: 0) < (totalPages?: 1) - 1}"
						th:href="@{/emp/empAll(p=${currentPage + 1})}"
						style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
						下一頁 </a>

				</div>
			</td>
		</tr>


	</table>

	<!-- ================= 新增員工燈箱 ================= -->
	<div id="addPerm"
		style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid black; padding: 20px; z-index: 1000; max-height: 80vh; overflow-y: auto; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);">
		<h3>新增員工資料</h3>
		<form th:action="@{/admin/add-employee}" method="POST">
			<table border="0" cellpadding="5">
				<!--                 	當使用者點擊「確認儲存」按鈕提交表單時，瀏覽器會自動檢查所有帶有 required 的輸入框。空的會攔截 -->
				<tr>
					<td style="white-space: nowrap;">姓名：</td>
					<td><input type="text" name="name" required></td>
				</tr>
				<tr>
					<td style="white-space: nowrap;">職稱：</td>
					<td><input type="text" name="roleTitle" required></td>
				</tr>
				<tr>
					<td>權限範圍：</td>
					<td><th:block th:each="perms : ${permissionVO}">
							<label style="display: inline-block; white-space: nowrap;">
								<input type="checkbox" name="permIds" th:value="${perms.permId}">
								<span th:text="${perms.permName}"></span>
							</label>
						</th:block></td>
				</tr>
				<tr>
					<td style="white-space: nowrap;">帳號狀態：</td>
					<td><select name="empStatus"
						style="width: 50%; padding: 6px; box-sizing: border-box; border: 1px solid #7a7a7a; border-radius: 4px;"
						required>
							<option value="" disabled selected>-- 請選擇狀態 --</option>
							<option value="0">未驗證</option>
							<option value="1">正常</option>
							<option value="2">註銷</option>
							<option value="3">停權</option>
					</select></td>
				</tr>

				<tr>
					<td
						style="white-space: nowrap; color: black; vertical-align: top; padding-top: 8px;">員工照片：</td>
					<td>
						<!-- accept="image/*" => 限制只能用圖片檔案 --> <input type="file"
						name="empImg" accept="image/*" onchange="previewImage(this);"
						style="margin-bottom: 12px;"><br> <!-- 精緻預覽圖框容器：預設就直接顯示（display: block），並且載入你專案內的預設大頭貼 -->
						<div
							style="width: 120px; height: 120px; border: 2px dashed #a0a0a0; border-radius: 6px; padding: 4px; background-color: #fafafa; display: block;">
							<img id="imagePreview" th:src="@{/images/empImg.jpg}" alt="圖片預覽"
								style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;" />
						</div>
					</td>
				</tr>


			</table>
			<br>
			<button type="submit">確認儲存</button>
			<button type="button"
				onclick="document.getElementById('addEmployee').style.display='none'">取消</button>
		</form>
	</div>



</body>
</html>
