<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>重設密碼</title>
<style>
body {
	font-family: system-ui, sans-serif;
	background-color: #f3f4f6;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	margin: 0;
}

.card {
	background: white;
	padding: 30px;
	border-radius: 8px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
	width: 350px;
}

h2 {
	margin-top: 0;
	color: #1f2937;
	text-align: center;
}

p {
	color: #6b7280;
	font-size: 14px;
	text-align: center;
	margin-bottom: 25px;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
	font-size: 14px;
	color: #374151;
}

input[type="password"] {
	width: 100%;
	padding: 8px;
	border: 1px solid #d1d5db;
	border-radius: 4px;
	box-sizing: border-box;
}

.error-msg {
	color: #dc2626;
	font-size: 12px;
	margin-top: 5px;
	font-weight: bold;
}

.btn-submit {
	width: 100%;
	background-color: #2563eb;
	color: white;
	border: none;
	padding: 10px;
	border-radius: 4px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 15px;
}
</style>
</head>
<body>

	<div class="card">
		<h2>設定新密碼</h2>
		<p>請輸入您的新密碼，密碼長度須在 8 到 20 個字元之間。</p>

		<div th:if="${errorMessage}" th:text="${errorMessage}"
			class="error-msg" style="text-align: center; margin-bottom: 15px;"></div>

		<form id="resetPasswordForm" th:action="@{/admin/resetPassword}"
			method="POST" th:object="${empPasswordDTO}">

			<!-- 🌟 核心魔鬼細節：把 currentPassword 宣告為 hidden 隱藏欄位，用來安全的把 token 帶回後端，且完美繞過後端的 NotBlank 限制 -->
			<input type="hidden" th:field="*{currentPassword}">

			<!-- 全域錯誤提示 -->
			<div th:if="${errorMessage}" th:text="${errorMessage}"
				class="error-msg" style="text-align: center; margin-bottom: 15px;"></div>

			<div class="form-group">
				<label>請輸入新密碼：</label> <input type="password"
					th:field="*{newPassword}" required>
				<div th:if="${#fields.hasErrors('newPassword')}"
					th:errors="*{newPassword}" class="error-msg"></div>
			</div>

			<div class="form-group">
				<label>再次輸入新密碼：</label> <input type="password"
					th:field="*{confirmPassword}" required>
				<div th:if="${#fields.hasErrors('confirmPassword')}"
					th:errors="*{confirmPassword}" class="error-msg"></div>
			</div>

			<button type="submit" class="btn-submit">確認重設密碼</button>
		</form>

	</div>

	<script>
		document.getElementById('resetPasswordForm')
				.addEventListener(
						'submit',
						function(event) {
							const newPassword = document
									.getElementById('newPassword').value;
							const confirmPassword = document
									.getElementById('confirmPassword').value;
							const jsErrorDiv = document
									.getElementById('js-error');

							if (newPassword !== confirmPassword) {
								event.preventDefault();
								jsErrorDiv.style.display = 'block';
							} else {
								jsErrorDiv.style.display = 'none';
							}
						});
	</script>

</body>
</html>
