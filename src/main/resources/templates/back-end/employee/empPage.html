<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
	xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>後台管理系統 - 員工管理</title>

</head>
<!-- 1. 外層維持與主框架相同的置中樣式 -->
<body style="text-align: center; font-family: Arial, sans-serif; padding: 20px;">


	<!-- 2. 建立大框架表格（1 row, 2 columns） -->
	<table border="1" cellpadding="10" cellspacing="0"
		style="width: 100%; max-width: 1500px; table-layout: fixed; margin: 0 auto;">
		<tr>
			<!-- 【左側欄位】：直接引用主框架的 sidebar，原地取代 -->
			<td th:replace="~{back-end/employee/adminPage :: sidebar}"></td>

			<!-- 【右側欄位】：裝載你原本的員工管理完整內容 -->
			<td
				style="vertical-align: top; text-align: left; width: calc(100% - 200px);">

				<!-- 這裡放你的內容區塊 -->
				<div
					style="display: block; width: 100%; overflow-x: auto; white-space: nowrap;">

					<div style="text-align: center;">
						<h2>員工管理系統</h2>
					</div>

					<!-- 新增員工 -->

					<div
						style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; white-space: nowrap; position: sticky; left: 0; width: 100%; box-sizing: border-box; padding-right: 5px;">
						<button type="button" 
							onclick="openAddEmpModal()">新增員工</button>
					</div>

					<!-- 員工資料數據表格（純右側表格） -->
					<table border="1" cellpadding="5" cellspacing="0"
						style="width: 100%; white-space: nowrap;">
						<thead>
							<tr>
								<th style="text-align: center;">員工編號(ID)</th>
								<th style="text-align: center;">員工姓名</th>
								<th style="text-align: center;">員工頭像</th>
								<th style="text-align: center;">職稱</th>
								<th style="text-align: center;">權限範圍</th>
								<th style="text-align: center;">帳號狀態</th>
								<th style="text-align: center;">最後登入時間</th>
								<th style="text-align: center;">建立時間</th>
								<th style="text-align: center;">修改時間</th>
								<th style="text-align: center;">修改</th>
								<th style="text-align: center;">刪除</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="empVO : ${empListData}">
								<!-- 員工編號 -->
								<td th:text="${empVO.employeeId}" style="text-align: center;"></td>
								<!-- 員工姓名 -->
								<td th:text="${empVO.empName}" style="text-align: center;"></td>
								<!-- 員工頭像 -->
								<td style="text-align: center;"><img
									th:if="${empVO.empImg != null and empVO.empImg.length > 0}"
									th:src="@{/admin/empImg/{employeeId}(employeeId=${empVO.employeeId})}"
									style="width: 100px; height: 100px; border-radius: 50%;">
									<!-- 情況 B：如果員工沒有圖片 ➔ 顯示灰色圓圈 --> <!-- 💡 核心修正：刪除 line-height，加上 align-items: center; -->
									<div
										th:unless="${empVO.empImg != null and empVO.empImg.length > 0}"
										style="width: 100px; height: 100px; border-radius: 50%; background-color: #e0e0e0; color: #666; font-size: 40px; display: flex; justify-content: center; align-items: center; margin: 0 auto; font-weight: bold;">
										無</div></td>

								<!-- 職稱 -->
								<td th:switch="${empVO.roleTitle}" style="text-align: center;">
									<span th:case="0">系統管理員</span> <span th:case="1">營運總監</span> <span
									th:case="2">客服專員</span> <span th:case="3">場地審核專員</span> <span
									th:case="4">財務專員</span> <span th:case="5">行銷專員</span>
								</td>
								<!-- 權限範圍 -->
								<td style="text-align: center;"><span
									th:each="empPerm, stat : ${empVO.empPermVO}" class="perm-item" th:data-permid="${empPerm.perms.permId}"> <span
										th:text="${empPerm.perms.permName} + (${stat.last}? '': '、')"></span>
								</span></td>
								<!-- 帳號狀態 -->
								<td th:switch="${empVO.empStatus}" style="text-align: center;">
									<span th:case="0" style="color: orange;">未驗證</span> <span
									th:case="1" style="color: green;">正常</span> <span th:case="2"
									style="color: red;">註銷</span> <span th:case="3"
									style="color: gray;">停權</span>
								</td>
								<!-- 最後登入時間 -->
								<td
									th:text="${empVO.lastLoginAt != null ? #temporals.format(empVO.lastLoginAt, 'yyyy-MM-dd HH:mm') : '未登入'}"
									style="text-align: center;"></td>
								<!-- 建立時間 -->
								<td th:text="${empVO.createdAt}" style="text-align: center;"></td>
								<!-- 修改時間 -->
								<td th:text="${empVO.updatedAt ?: '未修改'}"
									style="text-align: center;"></td>

								<!-- 修改按鈕 -->
								<td align="center">
									<button type="button"
										th:onclick="openEditEmpModal([[${empVO.employeeId}]],[[${empVO.empAccount}]],[[${empVO.empPassword}]], [[${empVO.empName}]], [[${empVO.roleTitle}]],[[${empVO.empStatus}]], [[${empVO.empImg != null && empVO.empImg.length > 0}]], this)">
										修改</button>
								</td>

								<!-- 刪除表單按鈕 -->
								<td align="center">
									<form method="post" th:action="@{/admin/empDelete}"
										style="margin: 0px;">
										<input type="hidden" name="employeeId" th:value="${empVO.employeeId}">
										<input type="submit" value="刪除" style="color: red;"
											onclick="return confirm('確定要刪除這位員工嗎？');">
									</form>
								</td>
							</tr>
						</tbody>

					</table>
					<div
						style="text-align: center; margin-top: 20px; font-family: Arial, sans-serif;">

						<a th:if="${currentPage > 0}"
							th:href="@{/admin/empPage(p=${(currentPage ?: 0) - 1})}"
							style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
							上一頁 </a>

						<span style="margin: 0 10px; font-weight: bold; color: #555;"
							th:text="'第 ' + (${currentPage ?: 0} + 1) + ' 頁 / 共 ' + ${totalPages ?:1} + ' 頁'">
							第 1 頁 / 共 1 頁 </span>

						<a th:if="${(currentPage ?: 0) < (totalPages?: 1) - 1}"
							th:href="@{/admin/empPage(p=${currentPage + 1})}"
							style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
							下一頁 </a>

					</div>
				</div>

			</td>
		</tr>


	</table>

	<div id="addEmpModal"
		th:style="'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid black; padding: 25px; z-index: 1000; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); width: 500px; box-sizing: border-box; white-space: nowrap; text-align: left !important; display: flow-root; display: ' + (${openAddEmpModal} ? 'block' : 'none') + ';'">

		<div th:insert="~{back-end/employee/addEmp :: addContent}"></div>

	</div>

	<div id="editEmpModal"
		th:style="'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid black; padding: 25px; z-index: 1000; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); width: 500px; box-sizing: border-box; white-space: nowrap; text-align: left !important; display: flow-root; display: ' + (${openEditEmpModal} ? 'block' : 'none') + ';'">

		<div th:insert="~{back-end/employee/updateEmp :: updateContent}"></div>

	</div>


	<script>

		// 照片預覽機制
		function previewImage(input) {
			var noImageCircle = document.getElementById('noImageCircle');
			var imagePreview = document.getElementById('imagePreview');

			if (input.files && input.files[0]) {
				var reader = new FileReader();
				reader.onload = function(e) {
					imagePreview.src = e.target.result;
					imagePreview.style.display = 'block';
					noImageCircle.style.display = 'none';
				}
				reader.readAsDataURL(input.files[0]);
			} else {
				imagePreview.src = '';
				imagePreview.style.display = 'none';
				noImageCircle.style.display = 'block';
			}
		}

		// 新增按鈕的 (點擊按鈕打開彈窗)
		function openAddEmpModal() {
			var modal = document.getElementById("addEmpModal");
			if (modal) {
				var form = modal.querySelector("form");
				if (form) {
					form.reset();
				}

				var noImageCircle = document.getElementById("noImageCircle");
				var imagePreview = document.getElementById("imagePreview");

				if (noImageCircle && imagePreview) {
					imagePreview.src = "";
					imagePreview.style.display = "none";
					noImageCircle.style.display = "block";
				}

				// 手動打開時一樣要給它 block
				modal.style.setProperty("display", "block", "important");
			}
		}

		// 修改按鈕的 (點擊按鈕打開彈窗)
		function openEditEmpModal(employeeId,  empAccount, empPassword,empName, roleTitle, empStatus, hasImg, btnElement) {
			var modal = document.getElementById("editEmpModal");
			if (modal) {
				var form = modal.querySelector("form");
				if (form) {
					form.reset();
				}

				if (document.getElementById("editEmployeeId"))
					document.getElementById("editEmployeeId").value = employeeId;
				if (document.getElementById("editEmpAccount"))
					document.getElementById("editEmpAccount").value = empAccount;
				if (document.getElementById("editEmpPassword"))
					document.getElementById("editEmpPassword").value = empPassword;
				if (document.getElementById("editEmpName"))
					document.getElementById("editEmpName").value = empName;
				if (document.getElementById("editRoleTitle"))
					document.getElementById("editRoleTitle").value = roleTitle;
				if (document.getElementById("editEmpStatus"))
					document.getElementById("editEmpStatus").value = empStatus;
				
	
				//拿權限編號
				var permIdsArray =[];
				if(btnElement){
					var currentRow = btnElement.closest('tr');
					if(currentRow){
						var permSpans = currentRow.querySelectorAll('.perm-item');
						permSpans.forEach(function(span){
							if(span.dataset.permid){
								permIdsArray.push(span.dataset.permid);
							}
						});
					}
				}
				
				
				var checkboxes = modal.querySelectorAll("input[name='permIds']");
				
				checkboxes.forEach(function(checkbox){
					if(permIdsArray.includes(checkbox.value)){
						checkbox.checked = true;
					}
				});
				
				
				
				var editNoImageCircle = document
						.getElementById("editNoImageCircle");
				var editImagePreview = document
						.getElementById("editImagePreview");

				if (editNoImageCircle && editImagePreview) {
					if (hasImg && employeeId) {
						// 指向後端撈取圖片的 Controller 途徑，並帶上員工 ID
						editImagePreview.src = "/admin/dbgUpdateImg/"
								+ employeeId;
		                    editImagePreview.style.display = "block";
		                    editNoImageCircle.style.display = "none";
					} else {
						editImagePreview.src = "";
						editImagePreview.style.display = "none";
						editNoImageCircle.style.display = "block";
					}
				}
				// 手動打開時一樣要給它 block
				modal.style.setProperty("display", "block", "important");
			}
		}

		// 關閉彈窗
		function closeEmpModal() {
			var modal = document.getElementById("addEmpModal");
			if (modal) {
				modal.style.setProperty("display", "none", "important");
			}
		}
		// 修改用(關閉彈窗)
		function closeEditEmpModal() {
		    var modal = document.getElementById("editEmpModal");
		    if (modal) {
		        modal.style.setProperty("display", "none", "important");
		    }
		}
		
		// 照片即時預覽機制（修改燈箱專用）
		function previewEditImage(input) {
		    var noImageCircle = document.getElementById('editNoImageCircle');
		    var imagePreview = document.getElementById('editImagePreview');

		    if (input.files && input.files[0]) {
		        var reader = new FileReader();
		        reader.onload = function(e) {
		            imagePreview.src = e.target.result;
		            imagePreview.style.display = 'block';
		            noImageCircle.style.display = 'none';
		        }
		        reader.readAsDataURL(input.files[0]);
		    }
		}
		
	</script>




</body>
</html>
