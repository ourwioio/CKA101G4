<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
	xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>後台管理系統 - 員工管理</title>

</head>
<!-- 1. 外層維持與主框架相同的置中樣式 -->
<body>


	<!-- 2. 建立大框架表格（1 row, 2 columns） -->
	<table border="1" cellpadding="10" cellspacing="0"
		style="width: 100%; max-width: 1500px; table-layout: fixed; margin: 0 auto;">
		<tr>
			<!-- 【左側欄位】：直接引用主框架的 sidebar，原地取代 -->
			<td th:replace="~{back-end/employee/adminPage :: sidebar}"></td>

			<!-- 【右側欄位】：裝載你原本的員工管理完整內容 -->
			<td
				style="vertical-align: top; text-align: left; width: calc(100% - 200px);">

				<!-- 這裡放你的內容區塊 -->
				<div
					style="display: block; width: 100%; overflow-x: auto; white-space: nowrap;">

					<div style="text-align: center;">
						<h2>員工管理系統</h2>
					</div>

					<!-- 新增員工 -->

					<div
						style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; white-space: nowrap; position: sticky; left: 0; width: 100%; box-sizing: border-box; padding-right: 5px;">
						<button type="button" class="btn btn-primary"
							onclick="openEmpModal()">新增員工</button>
					</div>

					<!-- 員工資料數據表格（純右側表格） -->
					<table border="1" cellpadding="5" cellspacing="0"
						style="width: 100%; white-space: nowrap;">
						<thead>
							<tr>
								<th style="text-align: center;">員工編號(ID)</th>
								<th style="text-align: center;">員工姓名</th>
								<th style="text-align: center;">員工頭像</th>
								<th style="text-align: center;">職稱</th>
								<th style="text-align: center;">權限範圍</th>
								<th style="text-align: center;">帳號狀態</th>
								<th style="text-align: center;">最後登入時間</th>
								<th style="text-align: center;">建立時間</th>
								<th style="text-align: center;">修改時間</th>
								<th style="text-align: center;">修改</th>
								<th style="text-align: center;">刪除</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="empVO : ${empListData}">
								<!-- 員工編號 -->
								<td th:text="${empVO.employeeId}" style="text-align: center;"></td>
								<!-- 員工姓名 -->
								<td th:text="${empVO.empName}" style="text-align: center;"></td>
								<!-- 員工頭像 -->
								<td style="text-align: center;"><img
									th:if="${empVO.empImg != null and empVO.empImg.length > 0}"
									th:src="@{/admin/empImg/{employeeId}(employeeId=${empVO.employeeId})}"
									style="width: 100px; height: 100px; border-radius: 50%;">
									<!-- 情況 B：如果員工沒有圖片 ➔ 顯示灰色圓圈 --> <!-- 💡 核心修正：刪除 line-height，加上 align-items: center; -->
									<div
										th:unless="${empVO.empImg != null and empVO.empImg.length > 0}"
										style="width: 100px; height: 100px; border-radius: 50%; background-color: #e0e0e0; color: #666; font-size: 40px; display: flex; justify-content: center; align-items: center; margin: 0 auto; font-weight: bold;">
										無</div></td>

								<!-- 職稱 -->
								<td th:switch="${empVO.roleTitle}" style="text-align: center;">
									<span th:case="0">系統管理員</span> <span th:case="1">營運總監</span> <span
									th:case="2">客服專員</span> <span th:case="3">場地審核專員</span> <span
									th:case="4">財務專員</span> <span th:case="5">行銷專員</span>
								</td>
								<!-- 權限範圍 -->
								<td style="text-align: center;"><span
									th:each="empPerm, stat : ${empVO.empPermVO}"> <span
										th:text="${empPerm.perms.permName} + (${stat.last}? '': '、')"></span>
								</span></td>
								<!-- 帳號狀態 -->
								<td th:switch="${empVO.empStatus}" style="text-align: center;">
									<span th:case="0" style="color: orange;">未驗證</span> <span
									th:case="1" style="color: green;">正常</span> <span th:case="2"
									style="color: red;">註銷</span> <span th:case="3"
									style="color: gray;">停權</span>
								</td>
								<!-- 最後登入時間 -->
								<td
									th:text="${empVO.lastLoginAt != null ? #temporals.format(empVO.lastLoginAt, 'yyyy-MM-dd HH:mm') : '未登入'}"
									style="text-align: center;"></td>
								<!-- 建立時間 -->
								<td th:text="${empVO.createdAt}" style="text-align: center;"></td>
								<!-- 修改時間 -->
								<td th:text="${empVO.updatedAt ?: '未修改'}"
									style="text-align: center;"></td>

								<!-- 修改按鈕 -->
								<td align="center">
									<button type="button"
										th:onclick="openEditModal([[${empVO.employeeId}]],[[${empVO.empImg}]], [[${empVO.empName}]], [[${empVO.roleTitle}]],[[${empVO.empStatus}]])">
										修改</button>
								</td>

								<!-- 刪除表單按鈕 -->
								<td align="center">
									<form method="post" th:action="@{/admin/empDelete}"
										style="margin: 0px;">
										<input type="hidden" name="id" th:value="${empVO.employeeId}">
										<input type="submit" value="刪除" style="color: red;"
											onclick="return confirm('確定要刪除這位員工嗎？');">
									</form>
								</td>
							</tr>
						</tbody>

					</table>
					<!-- 💡 核心新增：表格下方的「上一頁 / 下一頁」分頁按鈕控制區 -->
					<!-- 為了美觀，加上了簡單的行內樣式，你可以自由調整 -->
					<div
						style="text-align: center; margin-top: 20px; font-family: Arial, sans-serif;">

						<!-- 1. 上一頁按鈕：只有當前頁碼大於 0 時才顯示 -->
						<a th:if="${currentPage > 0}"
							th:href="@{/admin/empPage(p=${(currentPage ?: 0) - 1})}"
							style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
							上一頁 </a>

						<!-- 2. 顯示目前分頁進度（因為 Java 頁碼從 0 開始，畫面上呈現要 +1 才是符合人類直覺的第 1 頁） -->
						<span style="margin: 0 10px; font-weight: bold; color: #555;"
							th:text="'第 ' + (${currentPage ?: 0} + 1) + ' 頁 / 共 ' + ${totalPages ?:1} + ' 頁'">
							第 1 頁 / 共 1 頁 </span>

						<!-- 3. 下一頁按鈕：只有當前頁碼小於 (總頁數 - 1) 時才顯示 -->
						<a th:if="${(currentPage ?: 0) < (totalPages?: 1) - 1}"
							th:href="@{/admin/empPage(p=${currentPage + 1})}"
							style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; margin: 5px; background-color: #f8f9fa; color: #333; border-radius: 4px;">
							下一頁 </a>

					</div>
				</div>

			</td>
		</tr>


	</table>

	<!-- 新增燈箱外殼 -->
	<!-- 將 display: none 改為由後端變數 ${openAddModal} 直接決定！ -->
	<div id="addEmpModal"
		th:style="'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid black; padding: 25px; z-index: 1000; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); width: 500px; box-sizing: border-box; white-space: nowrap; text-align: left !important; display: flow-root; display: ' + (${openAddModal} ? 'block' : 'none') + ';'">

		<div th:insert="~{back-end/employee/addEmp :: formContent}"></div>

	</div>


	<script>
		// 清除提示信息
		function hideContent(d) {
			var element = document.getElementById(d);
			if (element) {
				element.style.display = "none";
			}
		}

		// 照片預覽機制
		function previewImage(input) {
			var noImageCircle = document.getElementById('noImageCircle');
			var imagePreview = document.getElementById('imagePreview');

			if (input.files && input.files[0]) {
				var reader = new FileReader();
				reader.onload = function(e) {
					imagePreview.src = e.target.result;
					imagePreview.style.display = 'block';
					noImageCircle.style.display = 'none';
				}
				reader.readAsDataURL(input.files[0]);
			} else {
				imagePreview.src = '';
				imagePreview.style.display = 'none';
				noImageCircle.style.display = 'block';
			}
		}

		// 手動點擊按鈕打開彈窗
		function openEmpModal() {
			var modal = document.getElementById("addEmpModal");
			if (modal) {
				var form = modal.querySelector("form");
				if (form) {
					form.reset();
				}

				var noImageCircle = document.getElementById("noImageCircle");
				var imagePreview = document.getElementById("imagePreview");

				if (noImageCircle && imagePreview) {
					imagePreview.src = "";
					imagePreview.style.display = "none";
					noImageCircle.style.display = "block";
				}

				// 手動打開時一樣要給它 block
				modal.style.setProperty("display", "block", "important");
			}
		}

		// 關閉彈窗
		function closeEmpModal() {
			var modal = document.getElementById("addEmpModal");
			if (modal) {
				modal.style.setProperty("display", "none", "important");
			}
		}
	</script>




</body>
</html>
