<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改初始密碼</title>
<style>
body {
	font-family: system-ui, sans-serif;
	background-color: #f3f4f6;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	margin: 0;
}

.card {
	background: white;
	padding: 30px;
	border-radius: 8px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
	width: 350px;
}

h2 {
	margin-top: 0;
	color: #1f2937;
	text-align: center;
}

p {
	color: #6b7280;
	font-size: 14px;
	text-align: center;
	margin-bottom: 25px;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
	font-size: 14px;
	color: #374151;
}

input[type="password"] {
	width: 100%;
	padding: 8px;
	border: 1px solid #d1d5db;
	border-radius: 4px;
	box-sizing: border-box;
}

.error-msg {
	color: #dc2626;
	font-size: 12px;
	margin-top: 5px;
	font-weight: bold;
}

.btn-submit {
	width: 100%;
	background-color: #2563eb;
	color: white;
	border: none;
	padding: 10px;
	border-radius: 4px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 15px;
}

.btn-logout {
	width: 100%;
	background-color: #e5e7eb;
	color: #4b5563;
	border: none;
	padding: 10px;
	border-radius: 4px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 8px;
}
</style>
</head>
<body>

	<div class="card">
		<h2>請變更初始密碼</h2>
		<p>為了帳號安全，第一次登入請先修改密碼。</p>

		<!-- 後端全域錯誤提示 -->
		<div th:if="${errorMessage}" th:text="${errorMessage}"
			class="error-msg" style="text-align: center; margin-bottom: 15px;"></div>

		<form th:action="@{/admin/upPassword}" method="POST"
			th:object="${empPasswordDTO}">

			<div class="form-group">
				<label>目前的初始密碼：</label> <input type="password"
					th:field="*{currentPassword}">
				<div th:if="${#fields.hasErrors('currentPassword')}"
					th:errors="*{currentPassword}" class="error-msg"></div>
			</div>

			<div class="form-group">
				<label>新密碼：</label> <input type="password" th:field="*{newPassword}">
				<div th:if="${#fields.hasErrors('newPassword')}"
					th:errors="*{newPassword}" class="error-msg"></div>
			</div>

			<div class="form-group">
				<label>再次輸入新密碼：</label> <input type="password"
					th:field="*{confirmPassword}">
				<div th:if="${#fields.hasErrors('confirmPassword')}"
					th:errors="*{confirmPassword}" class="error-msg"></div>
			</div>

			<button type="submit" class="btn-submit">儲存變更</button>
			<button type="button" class="btn-logout"
				onclick="document.getElementById('logoutForm').submit();">稍後設定並登出</button>
		</form>

		<form id="logoutForm" th:action="@{/admin/logout}" method="post"
			style="display: none;"></form>
	</div>

</body>
</html>
