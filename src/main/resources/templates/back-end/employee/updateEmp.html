<!-- ================= 修改員工燈箱 ================= -->
<div th:fragment="updateContent" class="modal-content-wrapper">

	<h3>修改員工資料</h3>
	
	<form th:action="@{/admin/employees/update}" method="POST"
		th:object="${employeeVO}" enctype="multipart/form-data">
		
		<div class="form-group" style="flex-direction: row; align-items: center; background-color: #f8f9fa; padding: 10px 14px; border-radius: 6px; border-left: 4px solid #007bff; max-width: 400px; box-sizing: border-box;">
			<label style="width: 100px; margin-bottom: 0; white-space: nowrap; flex-shrink: 0; font-weight: 600; color: #495057;">員工編號：</label>
			<input type="text" id="editEmployeeId" name="employeeId" th:value="*{employeeId}" readonly 
				style="border: none !important; background: transparent !important; pointer-events: none; outline: none !important; padding: 0 !important; font-size: 1.1rem; font-weight: 700; color: #212529; letter-spacing: 0.5px; width: 100%;" />
		</div>

		<!-- 隱藏表單控制項 -->
		<input type="hidden" id="editEmpAccount" name="empAccount" th:value="*{empAccount}" /> 
		<input type="hidden" id="editEmpPassword" name="empPassword" th:value="*{empPassword}" />
		<input type="hidden" name="searchEmpName" th:value="${currentEmpName}">
        <input type="hidden" name="searchRoleTitle" th:value="${currentRoleTitle}">
        <input type="hidden" name="searchEmpStatus" th:value="${currentEmpStatus}">
		
		<!-- 姓名 -->
		<div class="form-group">
			<label>員工姓名</label>
			<input type="text" th:field="*{empName}" id="editEmpName" class="form-control" placeholder="請輸入姓名">
			<span th:if="${#fields.hasErrors('empName')}" th:errors="*{empName}" class="error-text"></span>
		</div>

		<!-- 職稱 -->
		<div class="form-group">
			<label>職稱</label>
			<select th:field="*{roleTitle}" id="editRoleTitle" class="form-control">
				<option value="0">系統管理員</option>
				<option value="1">營運總監</option>
				<option value="2">客服專員</option>
				<option value="3">財務專員</option>
				<option value="4">行銷專員</option>
			</select> 
			<span th:if="${#fields.hasErrors('roleTitle')}" th:errors="*{roleTitle}" class="error-text"></span>
		</div>

		<!-- 帳號狀態 -->
		<div class="form-group">
			<label>帳號狀態</label>
			<select th:field="*{empStatus}" id="editEmpStatus" class="form-control">
				<option value="1">正常</option>
				<option value="2">註銷</option>
				<option value="3">停權</option>
			</select> 
			<span th:if="${#fields.hasErrors('empStatus')}" th:errors="*{empStatus}" class="error-text"></span>
		</div>

		<!-- 權限範圍 -->
		<div class="form-group">
			<label>權限範圍</label>
			<div class="perm-scroll-box">
				<th:block th:each="perms : ${permVO}">
					<label class="perm-label-badge">
						<!-- 💡 核心優化：更換 checkbox 的 class 名稱，方便你在 JS 裡做特殊防禦排查 -->
						<input type="checkbox" name="permIds" th:value="${perms.permId}" class="edit-perm-checkbox"
							th:checked="${selectedPermIds != null && selectedPermIds.contains(perms.permId)}"> 
						<span th:text="${perms.permName}"></span>
					</label>
				</th:block>
			</div> 
			<!-- 💡 終極修正：直接使用 th:if 偵測是否有任何與 empPermVO 相關的錯誤，只要出錯就強制顯示文字，打破 binding 限制 -->
			<span th:if="${#fields.hasErrors('empPermVO')}" class="error-text">權限範圍請勿空白</span>
		</div>

		<!-- 員工照片 -->
		<div class="form-group">
			<label>員工照片</label>
			<input type="file" name="upImg" accept="image/*" onchange="previewEditImage(this);" style="margin-bottom: 8px;">
			
			<div class="avatar-upload-box">
				<div id="editNoImageCircle" class="avatar-none"
					 th:style="${employeeVO.empImg == null} ? 'display: flex;' : 'display: none;'">
					無
				</div>
				<img id="editImagePreview" alt="圖片预覽" class="avatar-img"
					 th:src="${employeeVO.empImg != null} ? 
							 (${#fields.hasAnyErrors()} ? 'data:image/jpeg;base64,' + ${T(java.util.Base64).getEncoder().encodeToString(employeeVO.empImg)} : @{/admin/employees/dbgUpdateImg/{id}(id=${employeeVO.employeeId})}) 
							 : ''"
					 th:style="${employeeVO.empImg != null} ? 'display: block;' : 'display: none;'" />
			</div>
			<span th:if="${#fields.hasErrors('empImg')}" th:errors="*{empImg}" class="error-text"></span>
		</div>

		<!-- 操作按鈕列 -->
		<div class="modal-footer-btns">
			<button type="submit" class="btn btn-primary">確認儲存</button>
			<button type="button" class="btn btn-edit"
				onclick="closeEmpModal(); var p = document.getElementById('modalCurrentPage').value; window.location.href='/admin/employees/empPage?p=' + (p ? p : 0);">
				取消</button>
		</div>
		<input type="hidden" name="currentPage" id="modalCurrentPage" 
       th:value="${currentPage != null ? currentPage : 0}" />
		
	</form>
</div>
