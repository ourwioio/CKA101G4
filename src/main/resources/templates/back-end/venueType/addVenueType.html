<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新增場地類型</title>
<style>
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

body {
	font-family: "Noto Sans TC", Arial, sans-serif;
	background: #f5f6fa;
	color: #2d3436;
	margin: 0;
}

a {
	color: inherit;
}

.card {
	background: #ffffff;
	border-radius: 14px;
	border: 1px solid #e1e5ea;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
	max-width: 500px;
	margin: 0 auto;
	padding: 1.5rem;
}

.card-title {
	font-size: 18px;
	font-weight: 500;
	margin-bottom: 1.5rem;
}

.form-group {
	margin-bottom: 1.25rem;
}

label {
	display: block;
	font-size: 13px;
	color: #666;
	margin-bottom: 6px;
}

input[type="text"], input[type="number"], textarea, select {
	width: 100%;
	padding: 8px 12px;
	border: 1px solid #e0e0e0;
	border-radius: 6px;
	font-size: 14px;
	outline: none;
}

input:focus, textarea:focus, select:focus {
	border-color: #6c5ce7;
	outline: 2px solid rgba(108, 92, 231, 0.15);
}

textarea {
	height: 100px;
	resize: vertical;
}

.btn-row {
	display: flex;
	gap: 10px;
	margin-top: 1.5rem;
}

.btn-submit {
	background: #6c5ce7;
	color: white;
	border: none;
	border-radius: 6px;
	padding: 10px 24px;
	font-size: 14px;
	cursor: pointer;
}

.btn-submit:hover {
	background: #5748c8;
}

.btn-back {
	background: white;
	color: #666;
	border: 1px solid #ccc;
	border-radius: 6px;
	padding: 10px 24px;
	font-size: 14px;
	cursor: pointer;
	text-decoration: none;
	display: inline-flex;
	align-items: center;
}

.error {
	color: #c0392b;
	font-size: 12px;
	margin-top: 4px;
}
</style>
</head>
<body>

<div class="wb-admin-layout">

	<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
	</div>

	<main class="wb-admin-content">

	<div class="card">
		<div class="card-title">新增場地類型</div>
		<form th:action="@{/admin/venue/venueType/insert}" th:object="${venueTypeVO}"
			method="post">

			<div class="form-group">
				<label>類型名稱</label> <input type="text" th:field="*{typeName}"
					placeholder="請輸入類型名稱" />
				<div class="error" th:if="${#fields.hasErrors('typeName')}"
					th:errors="*{typeName}"></div>
			</div>

			<div class="form-group">
				<label>類型描述</label>
				<textarea th:field="*{typeDesc}" placeholder="請輸入類型描述"></textarea>
				<div class="error" th:if="${#fields.hasErrors('typeDesc')}"
					th:errors="*{typeDesc}"></div>
			</div>

			<div class="form-group">
				<label>類型模式</label> <select th:field="*{typeMode}">
					<option value="0">室內</option>
					<option value="1">室外</option>
				</select>
			</div>

			<div class="btn-row">
				<button type="submit" class="btn-submit">新增</button>
				<a class="btn-back" th:href="@{/admin/venue/venueType/listAllVenueType}">取消</a>
			</div>
		</form>
	</div>

	</main>

</div>

</body>
</html>
