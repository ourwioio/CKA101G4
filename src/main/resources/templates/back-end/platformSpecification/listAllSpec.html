<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>平台規範列表</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>平台規範列表</h2>
			<a th:href="@{/platformSpecification/addSpec}"
				class="btn btn-primary">新增規範</a>
		</div>

		<!-- Flash 訊息：發布/新增/修改/刪除成功時顯示 -->
		<div class="alert alert-success" th:if="${success != null}"
			th:text="${success}"></div>

		<!-- 複合搜尋：狀態 / 規範類型 / 標題關鍵字，可任意組合或留空 -->
		<form th:action="@{/platformSpecification/search}" method="post"
			class="row g-2 mb-4">
			<div class="col-auto">
				<select name="status" class="form-select">
					<option value="" th:selected="${searchStatus == null}">全部狀態</option>
					<option value="0"
						th:selected="${searchStatus != null and searchStatus == 0}">草稿</option>
					<option value="1"
						th:selected="${searchStatus != null and searchStatus == 1}">已發布</option>
				</select>
			</div>
			<div class="col-auto">
				<select name="specType" class="form-select">
					<option value="" th:selected="${searchSpecType == null}">全部類型</option>
					<option th:each="entry : ${specTypeListData}"
						th:value="${entry.key}" th:text="${entry.value}"
						th:selected="${searchSpecType != null and searchSpecType == entry.key}">
					</option>
				</select>
			</div>
			<div class="col-auto">
				<input type="text" name="keyword" class="form-control"
					placeholder="搜尋標題或內容" th:value="${searchKeyword}" />
			</div>
			<div class="col-auto">
				<button type="submit" class="btn btn-outline-primary">搜尋</button>
			</div>
			<div class="col-auto">
				<a th:href="@{/platformSpecification/listAllSpec}"
					class="btn btn-outline-secondary">清除條件</a>
			</div>
		</form>

		<table class="table table-hover bg-white">
			<thead>
				<tr>
					<th>編號</th>
					<th>類型</th>
					<th>標題</th>
					<th>狀態</th>
					<th>負責員工</th>
					<th>建立時間</th>
					<th>更新時間</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="spec : ${specListData}">
					<td th:text="${spec.specId}"></td>
					<td th:text="${specTypeListData.get(spec.specType)}"></td>
					<td>
						<form th:action="@{/platformSpecification/viewOne}" method="get"
							class="d-inline">
							<input type="hidden" name="specId" th:value="${spec.specId}" />
							<button type="submit"
								class="btn btn-link p-0 text-decoration-none"
								th:text="${spec.title}"></button>
						</form>
					</td>
					<td><span th:if="${spec.status == 1}" class="badge bg-success">已發布</span>
						<span th:if="${spec.status == 0}" class="badge bg-secondary">草稿</span>
					</td>
					<td
						th:text="${spec.employeeId} + ' - ' + ${employeeNameMap.get(spec.employeeId)}"></td>
					<td
						th:text="${#temporals.format(spec.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td
						th:text="${#temporals.format(spec.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td class="d-flex gap-1">
						<form th:action="@{/platformSpecification/getOne_For_Update}"
							method="post" class="d-inline">
							<input type="hidden" name="specId" th:value="${spec.specId}" />
							<button type="submit" class="btn btn-sm btn-outline-primary">修改</button>
						</form>

						<form th:action="@{/platformSpecification/publish}" method="post"
							class="d-inline" th:if="${spec.status == 0}"
							onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">
							<input type="hidden" name="specId" th:value="${spec.specId}" />
							<button type="submit" class="btn btn-sm btn-outline-success">發布</button>
						</form>

						<form th:action="@{/platformSpecification/delete}" method="post"
							class="d-inline" onsubmit="return confirm('確定要刪除這筆規範嗎？');">
							<input type="hidden" name="specId" th:value="${spec.specId}" />
							<button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>

		<div class="text-muted" th:if="${#lists.isEmpty(specListData)}">目前沒有符合條件的規範。</div>

	</div>
</body>
</html>
