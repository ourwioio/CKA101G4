<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>平台規範管理</title>

    <link rel="stylesheet" th:href="@{/css/back-end/platform/platformList.css}">
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側平台規範管理內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <h1 class="page-title">
                    平台規範管理
                </h1>

                <p class="page-subtitle">
                    維護各類平台使用規範內容，控管草稿與發布狀態，供前台會員查閱。
                </p>

            </header>

            <!-- =========================
                 成功訊息
                 ========================= -->

            <div class="message message--success"
                 th:if="${success != null}"
                 th:text="${success}">
                操作成功
            </div>

            <!-- =========================
                 查詢規範
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        查詢規範
                    </h2>

                    <span class="panel-description">
                        可依狀態、規範類型與標題關鍵字任意組合查詢
                    </span>

                </div>

                <div class="panel-body">

                    <form class="search-form"
                          th:action="@{/admin/platform/platformSpecification/search}"
                          method="post">

                        <select name="status">
                            <option value=""
                                    th:selected="${searchStatus == null}">
                                全部狀態
                            </option>
                            <option value="0"
                                    th:selected="${searchStatus != null and searchStatus == 0}">
                                草稿
                            </option>
                            <option value="1"
                                    th:selected="${searchStatus != null and searchStatus == 1}">
                                已發布
                            </option>
                        </select>

                        <select name="specType">
                            <option value=""
                                    th:selected="${searchSpecType == null}">
                                全部類型
                            </option>
                            <option th:each="entry : ${specTypeListData}"
                                    th:value="${entry.key}"
                                    th:text="${entry.value}"
                                    th:selected="${searchSpecType != null and searchSpecType == entry.key}">
                            </option>
                        </select>

                        <input type="text"
                               name="keyword"
                               placeholder="搜尋標題或內容"
                               th:value="${searchKeyword}">

                        <div class="search-form-actions">

                            <button class="btn btn--primary"
                                    type="submit">
                                搜尋
                            </button>

                            <a class="btn btn--secondary"
                               th:href="@{/admin/platform/platformSpecification/listAllSpec}">
                                清除條件
                            </a>

                        </div>

                    </form>

                </div>

            </section>

            <!-- =========================
                 規範列表
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        規範列表
                    </h2>

                    <span class="panel-description">

                        共

                        <strong th:text="${specListData != null
                                ? #lists.size(specListData)
                                : 0}">
                            0
                        </strong>

                        筆

                    </span>

                    <a class="btn btn--primary"
                       th:href="@{/admin/platform/platformSpecification/addSpec}">
                        新增規範
                    </a>

                </div>

                <!-- 有規範資料 -->
                <div class="table-scroll"
                     th:if="${specListData != null
                              and !#lists.isEmpty(specListData)}">

                    <table class="data-table">

                        <thead>

                        <tr>

                            <th class="col-id">
                                編號
                            </th>

                            <th class="col-type">
                                類型
                            </th>

                            <th class="col-title">
                                標題
                            </th>

                            <th class="col-status">
                                狀態
                            </th>

                            <th class="col-employee">
                                負責員工
                            </th>

                            <th class="col-time">
                                建立時間
                            </th>

                            <th class="col-time">
                                更新時間
                            </th>

                            <th class="col-action">
                                操作
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="spec : ${specListData}">

                            <td th:text="${spec.specId}">
                                1
                            </td>

                            <td class="cell-clip" th:text="${specTypeListData.get(spec.specType)}">
                                類型
                            </td>

                            <td>

                                <form class="action-form"
                                      th:action="@{/admin/platform/platformSpecification/viewOne}"
                                      method="get">

                                    <input type="hidden"
                                           name="specId"
                                           th:value="${spec.specId}">

                                    <button class="title-link"
                                            type="submit"
                                            th:text="${spec.title}">
                                        規範標題
                                    </button>

                                </form>

                            </td>

                            <td>

                                <span class="badge badge--published"
                                      th:if="${spec.status == 1}">
                                    已發布
                                </span>

                                <span class="badge badge--draft"
                                      th:if="${spec.status == 0}">
                                    草稿
                                </span>

                            </td>

                            <td th:text="${spec.employeeId} + ' - ' + ${employeeNameMap.get(spec.employeeId)}">
                                1001 - 員工
                            </td>

                            <td th:text="${#temporals.format(
                                    spec.createdAt,
                                    'yyyy-MM-dd HH:mm'
                            )}">
                                2026-07-15 14:30
                            </td>

                            <td th:text="${spec.updatedAt != null
                                    ? #temporals.format(spec.updatedAt, 'yyyy-MM-dd HH:mm')
                                    : '-'}">
                                -
                            </td>

                            <td class="cell-actions">

                                <div class="action-group">

                                    <form class="action-form"
                                          th:action="@{/admin/platform/platformSpecification/getOne_For_Update}"
                                          method="post">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--secondary btn--sm"
                                                type="submit">
                                            修改
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:if="${spec.status == 0}"
                                          th:action="@{/admin/platform/platformSpecification/publish}"
                                          method="post"
                                          onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--success btn--sm"
                                                type="submit">
                                            發布
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:action="@{/admin/platform/platformSpecification/delete}"
                                          method="post"
                                          onsubmit="return confirm('確定要刪除這筆規範嗎？');">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--danger btn--sm"
                                                type="submit">
                                            刪除
                                        </button>

                                    </form>

                                </div>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <!-- 無規範資料 -->
                <div class="empty-state"
                     th:if="${specListData == null
                              or #lists.isEmpty(specListData)}">
                    目前沒有符合條件的規範
                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
