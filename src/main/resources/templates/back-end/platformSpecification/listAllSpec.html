<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>平台規範管理</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .page {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .page-subtitle {
            margin: 7px 0 0;
            color: #69727b;
            font-size: 14px;
        }

        /* =========================
           訊息
           ========================= */

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            font-weight: 700;
        }

        .message--success {
            color: #176b45;
            background: #e8f8ef;
            border: 1px solid #b7e4ca;
        }

        /* =========================
           按鈕
           ========================= */

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 13px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            transition:
                    transform 0.15s ease,
                    background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn--primary {
            color: #ffffff;
            background: #6c5ce7;
        }

        .btn--primary:hover {
            background: #5748c8;
        }

        .btn--secondary {
            color: #4f5964;
            background: #edf0f3;
        }

        .btn--secondary:hover {
            background: #dfe4e8;
        }

        .btn--success {
            color: #ffffff;
            background: #00a878;
        }

        .btn--success:hover {
            background: #008f66;
        }

        .btn--danger {
            color: #ffffff;
            background: #d63031;
        }

        .btn--danger:hover {
            background: #b92526;
        }

        .btn--sm {
            min-height: 32px;
            padding: 6px 10px;
            font-size: 12px;
        }

        /* =========================
           共用面板
           ========================= */

        .panel {
            margin-bottom: 22px;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 15px
                    rgba(0, 0, 0, 0.04);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 17px 20px;
            border-bottom: 1px solid #e7eaee;
        }

        .panel-title {
            margin: 0;
            font-size: 20px;
        }

        .panel-description {
            color: #69727b;
            font-size: 13px;
        }

        .panel-body {
            padding: 20px;
        }

        /* =========================
           搜尋表單
           ========================= */

        .search-form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .search-form select,
        .search-form input[type="text"] {
            min-height: 42px;
            padding: 9px 11px;
            color: #2d3436;
            background: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 8px;
        }

        .search-form input[type="text"] {
            flex: 1;
            min-width: 220px;
        }

        /* =========================
           狀態標籤
           ========================= */

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .badge--draft {
            color: #475569;
            background: #e2e8f0;
        }

        .badge--published {
            color: #166534;
            background: #dcfce7;
        }

        /* =========================
           規範表格
           ========================= */

        .table-scroll {
            width: 100%;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            min-width: 1280px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #edf0f2;
            vertical-align: middle;
            text-align: left;
            font-size: 13px;
            word-break: break-word;
        }

        .data-table th {
            color: #4f5964;
            background: #f7f8fa;
            font-weight: 800;
        }

        .data-table tbody tr:hover {
            background: #fafaff;
        }

        .data-table tbody tr:last-child td {
            border-bottom: 0;
        }

        .col-id {
            width: 65px;
        }

        .col-type {
            width: 130px;
        }

        .col-title {
            width: 300px;
        }

        .col-status {
            width: 90px;
        }

        .col-employee {
            width: 150px;
        }

        .col-time {
            width: 130px;
        }

        .col-action {
            width: 210px;
        }

        .title-link {
            display: inline-block;
            padding: 0;
            color: #5a4acb;
            background: none;
            border: 0;
            font-weight: 800;
            font-size: 13px;
            line-height: 1.5;
            text-align: left;
            cursor: pointer;
            transition:
                    color 0.15s ease,
                    text-decoration 0.15s ease;
        }

        .title-link:hover {
            color: #4436aa;
            text-decoration: underline;
        }

        .action-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 7px;
        }

        .action-form {
            display: inline-block;
            margin: 0;
        }

        .empty-state {
            padding: 48px 20px;
            color: #69727b;
            text-align: center;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 800px) {

            .panel-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (max-width: 620px) {

            .search-form {
                flex-direction: column;
                align-items: stretch;
            }

            .search-form select,
            .search-form input,
            .search-form .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側平台規範管理內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <h1 class="page-title">
                    平台規範管理
                </h1>

                <p class="page-subtitle">
                    維護各類平台使用規範內容，控管草稿與發布狀態，供前台會員查閱。
                </p>

            </header>

            <!-- =========================
                 成功訊息
                 ========================= -->

            <div class="message message--success"
                 th:if="${success != null}"
                 th:text="${success}">
                操作成功
            </div>

            <!-- =========================
                 查詢規範
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        查詢規範
                    </h2>

                    <span class="panel-description">
                        可依狀態、規範類型與標題關鍵字任意組合查詢
                    </span>

                </div>

                <div class="panel-body">

                    <form class="search-form"
                          th:action="@{/platformSpecification/search}"
                          method="post">

                        <select name="status">
                            <option value=""
                                    th:selected="${searchStatus == null}">
                                全部狀態
                            </option>
                            <option value="0"
                                    th:selected="${searchStatus != null and searchStatus == 0}">
                                草稿
                            </option>
                            <option value="1"
                                    th:selected="${searchStatus != null and searchStatus == 1}">
                                已發布
                            </option>
                        </select>

                        <select name="specType">
                            <option value=""
                                    th:selected="${searchSpecType == null}">
                                全部類型
                            </option>
                            <option th:each="entry : ${specTypeListData}"
                                    th:value="${entry.key}"
                                    th:text="${entry.value}"
                                    th:selected="${searchSpecType != null and searchSpecType == entry.key}">
                            </option>
                        </select>

                        <input type="text"
                               name="keyword"
                               placeholder="搜尋標題或內容"
                               th:value="${searchKeyword}">

                        <button class="btn btn--primary"
                                type="submit">
                            搜尋
                        </button>

                        <a class="btn btn--secondary"
                           th:href="@{/platformSpecification/listAllSpec}">
                            清除條件
                        </a>

                    </form>

                </div>

            </section>

            <!-- =========================
                 規範列表
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        規範列表
                    </h2>

                    <span class="panel-description">

                        共

                        <strong th:text="${specListData != null
                                ? #lists.size(specListData)
                                : 0}">
                            0
                        </strong>

                        筆

                    </span>

                    <a class="btn btn--primary"
                       th:href="@{/platformSpecification/addSpec}">
                        新增規範
                    </a>

                </div>

                <!-- 有規範資料 -->
                <div class="table-scroll"
                     th:if="${specListData != null
                              and !#lists.isEmpty(specListData)}">

                    <table class="data-table">

                        <thead>

                        <tr>

                            <th class="col-id">
                                編號
                            </th>

                            <th class="col-type">
                                類型
                            </th>

                            <th class="col-title">
                                標題
                            </th>

                            <th class="col-status">
                                狀態
                            </th>

                            <th class="col-employee">
                                負責員工
                            </th>

                            <th class="col-time">
                                建立時間
                            </th>

                            <th class="col-time">
                                更新時間
                            </th>

                            <th class="col-action">
                                操作
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="spec : ${specListData}">

                            <td th:text="${spec.specId}">
                                1
                            </td>

                            <td th:text="${specTypeListData.get(spec.specType)}">
                                類型
                            </td>

                            <td>

                                <form class="action-form"
                                      th:action="@{/platformSpecification/viewOne}"
                                      method="get">

                                    <input type="hidden"
                                           name="specId"
                                           th:value="${spec.specId}">

                                    <button class="title-link"
                                            type="submit"
                                            th:text="${spec.title}">
                                        規範標題
                                    </button>

                                </form>

                            </td>

                            <td>

                                <span class="badge badge--published"
                                      th:if="${spec.status == 1}">
                                    已發布
                                </span>

                                <span class="badge badge--draft"
                                      th:if="${spec.status == 0}">
                                    草稿
                                </span>

                            </td>

                            <td th:text="${spec.employeeId} + ' - ' + ${employeeNameMap.get(spec.employeeId)}">
                                1001 - 員工
                            </td>

                            <td th:text="${#temporals.format(
                                    spec.createdAt,
                                    'yyyy-MM-dd HH:mm'
                            )}">
                                2026-07-15 14:30
                            </td>

                            <td th:text="${#temporals.format(
                                    spec.updatedAt,
                                    'yyyy-MM-dd HH:mm'
                            )}">
                                2026-07-15 14:30
                            </td>

                            <td>

                                <div class="action-group">

                                    <form class="action-form"
                                          th:action="@{/platformSpecification/getOne_For_Update}"
                                          method="post">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--secondary btn--sm"
                                                type="submit">
                                            修改
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:if="${spec.status == 0}"
                                          th:action="@{/platformSpecification/publish}"
                                          method="post"
                                          onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--success btn--sm"
                                                type="submit">
                                            發布
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:action="@{/platformSpecification/delete}"
                                          method="post"
                                          onsubmit="return confirm('確定要刪除這筆規範嗎？');">

                                        <input type="hidden"
                                               name="specId"
                                               th:value="${spec.specId}">

                                        <button class="btn btn--danger btn--sm"
                                                type="submit">
                                            刪除
                                        </button>

                                    </form>

                                </div>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <!-- 無規範資料 -->
                <div class="empty-state"
                     th:if="${specListData == null
                              or #lists.isEmpty(specListData)}">
                    目前沒有符合條件的規範
                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
