<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>新增平台規範</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .page {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0 0 7px;
            font-size: 28px;
            font-weight: 800;
        }

        .page-subtitle {
            margin: 0;
            color: #69727b;
            font-size: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 15px;
            color: #ffffff;
            background: #343a40;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 800;
            transition:
                    background 0.15s ease,
                    transform 0.15s ease;
        }

        .back-link:hover {
            background: #111111;
            transform: translateY(-1px);
        }

        /* =========================
           表單面板
           ========================= */

        .panel {
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 15px
                    rgba(0, 0, 0, 0.04);
        }

        .panel-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #4f5964;
            font-size: 13px;
            font-weight: 800;
        }

        .form-control {
            width: 100%;
            min-height: 42px;
            padding: 9px 11px;
            color: #2d3436;
            background: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 8px;
        }

        textarea.form-control {
            min-height: 160px;
            resize: vertical;
        }

        .form-control:focus {
            border-color: #6c5ce7;
            outline: 2px solid rgba(108, 92, 231, 0.15);
        }

        .field-error {
            margin-top: 6px;
            color: #a12622;
            font-size: 12px;
            font-weight: 700;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            padding-top: 6px;
        }

        /* =========================
           按鈕
           ========================= */

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 9px 18px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            transition:
                    transform 0.15s ease,
                    background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn--primary {
            color: #ffffff;
            background: #6c5ce7;
        }

        .btn--primary:hover {
            background: #5748c8;
        }

        .btn--secondary {
            color: #4f5964;
            background: #edf0f3;
        }

        .btn--secondary:hover {
            background: #dfe4e8;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 620px) {

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .back-link {
                text-align: center;
            }

            .form-actions,
            .form-actions .btn {
                width: 100%;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側新增規範內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <div>

                    <h1 class="page-title">
                        新增平台規範
                    </h1>

                    <p class="page-subtitle">
                        填寫規範內容並選擇是否立即發布。
                    </p>

                </div>

                <a class="back-link"
                   th:href="@{/admin/platform/platformSpecification/listAllSpec}">
                    ← 返回平台規範管理
                </a>

            </header>

            <!-- =========================
                 新增規範表單
                 ========================= -->

            <section class="panel">

                <div class="panel-body">

                    <form th:action="@{/admin/platform/platformSpecification/insert}"
                          th:object="${specVO}"
                          method="post">

                        <div class="form-group">

                            <label for="specType">
                                規範類型
                            </label>

                            <select id="specType"
                                    class="form-control"
                                    th:field="*{specType}">

                                <option value="">
                                    請選擇規範類型
                                </option>

                                <option th:each="entry : ${specTypeListData}"
                                        th:value="${entry.key}"
                                        th:text="${entry.value}">
                                </option>

                            </select>

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('specType')}"
                                 th:errors="*{specType}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="title">
                                規範標題
                            </label>

                            <input id="title"
                                   class="form-control"
                                   type="text"
                                   th:field="*{title}">

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="description">
                                規範內容
                            </label>

                            <textarea id="description"
                                      class="form-control"
                                      th:field="*{description}">
                            </textarea>

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="employeeId">
                                負責員工
                            </label>

                            <select id="employeeId"
                                    class="form-control"
                                    th:field="*{employeeId}">

                                <option value="">
                                    請選擇員工
                                </option>

                                <option th:each="emp : ${employeeListData}"
                                        th:value="${emp.employeeId}"
                                        th:text="${emp.employeeId} + ' - ' + ${emp.empName}">
                                </option>

                            </select>

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('employeeId')}"
                                 th:errors="*{employeeId}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="status">
                                狀態
                            </label>

                            <select id="status"
                                    class="form-control"
                                    th:field="*{status}">

                                <option value="0">
                                    草稿
                                </option>

                                <option value="1">
                                    發布
                                </option>

                            </select>

                        </div>

                        <div class="form-actions">

                            <button class="btn btn--primary"
                                    type="submit">
                                送出
                            </button>

                            <a class="btn btn--secondary"
                               th:href="@{/admin/platform/platformSpecification/listAllSpec}">
                                取消
                            </a>

                        </div>

                    </form>

                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
