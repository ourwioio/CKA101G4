<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>後台管理系統 - 活動檢舉管理</title>

<style>
* {
	box-sizing: border-box;
}

body {
	margin: 0;
	background: #f5f6fa;
	font-family: Arial, "Noto Sans TC", sans-serif;
	color: #2d3436;
}

a {
	text-decoration: none;
	color: inherit;
}

/* =========================================
           後台主佈局雙欄容器 (一體化設計)
           ========================================= */
.wb-admin-layout {
	display: flex;
	min-height: 100vh;
	width: 100%;
}

/* 主要內容工作區 */
.wb-admin-content {
	flex: 1;
	padding: 32px;
	background-color: #f5f6fa;
	overflow-x: hidden;
}

.list-container {
	width: 100%;
	max-width: 1400px;
	margin: 0 auto;
}

/* 頁面大標題 */
.page-header {
	margin-bottom: 24px;
	text-align: center;
}

.page-title {
	margin: 0;
	font-size: 26px;
	color: #2d3436;
	font-weight: bold;
}

/* =========================================
           頂部功能快捷按鈕列
           ========================================= */
.action-bar {
	display: flex;
	justify-content: flex-end;
	align-items: center;
	gap: 10px;
	flex-wrap: wrap;
	margin-bottom: 20px;
}

.btn-nav {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	height: 42px;
	padding: 0 18px;
	border-radius: 8px;
	font-size: 14px;
	font-weight: bold;
	color: #ffffff;
	transition: opacity 0.15s ease, transform 0.1s ease;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
}

.btn-nav:hover {
	opacity: 0.9;
}

.btn-nav:active {
	transform: scale(0.98);
}

/* 快捷鈕色彩系統統一整合 */
.btn-nav--blue {
	background: #0984e3;
}

.btn-nav--purple {
	background: #6c5ce7;
}

.btn-nav--green {
	background: #2ed573;
}

.btn-nav--orange {
	background: #e17055;
}

.btn-nav--gray {
	background: #636e72;
}

/* =========================================
           狀態篩選卡片區塊
           ========================================= */
.filter-card {
	background: #ffffff;
	border: 1px solid #dfe4e8;
	border-radius: 10px;
	padding: 16px 20px;
	margin-bottom: 24px;
	box-shadow: 0 3px 12px rgba(0, 0, 0, 0.03);
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 12px;
}

.filter-label {
	font-weight: bold;
	color: #2d3436;
	font-size: 14px;
}

.filter-tab-group {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
}

/* 篩選標籤按鈕基礎樣式 */
.tab-btn {
	padding: 6px 14px;
	font-size: 13px;
	font-weight: bold;
	background: #ffffff;
	color: #636e72;
	border: 1px solid #dfe4e8;
	border-radius: 6px;
	transition: all 0.15s ease;
}

.tab-btn:hover {
	background: #f8fafc;
	color: #2d3436;
	border-color: #b2bec3;
}

/* 各狀態動態激活 (Active) 樣式 */
.tab-btn.active-all {
	background: #0984e3;
	color: #fff;
	border-color: #0984e3;
}

.tab-btn.active-pending {
	background: #fdcb6e;
	color: #2d3436;
	border-color: #fdcb6e;
}

.tab-btn.active-invest {
	background: #d63031;
	color: #fff;
	border-color: #d63031;
}

.tab-btn.active-success {
	background: #2ed573;
	color: #fff;
	border-color: #2ed573;
}

.tab-btn.active-reject {
	background: #b2bec3;
	color: #fff;
	border-color: #b2bec3;
}

.tab-btn.active-appeal-s {
	background: #00cec9;
	color: #fff;
	border-color: #00cec9;
}

.tab-btn.active-appeal-r {
	background: #636e72;
	color: #fff;
	border-color: #636e72;
}

/* =========================================
           明細資料表格卡片與響應式包裹
           ========================================= */
.table-card {
	background: #ffffff;
	border: 1px solid #dfe4e8;
	border-radius: 10px;
	box-shadow: 0 3px 12px rgba(0, 0, 0, 0.04);
	overflow: hidden;
	margin-bottom: 24px;
}

.table-responsive {
	width: 100%;
	overflow-x: auto; /* 超出寬度時自動提供橫向滾動條 */
}

.custom-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 13px;
	white-space: nowrap; /* 防止多欄位文字折行擠壓 */
}

.custom-table th {
	background: #f8fafc;
	color: #2d3436;
	font-weight: bold;
	padding: 14px 12px;
	border-bottom: 2px solid #dfe4e8;
	text-align: center;
}

.custom-table td {
	padding: 12px;
	border-bottom: 1px solid #dfe4e8;
	color: #2d3436;
	vertical-align: middle;
}

.custom-table tbody tr:hover {
	background-color: #fdfdfd;
}

/* 輔助文字小樣式 */
.text-muted-sub {
	font-size: 11px;
	color: #7f8c8d;
	margin-top: 3px;
	display: block;
}

/* =========================================
           狀態標籤 Badge 系統
           ========================================= */
.status-badge {
	display: inline-block;
	padding: 4px 8px;
	font-size: 12px;
	font-weight: bold;
	border-radius: 4px;
	text-align: center;
}

.status-badge--orange {
	color: #d35400;
	background: #fff3e0;
}

.status-badge--green {
	color: #27ae60;
	background: #e8f5e9;
}

.status-badge--gray {
	color: #7f8c8d;
	background: #f5f5f5;
}

.status-badge--red {
	color: #c0392b;
	background: #ffebee;
}

.status-badge--blue {
	color: #2980b9;
	background: #e1f5fe;
}

.status-badge--dark {
	color: #2c3e50;
	background: #eceff1;
}

/* 操作按鈕 */
.btn-action {
	background: #0984e3;
	color: #ffffff;
	border: none;
	padding: 5px 12px;
	font-size: 12px;
	font-weight: bold;
	border-radius: 4px;
	cursor: pointer;
	transition: background 0.15s;
}

.btn-action:hover {
	background: #076bba;
}

.text-readonly {
	color: #b2bec3;
	font-size: 12px;
}

/* =========================================
           分頁導覽
           ========================================= */
.pagination-container {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 10px;
	margin-top: 20px;
}

.btn-page {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	height: 34px;
	padding: 0 14px;
	background: #ffffff;
	border: 1px solid #dfe4e8;
	color: #2d3436;
	font-size: 13px;
	font-weight: bold;
	border-radius: 4px;
	transition: background 0.15s;
}

.btn-page:hover {
	background: #edf2f7;
	border-color: #cbd5e0;
}

.page-info {
	font-size: 13px;
	font-weight: bold;
	color: #636e72;
}

.text-center {
	text-align: center !important;
}

.modal-overlay {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background: rgba(0, 0, 0, 0.4); /* 半透明黑底背景 */
	z-index: 9999;
	display: flex; /* 關鍵：啟動彈性排版 */
	align-items: center; /* 垂直置中 */
	justify-content: center; /* 水平置中 */
}

.modal-card {
	background: #ffffff;
	border-radius: 12px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
	width: 450px; /* 微調到 450px 讓長文字備註比較好讀 */
	padding: 24px;
	border: none;
}

.modal-title {
	margin: 0 0 16px 0;
	font-size: 18px;
	font-weight: bold;
	color: #2d3436;
	text-align: center;
}

.modal-actions {
	display: flex;
	justify-content: flex-end;
	gap: 10px;
	margin-top: 20px;
}

.btn-modal {
	height: 36px;
	padding: 0 16px;
	font-size: 13px;
	font-weight: bold;
	border-radius: 6px;
	cursor: pointer;
	border: none;
}

.btn-modal--cancel {
	background: #f5f6fa;
	color: #636e72;
	border: 1px solid #dfe4e8;
}

.btn-modal--cancel:hover {
	background: #dfe4e8;
}

/* 輕量化外殼：高度極低，帶有精緻的淺灰色細外框 */
.filter-card--compact {
	background: #ffffff;
	border-radius: 8px;
	border: 1px solid #e2e8f0;
	padding: 12px 20px;
	margin-bottom: 20px;
}

/* 橫向排列的表單容器 */
.filter-inline-form {
	display: flex;
	flex-wrap: wrap; /* 避免極端小螢幕破版 */
	align-items: center;
	gap: 24px; /* 每個元件之間的精緻間距 */
}

/* 每個篩選元件：標籤與下拉選單橫向併排 */
.filter-field-inline {
	display: flex;
	align-items: center;
	gap: 8px;
}

/* 縮小版的標籤文字 */
.filter-label-inline {
	font-size: 13px;
	font-weight: 500;
	color: #475569;
	white-space: nowrap; /* 避免文字斷行 */
}

.select-wrapper-inline {
	position: relative;
	min-width: 140px; /* 給予適當寬度，防止選單縮得太小 */
}

/* 針對類型選單給予稍寬的空間（因為中文字數較多） */
#rptType.form-control-inline {
	min-width: 180px;
}

/* 輕量化下拉選單本體 */
.form-control-inline {
	width: 100%;
	padding: 6px 30px 6px 12px; /* 減少上下內距，使其變扁、變精緻 */
	font-size: 13px;
	color: #334155;
	background-color: #f8fafc;
	border: 1px solid #cbd5e1;
	border-radius: 6px;
	cursor: pointer;
	appearance: none;
	-webkit-appearance: none;
	transition: all 0.2s ease;
}

/* 自訂小箭頭 */
.select-wrapper-inline::after {
	content: '▼';
	font-size: 9px;
	color: #94a3b8;
	position: absolute;
	right: 10px;
	top: 52%;
	transform: translateY(-50%);
	pointer-events: none;
}

.form-control-inline:focus {
	border-color: #3b82f6;
	background-color: #ffffff;
	box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
	outline: none;
}

.filter-actions-inline {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-left: auto; /* 💡 神奇魔法：自動將按鈕推至最右邊，視覺上最和諧 */
}

.btn-filter-submit-inline {
	background: #3b82f6;
	color: #ffffff;
	border: none;
	padding: 6px 16px;
	font-size: 13px;
	font-weight: 500;
	border-radius: 6px;
	cursor: pointer;
	transition: background 0.2s;
}

.btn-filter-submit-inline:hover {
	background: #2563eb;
}

.btn-filter-reset-inline {
	color: #64748b;
	text-decoration: none;
	font-size: 13px;
	font-weight: 500;
	padding: 6px 12px;
	border-radius: 6px;
	transition: background 0.2s;
}

.btn-filter-reset-inline:hover {
	background: #f1f5f9;
	color: #334155;
}
</style>
</head>
<body>

	<div class="wb-admin-layout">

		<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>

		<main class="wb-admin-content">
			<div class="list-container">

				<header class="page-header">
					<h2 class="page-title">活動檢舉管理系統</h2>
				</header>

				<div class="action-bar">
					<a th:href="@{/admin/activity/listAllActivity}"
						class="btn-nav btn-nav--blue">活動管理</a> <a
						th:href="@{/admin/activity/type/listAllActivityType}"
						class="btn-nav btn-nav--purple">類別管理</a> <a
						th:href="@{/admin/activity/order/listAllActivityOrder}"
						class="btn-nav btn-nav--green">訂單紀錄</a> <a
						th:href="@{/admin/activity/order/finance}"
						class="btn-nav btn-nav--orange">撥退款作業</a> <a
						th:href="@{/admin/activity/home}" class="btn-nav btn-nav--gray">回後台首頁</a>
				</div>

				<div class="filter-card filter-card--compact">
					<form th:action="@{/admin/activity/actRptList}" method="get"
						class="filter-inline-form">

						<!-- 1. 狀態篩選 -->
						<div class="filter-field-inline">
							<label class="filter-label-inline" for="status">狀態</label>
							<div class="select-wrapper-inline">
								<select id="status" name="status" class="form-control-inline">
									<option value="">全部狀態</option>
									<option value="0" th:selected="${currentStatus == 0}">待處理</option>
									<option value="1" th:selected="${currentStatus == 1}">檢舉成立</option>
									<option value="2" th:selected="${currentStatus == 2}">檢舉駁回</option>
								</select>
							</div>
						</div>

						<!-- 2. 員工篩選 -->
						<div class="filter-field-inline">
							<label class="filter-label-inline" for="empId">員工</label>
							<div class="select-wrapper-inline">
								<select id="empId" name="empId" class="form-control-inline">
									<option value="">全部員工</option>
									<option th:each="emp : ${empList}" th:value="${emp.employeeId}"
										th:text="${emp.empName}"
										th:selected="${currentEmpId == emp.employeeId}"></option>
								</select>
							</div>
						</div>

						<!-- 3. 檢舉類型 -->
						<div class="filter-field-inline">
							<label class="filter-label-inline" for="rptType">類型</label>
							<div class="select-wrapper-inline">
								<select id="rptType" name="rptType" class="form-control-inline">
									<option value="">全部類型</option>
									<option value="0" th:selected="${currentRptType == 0}">詐騙
										/ 虛假活動</option>
									<option value="1" th:selected="${currentRptType == 1}">色情
										/ 不當活動</option>
									<option value="2" th:selected="${currentRptType == 2}">暴力
										/ 危險活動</option>
									<option value="3" th:selected="${currentRptType == 3}">違法行為
										(聚賭、毒品)</option>
									<option value="4" th:selected="${currentRptType == 4}">其他</option>
								</select>
							</div>
						</div>

						<!-- 4. 按鈕組（直接融入尾端） -->
						<div class="filter-actions-inline">
							<button type="submit" class="btn-filter-submit-inline">篩選</button>
							<a th:href="@{/admin/activity/actRptList}"
								class="btn-filter-reset-inline">重設</a>
						</div>

					</form>
				</div>



				<!-- 明細資料表格區塊 -->
				<div class="table-card">
					<div class="table-responsive">
						<table class="custom-table">
							<thead>
								<tr>
									<th>檢舉編號</th>
									<th>活動與被檢舉人</th>
									<th>檢舉類型</th>
									<th>檢舉時間</th>
									<th>處理狀態</th>
									<th>審核員工</th>
									<th>狀態修改時間</th>
									<th>審核備註</th>
									<th>審核操作</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="rptVO : ${actRptListData}">
									<td th:text="${rptVO.actRptId}" class="text-center"></td>
									<td class="text-center"><span class="text-center"
										th:text="${rptVO.actId != null ? #strings.abbreviate(rptVO.actId.activityTitle, 15) : '未知活動'}"
										th:title="${rptVO.actId != null ? rptVO.actId.activityTitle : ''}">
									</span> <span class="text-muted-sub"
										th:text="${rptVO.actId != null ? '被檢舉人 ID: ' + rptVO.actId.memberId : '被檢舉人: 無'}"></span>
									</td>
									<td th:switch="${rptVO.rptType}" class="text-center"><span
										th:case="0">詐騙/虛假活動</span> <span th:case="1">色情/不當活動</span> <span
										th:case="2">暴力/危險活動</span> <span th:case="3">違法行為(聚賭、毒品)</span>
										<span th:case="4">其他</span></td>
									<td
										th:text="${rptVO.actRptTime != null ? #dates.format(rptVO.actRptTime, 'yyyy-MM-dd HH:mm') : '—'}"
										class="text-center"></td>
									<td th:switch="${rptVO.actRptStatus}" class="text-center">
										<span th:case="0" class="status-badge status-badge--orange">待處理</span>
										<span th:case="1" class="status-badge status-badge--green">檢舉成立/已處罰</span>
										<span th:case="2" class="status-badge status-badge--gray">檢舉駁回</span>
									</td>
									<td
										th:text="${rptVO.empId != null ? rptVO.empId.empName : '—'}"
										class="text-center"></td>
									<td
										th:text="${rptVO.updated != null ? #dates.format(rptVO.updated, 'yyyy-MM-dd HH:mm') : '—'}"
										class="text-center"></td>
									<td class="text-center" style="vertical-align: middle;">
										<button th:if="${rptVO.remark != null && rptVO.remark != ''}"
											type="button" class="btn-action"
											style="background: #636e72; padding: 4px 10px; font-size: 11px; margin: 0 auto; display: block;"
											th:data-remark="${rptVO.remark}"
											th:data-type="${rptVO.penaltyType}"
											th:data-value="${rptVO.penaltyValue != null ? rptVO.penaltyValue : 0}"
											onclick="openRemarkModal(this)">查看</button> <span
										th:unless="${rptVO.remark != null && rptVO.remark != ''}"
										class="text-readonly">—</span>
									</td>

									<td class="text-center"><a
										th:if="${rptVO.actRptStatus == 0}"
										th:href="@{/admin/activity/actRpt/review/{id}(id=${rptVO.actRptId})}"
										class="btn-action"
										style="display: inline-block; text-decoration: none; line-height: normal;">
											審核 </a> <span th:unless="${rptVO.actRptStatus == 0}"
										class="text-readonly">唯讀</span></td>
								</tr>
								<tr th:if="${#lists.isEmpty(actRptListData)}">
									<td colspan="14"
										style="text-align: center; color: #999; padding: 30px;">該分類目前沒有任何檢舉或申訴案件。</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<!-- 下方分頁導覽 -->
				<div class="pagination-container">
					<a th:if="${currentPage > 0}"
						th:href="@{/admin/activity/actRptList(status=${currentStatus}, empId=${currentEmpId}, page=${currentPage - 1})}"
						class="btn-page"> 上一頁 </a> <span class="page-info"
						th:text="'第 ' + (${currentPage ?: 0} + 1) + ' 頁 / 共 ' + ${totalPages ?: 1} + ' 頁'">
						第 1 頁 / 共 1 頁 </span> <a
						th:if="${(currentPage ?: 0) < (totalPages ?: 1) - 1}"
						th:href="@{/admin/activity/actRptList(status=${currentStatus}, empId=${currentEmpId}, page=${currentPage + 1})}"
						class="btn-page"> 下一頁 </a>
				</div>

			</div>
		</main>
	</div>

	<div id="remarkModal" class="modal-overlay" style="display: none;">
		<div class="modal-card" style="width: 480px;">
			<h3 class="modal-title">📄 完整審核紀錄與懲處明細</h3>

			<div
				style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; margin-bottom: 16px;">
				<div
					style="background-color: #f5f6fa; padding: 10px 14px; border-radius: 6px; border: 1px solid #dfe4e8; text-align: left;">
					<div
						style="font-size: 11px; font-weight: bold; color: #7f8c8d; margin-bottom: 4px;">歷史懲處類型</div>
					<div id="modalPenaltyType"
						style="font-size: 14px; font-weight: bold; color: #2d3436;">—</div>
				</div>
				<div
					style="background-color: #f5f6fa; padding: 10px 14px; border-radius: 6px; border: 1px solid #dfe4e8; text-align: left;">
					<div
						style="font-size: 11px; font-weight: bold; color: #7f8c8d; margin-bottom: 4px;">當時處罰記點</div>
					<div id="modalPenaltyValue"
						style="font-size: 14px; font-weight: bold; color: #2d3436;">—</div>
				</div>
			</div>

			<div class="form-group"
				style="margin-bottom: 24px; text-align: left;">
				<label
					style="display: block; font-size: 12px; font-weight: bold; color: #636e72; margin-bottom: 6px;">審核備註紀錄：</label>
				<p id="fullRemarkText"
					style="font-size: 14px; line-height: 1.6; color: #2d3436; white-space: pre-wrap; word-break: break-all; margin: 0; padding: 12px; background-color: #fdfdfd; border-radius: 6px; border: 1px solid #dfe4e8; min-height: 100px; max-height: 200px; overflow-y: auto;"></p>
			</div>

			<div class="modal-actions"
				style="margin-top: 0; padding-top: 0; border: none; justify-content: center;">
				<button type="button" class="btn-modal btn-modal--cancel"
					onclick="closeRemarkModal()" style="width: 100%; height: 38px;">
					關閉視窗</button>
			</div>
		</div>
	</div>

	<script>
		function openRemarkModal(buttonElement) {
			const remarkText = buttonElement.dataset.remark;
			const penaltyType = buttonElement.dataset.type;
			const penaltyValue = buttonElement.dataset.value;

			if (!remarkText)
				return;

			const typeEl = document.getElementById('modalPenaltyType');
			if (penaltyType == "1") {
				typeEl.innerHTML = '<span class="status-badge status-badge--red" style="padding: 2px 6px;">⚠️ 記點處分</span>';
			} else {
				typeEl.innerHTML = '<span class="status-badge status-badge--green" style="padding: 2px 6px;">✅ 無 / 駁回</span>';
			}

			const valEl = document.getElementById('modalPenaltyValue');
			if (penaltyType == "1") {
				valEl.innerHTML = '<strong style="color: #c0392b; font-size: 15px;">- '
						+ penaltyValue + ' 點</strong>';
			} else {
				valEl.innerHTML = '<span style="color: #7f8c8d;">0 點</span>';
			}

			document.getElementById('fullRemarkText').textContent = remarkText;
			document.getElementById('remarkModal').style.display = 'flex';
		}

		function closeRemarkModal() {
			document.getElementById('remarkModal').style.display = 'none';
			document.getElementById('fullRemarkText').textContent = '';
			document.getElementById('modalPenaltyType').textContent = '—';
			document.getElementById('modalPenaltyValue').textContent = '—';
		}

		// 點擊半透明黑底自動關閉
		document.getElementById('remarkModal').addEventListener('click',
				function(e) {
					if (e.target === this) {
						closeRemarkModal();
					}
				});
	</script>

</body>
</html>
