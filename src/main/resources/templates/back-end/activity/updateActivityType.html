<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改活動類型</title>
    <style>
        /* 明亮主題 (白底) 高質感樣式 */
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', 'PingFang TC', sans-serif; margin: 0; padding: 40px; }
        .header-container { max-width: 600px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-title { font-size: 1.8rem; font-weight: bold; color: #0f172a; }
        
        .btn-secondary { background-color: #ffffff; color: #475569; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; transition: all 0.2s; }
        .btn-secondary:hover { background-color: #f1f5f9; }

        .form-card { background-color: #ffffff; max-width: 600px; margin: 0 auto; border-radius: 12px; padding: 30px 40px; color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #334155; font-size: 0.95rem; }
        
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; background-color: #f8fafc; transition: all 0.2s; color: #1e293b; }
        .form-control:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); background-color: #ffffff; }
        
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        
        .btn-submit { background-color: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s; }
        .btn-submit:hover { background-color: #059669; }
        
        .btn-cancel { background-color: #ffffff; color: #475569; border: 1px solid #cbd5e1; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; text-decoration: none; transition: all 0.2s; }
        .btn-cancel:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="header-title">✏️ 修改活動分類</div>
        <a th:href="@{/admin/activity/type/listAllActivityType}" class="btn-secondary">🔙 返回列表</a>
    </div>
    <div class="form-card">
        <form th:action="@{/admin/activity/type/update}" th:object="${activityTypeVO}" method="post">
            
            <!-- 隱藏主鍵 ID，更新時必須有 -->
            <input type="hidden" th:field="*{activityTypeId}" />

            <div class="form-group">
                <label>分類標籤名稱 <span style="color: #ef4444;">*</span></label>
                <input type="text" class="form-control" th:field="*{activityTypeName}" required>
            </div>
            
            <div class="form-actions">
                <a th:href="@{/admin/activity/type/listAllActivityType}" class="btn-cancel">取消</a>
                <button type="submit" class="btn-submit">💾 儲存修改</button>
            </div>
        </form>
    </div>
</body>
</html>
