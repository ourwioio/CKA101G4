<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>FAQ內容</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">

		<div class="alert alert-success" th:if="${success != null}"
			th:text="${success}"></div>

		<div class="card">
			<div class="card-body">
				<h3 class="card-title" th:text="${faqVO.question}"></h3>

				<p class="mb-1">
					<span th:if="${faqVO.status == 1}" class="badge bg-success">已發布</span>
					<span th:if="${faqVO.status == 0}" class="badge bg-secondary">草稿</span>
					<span class="text-muted small ms-2"
						th:text="${faqTypeListData.get(faqVO.faqType)}"></span>
				</p>

				<hr />

				<p style="white-space: pre-line;" th:text="${faqVO.answer}"></p>

				<p class="text-muted small mb-0">
					建立人編號：<span th:text="${faqVO.employeeId}"></span>
				</p>
				<p class="text-muted small mb-0">
					建立時間：<span
						th:text="${#temporals.format(faqVO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
				</p>
				<p class="text-muted small mb-0">
					更新時間： <span th:if="${faqVO.updatedAt != null}"
						th:text="${#temporals.format(faqVO.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
					<span th:unless="${faqVO.updatedAt != null}">-</span>
				</p>
			</div>
		</div>

		<a th:href="@{/faq/listAllFaq}" class="btn btn-secondary mt-3">回FAQ列表</a>

	</div>
</body>
</html>
