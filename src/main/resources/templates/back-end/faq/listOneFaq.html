<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FAQ 內容</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 15px;
            color: #ffffff;
            background: #343a40;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 800;
            transition:
                    background 0.15s ease,
                    transform 0.15s ease;
        }

        .back-link:hover {
            background: #111111;
            transform: translateY(-1px);
        }

        /* =========================
           訊息
           ========================= */

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            font-weight: 700;
        }

        .message--success {
            color: #176b45;
            background: #e8f8ef;
            border: 1px solid #b7e4ca;
        }

        /* =========================
           狀態標籤
           ========================= */

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 78px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .badge--draft {
            color: #475569;
            background: #e2e8f0;
        }

        .badge--published {
            color: #166534;
            background: #dcfce7;
        }

        /* =========================
           FAQ 詳情卡片
           ========================= */

        .detail-card {
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 5px 20px
                    rgba(0, 0, 0, 0.05);
        }

        .detail-header {
            padding: 24px;
            color: #ffffff;
            background:
                    linear-gradient(
                            135deg,
                            #6c5ce7,
                            #8c7ae6
                    );
        }

        .detail-number {
            margin-bottom: 8px;
            font-size: 13px;
            opacity: 0.86;
        }

        .detail-title {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            word-break: break-word;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.92;
        }

        .detail-body {
            padding: 24px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns:
                    repeat(2, minmax(0, 1fr));
            gap: 0;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid #e3e7eb;
            border-radius: 10px;
        }

        .detail-item {
            min-height: 66px;
            padding: 14px 16px;
            border-bottom: 1px solid #e8ebee;
        }

        .detail-item:nth-child(odd) {
            border-right: 1px solid #e8ebee;
        }

        .detail-label {
            margin-bottom: 6px;
            color: #7b838b;
            font-size: 12px;
            font-weight: 700;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.6;
            word-break: break-word;
        }

        .section-title {
            margin: 0 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e7eaee;
            font-size: 18px;
        }

        .description-panel {
            padding: 18px;
            line-height: 1.8;
            background: #f8f9fb;
            border: 1px solid #e5e8ec;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 700px) {

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .detail-item:nth-child(odd) {
                border-right: 0;
            }

            .page-header {
                align-items: stretch;
                flex-direction: column;
            }

            .back-link {
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側 FAQ 內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <h1 class="page-title">
                    FAQ 內容
                </h1>

                <a class="back-link"
                   th:href="@{/admin/platform/faq/listAllFaq}">
                    ← 返回 FAQ 列表
                </a>

            </header>

            <!-- =========================
                 成功訊息
                 ========================= -->

            <div class="message message--success"
                 th:if="${success != null}"
                 th:text="${success}">
                操作成功
            </div>

            <!-- =========================
                 FAQ 詳情
                 ========================= -->

            <article class="detail-card">

                <header class="detail-header">

                    <div class="detail-number">

                        FAQ 編號 #

                        <span th:text="${faqVO.faqId}">
                            1
                        </span>

                    </div>

                    <h2 class="detail-title"
                        th:text="${faqVO.question}">
                        FAQ 問題
                    </h2>

                    <div class="detail-meta">

                        <span class="badge badge--published"
                              th:if="${faqVO.status == 1}">
                            已發布
                        </span>

                        <span class="badge badge--draft"
                              th:if="${faqVO.status == 0}">
                            草稿
                        </span>

                        <span th:text="${faqTypeListData.get(faqVO.faqType)}">
                            類型
                        </span>

                    </div>

                </header>

                <div class="detail-body">

                    <!-- =====================
                         基本資料
                         ===================== -->

                    <h3 class="section-title">
                        基本資料
                    </h3>

                    <section class="detail-grid">

                        <div class="detail-item">

                            <div class="detail-label">
                                建立人編號
                            </div>

                            <div class="detail-value"
                                 th:text="${faqVO.employeeId}">
                                1001
                            </div>

                        </div>

                        <div class="detail-item">

                            <div class="detail-label">
                                建立時間
                            </div>

                            <div class="detail-value"
                                 th:text="${#temporals.format(
                                         faqVO.createdAt,
                                         'yyyy-MM-dd HH:mm:ss'
                                 )}">
                                2026-07-15 14:30:00
                            </div>

                        </div>

                        <div class="detail-item">

                            <div class="detail-label">
                                更新時間
                            </div>

                            <div class="detail-value">

                                <span th:if="${faqVO.updatedAt != null}"
                                      th:text="${#temporals.format(
                                              faqVO.updatedAt,
                                              'yyyy-MM-dd HH:mm:ss'
                                      )}">
                                    2026-07-15 14:30:00
                                </span>

                                <span th:unless="${faqVO.updatedAt != null}">
                                    -
                                </span>

                            </div>

                        </div>

                    </section>

                    <!-- =====================
                         FAQ 答案
                         ===================== -->

                    <h3 class="section-title">
                        FAQ 答案
                    </h3>

                    <div class="description-panel"
                         th:text="${faqVO.answer}">
                        FAQ 答案
                    </div>

                </div>

            </article>

        </div>

    </main>

</div>

</body>
</html>
