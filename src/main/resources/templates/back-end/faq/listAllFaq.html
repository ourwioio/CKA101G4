<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>常見問題管理</title>

    <link rel="stylesheet" th:href="@{/css/back-end/platform/platformList.css}">
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側常見問題管理內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <h1 class="page-title">
                    常見問題管理
                </h1>

                <p class="page-subtitle">
                    管理八大類常見問題（FAQ）的問題與解答，維護前台常見問題頁面內容。
                </p>

            </header>

            <!-- =========================
                 成功訊息
                 ========================= -->

            <div class="message message--success"
                 th:if="${success != null}"
                 th:text="${success}">
                操作成功
            </div>

            <!-- =========================
                 查詢 FAQ
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        查詢 FAQ
                    </h2>

                    <span class="panel-description">
                        可依狀態、FAQ 類型與關鍵字任意組合查詢
                    </span>

                </div>

                <div class="panel-body">

                    <form class="search-form"
                          th:action="@{/admin/platform/faq/search}"
                          method="post">

                        <select name="status">
                            <option value=""
                                    th:selected="${searchStatus == null}">
                                全部狀態
                            </option>
                            <option value="0"
                                    th:selected="${searchStatus != null and searchStatus == 0}">
                                草稿
                            </option>
                            <option value="1"
                                    th:selected="${searchStatus != null and searchStatus == 1}">
                                已發布
                            </option>
                        </select>

                        <select name="faqType">
                            <option value=""
                                    th:selected="${searchFaqType == null}">
                                全部類型
                            </option>
                            <option th:each="entry : ${faqTypeListData}"
                                    th:value="${entry.key}"
                                    th:text="${entry.value}"
                                    th:selected="${searchFaqType != null and searchFaqType == entry.key}">
                            </option>
                        </select>

                        <input type="text"
                               name="keyword"
                               placeholder="搜尋問題或答案"
                               th:value="${searchKeyword}">

                        <div class="search-form-actions">

                            <button class="btn btn--primary"
                                    type="submit">
                                搜尋
                            </button>

                            <a class="btn btn--secondary"
                               th:href="@{/admin/platform/faq/listAllFaq}">
                                清除條件
                            </a>

                        </div>

                    </form>

                </div>

            </section>

            <!-- =========================
                 FAQ 列表
                 ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2 class="panel-title">
                        FAQ 列表
                    </h2>

                    <span class="panel-description">

                        共

                        <strong th:text="${faqListData != null
                                ? #lists.size(faqListData)
                                : 0}">
                            0
                        </strong>

                        筆

                    </span>

                    <a class="btn btn--primary"
                       th:href="@{/admin/platform/faq/addFaq}">
                        新增 FAQ
                    </a>

                </div>

                <!-- 有 FAQ 資料 -->
                <div class="table-scroll"
                     th:if="${faqListData != null
                              and !#lists.isEmpty(faqListData)}">

                    <table class="data-table">

                        <thead>

                        <tr>

                            <th class="col-id">
                                編號
                            </th>

                            <th class="col-type">
                                類型
                            </th>

                            <th class="col-question">
                                問題
                            </th>

                            <th class="col-status">
                                狀態
                            </th>

                            <th class="col-employee">
                                建立人
                            </th>

                            <th class="col-time">
                                建立時間
                            </th>

                            <th class="col-time">
                                更新時間
                            </th>

                            <th class="col-action">
                                操作
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="faq : ${faqListData}">

                            <td th:text="${faq.faqId}">
                                1
                            </td>

                            <td class="cell-clip" th:text="${faqTypeListData.get(faq.faqType)}">
                                類型
                            </td>

                            <td>

                                <form class="action-form"
                                      th:action="@{/admin/platform/faq/viewOne}"
                                      method="get">

                                    <input type="hidden"
                                           name="faqId"
                                           th:value="${faq.faqId}">

                                    <button class="title-link"
                                            type="submit"
                                            th:text="${faq.question}">
                                        FAQ 問題
                                    </button>

                                </form>

                            </td>

                            <td>

                                <span class="badge badge--published"
                                      th:if="${faq.status == 1}">
                                    已發布
                                </span>

                                <span class="badge badge--draft"
                                      th:if="${faq.status == 0}">
                                    草稿
                                </span>

                            </td>

                            <td th:text="${faq.employeeId} + ' - ' + ${employeeNameMap.get(faq.employeeId)}">
                                1001 - 員工
                            </td>

                            <td th:text="${#temporals.format(
                                    faq.createdAt,
                                    'yyyy-MM-dd HH:mm'
                            )}">
                                2026-07-15 14:30
                            </td>

                            <td>

                                <span th:if="${faq.updatedAt != null}"
                                      th:text="${#temporals.format(
                                              faq.updatedAt,
                                              'yyyy-MM-dd HH:mm'
                                      )}">
                                    2026-07-15 14:30
                                </span>

                                <span th:unless="${faq.updatedAt != null}">
                                    -
                                </span>

                            </td>

                            <td class="cell-actions">

                                <div class="action-group">

                                    <form class="action-form"
                                          th:action="@{/admin/platform/faq/getOne_For_Update}"
                                          method="post">

                                        <input type="hidden"
                                               name="faqId"
                                               th:value="${faq.faqId}">

                                        <button class="btn btn--secondary btn--sm"
                                                type="submit">
                                            修改
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:if="${faq.status == 0}"
                                          th:action="@{/admin/platform/faq/publish}"
                                          method="post"
                                          onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">

                                        <input type="hidden"
                                               name="faqId"
                                               th:value="${faq.faqId}">

                                        <button class="btn btn--success btn--sm"
                                                type="submit">
                                            發布
                                        </button>

                                    </form>

                                    <form class="action-form"
                                          th:action="@{/admin/platform/faq/delete}"
                                          method="post"
                                          onsubmit="return confirm('確定要刪除這筆FAQ嗎？');">

                                        <input type="hidden"
                                               name="faqId"
                                               th:value="${faq.faqId}">

                                        <button class="btn btn--danger btn--sm"
                                                type="submit">
                                            刪除
                                        </button>

                                    </form>

                                </div>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <!-- 無 FAQ 資料 -->
                <div class="empty-state"
                     th:if="${faqListData == null
                              or #lists.isEmpty(faqListData)}">
                    目前沒有符合條件的 FAQ
                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
