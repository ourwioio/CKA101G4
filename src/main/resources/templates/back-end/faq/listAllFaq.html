<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>FAQ列表</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">

		<!-- 平台管理切換列 -->
		<ul class="nav nav-pills mb-4 border-bottom pb-3">
			<li class="nav-item"><a class="nav-link"
				th:href="@{/platform/index}">平台管理首頁</a></li>
			<li class="nav-item"><a class="nav-link"
				th:href="@{/bulletin/listAllBulletin}">公告管理</a></li>
			<li class="nav-item"><a class="nav-link"
				th:href="@{/platformSpecification/listAllSpec}">平台規範管理</a></li>
			<li class="nav-item"><a class="nav-link active"
				th:href="@{/faq/listAllFaq}">常見問題管理</a></li>
		</ul>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>FAQ列表</h2>
			<a th:href="@{/faq/addFaq}" class="btn btn-primary">新增FAQ</a>
		</div>

		<!-- Flash 訊息：發布/新增/修改/刪除成功時顯示 -->
		<div class="alert alert-success" th:if="${success != null}"
			th:text="${success}"></div>

		<!-- 複合搜尋：狀態 / FAQ類型 / 問題關鍵字，可任意組合或留空 -->
		<form th:action="@{/faq/search}" method="post" class="row g-2 mb-4">
			<div class="col-auto">
				<select name="status" class="form-select">
					<option value="" th:selected="${searchStatus == null}">全部狀態</option>
					<option value="0"
						th:selected="${searchStatus != null and searchStatus == 0}">草稿</option>
					<option value="1"
						th:selected="${searchStatus != null and searchStatus == 1}">已發布</option>
				</select>
			</div>
			<div class="col-auto">
				<select name="faqType" class="form-select">
					<option value="" th:selected="${searchFaqType == null}">全部類型</option>
					<option th:each="entry : ${faqTypeListData}"
						th:value="${entry.key}" th:text="${entry.value}"
						th:selected="${searchFaqType != null and searchFaqType == entry.key}">
					</option>
				</select>
			</div>
			<div class="col-auto">
				<input type="text" name="keyword" class="form-control"
					placeholder="搜尋問題或答案" th:value="${searchKeyword}" />
			</div>
			<div class="col-auto">
				<button type="submit" class="btn btn-outline-primary">搜尋</button>
			</div>
			<div class="col-auto">
				<a th:href="@{/faq/listAllFaq}" class="btn btn-outline-secondary">清除條件</a>
			</div>
		</form>

		<table class="table table-hover bg-white">
			<thead>
				<tr>
					<th>編號</th>
					<th>類型</th>
					<th>問題</th>
					<th>狀態</th>
					<th>建立人</th>
					<th>建立時間</th>
					<th>更新時間</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="faq : ${faqListData}">
					<td th:text="${faq.faqId}"></td>
					<td th:text="${faqTypeListData.get(faq.faqType)}"></td>
					<td>
						<form th:action="@{/faq/viewOne}" method="get" class="d-inline">
							<input type="hidden" name="faqId" th:value="${faq.faqId}" />
							<button type="submit"
								class="btn btn-link p-0 text-decoration-none"
								th:text="${faq.question}"></button>
						</form>
					</td>
					<td><span th:if="${faq.status == 1}" class="badge bg-success">已發布</span>
						<span th:if="${faq.status == 0}" class="badge bg-secondary">草稿</span>
					</td>
					<td
						th:text="${faq.employeeId} + ' - ' + ${employeeNameMap.get(faq.employeeId)}"></td>
					<td
						th:text="${#temporals.format(faq.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td><span th:if="${faq.updatedAt != null}"
						th:text="${#temporals.format(faq.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
						<span th:unless="${faq.updatedAt != null}">-</span></td>
					<td class="d-flex gap-1">
						<form th:action="@{/faq/getOne_For_Update}" method="post"
							class="d-inline">
							<input type="hidden" name="faqId" th:value="${faq.faqId}" />
							<button type="submit" class="btn btn-sm btn-outline-primary">修改</button>
						</form>

						<form th:action="@{/faq/publish}" method="post" class="d-inline"
							th:if="${faq.status == 0}"
							onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">
							<input type="hidden" name="faqId" th:value="${faq.faqId}" />
							<button type="submit" class="btn btn-sm btn-outline-success">發布</button>
						</form>

						<form th:action="@{/faq/delete}" method="post" class="d-inline"
							onsubmit="return confirm('確定要刪除這筆FAQ嗎？');">
							<input type="hidden" name="faqId" th:value="${faq.faqId}" />
							<button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>

		<div class="text-muted" th:if="${#lists.isEmpty(faqListData)}">目前沒有符合條件的FAQ。</div>

	</div>
</body>
</html>
