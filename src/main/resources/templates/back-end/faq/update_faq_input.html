<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改FAQ</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">
		<h2 class="mb-4">修改FAQ</h2>

		<form th:action="@{/faq/update}" th:object="${faqVO}" method="post">

			<!-- 主鍵要一併送回去，否則 Service 存檔時會變成新增一筆 -->
			<input type="hidden" th:field="*{faqId}" />

			<div class="mb-3">
				<label class="form-label">FAQ類型</label> <select class="form-select"
					th:field="*{faqType}">
					<option value="">請選擇FAQ類型</option>
					<option th:each="entry : ${faqTypeListData}"
						th:value="${entry.key}" th:text="${entry.value}"></option>
				</select>
				<div class="text-danger small"
					th:if="${#fields.hasErrors('faqType')}" th:errors="*{faqType}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">問題</label> <input type="text"
					class="form-control" th:field="*{question}" />
				<div class="text-danger small"
					th:if="${#fields.hasErrors('question')}" th:errors="*{question}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">答案</label>
				<textarea class="form-control" rows="6" th:field="*{answer}"></textarea>
				<div class="text-danger small"
					th:if="${#fields.hasErrors('answer')}" th:errors="*{answer}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">建立人</label> <select class="form-select"
					th:field="*{employeeId}">
					<option value="">請選擇員工</option>
					<option th:each="emp : ${employeeListData}"
						th:value="${emp.employeeId}"
						th:text="${emp.employeeId} + ' - ' + ${emp.empName}"></option>
				</select>
				<div class="text-danger small"
					th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></div>
			</div>

			<div class="mb-4">
				<label class="form-label">狀態</label>

				<!-- 已發布：唯讀顯示，不可改回草稿；status 仍以隱藏欄位送回，Service 端也會再次強制鎖定 -->
				<div th:if="${faqVO.status == 1}">
					<p>
						<span class="badge bg-success">已發布（發布後不可改回草稿）</span>
					</p>
					<input type="hidden" th:field="*{status}" />
				</div>

				<!-- 草稿：允許選擇要維持草稿或直接改為發布 -->
				<select th:if="${faqVO.status == 0}" class="form-select"
					th:field="*{status}">
					<option value="0">草稿</option>
					<option value="1">發布</option>
				</select>
			</div>

			<button type="submit" class="btn btn-primary">儲存修改</button>
			<a th:href="@{/faq/listAllFaq}" class="btn btn-secondary">取消</a>
		</form>
	</div>
</body>
</html>
