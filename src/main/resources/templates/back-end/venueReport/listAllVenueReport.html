<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>場地檢舉管理</title>
<link rel="stylesheet" th:href="@{/css/back-end/venue/listAllVenue.css}"
	href="venue-admin-list.css">
<style>
.filter-bar {
	align-items: flex-start;
}

.filter-fields {
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 10px;
	flex: 1 1 auto;
}

.filter-actions {
	display: flex;
	gap: 10px;
	margin-left: auto;
}

.filter-bar input[type="date"] {
	width: 150px;
}

.filter-label {
	white-space: nowrap;
	margin-left: 4px;
}

.filter-bar input[name="venueName"] {
	width: 140px;
}

.filter-bar input[name="keyword"] {
	width: 220px;
	flex: 1 1 220px;
}

table th:nth-child(1), table td:nth-child(1) { width: 8%; }
table th:nth-child(2), table td:nth-child(2) { width: 11%; }
table th:nth-child(3), table td:nth-child(3) { width: 14%; }
table th:nth-child(4), table td:nth-child(4) { width: 12%; }
table th:nth-child(5), table td:nth-child(5) { width: 14%; }
table th:nth-child(6), table td:nth-child(6) { width: 15%; }
table th:nth-child(7), table td:nth-child(7) { width: 14%; }
table th:nth-child(8), table td:nth-child(8) { width: 12%; }
table th { white-space: nowrap; }
</style>
</head>
<body>

<div class="wb-admin-layout">

	<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
	</div>

	<main class="wb-admin-content">

	<div class="wrap">
		<div class="header">
			<span class="title">場地檢舉清單</span>
		</div>

		<div class="message message--error" th:if="${dateRangeError != null}"
			th:text="${dateRangeError}">請將檢舉時間的起訖日期填寫完整，否則無法查詢</div>

		<!-- 搜尋區：處理狀態 + 檢舉時間區間 + 內容關鍵字 -->
		<form id="venueReportSearchForm" class="filter-bar" th:action="@{/admin/venue/venueReport/search}" method="get">

			<div class="filter-fields">
				<select name="reportStatus">
					<option value="">-- 全部狀態 --</option>
					<option value="0"
						th:selected="${searchStatus != null and searchStatus == 0}">審核中</option>
					<option value="1"
						th:selected="${searchStatus != null and searchStatus == 1}">審核通過</option>
					<option value="2"
						th:selected="${searchStatus != null and searchStatus == 2}">審核未通過</option>
				</select> <span class="filter-label">檢舉時間</span> <input type="date" id="reportStartDate" name="startDate" th:value="${searchStartDate}" />
				<span>~</span> <input type="date" id="reportEndDate" name="endDate"
					th:value="${searchEndDate}" /> <input type="text" name="venueName"
					placeholder="場地名稱" th:value="${searchVenueName}" /> <input
					type="text" name="keyword" placeholder="檢舉內容關鍵字"
					th:value="${searchKeyword}" />
			</div>

			<div class="filter-actions">
				<button type="submit" class="btn btn-primary">搜尋</button>
				<a th:href="@{/admin/venue/venueReport/listAllVenueReport}" class="btn btn-secondary">清除條件</a>
			</div>
		</form>

		<div class="table-wrap">
			<table>
				<thead>
					<tr>
						<th>檢舉編號</th>
						<th>場地訂單編號</th>
						<th>場地名稱</th>
						<th>處理狀態</th>
						<th>檢舉時間</th>
						<th>處理員工</th>
						<th>處理完成時間</th>
						<th>查看詳情</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${#lists.isEmpty(venueReportListData)}">
						<td colspan="8"
							style="text-align: center; padding: 2rem; color: #64748b;">
							目前沒有符合條件的檢舉紀錄</td>
					</tr>
					<tr th:each="venueReport : ${venueReportListData}">
						<td th:text="${venueReport.venueReportId}"></td>
						<td th:text="${venueReport.venueOrderId}"></td>
						<td th:text="${venueNameMap.get(venueReport.venueReportId)}"></td>
						<td><span th:switch="${venueReport.reportStatus}"> <span
								th:case="0" class="btn-toggle btn-toggle-pending"
								style="pointer-events: none;">審核中</span> <span th:case="1"
								class="btn-toggle btn-toggle-up" style="pointer-events: none;">審核通過</span>
								<span th:case="2" class="btn-toggle btn-toggle-down"
								style="pointer-events: none;">審核未通過</span>
						</span></td>
						<td style="white-space: nowrap;"
							th:text="${venueReport.serReportTime != null ? #temporals.format(venueReport.serReportTime, 'yyyy-MM-dd HH:mm') : '-'}"></td>
						<td
							th:text="${venueReport.employeeId != null ? venueReport.employeeId + ' - ' + employeeNameMap.get(venueReport.employeeId) : '尚未處理'}"></td>
						<td style="white-space: nowrap;"
							th:text="${venueReport.handledAt != null ? #temporals.format(venueReport.handledAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
						<td>
							<form th:action="@{/admin/venue/venueReport/viewOne}" method="get"
								class="inline-form">
								<input type="hidden" name="venueReportId"
									th:value="${venueReport.venueReportId}" />
								<button type="submit" class="btn-edit">查看詳情</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	</main>

</div>

</body>
</html>
