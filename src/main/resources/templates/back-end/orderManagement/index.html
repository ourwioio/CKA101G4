<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>訂單交易管理</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.menu-card {
	transition: box-shadow 0.15s, transform 0.15s;
}

.menu-card:hover {
	box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.1);
	transform: translateY(-2px);
}
</style>
</head>
<body class="bg-light">
	<div class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>訂單交易管理</h2>
		</div>

		<div class="row g-3">
			<div class="col-md-4">
				<a th:href="@{/refundPayout/payoutList}"
					class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">撥款明細管理</h5>
							<p class="card-text text-muted mb-0">三類訂單撥款狀態與處理進度。</p>
						</div>
					</div>
				</a>
			</div>

			<div class="col-md-4">
				<a th:href="@{/refundPayout/refundList}"
					class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">退款明細管理</h5>
							<p class="card-text text-muted mb-0">三類訂單退款狀態與處理進度。</p>
						</div>
					</div>
				</a>
			</div>

			<div class="col-md-4">
				<a th:href="@{/transaction/revenue}" class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">營收與交易明細</h5>
							<p class="card-text text-muted mb-0">各類訂單營收概況與交易紀錄查詢。</p>
						</div>
					</div>
				</a>
			</div>
		</div>

	</div>
</body>
</html>
