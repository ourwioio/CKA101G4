<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營收與交易明細管理</title>
</head>
<body>

    <form th:action="@{/transaction/revenue}" method="get">
        
        <select name="quickRange" onchange="this.form.submit()">
            <option value="thisMonth" th:selected="${selectedRange == 'thisMonth'}">本月</option>
            <option value="thisQuarter" th:selected="${selectedRange == 'thisQuarter'}">本季</option>
            <option value="thisYear" th:selected="${selectedRange == 'thisYear'}">本年</option>
            <option value="all" th:selected="${selectedRange == 'all'}">全部</option>
            <option value="custom" th:selected="${selectedRange == 'custom'}">自訂區間</option>
        </select>

        <select name="orderType" onchange="this.form.submit()">
            <option value="" th:selected="${#strings.isEmpty(selectedType)}">全部類型</option>
            <option value="服務" th:selected="${selectedType == '服務'}">服務</option>
            <option value="活動" th:selected="${selectedType == '活動'}">活動</option>
            <option value="場地" th:selected="${selectedType == '場地'}">場地</option>
        </select>

        <select name="category" onchange="this.form.submit()">
		    <option value="" th:selected="${#strings.isEmpty(selectedCategory)}">全部狀態</option>
		    <option value="已完成" th:selected="${selectedCategory == '已完成'}">已完成</option>
		    <option value="已退款" th:selected="${selectedCategory == '已退款'}">已退款</option>
		</select>

        <input type="date" name="startDate" th:value="${param.startDate}" />
        <input type="date" name="endDate" th:value="${param.endDate}" />
        <button type="submit">套用篩選</button>
    </form>

    <hr>

    <h3>營收概況</h3>
    <p>服務收入：<span th:text="${revenueSummary.serviceRevenue}">0</span></p>
    <p>活動收入：<span th:text="${revenueSummary.activityRevenue}">0</span></p>
    <p>場地收入：<span th:text="${revenueSummary.venueRevenue}">0</span></p>
    <p><strong>總收入：<span th:text="${revenueSummary.totalRevenue}">0</span></strong></p>

    <hr>
    
    <h2>交易明細</h2>
    <table border="1" style="border-collapse: collapse; width: 100%; text-align: left;">
        <thead>
            <tr>
                <th>類型</th>
                <th>訂單編號</th>
                <th>金額</th>
                <th>狀態</th>
                <th>時間</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${transactions}">
                <td th:text="${t.orderType}"></td>
                <td th:text="${t.orderId}"></td>
                <td th:text="${t.totalAmount}"></td>
                <td th:text="${t.statusLabel}"
                    th:style="${t.isRevenue} ? 'color:green; font-weight:bold;' : 'color:gray;'"></td>
                <td th:text="${#temporals.format(t.transactionTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(transactions)}" style="color: red; font-weight: bold;">
        此篩選條件與區間內查無交易紀錄
    </p>
    
</body>
</html>
