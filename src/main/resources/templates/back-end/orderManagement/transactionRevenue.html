<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營收與交易明細管理</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">

		<!-- 訂單交易管理切換列 -->
		<ul class="nav nav-pills mb-4 border-bottom pb-3">
			<li class="nav-item"><a class="nav-link"
				th:href="@{/orderManagement/index}">訂單交易管理首頁</a></li>
			<li class="nav-item"><a class="nav-link"
				th:href="@{/refundPayout/payoutList}">撥款明細管理</a></li>
			<li class="nav-item"><a class="nav-link"
				th:href="@{/refundPayout/refundList}">退款明細管理</a></li>
			<li class="nav-item"><a class="nav-link active"
				th:href="@{/transaction/revenue}">營收與交易明細</a></li>
		</ul>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>營收與交易明細</h2>
		</div>

		<!-- 篩選條件 -->
		<form th:action="@{/transaction/revenue}" method="get"
			class="row g-3 mb-4">

			<div class="col-auto">
				<label class="form-label">時間區間</label> <select name="quickRange"
					class="form-select" onchange="this.form.submit()">
					<option value="thisMonth"
						th:selected="${selectedRange == 'thisMonth'}">本月</option>
					<option value="thisQuarter"
						th:selected="${selectedRange == 'thisQuarter'}">本季</option>
					<option value="thisYear"
						th:selected="${selectedRange == 'thisYear'}">本年</option>
					<option value="all" th:selected="${selectedRange == 'all'}">全部</option>
					<option value="custom" th:selected="${selectedRange == 'custom'}">自訂區間</option>
				</select>
			</div>

			<div class="col-auto">
				<label class="form-label">訂單類型</label> <select name="orderType"
					class="form-select" onchange="this.form.submit()">
					<option value="" th:selected="${#strings.isEmpty(selectedType)}">全部類型</option>
					<option value="服務" th:selected="${selectedType == '服務'}">服務</option>
					<option value="活動" th:selected="${selectedType == '活動'}">活動</option>
					<option value="場地" th:selected="${selectedType == '場地'}">場地</option>
				</select>
			</div>

			<div class="col-auto">
				<label class="form-label">交易狀態</label> <select name="category"
					class="form-select" onchange="this.form.submit()">
					<option value=""
						th:selected="${#strings.isEmpty(selectedCategory)}">全部狀態</option>
					<option value="已完成" th:selected="${selectedCategory == '已完成'}">已完成</option>
					<option value="已退款" th:selected="${selectedCategory == '已退款'}">已退款</option>
				</select>
			</div>

			<div class="col-auto">
				<label class="form-label">開始日期</label> <input type="date"
					name="startDate" class="form-control" th:value="${param.startDate}" />
			</div>

			<div class="col-auto">
				<label class="form-label">結束日期</label> <input type="date"
					name="endDate" class="form-control" th:value="${param.endDate}" />
			</div>

			<div class="col-auto align-self-end">
				<button type="submit" class="btn btn-primary">套用篩選</button>
				<a th:href="@{/transaction/revenue}"
					class="btn btn-outline-secondary">清除條件</a>
			</div>
		</form>

		<!-- 營收概況 -->
		<h5 class="mb-3">營收概況</h5>
		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card h-100">
					<div class="card-body">
						<div class="text-muted small">服務收入</div>
						<div class="fs-4" th:text="${revenueSummary.serviceRevenue}">0</div>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card h-100">
					<div class="card-body">
						<div class="text-muted small">活動收入</div>
						<div class="fs-4" th:text="${revenueSummary.activityRevenue}">0</div>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card h-100">
					<div class="card-body">
						<div class="text-muted small">場地收入</div>
						<div class="fs-4" th:text="${revenueSummary.venueRevenue}">0</div>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card h-100 border-primary">
					<div class="card-body">
						<div class="text-muted small">總收入</div>
						<div class="fs-4 fw-bold text-primary"
							th:text="${revenueSummary.totalRevenue}">0</div>
					</div>
				</div>
			</div>
		</div>

		<!-- 交易明細 -->
		<h5 class="mb-3">交易明細</h5>
		<table class="table table-bordered table-hover align-middle bg-white">
			<thead class="table-light">
				<tr>
					<th>類型</th>
					<th>訂單編號</th>
					<th>金額</th>
					<th>狀態</th>
					<th>時間</th>
				</tr>
			</thead>
			<tbody>
				<tr th:if="${#lists.isEmpty(transactions)}">
					<td colspan="5" class="text-center text-muted">此篩選條件與區間內查無交易紀錄</td>
				</tr>
				<tr th:each="t : ${transactions}">
					<td th:text="${t.orderType}"></td>
					<td th:text="${t.orderId}"></td>
					<td th:text="${t.totalAmount}"></td>
					<td><span th:if="${t.isRevenue}" class="badge bg-success"
						th:text="${t.statusLabel}"></span> <span
						th:unless="${t.isRevenue}" class="badge bg-secondary"
						th:text="${t.statusLabel}"></span></td>
					<td
						th:text="${#temporals.format(t.transactionTime, 'yyyy-MM-dd HH:mm')}"></td>
				</tr>
			</tbody>
		</table>

	</div>
</body>
</html>
