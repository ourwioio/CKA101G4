<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
	<title>退款訂單管理</title>
    <th:block th:insert="~{back-end/venue/index}"></th:block>
</head>
<body>
	<span>退款訂單 listAllRefund.html</span>

	<form th:action="@{/venueOrder/listAllRefund}" method="get">

	    退款狀態：
	    <select name="refundStatus">
	        <option value="0" th:selected="${params.refundStatus == 0}">進行中</option>
	        <option value="1" th:selected="${params.refundStatus == 1}">完成</option>
	        <option value="2" th:selected="${params.refundStatus == 2}">未申請</option>
	    </select>

	    <button type="submit">查詢</button>

	</form>

	<br>

	<div th:if="${#lists.isEmpty(allRefundData)}" style="color:orange;">
	    <p>查無符合條件的退款訂單</p>
	</div>

	<table>
		<thead>
			<tr>
				<th>訂單編號</th>
				<th>訂單建立時間</th>
				<th>總金額</th>
				<th>訂單狀態</th>
				<th>退款狀態</th>
				<th>退款原因</th>
				<th>處理員工</th>
				<th>操作</th>
			</tr>
		</thead>

		<tbody>
			<th:block th:each="venueOrderVO : ${allRefundData}">
				<tr>
					<td th:text="${venueOrderVO.venueOrderId}"></td>
					<td th:text="${#temporals.format(venueOrderVO.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td th:text="${venueOrderVO.totalAmount} + '元'"></td>
					<td th:switch="${venueOrderVO.orderStatus}">
						<span th:case="0">待付款</span>
						<span th:case="1">已付款</span>
						<span th:case="2">已取消</span>
						<span th:case="3">已完成</span>
						<span th:case="4">已取消(退款)</span>
					</td>
					<td th:switch="${venueOrderVO.refundStatus}">
						<span th:case="0">進行中</span>
						<span th:case="1">完成</span>
						<span th:case="2">未申請</span>
					</td>
					<td th:text="${venueOrderVO.refundReason}"></td>
					<td th:text="${venueOrderVO.empVO != null ? venueOrderVO.empVO.employeeId : '沒有處理員工'}"></td>
					<td>
						<form th:action="@{/venueOrder/refund}" method="get">
							<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}">
							<button type="submit"
							        th:if="${venueOrderVO.refundStatus == 0}">退款</button>
						</form>
					</td>
				</tr>
			</th:block>
		</tbody>

	</table>
</body>
</html>
