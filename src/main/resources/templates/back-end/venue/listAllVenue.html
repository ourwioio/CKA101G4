<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>場地資料管理</title>
    <th:block th:insert="~{back-end/venue/index}"></th:block>
    <link rel="stylesheet" th:href="@{/css/back-end/venue/listAllVenue.css}" href="venue-admin-list.css">
</head>
<body>
    <div class="wrap">
        <div class="header">
            <span class="title">瀏覽全部場地</span>
        </div>
        
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>場地編號</th>
                        <th>照片</th>
                        <th>場地名稱</th>
                        <th>地址</th>
                        <th>人數</th>
                        <th>每小時金額</th>
                        <th>建立日期</th>
                        <th>更新上下架</th>
                        <th>查看場地</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="venue : ${venueListData}">
                        <td th:text="${venue.venueId}"></td>
                        <td class="img-cell">
                            <img th:if="${venue.venueImages != null and !venue.venueImages.isEmpty()}"
                                 th:src="@{/venue/getImage(imagesId=${venue.venueImages[0].imagesId})}" />
                            <div th:unless="${venue.venueImages != null and !venue.venueImages.isEmpty()}"
                                 class="no-img">無圖片</div>
                        </td>
                        <td th:text="${venue.venueName}"></td>
                        <td th:text="${venue.address}"></td>
                        <td th:text="${venue.capacity}"></td>
                        <td th:text="${venue.hourlyRate}"></td>
                        <td th:text="${#temporals.format(venue.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
						<td>
						    <form th:action="@{/venue/toggleStatus}" method="post" class="inline-form">
						        <input type="hidden" name="venueId" th:value="${venue.venueId}" />
						        <button type="submit" 
						                th:class="${venue.venueStatus == 1} ? 'btn-toggle btn-toggle-up' : 'btn-toggle btn-toggle-down'"
						                th:switch="${venue.venueStatus}"
						                onclick="return confirm('確定要變更此場地的上下架狀態嗎？');">
						                <span th:case="0">上架中</span>
						                <span th:case="1">已下架</span>
						                <span th:case="2">審核中</span>
						        </button>
						    </form>
						</td>
                        <td>
                            <form th:action="@{/venue/getOneVenue}" method="get" class="inline-form">
                                <input type="hidden" name="venueId" th:value="${venue.venueId}" />
                                <button type="submit" class="btn-edit">查看場地</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div> 
</body>
</html>
