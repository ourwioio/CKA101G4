<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
	<title>撥款訂單管理</title>
    <th:block th:insert="~{back-end/venue/index}"></th:block>
</head>
<body>
	<span>撥款訂單 listAllPayout.html</span>

	<form th:action="@{/venueOrder/listAllPayout}" method="get">

	    撥款狀態：
	    <select name="payoutAmount">
	        <option value="0" th:selected="${params.payoutAmount == 0}">未撥款</option>
	        <option value="1" th:selected="${params.payoutAmount == 1}">已撥款</option>
	    </select>

	    <button type="submit">查詢</button>

	</form>

	<br>

	<div th:if="${noDataMessage != null}" style="color:orange;">
	    <p th:text="${noDataMessage}"></p>
	</div>

	<table>
		<thead>
			<tr>
				<th>訂單編號</th>
				<th>訂單建立時間</th>
				<th>總金額</th>
				<th>訂單狀態</th>
				<th>撥款狀態</th>
				<th>處理員工</th>
				<th>操作</th>
			</tr>
		</thead>

		<tbody>
			<th:block th:each="venueOrderVO : ${listAllPayout}">
				<tr>
					<td>
					    <a th:href="@{/venueOrder/getOneVenueOrder(venueOrderId=${venueOrderVO.venueOrderId})}"
					       th:text="${venueOrderVO.venueOrderId}"></a>
					</td>
					<td th:text="${#temporals.format(venueOrderVO.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td th:text="${venueOrderVO.totalAmount} + '元'"></td>
					<td th:switch="${venueOrderVO.orderStatus}">
						<span th:case="0">待付款</span>
						<span th:case="1">已付款</span>
						<span th:case="2">已取消</span>
						<span th:case="3">已完成</span>
						<span th:case="4">已取消(退款)</span>
					</td>
					<td th:switch="${venueOrderVO.payoutAmount}">
						<span th:case="0">未撥款</span>
						<span th:case="1">已撥款</span>
					</td>
					<td th:text="${venueOrderVO.empVO != null ? venueOrderVO.empVO.employeeId : '沒有處理員工'}"></td>
					<td>
						<form th:action="@{/venueOrder/payout}" method="get">
							<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}">
							<button type="submit"
							        th:if="${venueOrderVO.payoutAmount == 0}">撥款</button>
						</form>
					</td>
				</tr>
			</th:block>
		</tbody>

	</table>
</body>
</html>
