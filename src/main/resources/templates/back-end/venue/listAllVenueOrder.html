<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
	<title>場地資料管理</title>
    <th:block th:insert="~{back-end/venue/index}"></th:block>
</head>
<body>
	<span>全部訂單 listAllVenue.html</span>
	
	<table>
		<thead>
			<tr>
				<th>訂單編號</th>
				<th>訂單建立時間</th>
				<th>總金額</th>
				<th>付款狀態</th>
				<th>撥款狀態</th>
				<th>退款狀態</th>
				<th>詳細</th>
			</tr>
		</thead>
		
		<tbody>
			<th:block th:each="venueOrderVO : ${venueListData}">
				<tr>
					<td th:text="${venueOrderVO.venueOrderId}"></td>
					<td th:text="${#temporals.format(venueOrderVO.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
					<td th:text="${venueOrderVO.totalAmount} + '元'"></td>
					<td th:switch="${venueOrderVO.orderStatus}">
						<span th:case="0">待撥款</span>
						<span th:case="1">已付款</span>
						<span th:case="2">已取消</span>
						<span th:case="3">已完成</span>
					</td>
					<td th:switch="${venueOrderVO.payoutAmount}">
						<span th:case="0">未撥款</span>
						<span th:case="1">已撥款</span>
					</td>
					<td th:switch="${venueOrderVO.refundStatus}">
						<span th:case="0">進行中</span>
						<span th:case="1">完成</span>
						<span th:case="2">未申請</span>
					</td>
					<td>
						<form th:action="@{/venueOrder/getOneVenueOrder}" method="get">
							<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}">
							<button type="submit">查看場地</button>
						</form>
					</td>
				</tr>
			</th:block>
		</tbody>
		
	</table>
</body>
</html>
