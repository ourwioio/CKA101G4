<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>公告管理</title>

<link rel="stylesheet" th:href="@{/css/back-end/platform/platformList.css}">
</head>

<body>

	<div class="wb-admin-layout">

		<!-- =========================
         左側共用 Sidebar
         ========================= -->

		<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
		</div>

		<!-- =========================
         右側公告管理內容
         ========================= -->

		<main class="wb-admin-content">

			<div class="page">

				<!-- =========================
                 頁面標題
                 ========================= -->

				<header class="page-header">

					<h1 class="page-title">公告管理</h1>

					<p class="page-subtitle">建立、修改與發布平台公告，並可依狀態、發布日期與關鍵字查詢公告內容。</p>

				</header>

				<!-- =========================
                 成功訊息
                 ========================= -->

				<div class="message message--success" th:if="${success != null}"
					th:text="${success}">操作成功</div>

				<div class="message message--error" th:if="${dateRangeError != null}"
					th:text="${dateRangeError}">請完整填寫發布日期區間的起訖日期</div>

				<!-- =========================
                 查詢公告
                 ========================= -->

				<section class="panel">

					<div class="panel-header">

						<h2 class="panel-title">查詢公告</h2>

						<span class="panel-description"> 可依狀態、關鍵字與發布日期區間任意組合查詢 </span>

					</div>

					<div class="panel-body">

						<form class="search-form"
							th:action="@{/admin/platform/bulletin/search}" method="post">

							<select name="status">
								<option value="" th:selected="${searchStatus == null}">
									全部狀態</option>
								<option value="0"
									th:selected="${searchStatus != null and searchStatus == 0}">
									草稿</option>
								<option value="1"
									th:selected="${searchStatus != null and searchStatus == 1}">
									已發布</option>
							</select> <span class="search-sep">
								發布日期 </span> <input type="date" name="startDate"
								th:value="${searchStartDate}"> <span class="search-sep">
								～ </span> <input type="date" name="endDate" th:value="${searchEndDate}">
								<input type="text" name="keyword" placeholder="搜尋標題、內容或標籤"
								th:value="${searchKeyword}">

							<div class="search-form-actions">

								<button class="btn btn--primary" type="submit">搜尋</button>

								<a class="btn btn--secondary"
									th:href="@{/admin/platform/bulletin/listAllBulletin}"> 清除條件
								</a>

							</div>

						</form>

					</div>

				</section>

				<!-- =========================
                 公告列表
                 ========================= -->

				<section class="panel">

					<div class="panel-header">

						<h2 class="panel-title">公告列表</h2>

						<span class="panel-description"> 共 <strong
							th:text="${bulletinListData != null
                                ? #lists.size(bulletinListData)
                                : 0}">
								0 </strong> 筆

						</span> <a class="btn btn--primary"
							th:href="@{/admin/platform/bulletin/addBulletin}"> 新增公告 </a>

					</div>

					<!-- 有公告資料 -->
					<div class="table-scroll"
						th:if="${bulletinListData != null
                              and !#lists.isEmpty(bulletinListData)}">

						<table class="data-table">

							<thead>

								<tr>

									<th class="col-id">編號</th>

									<th class="col-title">標題</th>

									<th class="col-status">狀態</th>

									<th class="col-date">發布日期</th>

									<th class="col-employee">負責員工</th>

									<th class="col-time">建立時間</th>

									<th class="col-time">更新時間</th>

									<th class="col-action">操作</th>

								</tr>

							</thead>

							<tbody>

								<tr th:each="bulletin : ${bulletinListData}">

									<td th:text="${bulletin.bulletinId}">1</td>

									<td>

										<form class="action-form"
											th:action="@{/admin/platform/bulletin/viewOne}" method="post">

											<input type="hidden" name="bulletinId"
												th:value="${bulletin.bulletinId}">

											<button class="title-link" type="submit"
												th:text="${bulletin.title}">公告標題</button>

										</form>

									</td>

									<td><span class="badge badge--published"
										th:if="${bulletin.status == 1}"> 已發布 </span> <span
										class="badge badge--draft" th:if="${bulletin.status == 0}">
											草稿 </span></td>

									<td
										th:text="${bulletin.publishDate != null
                                    ? bulletin.publishDate
                                    : '-'}">
										-</td>

									<td
										th:text="${bulletin.employeeId} + ' - ' + ${employeeNameMap.get(bulletin.employeeId)}">
										1001 - 員工</td>

									<td
										th:text="${#temporals.format(
                                    bulletin.createdAt,
                                    'yyyy-MM-dd HH:mm'
                            )}">
										2026-07-15 14:30</td>

									<td
										th:text="${bulletin.updatedAt != null
                                    ? #temporals.format(bulletin.updatedAt, 'yyyy-MM-dd HH:mm')
                                    : '-'}">
										-</td>

									<td class="cell-actions">

										<div class="action-group">

											<form class="action-form"
												th:action="@{/admin/platform/bulletin/getOne_For_Update}"
												method="post">

												<input type="hidden" name="bulletinId"
													th:value="${bulletin.bulletinId}">

												<button class="btn btn--secondary btn--sm" type="submit">
													修改</button>

											</form>

											<form class="action-form" th:if="${bulletin.status == 0}"
												th:action="@{/admin/platform/bulletin/publish}"
												method="post"
												onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">

												<input type="hidden" name="bulletinId"
													th:value="${bulletin.bulletinId}">

												<button class="btn btn--success btn--sm" type="submit">
													發布</button>

											</form>

											<form class="action-form"
												th:action="@{/admin/platform/bulletin/delete}" method="post"
												onsubmit="return confirm('確定要刪除這筆公告嗎？');">

												<input type="hidden" name="bulletinId"
													th:value="${bulletin.bulletinId}">

												<button class="btn btn--danger btn--sm" type="submit">
													刪除</button>

											</form>

										</div>

									</td>

								</tr>

							</tbody>

						</table>

					</div>

					<!-- 無公告資料 -->
					<div class="empty-state"
						th:if="${bulletinListData == null
                              or #lists.isEmpty(bulletinListData)}">
						目前沒有符合條件的公告</div>

				</section>

			</div>

		</main>

	</div>

</body>
</html>
