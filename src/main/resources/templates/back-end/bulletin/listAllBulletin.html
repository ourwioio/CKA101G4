<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>公告列表</h2>
        <a th:href="@{/bulletin/addBulletin}" class="btn btn-primary">新增公告</a>
    </div>

    <!-- Flash 訊息：發布/收回/新增/修改/刪除成功時顯示 -->
    <div class="alert alert-success" th:if="${success != null}" th:text="${success}"></div>

    <!-- 複合搜尋：狀態 / 關鍵字 / 發布日期區間，可任意組合或留空 -->
    <form th:action="@{/bulletin/search}" method="post" class="row g-2 mb-4 align-items-center">
        <div class="col-auto">
            <select name="status" class="form-select">
                <option value="" th:selected="${searchStatus == null}">全部狀態</option>
                <option value="0" th:selected="${searchStatus != null and searchStatus == 0}">草稿</option>
                <option value="1" th:selected="${searchStatus != null and searchStatus == 1}">已發布</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="keyword" class="form-control" placeholder="標題或標籤關鍵字"
                   th:value="${searchKeyword}" />
        </div>
        <div class="col-auto">
            <label class="col-form-label">發布日期</label>
        </div>
        <div class="col-auto">
            <input type="date" name="startDate" class="form-control" th:value="${searchStartDate}" />
        </div>
        <div class="col-auto">～</div>
        <div class="col-auto">
            <input type="date" name="endDate" class="form-control" th:value="${searchEndDate}" />
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-primary">搜尋</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/bulletin/listAllBulletin}" class="btn btn-outline-secondary">清除條件</a>
        </div>
    </form>

    <table class="table table-hover bg-white">
        <thead>
            <tr>
                <th>編號</th>
                <th>標題</th>
                <th>狀態</th>
                <th>發布日期</th>
                <th>標籤</th>
                <th>負責員工</th>
                <th>建立時間</th>
                <th>更新時間</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="bulletin : ${bulletinListData}">
                <td th:text="${bulletin.bulletinId}"></td>
                <td>
                    <form th:action="@{/bulletin/viewOne}" method="post" class="d-inline">
                        <input type="hidden" name="bulletinId" th:value="${bulletin.bulletinId}" />
                        <button type="submit" class="btn btn-link p-0 text-decoration-none" th:text="${bulletin.title}"></button>
                    </form>
                </td>
                <td>
                    <span th:if="${bulletin.status == 1}" class="badge bg-success">已發布</span>
                    <span th:if="${bulletin.status == 0}" class="badge bg-secondary">草稿</span>
                </td>
                <td th:text="${bulletin.publishDate != null ? bulletin.publishDate : '-'}"></td>
                <td th:text="${bulletin.tags}"></td>
                <td th:text="${bulletin.employeeId} + ' - ' + ${employeeNameMap.get(bulletin.employeeId)}"></td>
                <td class="small text-muted" th:text="${#temporals.format(bulletin.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="small text-muted" th:text="${#temporals.format(bulletin.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="d-flex gap-1">
                    <form th:action="@{/bulletin/getOne_For_Update}" method="post" class="d-inline">
                        <input type="hidden" name="bulletinId" th:value="${bulletin.bulletinId}" />
                        <button type="submit" class="btn btn-sm btn-outline-primary">修改</button>
                    </form>

                    <form th:action="@{/bulletin/publish}" method="post" class="d-inline" th:if="${bulletin.status == 0}"
                          onsubmit="return confirm('發布後將無法改回草稿，確定要發布嗎？');">
                        <input type="hidden" name="bulletinId" th:value="${bulletin.bulletinId}" />
                        <button type="submit" class="btn btn-sm btn-outline-success">發布</button>
                    </form>

                    <form th:action="@{/bulletin/delete}" method="post" class="d-inline"
                          onsubmit="return confirm('確定要刪除這筆公告嗎？');">
                        <input type="hidden" name="bulletinId" th:value="${bulletin.bulletinId}" />
                        <button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-muted" th:if="${#lists.isEmpty(bulletinListData)}">目前沒有符合條件的公告。</div>

</div>
</body>
</html>
