<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>公告內容</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">

		<div class="alert alert-success" th:if="${success != null}"
			th:text="${success}"></div>

		<div class="card">
			<div class="card-body">
				<h3 class="card-title" th:text="${bulletinVO.title}"></h3>

				<p class="mb-1">
					<span th:if="${bulletinVO.status == 1}" class="badge bg-success">已發布</span>
					<span th:if="${bulletinVO.status == 0}" class="badge bg-secondary">草稿</span>
					<span class="text-muted small ms-2"
						th:if="${bulletinVO.publishDate != null}"> 發布日期：<span
						th:text="${bulletinVO.publishDate}"></span>
					</span>
				</p>

				<hr />

				<p style="white-space: pre-line;" th:text="${bulletinVO.content}"></p>

				<p class="text-muted small mb-0">
					標籤：<span th:text="${bulletinVO.tags}"></span>
				</p>
				<p class="text-muted small mb-0">
					負責員工：<span
						th:text="${bulletinVO.employeeId} + ' - ' + ${employeeNameMap.get(bulletinVO.employeeId)}"></span>
				</p>
				<p class="text-muted small mb-0">
					建立時間：<span
						th:text="${#temporals.format(bulletinVO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
				</p>
				<p class="text-muted small">
					更新時間：<span
						th:text="${#temporals.format(bulletinVO.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
				</p>
			</div>
		</div>

		<a th:href="@{/bulletin/listAllBulletin}"
			class="btn btn-secondary mt-3">回列表</a>

	</div>
</body>
</html>
