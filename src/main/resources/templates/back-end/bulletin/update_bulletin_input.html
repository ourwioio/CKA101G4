<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改公告</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-4">修改公告</h2>

    <form th:action="@{/bulletin/update}" th:object="${bulletinVO}" method="post">

        <!-- 主鍵要一併送回去，否則 Service 存檔時會變成新增一筆 -->
        <input type="hidden" th:field="*{bulletinId}" />

        <div class="mb-3">
            <label class="form-label">標題</label>
            <input type="text" class="form-control" th:field="*{title}" />
            <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">內容</label>
            <textarea class="form-control" rows="5" th:field="*{content}"></textarea>
            <div class="text-danger small" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">標籤</label>
            <input type="text" class="form-control" th:field="*{tags}" placeholder="以逗號分隔多個標籤" />
            <div class="text-danger small" th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">負責員工</label>
            <select class="form-select" th:field="*{employeeId}">
                <option value="">請選擇員工</option>
                <option th:each="emp : ${employeeListData}"
                        th:value="${emp.employeeId}"
                        th:text="${emp.employeeId} + ' - ' + ${emp.empName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">狀態</label>
            <p>
                <span th:if="${bulletinVO.status == 1}" class="badge bg-success">已發布（發布後不可改回草稿）</span>
                <span th:if="${bulletinVO.status == 0}" class="badge bg-secondary">草稿</span>
            </p>
            <!-- 唯讀顯示用，實際值仍原封不動送回後端，Service 端也會再次強制鎖定已發布狀態 -->
            <input type="hidden" th:field="*{status}" />
        </div>

        <div class="mb-4 text-muted small" th:if="${bulletinVO.publishDate != null}">
            首次發布日期：<span th:text="${bulletinVO.publishDate}"></span>（發布後不會再變更）
        </div>

        <button type="submit" class="btn btn-primary">儲存修改</button>
        <a th:href="@{/bulletin/listAllBulletin}" class="btn btn-secondary">取消</a>
    </form>
</div>
</body>
</html>
