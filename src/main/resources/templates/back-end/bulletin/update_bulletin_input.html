<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>修改公告</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #2d3436;
            background: #f5f6fa;
            font-family:
                    "Noto Sans TC",
                    Arial,
                    sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .page {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* =========================
           頁面標題
           ========================= */

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0 0 7px;
            font-size: 28px;
            font-weight: 800;
        }

        .page-subtitle {
            margin: 0;
            color: #69727b;
            font-size: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 15px;
            color: #ffffff;
            background: #343a40;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 800;
            transition:
                    background 0.15s ease,
                    transform 0.15s ease;
        }

        .back-link:hover {
            background: #111111;
            transform: translateY(-1px);
        }

        /* =========================
           表單面板
           ========================= */

        .panel {
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e1e5ea;
            border-radius: 14px;
            box-shadow:
                    0 4px 15px
                    rgba(0, 0, 0, 0.04);
        }

        .panel-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #4f5964;
            font-size: 13px;
            font-weight: 800;
        }

        .form-control {
            width: 100%;
            min-height: 42px;
            padding: 9px 11px;
            color: #2d3436;
            background: #ffffff;
            border: 1px solid #d9dee5;
            border-radius: 8px;
        }

        textarea.form-control {
            min-height: 140px;
            resize: vertical;
        }

        .form-control:focus {
            border-color: #0984e3;
            outline: 2px solid rgba(9, 132, 227, 0.15);
        }

        .field-error {
            margin-top: 6px;
            color: #a12622;
            font-size: 12px;
            font-weight: 700;
        }

        .status-locked {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #f8f9fb;
            border: 1px solid #e5e8ec;
            border-radius: 8px;
            font-size: 13px;
            color: #69727b;
        }

        .hint {
            margin-top: 8px;
            color: #9299a1;
            font-size: 12px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            padding-top: 6px;
        }

        /* =========================
           狀態標籤
           ========================= */

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 78px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .badge--draft {
            color: #475569;
            background: #e2e8f0;
        }

        .badge--published {
            color: #166534;
            background: #dcfce7;
        }

        /* =========================
           按鈕
           ========================= */

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 9px 18px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            transition:
                    transform 0.15s ease,
                    background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn--update {
            color: #ffffff;
            background: #0984e3;
        }

        .btn--update:hover {
            background: #0873c4;
        }

        .btn--secondary {
            color: #4f5964;
            background: #edf0f3;
        }

        .btn--secondary:hover {
            background: #dfe4e8;
        }

        /* =========================
           RWD
           ========================= */

        @media (max-width: 620px) {

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .back-link {
                text-align: center;
            }

            .form-actions,
            .form-actions .btn {
                width: 100%;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="wb-admin-layout">

    <!-- =========================
         左側共用 Sidebar
         ========================= -->

    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}">
    </div>

    <!-- =========================
         右側修改公告內容
         ========================= -->

    <main class="wb-admin-content">

        <div class="page">

            <!-- =========================
                 頁面標題
                 ========================= -->

            <header class="page-header">

                <div>

                    <h1 class="page-title">
                        修改公告
                    </h1>

                    <p class="page-subtitle">
                        修改公告內容，已發布公告無法改回草稿。
                    </p>

                </div>

                <a class="back-link"
                   th:href="@{/admin/platform/bulletin/listAllBulletin}">
                    ← 返回公告管理
                </a>

            </header>

            <!-- =========================
                 修改公告表單
                 ========================= -->

            <section class="panel">

                <div class="panel-body">

                    <form th:action="@{/admin/platform/bulletin/update}"
                          th:object="${bulletinVO}"
                          method="post">

                        <!-- 主鍵要一併送回去，否則 Service 存檔時會變成新增一筆 -->
                        <input type="hidden"
                               th:field="*{bulletinId}">

                        <div class="form-group">

                            <label for="title">
                                標題
                            </label>

                            <input id="title"
                                   class="form-control"
                                   type="text"
                                   th:field="*{title}">

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="content">
                                內容
                            </label>

                            <textarea id="content"
                                      class="form-control"
                                      th:field="*{content}">
                            </textarea>

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('content')}"
                                 th:errors="*{content}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="tags">
                                標籤
                            </label>

                            <input id="tags"
                                   class="form-control"
                                   type="text"
                                   th:field="*{tags}"
                                   placeholder="以逗號分隔多個標籤">

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('tags')}"
                                 th:errors="*{tags}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label for="employeeId">
                                負責員工
                            </label>

                            <select id="employeeId"
                                    class="form-control"
                                    th:field="*{employeeId}">

                                <option value="">
                                    請選擇員工
                                </option>

                                <option th:each="emp : ${employeeListData}"
                                        th:value="${emp.employeeId}"
                                        th:text="${emp.employeeId} + ' - ' + ${emp.empName}">
                                </option>

                            </select>

                            <div class="field-error"
                                 th:if="${#fields.hasErrors('employeeId')}"
                                 th:errors="*{employeeId}">
                            </div>

                        </div>

                        <div class="form-group">

                            <label>
                                狀態
                            </label>

                            <div class="status-locked">

                                <span class="badge badge--published"
                                      th:if="${bulletinVO.status == 1}">
                                    已發布
                                </span>

                                <span class="badge badge--draft"
                                      th:if="${bulletinVO.status == 0}">
                                    草稿
                                </span>

                                <span th:if="${bulletinVO.status == 1}">
                                    發布後不可改回草稿
                                </span>

                            </div>

                            <!-- 唯讀顯示用，實際值仍原封不動送回後端，Service 端也會再次強制鎖定已發布狀態 -->
                            <input type="hidden"
                                   th:field="*{status}">

                            <div class="hint"
                                 th:if="${bulletinVO.publishDate != null}">

                                首次發布日期：

                                <span th:text="${bulletinVO.publishDate}">
                                    2026-07-15
                                </span>

                                （發布後不會再變更）

                            </div>

                        </div>

                        <div class="form-actions">

                            <button class="btn btn--update"
                                    type="submit">
                                儲存修改
                            </button>

                            <a class="btn btn--secondary"
                               th:href="@{/admin/platform/bulletin/listAllBulletin}">
                                取消
                            </a>

                        </div>

                    </form>

                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
