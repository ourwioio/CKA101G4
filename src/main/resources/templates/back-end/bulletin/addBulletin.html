<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新增公告</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-4">
		<h2 class="mb-4">新增公告</h2>

		<form th:action="@{/bulletin/insert}" th:object="${bulletinVO}"
			method="post">

			<div class="mb-3">
				<label class="form-label">標題</label> <input type="text"
					class="form-control" th:field="*{title}" />
				<div class="text-danger small" th:if="${#fields.hasErrors('title')}"
					th:errors="*{title}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">內容</label>
				<textarea class="form-control" rows="5" th:field="*{content}"></textarea>
				<div class="text-danger small"
					th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">標籤</label> <input type="text"
					class="form-control" th:field="*{tags}" placeholder="以逗號分隔多個標籤" />
				<div class="text-danger small" th:if="${#fields.hasErrors('tags')}"
					th:errors="*{tags}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">負責員工</label> <select class="form-select"
					th:field="*{employeeId}">
					<option value="">請選擇員工</option>
					<option th:each="emp : ${employeeListData}"
						th:value="${emp.employeeId}"
						th:text="${emp.employeeId} + ' - ' + ${emp.empName}"></option>
				</select>
				<div class="text-danger small"
					th:if="${#fields.hasErrors('employeeId')}"
					th:errors="*{employeeId}"></div>
			</div>

			<div class="mb-4">
				<label class="form-label">狀態</label> <select class="form-select"
					th:field="*{status}">
					<option value="0">草稿</option>
					<option value="1">發布</option>
				</select>
			</div>

			<button type="submit" class="btn btn-primary">送出</button>
			<a th:href="@{/bulletin/listAllBulletin}" class="btn btn-secondary">取消</a>
		</form>
	</div>
</body>
</html>
