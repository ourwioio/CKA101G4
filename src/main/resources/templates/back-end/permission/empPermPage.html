<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>後台管理系統 - 員工權限管理</title>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">
<style>
/* ================= 全局與現代化佈局變數 ================= */
:root {
	--slate-50: #f8fafc;
	--slate-100: #f1f5f9;
	--slate-200: #e2e8f0;
	--slate-300: #cbd5e1;
	--slate-500: #64748b;
	--slate-600: #475569;
	--slate-700: #334155;
	--slate-800: #1e293b;
	--sky-50: #f0f9ff;
	--sky-600: #0284c7;
	--sky-700: #0369a1;
	--rose-50: #fff1f2;
	--rose-600: #e11d48;
	--shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
	--shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px
		rgba(0, 0, 0, 0.06);
	--shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px
		rgba(0, 0, 0, 0.05);
}

body {
	margin: 0;
	padding: 0;
	background-color: var(--slate-50);
	font-family: 'Inter', "Microsoft JhengHei", sans-serif;
	color: var(--slate-800);
	-webkit-font-smoothing: antialiased;
}

/* 雙欄主框架外容器 */
.admin-container {
	display: flex;
	min-height: 100vh;
	width: 100%;
}

/* 側邊欄包裹區 */
.sidebar-wrapper {
	width: 270px;
	flex-shrink: 0;
	background-color: #ffffff;
	border-right: 1px solid var(--slate-200);
}

/* 右側主要內容版面 */
.main-content {
	flex-grow: 1;
	padding: 32px;
	box-sizing: border-box;
	background-color: var(--slate-50);
	overflow-x: hidden;
}

/* 白色卡片內襯底 */
.content-card {
	background-color: #ffffff;
	border-radius: 12px;
	border: 1px solid var(--slate-200);
	box-shadow: var(--shadow-sm);
	padding: 24px;
	margin: 0 auto;
	max-width: 1500px;
}

/* 頂部標題與工具列排版 */
.page-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 24px;
	padding-bottom: 16px;
	border-bottom: 1px solid var(--slate-100);
}

.page-title {
	font-size: 22px;
	font-weight: 700;
	color: var(--slate-800);
	margin: 0;
}

/* 按鈕美化 */
.btn-primary {
	background-color: var(--sky-600);
	color: #ffffff;
	border: none;
	padding: 10px 18px;
	font-size: 14px;
	font-weight: 600;
	border-radius: 8px;
	cursor: pointer;
	display: inline-flex;
	align-items: center;
	gap: 6px;
	transition: background-color 0.15s ease;
}

.btn-primary:hover {
	background-color: var(--sky-700);
}

.btn-action-edit {
	background-color: #ffffff;
	color: var(--slate-700);
	border: 1px solid var(--slate-300);
	padding: 6px 12px;
	font-size: 13px;
	font-weight: 500;
	border-radius: 6px;
	cursor: pointer;
	transition: all 0.15s ease;
}

.btn-action-edit:hover {
	background-color: var(--slate-50);
	border-color: var(--slate-400);
}

.btn-action-delete {
	background-color: #ffffff;
	color: var(--rose-600);
	border: 1px solid var(--slate-200);
	padding: 6px 12px;
	font-size: 13px;
	font-weight: 500;
	border-radius: 6px;
	cursor: pointer;
	transition: all 0.15s ease;
}

.btn-action-delete:hover {
	background-color: var(--rose-50);
	border-color: var(--rose-600);
}

/* ================= 現代化資料表格系統 ================= */
.table-responsive-wrapper {
	width: 100%;
	overflow-x: auto;
	border: 1px solid var(--slate-200);
	border-radius: 8px;
	background-color: #ffffff;
}

.modern-table {
	width: 100%;
	border-collapse: collapse;
	text-align: left;
	font-size: 14px;
}

.modern-table th {
	background-color: var(--slate-50);
	color: var(--slate-600);
	font-weight: 600;
	padding: 14px 16px;
	border-bottom: 1px solid var(--slate-200);
	white-space: nowrap;
}

.modern-table td {
	padding: 14px 16px;
	border-bottom: 1px solid var(--slate-100);
	color: var(--slate-700);
}

.modern-table tbody tr:hover {
	background-color: rgba(241, 245, 249, 0.5);
}

/* 員工編號對應的藥丸標籤組 */
.emp-badge-container {
	display: flex;
	flex-direction: column;
	gap: 6px;
}

.emp-badge-item {
	display: inline-flex;
	align-items: center;
	background-color: var(--slate-50);
	border: 1px solid var(--slate-200);
	padding: 4px 8px;
	border-radius: 6px;
	font-size: 12px;
	color: var(--slate-700);
	max-width: fit-content;
}

.emp-id-highlight {
	font-weight: 600;
	color: var(--sky-700);
	background-color: var(--sky-50);
	padding: 2px 4px;
	border-radius: 4px;
	margin-right: 4px;
}

.empty-state-text {
	color: var(--slate-500);
	font-style: italic;
	font-size: 13px;
}

/* ================= 分頁導覽控制區 ================= */
.pagination-wrapper {
	display: flex;
	justify-content: center;
	align-items: center;
	gap: 8px;
	margin-top: 24px;
}

.page-link-btn {
	padding: 8px 14px;
	border: 1px solid var(--slate-300);
	text-decoration: none;
	background-color: #ffffff;
	color: var(--slate-700);
	border-radius: 6px;
	font-size: 13px;
	font-weight: 500;
	transition: all 0.15s ease;
}

.page-link-btn:hover {
	background-color: var(--slate-50);
	border-color: var(--slate-400);
}

.page-info-text {
	font-size: 14px;
	font-weight: 600;
	color: var(--slate-600);
	padding: 0 8px;
}

/* ================= 現代化燈箱外框優化 ================= */
.premium-modal {
	position: fixed;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	background: #ffffff;
	border: none !important;
	border-radius: 12px;
	padding: 28px;
	z-index: 1000;
	box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0, 0, 0, 0.05);
	width: 520px;
	box-sizing: border-box;
}

/* 1. 權限專屬篩選外殼：極致洗鍊白、微陰影層次 */
.filter-card--perm {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    padding: 14px 20px;
    margin-bottom: 24px;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
}

/* 2. 表單橫向彈性佈局 */
.filter-inline-form {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 20px;
}

/* 3. 單個篩選組合：標籤與控制項置中對齊 */
.filter-field-inline {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 4. 側邊精緻粗體小標籤 */
.filter-label-inline {
    font-size: 13px;
    font-weight: 600;
    color: #475569; /* 深灰藍，呈現內斂的專門感 */
    white-space: nowrap;
}

/* 5. 輸入框與下拉選單的共用極簡高質感外觀 */
.filter-inline-form .form-control-inline {
    height: 36px;
    padding: 6px 14px;
    font-size: 13px;
    color: #1e293b;
    background-color: #f8fafc; /* 溫和的淺灰底色，降低眼睛疲勞 */
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    outline: none;
    transition: all 0.15s ease-in-out;
}

/* 寬度細緻調整，確保文字不會被遮擋或破版 */
input[type="text"].form-control-inline {
    width: 170px;
}

.select-wrapper-inline {
    position: relative;
    display: inline-block;
}

.select-wrapper-inline select.form-control-inline {
    width: 160px;
    padding-right: 32px; /* 為右側自訂小箭頭保留呼吸空間 */
    cursor: pointer;
    appearance: none; /* 彻底移除瀏覽器內建粗糙箭頭 */
    -webkit-appearance: none;
}

/* 6. 特製現代感微型下拉小竹節箭頭 */
.select-wrapper-inline::after {
    content: '▾';
    font-size: 12px;
    color: #64748b;
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-52%);
    pointer-events: none;
}

/* 7. 焦點互動：點擊時會呈現高級感的翡翠綠呼吸發光層 */
.filter-inline-form .form-control-inline:focus {
    background-color: #ffffff;
    border-color: #0d9488; /* 翡翠綠聚焦框 */
    box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
}

/* 8. 右側按鈕組排版 */
.filter-actions-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
}

/* 9. 沉穩的墨綠色搜尋確認按鈕（代表系統安全性控制） */
.btn-filter-submit-inline {
    height: 36px;
    background: #115e59; 
    color: #ffffff;
    border: none;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease;
}

.btn-filter-submit-inline:hover {
    background: #134e4a;
}

/* 10. 輕量級重設按鈕 */
.btn-filter-reset-inline {
    height: 36px;
    line-height: 34px; /* 精確垂直置中 */
    color: #64748b;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 0 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    box-sizing: border-box;
}

.btn-filter-reset-inline:hover {
    background: #f1f5f9;
    color: #334155;
}

</style>
</head>
<body>

	<!-- 外層改用 CSS Flex 彈性雙欄取代傳統大 Table -->
	<div class="admin-container">

		<!-- 左側導覽列區塊 -->
		<div class="sidebar-wrapper">
			<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>
		</div>

		<!-- 右側主要工作面板 -->
		<div class="main-content">
			<div class="content-card">

				<!-- 頁面頂部檔頭區塊 -->
			<div class="page-header" style="margin-bottom: 20px;">
    <h2 class="page-title">👥 員工權限管理系統</h2>
    <button type="button" class="btn-primary" th:onclick="openAddModal([[${currentPage}]])">
        <span>＋</span> 新增權限
    </button>
</div>

<!-- ================= 【第二層】：完全獨立的流線型篩選列（移到 header 外面） ================= -->
<div class="filter-card--compact filter-card--perm">
    <form th:action="@{/admin/employees/empPermPage}" method="get" class="filter-inline-form">
        
        <!-- 1. 權限名稱關鍵字搜尋 -->
        <div class="filter-field-inline">
            <label class="filter-label-inline" for="searchPermName">權限名稱</label>
            <input type="text" id="searchPermName" name="searchPermName" class="form-control-inline" 
                   placeholder="輸入名稱關鍵字..." th:value="${currentPermName}">
        </div>

        <!-- 2. 已授權狀態篩選 -->
        <div class="filter-field-inline">
            <label class="filter-label-inline" for="searchHasEmp">授權狀態</label>
            <div class="select-wrapper-inline">
                <select id="searchHasEmp" name="searchHasEmp" class="form-control-inline">
                    <option value="">全部權限狀態</option>
                    <option value="true" th:selected="${currentHasEmp == 'true'}">已有授權員工</option>
                    <option value="false" th:selected="${currentHasEmp == 'false'}">目前無授權員工</option>
                </select>
            </div>
        </div>

        <!-- 3. 按鈕組（神奇魔法：自動推至最右側平衡構圖） -->
        <div class="filter-actions-inline">
            <a th:href="@{/admin/employees/empPermPage}" class="btn-filter-reset-inline">重設</a>
            <button type="submit" class="btn-filter-submit-inline">搜尋權限</button>
        </div>
        
    </form>
</div>

				<!-- 資料表格響應式容器 -->
				<div class="table-responsive-wrapper">
					<table class="modern-table">
						<thead>
							<tr>
								<th style="width: 90px; text-align: center;">權限編號</th>
								<th style="width: 150px;">權限名稱</th>
								<th>權限功能描述</th>
								<th style="width: 160px; text-align: center;">最近更新時間</th>
								<th style="width: 320px;">已授權員工 & 授權時間</th>
								<th style="width: 80px; text-align: center;">修改</th>
								<th style="width: 80px; text-align: center;">刪除</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="permVO : ${permListData}">
								<!-- 權限編號 -->
								<td th:text="${permVO.permId}"
									style="text-align: center; font-weight: 600;"></td>
								<!-- 權限名稱 -->
								<td><strong th:text="${permVO.permName}"></strong></td>
								<!-- 權限內容描述 -->
								<td th:text="${permVO.permDsc}"></td>
								<!-- 權限更新時間 -->
								<td th:text="${permVO.permUpdatedAt ?: '未更新'}"
									style="text-align: center; font-size: 13px; color: var(--slate-500);"></td>
								<!-- 員工編號與授權時間 (優化為精緻的藥丸標籤堆疊) -->
								<td>
									<div class="emp-badge-container"
										th:if="${!#lists.isEmpty(permVO.empPermVO)}">
										<div class="emp-badge-item"
											th:each="empPermVO : ${permVO.empPermVO}">
											<span class="emp-id-highlight"
												th:text="'ID: ' + ${empPermVO.emps.employeeId}"></span> <span
												style="color: var(--slate-500); margin: 0 4px;">|</span> <span
												th:text="${empPermVO.assignedAt != null ? #dates.format(empPermVO.assignedAt, 'yyyy-MM-dd HH:mm') : '未紀錄'}"></span>
										</div>
									</div> <span th:if="${#lists.isEmpty(permVO.empPermVO)}"
									class="empty-state-text"> ⚠ 目前無授權員工 </span>
								</td>

								<!-- 修改按鈕 -->
								<td style="text-align: center;">
									<button type="button" class="btn-action-edit"
										th:onclick="openEditModal([[${permVO.permId}]], [[${permVO.permName}]], [[${permVO.permDsc}]],[[${currentPage}]])">
										修改</button>
								</td>

								<!-- 刪除按鈕與表單 -->
								<td style="text-align: center;">
									<form method="post" th:action="@{/admin/employees/permDelete}"
										style="margin: 0;">
										<input type="hidden" name="permId" th:value="${permVO.permId}">
										<input type="hidden" name="currentPage"
											th:value="${currentPage}"> <input type="hidden"
											name="searchPermName" th:value="${currentPermName}">
										<input type="hidden" name="searchHasEmp"
											th:value="${currentHasEmp}">
										<button type="submit" class="btn-action-delete"
											onclick="return confirm('確定要完全刪除此項員工權限嗎？');">刪除</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<!-- 分頁導覽控制面板 -->
				<div class="pagination-wrapper">
					<a th:if="${currentPage > 0}"
						th:href="@{/admin/employees/empPermPage(p=${(currentPage ?: 0) - 1}, searchPermName=${currentPermName}, searchHasEmp=${currentHasEmp})}"
						class="page-link-btn"> 上一頁 </a> <span class="page-info-text"
						th:text="'第 ' + (${currentPage ?: 0} + 1) + ' 頁 / 共 ' + ${totalPages ?:1} + ' 頁'">
						第 1 頁 / 共 1 頁 </span> <a
						th:if="${(currentPage ?: 0) < (totalPages?: 1) - 1}"
						th:href="@{/admin/employees/empPermPage(p=${currentPage + 1}, searchPermName=${currentPermName}, searchHasEmp=${currentHasEmp})}"
						class="page-link-btn"> 下一頁 </a>
				</div>

			</div>
		</div>
	</div>

	<!-- ================= 新增權限燈箱外框 ================= -->
	<div id="addModal" class="premium-modal"
		th:style="'display: ' + (${openAddModal} ? 'block' : 'none') + ';'">
		<div th:insert="~{back-end/permission/addPerm :: addPermContent}"></div>
	</div>

	<!-- ================= 修改權限燈箱外框 ================= -->
	<div id="editModal" class="premium-modal"
		th:style="'display: ' + (${openEditModal} ? 'block' : 'none') + ';'">
		<div
			th:insert="~{back-end/permission/updatePerm :: updatePermContent}"></div>
	</div>

	<script th:inline="javascript">
		// 新增按鈕控制邏輯
		function openAddModal(currentPage, isErrorReturn = false) {
			var modal = document.getElementById("addModal");
			if (modal) {
				var form = modal.querySelector("form");
				if (form && !isErrorReturn) {
	                form.reset();
	            }

				if (document.getElementById("modalCurrentPage")) {
					document.getElementById("modalCurrentPage").value = (currentPage !== undefined && currentPage !== null) ? currentPage
							: 0;
				}

				modal.style.setProperty("display", "block", "important");
			}
		}

		function closeAddModal() {
			var modal = document.getElementById("addModal");
			if (modal) {
				modal.style.setProperty("display", "none", "important");
			}
		}

		// 修改按鈕控制邏輯
		function openEditModal(permId, permName, permDsc, currentPage, isErrorReturn = false) {
			var modal = document.getElementById("editModal");
			if (modal) {
				
				if (isErrorReturn) {
	                modal.style.setProperty("display", "block", "important");
	                return;
	            }
				
				var form = modal.querySelector("form");
				if (form) {
					form.reset();
				}

				if (document.getElementById("editPermId"))
					document.getElementById("editPermId").value = permId;
				if (document.getElementById("editPermName"))
					document.getElementById("editPermName").value = permName;
				if (document.getElementById("editPermDsc"))
					document.getElementById("editPermDsc").value = permDsc;
				
				
				if (document.getElementById("modalCurrentPage")) {
					document.getElementById("modalCurrentPage").value = (currentPage !== undefined && currentPage !== null) ? currentPage
							: 0;
				}

				modal.style.setProperty("display", "block", "important");
			}
		}

		// 修正原版 JavaScript 裡 EditModal 字母大小寫不一致的 Bug
		function closeEditModal() {
			var modal = document.getElementById("editModal");
			if (modal) {
				modal.style.setProperty("display", "none", "important");
			}
		}
		
		document.addEventListener("DOMContentLoaded", function() {
	        let shouldOpenAdd = /*[[${openAddModal}]]*/ false;
	        let shouldOpenEdit = /*[[${openEditModal}]]*/ false;
	        let currentPageNum = /*[[${currentPage ?: 0}]]*/ 0;
	        

	        if (shouldOpenAdd === true || shouldOpenAdd === "true" || window.location.search.includes("openAddModal=true")) {
	            if (typeof openAddModal === 'function') openAddModal(currentPageNum, true);
	        }
	        
	        if (shouldOpenEdit === true || shouldOpenEdit === "true" || window.location.search.includes("openEditModal=true")) {
	            let permVO = /*[[${permissionVO}]]*/ null;
	            if (permVO && permVO.permId) {
	                if (typeof openEditModal === 'function') {
	                    openEditModal(permVO.permId, permVO.permName, permVO.permDsc, currentPageNum, true); 
	                }
	            }
	        }
	    });
	</script>

</body>
</html>
