<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>平台管理</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.menu-card {
	transition: box-shadow 0.15s, transform 0.15s;
}

.menu-card:hover {
	box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.1);
	transform: translateY(-2px);
}
</style>
</head>
<body class="bg-light">
	<div class="container py-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>平台管理</h2>
		</div>

		<div class="row g-3">
			<div class="col-md-4">
				<a th:href="@{/bulletin/listAllBulletin}"
					class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">公告管理</h5>
							<p class="card-text text-muted mb-0">平台公告的新增、發布與維護。</p>
						</div>
					</div>
				</a>
			</div>

			<div class="col-md-4">
				<a th:href="@{/platformSpecification/listAllSpec}"
					class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">平台規範管理</h5>
							<p class="card-text text-muted mb-0">平台使用規範的建立與維護。</p>
						</div>
					</div>
				</a>
			</div>

			<div class="col-md-4">
				<a th:href="@{/faq/listAllFaq}" class="text-decoration-none">
					<div class="card h-100 menu-card">
						<div class="card-body">
							<h5 class="card-title text-dark">常見問題管理</h5>
							<p class="card-text text-muted mb-0">常見問題（FAQ）的建立與維護。</p>
						</div>
					</div>
				</a>
			</div>
		</div>

	</div>
</body>
</html>
