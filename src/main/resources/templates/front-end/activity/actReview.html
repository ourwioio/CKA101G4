<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>填寫活動評價｜Webond</title>
<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">

<link rel="stylesheet" th:href="@{/css/front-end/common/footer.css}">
<link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
<style>
/* ==========================================================
       Webond 活動評價頁 — 圓潤角色風 (cream / ink / pastel blobs)
       ========================================================== */
@import
	url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap')
	;

:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--color-pink: #FFB5C1;
	--color-green: #B7E1D1;
	--color-blue: #A9D3FF;
	--color-red: #FF5271;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);
	--nav-height: 76px;
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: var(--font-body);
	background: var(--color-bg);
	color: var(--color-ink);
	line-height: 1.6;
	-webkit-font-smoothing: antialiased;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	padding: calc(var(--nav-height)) 20px 40px;
}

h2, h3, h4 {
	font-family: var(--font-display);
	margin: 0;
}

/* 核心大卡片主體 */
.card {
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-radius: var(--radius-lg);
	box-shadow: var(--shadow-md);
	width: 100%;
	max-width: 550px;
	overflow: hidden;
}

/* 卡片頭部標題區 */
.card-header {
	padding: 36px 36px 0 36px;
	background: transparent;
}

.card-header h2 {
	font-size: 24px;
	font-weight: 800;
	color: var(--color-ink);
	position: relative;
	padding-left: 16px;
}

/* 經典小圓點點綴 */
.card-header h2::before {
	content: '';
	position: absolute;
	left: 0;
	top: 50%;
	transform: translateY(-50%);
	width: 7px;
	height: 7px;
	border-radius: 50%;
	background: var(--color-yellow-deep);
}

.card-body {
	padding: 28px 36px 36px 36px;
}

/* 錯誤提示橫幅 */
.alert-error {
	background: var(--color-pink);
	color: var(--color-ink);
	border-radius: var(--radius-md);
	padding: 14px 20px;
	font-size: 14px;
	font-weight: 700;
	margin-bottom: 24px;
	box-shadow: var(--shadow-sm);
	border: none;
}

/* 訂單資料沉浸面板 */
.info-box {
	background: var(--color-surface-soft);
	border: 1px solid var(--color-border);
	padding: 14px 18px;
	border-radius: var(--radius-md);
	margin-bottom: 24px;
	color: var(--color-ink);
	font-size: 14.5px;
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.info-box strong {
	font-weight: 800;
}

.info-box span {
	font-weight: 600;
	color: var(--color-ink-soft);
}

/* 表單欄位群組 */
.form-group {
	margin-bottom: 24px;
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.form-label {
	font-size: 14px;
	font-weight: 800;
	color: var(--color-ink);
	padding-left: 2px;
}

/* 輸入文字域控組 */
.form-control {
	width: 100%;
	font-family: var(--font-body);
	font-size: 14px;
	font-weight: 600;
	color: var(--color-ink);
	background: var(--color-surface-soft);
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	padding: 14px;
	outline: none;
	transition: all 0.15s ease;
}

.form-control:focus {
	border-color: var(--color-yellow-deep);
	background: var(--color-surface);
}

/* 💡 核心優化：尺寸完全固定、內文超出可捲動、不顯示捲軸條 */
textarea.form-control {
	resize: none;
	overflow-y: auto;
	scrollbar-width: none;
	-ms-overflow-style: none;
}

textarea.form-control::-webkit-scrollbar {
	display: none;
}

/* ==========================================================
       🌟 核心打造：Google Maps 質感互動星等樣式
       ========================================================== */
.google-star-rating {
	display: inline-flex;
	align-items: center;
	gap: 6px;
	padding: 4px 0;
	user-select: none;
}

.google-star-node {
	font-size: 34px; /* 寬大舒適的點擊範圍 */
	color: var(--color-border); /* 預設灰沙色 */
	cursor: pointer;
	transition: transform 0.1s ease, color 0.1s ease;
}

.google-star-node:hover {
	transform: scale(1.15);
}

.google-star-node.filled {
	color: var(--color-yellow-deep); /* 亮黃色填充 */
}

/* 提交按鈕：經典 Webond 沉穩黑大膠囊 */
.btn-submit {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	min-height: 48px;
	border: none;
	border-radius: var(--radius-full);
	padding: 12px 24px;
	color: #ffffff;
	font-weight: 800;
	cursor: pointer;
	font-size: 15px;
	background: var(--color-ink);
	box-shadow: var(--shadow-sm);
	transition: transform 0.18s ease, box-shadow 0.18s ease, background
		0.15s ease;
	font-family: var(--font-body);
	margin-top: 10px;
}

.btn-submit:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-md);
	background: var(--color-yellow-deep);
	color: var(--color-ink);
}

.btn-submit:active {
	transform: translateY(0) scale(0.98);
}
</style>
</head>
<body>


	<div class="card">
		<div class="card-header">
			<h2>活動心得分享</h2>
		</div>
		<div class="card-body">

			<div th:if="${errorMessage != null}" class="alert-error"
				th:text="${errorMessage}">這裡會動態顯示錯誤訊息</div>

			<div class="info-card"
				style="background: var(--color-surface-soft); border: 1.5px dashed var(--color-border); padding: 20px; border-radius: var(--radius-md); margin-bottom: 24px;">

				<div
					style="font-size: 18px; font-weight: 800; color: var(--color-ink); margin-bottom: 12px; border-bottom: 1px solid var(--color-border); padding-bottom: 8px;">
					📌 活動名稱：<span th:text="${activityName}"></span>
				</div>

				<div
					style="font-size: 13.5px; color: var(--color-ink-soft); display: flex; flex-direction: column; gap: 6px;">
					<div>
						<strong>訂單編號：</strong> <span
							th:text="${orderData.activityOrderId}"></span>
					</div>

					<div>
						<strong>活動時間：</strong> <span
							th:text="${#temporals.format(activityTime, 'yyyy/MM/dd HH:mm')}"></span>
					</div>
					<div>
						<strong>實付金額：</strong> <span>NT$ <span
							th:text="${orderData.activityPrice}"></span></span>
					</div>
				</div>
			</div>

			<form th:action="@{/review/submit}" method="post">
				<input type="hidden" name="orderId"
					th:value="${orderData.activityOrderId}" />

				<div class="form-group">
					<label class="form-label">給予本次活動評分</label>

					<input type="hidden" id="buyerRating" name="buyerRating"
						class="js-real-rating-input"
						th:value="${prevRating != null ? prevRating : 3}" />

					<div class="google-star-rating">
						<span class="google-star-node" data-score="1">★</span> <span
							class="google-star-node" data-score="2">★</span> <span
							class="google-star-node" data-score="3">★</span> <span
							class="google-star-node" data-score="4">★</span> <span
							class="google-star-node" data-score="5">★</span>
					</div>
				</div>

				<div class="form-group">
					<label for="buyerComment" class="form-label">評價內容</label>
					<textarea class="form-control" id="buyerComment"
						name="buyerComment" rows="5" placeholder="歡迎分享您參與這次活動的真實心得..."
						maxlength="1000" required th:text="${prevComment}"></textarea>
				</div>

				<button type="submit" class="btn-submit">提交評價</button>
				<a th:href="@{/activity/front/myOrder}"
					style="display: inline-flex; align-items: center; justify-content: center; width: 100%; min-height: 48px; border: 1.5px solid var(--color-border); border-radius: var(--radius-full); padding: 12px 24px; color: var(--color-ink-soft); font-weight: 800; text-decoration: none; font-size: 15px; background: transparent; margin-top: 12px; transition: all 0.15s ease;"
					onmouseover="this.style.background='var(--color-surface-soft)'; this.style.color='var(--color-ink)';"
					onmouseout="this.style.background='transparent'; this.style.color='var(--color-ink-soft)';">
					返回活動管理 </a>

			</form>
		</div>
	</div>


	
	<div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>


	<script>
    document.addEventListener('DOMContentLoaded', function() {
        const ratingContainer = document.querySelector('.google-star-rating');
        if (!ratingContainer) return;

        const stars = ratingContainer.querySelectorAll('.google-star-node');
        const hiddenInput = document.getElementById('buyerRating');

        // 輔助函式：點亮到指定的星等
        function lightUpStars(score) {
            stars.forEach(star => {
                const starScore = parseInt(star.getAttribute('data-score'), 10);
                if (starScore <= score) {
                    star.classList.add('filled');
                } else {
                    star.classList.remove('filled');
                }
            });
        }

        // 載入時立刻讀取 input 的值
        const initialScore = parseInt(hiddenInput.value, 10) || 3;
        lightUpStars(initialScore);

        stars.forEach(star => {
            star.addEventListener('mouseenter', function() {
                const currentHoverScore = parseInt(this.getAttribute('data-score'), 10);
                lightUpStars(currentHoverScore);
            });

            star.addEventListener('mouseleave', function() {
                const currentSelectedScore = parseInt(hiddenInput.value, 10) || 0;
                lightUpStars(currentSelectedScore);
            });

            star.addEventListener('click', function() {
                const selectedScore = this.getAttribute('data-score');
                hiddenInput.value = selectedScore;
                lightUpStars(parseInt(selectedScore, 10));
            });
        });
    });
</script>

</body>
</html>
