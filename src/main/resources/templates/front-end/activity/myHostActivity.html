<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我舉辦的活動</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/activity/activity-navbar-offset.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

  <style>
/* ==========================================================
   Webond 我舉辦的活動頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271;

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

  --nav-height: 76px;
}

*{ box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding: 0 20px 40px;
}

h1, h2, h3, h4 { font-family: var(--font-display); margin: 0; }
a { text-decoration: none; color: inherit; }

/* ==========================================================
   活動中心子導覽列 (與我的場地共用同一套視覺樣式)
   ========================================================== */
.activity-topbar{
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  margin: 0 -20px;
  margin-top: calc(var(--nav-height) + 16px);
}
.activity-topbar__inner{
  max-width: 1200px;
  margin: 0 auto;
  padding: 22px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.activity-topbar__title{
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 800;
  margin: 0;
}
.activity-tabs{
  display: flex;
  align-items: center;
  gap: 22px;
  flex-wrap: wrap;
  font-size: 13.5px;
  font-weight: 700;
}
.activity-tabs a{
  position: relative;
  padding: 4px 10px;
  color: var(--color-ink-soft);
  transition: color .15s ease;
}
.activity-tabs a:hover{ color: var(--color-ink); }
.activity-tabs a.is-active{ color: var(--color-ink); }
.activity-tabs a.is-active::after{
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 2px;
  background: var(--color-yellow-deep);
}
.activity-tabs__cta{
  background: var(--color-ink);
  color: #fff !important;
  padding: 8px 18px;
  border-radius: var(--radius-full);
  transition: background .15s ease, color .15s ease, transform .15s ease;
}
.activity-tabs__cta:hover{
  background: var(--color-yellow-deep);
  color: var(--color-ink) !important;
  transform: translateY(-2px);
}

/* ==========================================================
   版面容器
   ========================================================== */
.container {
  max-width: 1200px;
  margin: 32px auto 60px;
}

/* ==========================================================
   🌟 提示警告框：極簡無邊框、無立體陰影、字重 400
   ========================================================== */
.alert-error {
  background: var(--color-pink);
  color: var(--color-ink);
  border-radius: var(--radius-md);
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 400; /* 🌟 舒適的 400 字重 */
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.alert-success {
  background: var(--color-green);
  color: var(--color-ink);
  border-radius: var(--radius-md);
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 400;
  margin-bottom: 24px;
}

/* ==========================================================
   頂部大標頭區
   ========================================================== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 2px dashed var(--color-border);
  padding-bottom: 20px;
  margin-bottom: 32px;
  gap: 20px;
}

.header h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--color-ink);
  position: relative;
  padding-left: 18px;
  margin-bottom: 6px;
}
.header h1::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--color-yellow-deep);
}

/* 主辦人名字標示：套用全新柔和規範 */
.member {
  font-size: 13.5px;
  color: var(--color-ink-soft);
  font-weight: 450; /* 🌟 柔和字重 */
}

.member span {
  font-weight: 700;
  color: var(--color-ink);
}

/* ==========================================================
   Q 萌管理表格卡片 (Table Card)
   ========================================================== */
.table-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden; /* 確保 Table 頂部左右圓角不破開 */
}

/* 響應式滾動容器 (並隱藏滾動條) */
.table-responsive {
  width: 100%;
  overflow-x: auto;
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE/Edge */
}
.table-responsive::-webkit-scrollbar {
  display: none; /* Chrome/Safari */
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--color-surface-soft);
  color: var(--color-ink);
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 800;
  font-family: var(--font-display);
  border-bottom: 1px solid var(--color-border);
  white-space: nowrap;
  text-align: center;
}

td {
  padding: 18px 20px;
  font-size: 14px;
  color: var(--color-ink-soft); /* 🌟 套用最新字體顏色規範 */
  font-weight: 450;              /* 🌟 套用最新柔和字重規範 */
  border-bottom: 1px solid var(--color-border);
  vertical-align: middle;
  text-align: center;
}

tr:last-child td {
  border-bottom: none; /* 最後一列去除底邊線 */
}

tr:hover td {
  background: var(--color-surface-soft); /* 懸停時整列溫和變色 */
}

/* 活動縮圖 */
.activity-thumb {
  width: 90px;
  height: 64px;
  object-fit: cover;
  border-radius: var(--radius-md); /* 16px 舒適圓角 */
  border: 1px solid var(--color-border);
  background: var(--color-surface-soft);
  display: block;
  margin: 0 auto;
}

/* ==========================================================
   狀態徽章 (統一改為無邊框無陰影膠囊樣式)
   ========================================================== */
.status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 5px 14px;
  border-radius: var(--radius-full);
  font-size: 12.5px;
  font-weight: 800;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

/* 正常：溫和草綠 */
.status.normal {
  background: var(--color-green);
  color: var(--color-ink);
}

/* 延期：暖黃 */
.status.delay {
  background: var(--color-yellow);
  color: var(--color-ink);
}

/* 取消：粉紅 */
.status.cancel {
  background: var(--color-pink);
  color: var(--color-ink);
}

/* 已結束：中性沙色，與仍可報名的活動區隔 */
.status.ended {
  background: var(--color-border);
  color: var(--color-ink);
}

/* 待審核提示：亮紅小氣球 */
.review-badge {
  display: inline-flex;
  align-items: center;
  background: var(--color-red);
  color: #FFFFFF;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 800;
  margin-top: 6px;
  line-height: 1.2;
}

/* ==========================================================
   操作按鈕群組 (馬卡龍色系軟圓角藥丸樣式)
   ========================================================== */
.action {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 8px;
  min-width: 440px;
}

.action form {
  margin: 0;
}

.action a,
.action button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  transition: transform .18s ease, box-shadow .18s ease, filter .15s ease;
  white-space: nowrap;
	border: 0;
	cursor: pointer;
	font-family: inherit;
}

.action a:hover,
.action button:hover {
  transform: translateY(-2px);
  filter: brightness(0.96); /* 輕微變深 */
}

/* 詳情：馬卡龍藍 */
.btn-detail {
  background: var(--color-blue);
  color: var(--color-ink);
}

/* 修改：馬卡龍綠 */
.btn-edit {
  background: var(--color-green);
  color: var(--color-ink);
}

/* 報名名單：馬卡龍黃 */
.btn-member {
  background: var(--color-yellow);
  color: var(--color-ink);
}

/* 再次舉辦：馬卡龍粉 */
.btn-repeat {
  background: var(--color-pink);
  color: var(--color-ink);
}

/* 聊天室：沙色灰 */
.btn-chat {
  background: var(--color-border);
  color: var(--color-ink);
}

/* 下架活動：顯示為取消操作，但保留活動歷史資料 */
.btn-cancel-activity {
  background: var(--color-pink);
  color: var(--color-ink);
}

/* ==========================================================
   無建立活動空狀態
   ========================================================== */
.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--color-ink-soft);
  font-size: 15px;
  font-weight: 800;
  background: var(--color-surface-soft);
}

/* ==========================================================
   RWD 手機版優化
   ========================================================== */
@media (max-width: 760px) {
  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }
  .table-card { border-radius: var(--radius-md); }
}
  </style>
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>

<body>

<div th:replace="~{front-end/activity/activityHeader :: header('myHostActivity')}"></div>

  <div class="container">

    <!-- ========== 溫和無邊框無陰影錯誤檢核提示 (400 字重) ========== -->
    <div th:if="${param.cannotEdit}" class="alert-error">
       已有會員報名此活動，為維護權益，目前無法直接修改活動內容。
    </div>
    <div th:if="${param.noPermission}" class="alert-error">
       權限不足！您僅能修改與管理自己所主辦的活動。
    </div>
	<div th:if="${param.cannotCancel}" class="alert-error">
	   已結束或已取消的活動無法再次下架。
	</div>
	<div th:if="${param.activityNotFound}" class="alert-error">
	   找不到指定的活動資料。
	</div>
	<div th:if="${param.cancelSuccess}" class="alert-success">
	   活動已成功下架，狀態已更新為「已取消」。
	</div>

    <!-- ========== 頂部大標頭區 ========== -->
    <div class="header">
      <div>
        <h1>我舉辦的活動</h1>
      </div>
    </div>

    <!-- ========== 管理表格卡片 ========== -->
    <div class="table-card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th style="padding-left: 24px;">活動編號</th>
              <th>圖片</th>
              <th>活動名稱</th>
              <th>活動價格</th>
              <th>目前人數</th>
              <th>活動狀態</th>
              <th style="padding-right: 24px;">操作管理</th>
            </tr>
          </thead>

          <tbody>
            <!-- 查無任何活動空狀態 -->
            <tr th:if="${#lists.isEmpty(activityListData)}">
              <td colspan="7" class="empty">
                目前您尚未建立過任何揪團活動
              </td>
            </tr>

            <!-- 數據資料列 (字重 450 / 顏色 ink-soft) -->
            <tr th:each="activity : ${activityListData}"
                th:attr="data-live-activity-id=${activity.activityId},
                         data-live-activity-status=${activity.activityStatus},
                         data-live-attendees-count=${activity.attendeesCount},
                         data-live-ended=${endedActivityMap[activity.activityId]}">
              <!-- 活動編號 (稍加粗區隔) -->
              <td style="padding-left: 24px; font-weight: 600; color: var(--color-ink);" th:text="${activity.activityId}"></td>

              <!-- 圖片 -->
              <td>
                <img class="activity-thumb" th:src="@{/activity/front/image(id=${activity.activityId})}" alt="活動圖片">
              </td>

              <!-- 活動名稱與評價審核提醒 -->
              <td>
                <div th:text="${activity.activityTitle}" style="font-weight: 600; color: var(--color-ink); font-size: 14.5px;"></div>
                <span class="review-badge"
                      th:if="${pendingReviewCountMap[activity.activityId] != null and pendingReviewCountMap[activity.activityId] > 0}"
                      th:text="| 待審核 ${pendingReviewCountMap[activity.activityId]} 筆|">
                  待審核 1 筆
                </span>
              </td>

              <!-- 價格 -->
              <td>
                <span style="font-family: var(--font-display); font-weight: 600; color: var(--color-ink);">
                  NT$ <span th:text="${activity.activityPrice}">0</span>
                </span>
              </td>

              <!-- 目前人數 -->
              <td>
                <span th:text="${activity.attendeesCount}" style="color: var(--color-ink); font-weight: 600;">0</span>
                <span style="color: var(--color-border); margin: 0 4px;">/</span>
                <span th:text="${activity.maxParticipants}">10</span> 人
              </td>

              <!-- 活動狀態 (極簡無邊框徽章) -->
              <td>
                <span th:if="${activity.activityStatus != 2 and endedActivityMap[activity.activityId]}"
					  class="status ended">已結束</span>
                <span th:if="${activity.activityStatus == 0 and !endedActivityMap[activity.activityId]}"
					  class="status normal">正常舉行</span>
                <span th:if="${activity.activityStatus == 1 and !endedActivityMap[activity.activityId]}"
					  class="status delay">延期</span>
                <span th:if="${activity.activityStatus == 2}" class="status cancel">已取消</span>
              </td>

              <!-- 操作按鈕列 (馬卡龍色系小藥丸) -->
              <td style="padding-right: 24px;">
                <div class="action">
                  <a class="btn-detail" th:href="@{/activity/front/detail(id=${activity.activityId}, from='host')}">
                    詳情
                  </a> 
                  <a class="btn-edit" th:href="@{/activity/front/updateHostActivity(id=${activity.activityId})}">
                    修改
                  </a> 
                  <a class="btn-member" th:href="@{/activity/front/memberList(activityId=${activity.activityId})}">
                    報名名單
                  </a> 
                  <a class="btn-repeat" th:href="@{/activity/front/repeatHostActivity(id=${activity.activityId})}">
                    再次舉辦
                  </a> 
                  <a class="btn-chat" th:href="@{/activity/front/chat(activityId=${activity.activityId}, from='host')}">
                    聊天室
                  </a>
				  <form th:if="${canCancelActivityMap[activity.activityId]}"
						th:action="@{/activity/front/cancelHostActivity}" method="post"
						onsubmit="return confirm('確定要下架這個活動嗎？活動將改為已取消，未完成訂單也會同步取消並依付款狀態進入退款流程。');">
					<input type="hidden" name="activityId" th:value="${activity.activityId}">
					<button type="submit" class="btn-cancel-activity">下架活動</button>
				  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>

<script th:src="@{/js/front-end/activity/activityStatusPolling.js}"></script>
</body>
</html>
