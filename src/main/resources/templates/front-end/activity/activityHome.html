<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>活動後台</title>

<style>
body {
	margin: 0;
	padding: 40px;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	color: #1e293b;
}

.header {
	max-width: 1100px;
	margin: auto;
	text-align: center;
	margin-bottom: 28px;
}

.header h1 {
	font-size: 2.2rem;
	margin-bottom: 10px;
	color: #0f172a;
}

.header p {
	color: #64748b;
	font-size: 1.05rem;
}

.top-actions {
	max-width: 1100px;
	margin: 0 auto 20px;
	display: flex;
	justify-content: flex-end;
}

.btn-home {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.login-panel {
	max-width: 1100px;
	margin: 0 auto 32px;
	background: white;
	border: 1px solid #e2e8f0;
	border-radius: 12px;
	padding: 18px 20px;
	box-shadow: 0 5px 12px rgba(0, 0, 0, .08);
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 16px;
}

.login-panel strong {
	color: #0f172a;
}

.login-form {
	display: flex;
	align-items: center;
	gap: 10px;
}

.login-form select {
	min-width: 220px;
	padding: 10px 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	font-size: 15px;
}

.login-form button {
	background: #2563eb;
	color: white;
	border: 0;
	border-radius: 8px;
	padding: 10px 18px;
	font-weight: bold;
	cursor: pointer;
}

.card-container {
	max-width: 1100px;
	margin: auto;
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
	gap: 30px;
}

.card {
	background: #fff;
	border-radius: 15px;
	padding: 35px;
	text-align: center;
	border: 1px solid #e2e8f0;
	box-shadow: 0 5px 12px rgba(0, 0, 0, .08);
}

.card h2 {
	margin: 10px 0;
	color: #0f172a;
}

.card p {
	color: #64748b;
	line-height: 1.7;
	min-height: 60px;
}

.btn {
	display: inline-block;
	margin-top: 20px;
	padding: 12px 28px;
	border-radius: 8px;
	color: white;
	text-decoration: none;
	font-weight: bold;
}

.activity {
	background: #3b82f6;
}

.type {
	background: #8b5cf6;
}

.order {
	background: #10b981;
}
</style>
</head>

<body>

	<div class="top-actions">
		<a th:href="@{/activity/home}" class="btn-home">回活動首頁</a>
	</div>

	<div class="header">
		<h1>活動後台</h1>
		<p>
			目前員工：<span th:text="${loginEmployeeName}">測試員工</span>
			（員工編號 <span th:text="${loginEmployeeId}">1</span>）
		</p>
	</div>

		<div class="login-panel">
		<div>
			<strong>測試後台員工</strong>
			<div>後台員工可查看活動資料與下架活動；報名審核由活動主辦會員處理。</div>
		</div>

		<form class="login-form" th:action="@{/activity/admin/fakeLogin}" method="post">
			<select name="employeeId">
				<option th:each="employee : ${employeeListData}"
					th:value="${employee.employeeId}"
					th:selected="${employee.employeeId == loginEmployeeId}"
					th:text="|員工${employee.employeeId} - ${employee.empName ?: '未命名'}|">
				</option>
			</select>
			<button type="submit">切換</button>
		</form>
	</div>

	<div class="card-container">
		<div class="card">
			<h2>活動管理</h2>
			<p>後台只可查看活動與下架活動，不提供新增或修改活動。</p>
			<a class="btn activity" th:href="@{/activity/listAllActivity}">進入活動管理</a>
		</div>

		<div class="card">
			<h2>活動類別管理</h2>
			<p>管理活動分類資料。</p>
			<a class="btn type" th:href="@{/activityType/listAllActivityType}">進入類別管理</a>
		</div>

		<div class="card">
			<h2>報名紀錄</h2>
			<p>查看活動報名狀態；報名申請由活動主辦會員審核。</p>
			<a class="btn order" th:href="@{/activityOrder/listAllActivityOrder}">進入報名紀錄</a>
		</div>
	</div>

</body>
</html>
