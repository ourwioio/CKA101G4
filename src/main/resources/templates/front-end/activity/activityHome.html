<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>&#27963;&#21205;&#24460;&#21488;</title>

<style>
body {
	margin: 0;
	padding: 40px;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	color: #1e293b;
}

.top-actions {
	max-width: 1100px;
	margin: 0 auto 20px;
	display: flex;
	justify-content: flex-end;
}

.btn-home {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.header {
	max-width: 1100px;
	margin: auto;
	text-align: center;
	margin-bottom: 28px;
}

.header h1 {
	font-size: 2.2rem;
	margin-bottom: 10px;
	color: #0f172a;
}

.header p {
	color: #64748b;
	font-size: 1.05rem;
}

.login-panel {
	max-width: 1100px;
	margin: 0 auto 32px;
	background: white;
	border: 1px solid #e2e8f0;
	border-radius: 12px;
	padding: 18px 20px;
	box-shadow: 0 5px 12px rgba(0, 0, 0, .08);
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 16px;
}

.login-panel strong {
	color: #0f172a;
}

.login-form {
	display: flex;
	align-items: center;
	gap: 10px;
}

.login-form select {
	min-width: 220px;
	padding: 10px 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	font-size: 15px;
}

.login-form button {
	background: #2563eb;
	color: white;
	border: 0;
	border-radius: 8px;
	padding: 10px 18px;
	font-weight: bold;
	cursor: pointer;
}

.warning {
	max-width: 1100px;
	margin: 0 auto 20px;
	background: #fef3c7;
	color: #92400e;
	border: 1px solid #fde68a;
	border-radius: 10px;
	padding: 14px 18px;
	font-weight: bold;
}

.card-container {
	max-width: 1100px;
	margin: auto;
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
	gap: 30px;
}

.card {
	background: #fff;
	border-radius: 15px;
	padding: 35px;
	text-align: center;
	border: 1px solid #e2e8f0;
	box-shadow: 0 5px 12px rgba(0, 0, 0, .08);
}

.card h2 {
	margin: 10px 0;
	color: #0f172a;
}

.card p {
	color: #64748b;
	line-height: 1.7;
	min-height: 60px;
}

.btn {
	display: inline-block;
	margin-top: 20px;
	padding: 12px 28px;
	border-radius: 8px;
	color: white;
	text-decoration: none;
	font-weight: bold;
}

.activity {
	background: #3b82f6;
}

.type {
	background: #8b5cf6;
}

.order {
	background: #0f766e;
}
</style>
</head>

<body>
	<div class="top-actions">
		<a th:href="@{/activity/home}" class="btn-home">&#22238;&#21069;&#24460;&#21488;&#36984;&#21934;</a>
	</div>

	<div class="header">
		<h1>&#27963;&#21205;&#24460;&#21488;</h1>
		<p>
			&#30446;&#21069;&#21729;&#24037;&#65306;<span th:text="${loginEmployeeName}">&#26410;&#30331;&#20837;</span>
			<span th:if="${isLoginEmployee}">&#65288;&#21729;&#24037;&#32232;&#34399; <span th:text="${loginEmployeeId}">1</span>&#65289;</span>
		</p>
	</div>

	<div th:if="${param.loginRequired}" class="warning">
		&#35531;&#20808;&#30331;&#20837;&#24460;&#21488;&#21729;&#24037;&#65292;&#25165;&#33021;&#26597;&#30475;&#27963;&#21205;&#24460;&#21488;&#36039;&#26009;&#12290;
	</div>

	<div class="login-panel">
		<div>
			<strong>&#28204;&#35430;&#24460;&#21488;&#21729;&#24037;</strong>
			<div>&#36984;&#25799;&#24460;&#21488;&#21729;&#24037;&#24460;&#65292;&#25165;&#33021;&#26597;&#30475;&#27963;&#21205;&#36039;&#26009;&#12289;&#35330;&#21934;&#32000;&#37636;&#33287;&#19979;&#26550;&#27963;&#21205;&#12290;</div>
		</div>

		<form class="login-form" th:action="@{/activity/admin/fakeLogin}" method="post">
			<select name="employeeId">
				<option value="" th:selected="${!isLoginEmployee}">&#26410;&#30331;&#20837;</option>
				<option th:each="employee : ${employeeListData}"
					th:value="${employee.employeeId}"
					th:selected="${employee.employeeId == loginEmployeeId}"
					th:text="${'Employee ' + employee.employeeId + ' - ' + (employee.empName ?: 'No name')}">
				</option>
			</select>
			<button type="submit">&#20999;&#25563;</button>
		</form>
	</div>

	<div th:unless="${isLoginEmployee}" class="warning">
		&#30446;&#21069;&#23578;&#26410;&#30331;&#20837;&#24460;&#21488;&#21729;&#24037;&#65292;&#19979;&#26041;&#21151;&#33021;&#21345;&#29255;&#26371;&#26283;&#26178;&#38577;&#34255;&#12290;
	</div>

	<div class="card-container" th:if="${isLoginEmployee}">
		<div class="card">
			<h2>&#27963;&#21205;&#31649;&#29702;</h2>
			<p>&#24460;&#21488;&#21482;&#21487;&#26597;&#30475;&#27963;&#21205;&#33287;&#19979;&#26550;&#27963;&#21205;&#65292;&#19981;&#25552;&#20379;&#26032;&#22686;&#25110;&#20462;&#25913;&#27963;&#21205;&#12290;</p>
			<a class="btn activity" th:href="@{/activity/listAllActivity}">&#36914;&#20837;&#27963;&#21205;&#31649;&#29702;</a>
		</div>

		<div class="card">
			<h2>&#27963;&#21205;&#39006;&#21029;&#31649;&#29702;</h2>
			<p>&#31649;&#29702;&#27963;&#21205;&#20998;&#39006;&#36039;&#26009;&#12290;</p>
			<a class="btn type" th:href="@{/activityType/listAllActivityType}">&#36914;&#20837;&#39006;&#21029;&#31649;&#29702;</a>
		</div>

		<div class="card">
			<h2>&#35330;&#21934;&#32000;&#37636;</h2>
			<p>&#26597;&#30475;&#27963;&#21205;&#22577;&#21517;&#33287;&#20184;&#27454;&#29376;&#24907;&#65292;&#25552;&#20379;&#36864;&#27454;&#33287;&#25765;&#27454;&#27969;&#31243;&#26597;&#35426;&#20358;&#28304;&#65307;&#22577;&#21517;&#23529;&#26680;&#30001;&#20027;&#36774;&#26371;&#21729;&#34389;&#29702;&#12290;</p>
			<a class="btn order" th:href="@{/activityOrder/listAllActivityOrder}">&#26597;&#30475;&#35330;&#21934;&#32000;&#37636;</a>
		</div>
	</div>
</body>
</html>
