<table class="table table-hover align-middle">
    <thead>
        <tr>
            <th>活動訂單編號</th>
            <th>活動名稱</th>
            <th>訂單總金額</th>
            <th>訂單狀態</th>
            <th>操作選項</th>
        </tr>
    </thead>
    <tbody>
        <!-- 跑迴圈印出所有訂單 -->
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}">10023</td>
            <td th:text="${order.activityId}">ACT999</td>
            <td th:text="${order.orderStatus}">COMPLETED</td>
            
            <td>
                <!-- 情況 1：符合條件，顯示「填寫評價」按鈕 -->
                <a th:if="${order.orderStatus == 'COMPLETED' && order.buyerRating == null}" 
                   th:href="@{/reviews/form(orderId=${order.orderId})}" 
                   class="btn btn-primary btn-sm">
                   ✍️ 填寫評價
                </a>

                <!-- 情況 2：已經評價過了，按鈕變成灰色唯讀狀態，提升體驗 -->
                <button th:if="${order.buyerRating != null}" 
                        class="btn btn-secondary btn-sm" disabled>
                   ✅ 已完成評價
                </button>

                <!-- 情況 3：訂單還沒完成（例如：審核中、未付款），不顯示任何評論按鈕 -->
                <span th:if="${order.orderStatus != 'COMPLETED' && order.buyerRating == null}" 
                      class="text-muted small">
                   尚未開放評價
                </span>
            </td>
        </tr>
    </tbody>
</table>
