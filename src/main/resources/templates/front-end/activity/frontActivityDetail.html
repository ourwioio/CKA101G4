<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>活動詳情</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
body {
	margin: 0;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	padding: 40px;
}

.card {
	max-width: 900px;
	margin: auto;
	background: white;
	border-radius: 16px;
	padding: 35px 45px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 1px solid #e2e8f0;
	padding-bottom: 20px;
	margin-bottom: 25px;
}

h1 {
	color: #0f172a;
	margin: 0;
}

.activity-image {
	width: 100%;
	max-height: 420px;
	object-fit: cover;
	border-radius: 12px;
	margin-bottom: 24px;
	background: #e2e8f0;
}

.member {
	color: #64748b;
	font-weight: bold;
}

.registration-status {
	display: inline-block;
	background: #e0f2fe;
	color: #075985;
	padding: 8px 14px;
	border-radius: 999px;
	font-weight: bold;
	margin-bottom: 18px;
}

.alert-error {
	background: #fee2e2;
	color: #b91c1c;
	padding: 14px 18px;
	border-radius: 8px;
	margin-bottom: 20px;
	font-weight: bold;
	border: 1px solid #fecaca;
}

.alert-warning {
	background: #fef3c7;
	color: #92400e;
	padding: 14px 18px;
	border-radius: 8px;
	margin-bottom: 20px;
	font-weight: bold;
	border: 1px solid #fde68a;
}

.info {
	margin: 18px 0;
	font-size: 17px;
	color: #334155;
}

.label {
	font-weight: bold;
	color: #0f172a;
}

.desc {
	margin-top: 20px;
	padding: 20px;
	background: #f8fafc;
	border-radius: 12px;
	line-height: 1.8;
	color: #475569;
}

.actions {
	margin-top: 30px;
	display: flex;
	justify-content: flex-end;
	gap: 12px;
}

.btn-back {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 12px 22px;
	border-radius: 8px;
	font-weight: bold;
}

.btn-order {
	background: #2563eb;
	color: white;
	text-decoration: none;
	padding: 12px 24px;
	border-radius: 8px;
	font-weight: bold;
}

.btn-order:hover {
	background: #1d4ed8;
}

.btn-report {
	background: #dc2626;
	color: white;
	text-decoration: none;
	border: 0;
	padding: 12px 24px;
	border-radius: 8px;
	font-weight: bold;
	cursor: pointer;
}

.btn-report:hover {
	background: #b91c1c;
}
</style>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>

	<div class="card">

		<img class="activity-image"
			th:src="@{/activity/front/image(id=${activityVO.activityId})}"
			alt="活動圖片">

		<div class="header">
			<h1 th:text="${activityVO.activityTitle}">活動名稱</h1>

			<div class="member">
				目前狀態： <span th:text="${loginMemberName}">未登入</span>
			</div>
		</div>

		<div th:if="${showLoginPrompt}" class="alert-warning">
			未登入只能瀏覽活動詳情，請先登入會員後再報名。
		</div>

		<div th:if="${fullMessage}" class="alert-error">
			<span th:text="${fullMessage}"></span>
		</div>

		<div th:if="${duplicateMessage}" class="alert-error">
			<span th:text="${duplicateMessage}"></span>
		</div>

		<div th:if="${ownerMessage}" class="alert-error">
			<span th:text="${ownerMessage}"></span>
		</div>

		<div th:if="${closedMessage}" class="alert-error">
			<span th:text="${closedMessage}"></span>
		</div>

		<div class="registration-status" th:text="${registrationStatusText}">報名中</div>

		<div class="info">
			<span class="label">主辦會員編號：</span> <span
				th:text="${activityVO.memberId}">1</span>
		</div>

		<div class="info">
			<span class="label">活動價格：</span> NT$ <span
				th:text="${activityVO.activityPrice}">0</span>
		</div>

		<div class="info">
			<span class="label">最低成團人數：</span> <span
				th:text="${activityVO.minParticipants}">1</span>
		</div>

		<div class="info">
			<span class="label">最高人數限制：</span> <span
				th:text="${activityVO.maxParticipants}">10</span>
		</div>

		<div class="info">
			<span class="label">目前報名人數：</span> <span
				th:text="${activityVO.attendeesCount}">0</span> / <span
				th:text="${activityVO.maxParticipants}">10</span>
		</div>

		<div class="info">
			<span class="label">報名開始：</span> <span
				th:text="${#temporals.format(activityVO.registrationStartTime, 'yyyy-MM-dd HH:mm')}"></span>
		</div>

		<div class="info">
			<span class="label">報名截止：</span> <span
				th:text="${#temporals.format(activityVO.registrationDeadline, 'yyyy-MM-dd HH:mm')}"></span>
		</div>

		<div class="info">
			<span class="label">活動開始時間：</span> <span
				th:text="${#temporals.format(activityVO.startTime, 'yyyy-MM-dd HH:mm')}"></span>
		</div>

		<div class="info">
			<span class="label">活動結束時間：</span> <span
				th:text="${#temporals.format(activityVO.endTime, 'yyyy-MM-dd HH:mm')}"></span>
		</div>

		<div class="desc" th:text="${activityVO.activityDescription}">
			活動描述</div>

		<div class="actions">
			<a class="btn-report"
				th:href="${isLoginMember} ? @{/activity/report(activityId=${activityVO.activityId})} : @{/member/login}"
				th:title="${isLoginMember} ? '&#27298;&#33289;&#27492;&#27963;&#21205;' : '&#35531;&#20808;&#30331;&#20837;&#24460;&#20877;&#27298;&#33289;&#27963;&#21205;'">&#27298;&#33289;&#27963;&#21205;</a>
			<a th:href="${backUrl}" class="btn-back" th:text="${backText}">返回列表</a> <a
				th:if="${showOrderButton}"
				th:href="@{/activity/front/order(activityId=${activityVO.activityId})}"
				class="btn-order"> 立即報名 </a>
		</div>

	</div>

</body>
</html>
