<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改活動</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
body {
	background-color: #f8fafc;
	color: #1e293b;
	font-family: 'Inter', 'PingFang TC', sans-serif;
	margin: 0;
	padding: 40px;
}

.header-container {
	max-width: 900px;
	margin: 0 auto 20px auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 2px solid #e2e8f0;
	padding-bottom: 20px;
}

.header-title {
	font-size: 1.8rem;
	font-weight: bold;
	color: #0f172a;
}

.btn-secondary {
	background: #fff;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 10px 20px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}

.btn-secondary:hover {
	background: #f1f5f9;
}

.form-card {
	background: #fff;
	max-width: 900px;
	margin: auto;
	border-radius: 12px;
	padding: 30px 40px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, .1);
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr;
	gap: 20px;
}

.col-span-2 {
	grid-column: span 2;
}

.col-span-3 {
	grid-column: span 3;
}

.form-group {
	margin-bottom: 5px;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	font-weight: bold;
}

.required {
	color: red;
}

.form-control {
	width: 100%;
	padding: 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	box-sizing: border-box;
	font-size: 15px;
}

.form-control:focus {
	outline: none;
	border-color: #10b981;
	box-shadow: 0 0 0 3px rgba(16, 185, 129, .15);
}

textarea.form-control {
	resize: vertical;
	min-height: 120px;
}

.error {
	color: #dc2626;
	font-size: 13px;
	margin-top: 5px;
}

.error-input {
	border: 2px solid #dc2626 !important;
	background: #fef2f2;
}

.form-actions {
	display: flex;
	justify-content: flex-end;
	gap: 12px;
	margin-top: 30px;
	padding-top: 20px;
	border-top: 1px solid #e2e8f0;
}

.btn-submit {
	background: #10b981;
	color: white;
	border: none;
	padding: 12px 24px;
	border-radius: 8px;
	font-weight: bold;
	cursor: pointer;
}

.btn-submit:hover {
	background: #059669;
}

.btn-cancel {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 12px 24px;
	border-radius: 8px;
	text-decoration: none;
}

.btn-cancel:hover {
	background: #f1f5f9;
}
</style>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
</head>

<body>

	<div class="header-container">
		<div class="header-title">✏️ 修改活動內容</div>
		<a th:href="@{/admin/activity/listAllActivity}" class="btn-secondary">🔙
			返回列表</a>
	</div>

	<div class="form-card">

		<form th:action="@{/admin/activity/update}" th:object="${activityVO}"
			method="post">

			<input type="hidden" th:field="*{activityId}"> <input
				type="hidden" th:field="*{attendeesCount}"> <input
				type="hidden" th:field="*{createdAt}">

			<div class="form-grid">

				<!-- 活動標題 -->
				<div class="form-group col-span-2">

					<label> 活動標題 <span class="required">*</span>
					</label> <input type="text" class="form-control"
						th:field="*{activityTitle}"
						th:classappend="${#fields.hasErrors('activityTitle')} ? ' error-input'"
						required>

					<div class="error" th:if="${#fields.hasErrors('activityTitle')}"
						th:errors="*{activityTitle}"></div>

				</div>

				<!-- 活動類型 -->
				<div class="form-group">

					<label> 活動類型 <span class="required">*</span>
					</label> <select class="form-control" th:field="*{activityTypeId}"
						th:classappend="${#fields.hasErrors('activityTypeId')} ? ' error-input'"
						required>

						<option value="">請選擇類型</option>

						<option th:each="type:${typeListData}"
							th:value="${type.activityTypeId}"
							th:text="${type.activityTypeName}"></option>

					</select>

					<div class="error" th:if="${#fields.hasErrors('activityTypeId')}"
						th:errors="*{activityTypeId}"></div>

				</div>

				<!-- 主辦會員 -->
				<div class="form-group">

					<label> 主辦會員ID <span class="required">*</span>
					</label> <input type="number" class="form-control" th:field="*{memberId}"
						th:classappend="${#fields.hasErrors('memberId')} ? ' error-input'"
						required>

					<div class="error" th:if="${#fields.hasErrors('memberId')}"
						th:errors="*{memberId}"></div>

				</div>

				<!-- 活動費用 -->
				<div class="form-group">

					<label>活動費用($)</label> <input type="number" class="form-control"
						th:field="*{activityPrice}" min="0"
						th:classappend="${#fields.hasErrors('activityPrice')} ? ' error-input'">

					<div class="error" th:if="${#fields.hasErrors('activityPrice')}"
						th:errors="*{activityPrice}"></div>

				</div>

				<!-- 活動狀態 -->
				<div class="form-group">

					<label>活動狀態</label> <select class="form-control"
						th:field="*{activityStatus}">

						<option value="0">正常舉行</option>
						<option value="1">延期</option>
						<option value="2">取消</option>

					</select>

				</div>
				<!-- 最低成團人數 -->
				<div class="form-group">

					<label>最低成團人數</label> <input type="number" class="form-control"
						th:field="*{minParticipants}" min="1"
						th:classappend="${#fields.hasErrors('minParticipants')} ? ' error-input'">

					<div class="error" th:if="${#fields.hasErrors('minParticipants')}"
						th:errors="*{minParticipants}"></div>

				</div>

				<!-- 最高人數 -->
				<div class="form-group">

					<label>最高人數限制</label> <input type="number" class="form-control"
						th:field="*{maxParticipants}" min="1"
						th:classappend="${#fields.hasErrors('maxParticipants')} ? ' error-input'">

					<div class="error" th:if="${#fields.hasErrors('maxParticipants')}"
						th:errors="*{maxParticipants}"></div>

				</div>

				<div></div>

				<!-- 報名開始 -->
				<div class="form-group">

					<label>報名開始時間</label> <input type="datetime-local"
						class="form-control" th:field="*{registrationStartTime}"
						th:classappend="${#fields.hasErrors('registrationStartTime')} ? ' error-input'">

					<div class="error"
						th:if="${#fields.hasErrors('registrationStartTime')}"
						th:errors="*{registrationStartTime}"></div>

				</div>

				<!-- 報名截止 -->
				<div class="form-group">

					<label>報名截止時間</label> <input type="datetime-local"
						class="form-control" th:field="*{registrationDeadline}"
						th:classappend="${#fields.hasErrors('registrationDeadline')} ? ' error-input'">

					<div class="error"
						th:if="${#fields.hasErrors('registrationDeadline')}"
						th:errors="*{registrationDeadline}"></div>

				</div>

				<!-- 活動結束 -->
				<div class="form-group">

					<label> 活動結束時間 <span class="required">*</span>
					</label> <input type="datetime-local" class="form-control"
						th:field="*{endTime}"
						th:classappend="${#fields.hasErrors('endTime')} ? ' error-input'"
						required>

					<div class="error" th:if="${#fields.hasErrors('endTime')}"
						th:errors="*{endTime}"></div>

				</div>

				<!-- 活動描述 -->
				<div class="form-group col-span-3">

					<label>活動描述</label>

					<textarea class="form-control" th:field="*{activityDescription}"
						th:classappend="${#fields.hasErrors('activityDescription')} ? ' error-input'">
        </textarea>

					<div class="error"
						th:if="${#fields.hasErrors('activityDescription')}"
						th:errors="*{activityDescription}"></div>

				</div>

			</div>

			<div class="form-actions">

				<a th:href="@{/admin/activity/listAllActivity}" class="btn-cancel"> 取消
				</a>

				<button type="submit" class="btn-submit">💾 儲存修改</button>

			</div>

		</form>

	</div>

</body>
</html>
