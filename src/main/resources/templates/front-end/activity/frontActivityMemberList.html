<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報名審核</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/activity/activity-navbar-offset.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root {
    --color-bg: #F7F3EC;
    --color-surface: #FFFFFF;
    --color-surface-soft: #FFFDF8;
    --color-ink: #17140F;
    --color-ink-soft: #726A5F;
    --color-border: #ECE4D6;
    --color-yellow: #FFE59A;
    --color-yellow-deep: #FFC94D;
    --color-pink: #FFB5C1;
    --color-green: #B7E1D1;
    --color-blue: #A9D3FF;
    --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
    --font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
    --radius-lg: 26px;
    --radius-md: 16px;
    --radius-full: 999px;
    --shadow-sm: 0 3px 10px rgba(23, 20, 15, .06);
    --shadow-md: 0 14px 34px rgba(23, 20, 15, .10);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 0;
    background: var(--color-bg);
    color: var(--color-ink);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

.container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 116px 20px 60px;
}

.header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 24px;
}

.header h1 {
    position: relative;
    margin: 0 0 6px;
    padding-left: 18px;
    color: var(--color-ink);
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
}

.header h1::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 9px;
    height: 9px;
    transform: translateY(-50%);
    border-radius: 50%;
    background: var(--color-yellow-deep);
}

.sub {
    margin-top: 4px;
    color: var(--color-ink-soft);
    font-size: 13.5px;
    font-weight: 700;
}

.btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-full);
    background: var(--color-surface);
    box-shadow: var(--shadow-sm);
    color: var(--color-ink);
    font-size: 13.5px;
    font-weight: 800;
    white-space: nowrap;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}

.btn-back:hover {
    transform: translateY(-2px);
    border-color: var(--color-ink);
    box-shadow: var(--shadow-md);
}

.notice {
    margin-bottom: 16px;
    padding: 12px 16px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-ink);
    font-size: 13.5px;
    font-weight: 700;
}

.success { background: var(--color-green); }
.error { background: #FFD9DF; }

.group-status {
    margin-bottom: 16px;
    padding: 16px 18px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    box-shadow: var(--shadow-sm);
    color: var(--color-ink-soft);
    font-size: 13.5px;
    font-weight: 700;
}

.group-status strong { color: var(--color-ink); }
.group-ok { color: #39775F; }
.group-wait { color: #9A6A00; }
.group-full { color: #C8324C; }

.table-card {
    overflow-x: auto;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-surface);
    box-shadow: var(--shadow-sm);
    scrollbar-color: var(--color-border) transparent;
}

table {
    width: 100%;
    min-width: 1080px;
    border-collapse: collapse;
}

th {
    padding: 16px 14px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-surface-soft);
    color: var(--color-ink);
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
}

td {
    padding: 18px 14px;
    border-bottom: 1px dashed var(--color-border);
    color: var(--color-ink-soft);
    font-size: 13.5px;
    font-weight: 600;
    text-align: center;
    vertical-align: top;
}

tbody tr { transition: background .15s ease, opacity .15s ease; }
tbody tr:hover { background: var(--color-surface-soft); }
tbody tr:last-child td { border-bottom: 0; }
td:nth-child(7) { text-align: left; }

.status {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 13px;
    border-radius: var(--radius-full);
    color: var(--color-ink);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .3px;
    white-space: nowrap;
}

.finish { background: var(--color-green); }
.cancel { background: #FFD9DF; }
.refund { background: var(--color-yellow); }
.pending { background: var(--color-blue); }
.paying { background: #D9D1FF; }

.countdown {
    display: block;
    width: 190px;
    margin: 8px auto 0;
    color: var(--color-ink-soft);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
}

.countdown.expired { color: #C8324C; }
.row-updating { opacity: .55; }

.action {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

.action form { margin: 0; }

.btn-approve,
.btn-reject {
    min-width: 64px;
    padding: 8px 15px;
    border: 0;
    border-radius: var(--radius-full);
    box-shadow: var(--shadow-sm);
    color: var(--color-ink);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.btn-approve { background: var(--color-green); }
.btn-reject { background: var(--color-pink); }

.btn-approve:hover,
.btn-reject:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    filter: saturate(1.08);
}

.btn-approve:disabled,
.btn-reject:disabled {
    transform: none;
    background: var(--color-border);
    box-shadow: none;
    color: var(--color-ink-soft);
    cursor: not-allowed;
}

.empty {
    padding: 54px 24px;
    color: var(--color-ink-soft);
    font-size: 15px;
    font-weight: 800;
    text-align: center;
}

@media (max-width: 760px) {
    .container { padding: 92px 16px 40px; }
    .header { align-items: stretch; flex-direction: column; }
    .header h1 { font-size: 25px; }
    .btn-back { width: 100%; }
    .table-card { border-radius: 20px; }
}
</style>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>

<div class="container"
    th:attr="data-activity-id=${activityVO.activityId},
             data-order-count=${orderCount},
             data-latest-order-id=${latestOrderId},
             data-live-activity-id=${activityVO.activityId},
             data-live-activity-status=${activityVO.activityStatus},
             data-live-attendees-count=${activityVO.attendeesCount}">

    <div class="header">
        <div>
            <h1>報名審核</h1>
            <div class="sub">
                活動：
                <span th:text="${activityVO.activityTitle}"></span>
            </div>
        </div>

        <a th:href="@{/activity/front/myHostActivity}" class="btn-back">
            我舉辦的活動
        </a>
    </div>

    <div th:if="${param.approveSuccess}" class="notice success">已同意報名，訂單已改為待付款。</div>
    <div th:if="${param.rejectSuccess}" class="notice success">已拒絕報名申請。</div>
    <div th:if="${param.approveFailed}" class="notice error">同意失敗，名額已满。</div>
    <div th:if="${param.approveExpired}" class="notice error">審核時間已逾時，無法再同意報名。</div>

    <div class="group-status">
        目前已付款人數：
        <strong th:text="${activityVO.attendeesCount ?: 0}">0</strong>
        /
        <strong th:text="${activityVO.maxParticipants}">0</strong>
        <span th:if="${hasReachedMinimum}" class="group-ok">已達成成團人數</span>
        <span th:unless="${hasReachedMinimum}" class="group-wait">
            尚未成團，至少需要
            <strong th:text="${activityVO.minParticipants}">1</strong>
            人
        </span>
        <span th:if="${isFull}" class="group-full">名額已满，待付款訂單將無法付款。</span>
    </div>

    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>訂單編號</th>
                    <th>會員ID</th>
                    <th>報名人數</th>
                    <th>總金額</th>
                    <th>付款方式</th>
                    <th>訂單狀態</th>
                    <th>報名備註</th>
                    <th>審核操作</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(orderListData)}">
                    <td colspan="8" class="empty">
                        目前沒有會員報名資料
                    </td>
                </tr>

                <tr th:each="order : ${orderListData}"
                    th:attr="data-order-id=${order.activityOrderId},data-order-status=${order.orderStatus}">
                    <td th:text="${order.activityOrderId}"></td>
                    <td th:text="${order.buyerMemberId}"></td>
                    <td th:text="${order.bookingCount}"></td>

                    <td>
                        NT$ <span th:text="${order.totalAmount}"></span>
                    </td>

                    <td>
                        <span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
                        <span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
                    </td>

                    <td>
                        <span th:if="${order.orderStatus == 0}" class="status finish">已付款</span>
                        <span th:if="${order.orderStatus == 1}" class="status cancel">已取消</span>
                        <span th:if="${order.orderStatus == 2}" class="status pending">待主辦審核</span>
                        <span th:if="${order.orderStatus == 3}" class="status paying">待付款</span>
                        <span th:if="${order.orderStatus == 4}" class="status finish">已完成</span>
                        <div class="countdown"
                            th:if="${order.orderStatus == 2}"
                            th:attr="data-deadline=${#temporals.format(activityVO.registrationDeadline, 'yyyy-MM-dd''T''HH:mm:ss')}">
                            審核剩餘：<span>計算中</span>
                        </div>
                        <div class="countdown"
                            th:if="${order.orderStatus == 3 and order.approvedAt != null}"
                            th:attr="data-start=${#temporals.format(order.approvedAt, 'yyyy-MM-dd''T''HH:mm:ss')},data-seconds=60">
                            付款剩餘：<span>計算中</span>
                        </div>
                    </td>
                    <td th:text="${order.orderNote ?: '-'}"></td>
                    <td>
                        <div class="action" th:if="${order.orderStatus == 2}">
                            <form th:action="@{/activity/front/memberList/approve}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-approve" type="submit">同意</button>
                            </form>

                            <form th:action="@{/activity/front/memberList/reject}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-reject" type="submit">拒絕</button>
                            </form>
                        </div>
                        <span th:unless="${order.orderStatus == 2}">-</span>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

<div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>

<script th:inline="javascript">
    function formatRemaining(milliseconds) {
        if (milliseconds <= 0) {
            return '\u5df2\u903e\u6642';
        }
        const totalSeconds = Math.floor(milliseconds / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (days > 0) {
            return days + '\u5929 ' + hours + '\u5c0f\u6642 ' + minutes + '\u5206';
        }
        if (hours > 0) {
            return hours + '\u5c0f\u6642 ' + minutes + '\u5206 ' + seconds + '\u79d2';
        }
        return minutes + '\u5206 ' + seconds + '\u79d2';
    }

    function updateCountdowns() {
        document.querySelectorAll('.countdown').forEach(function(item) {
            let deadline = null;
            if (item.dataset.deadline) {
                deadline = new Date(item.dataset.deadline).getTime();
            } else if (item.dataset.start && item.dataset.seconds) {
                deadline = new Date(item.dataset.start).getTime() + Number(item.dataset.seconds) * 1000;
            }
            if (!deadline || Number.isNaN(deadline)) {
                return;
            }
            const remaining = deadline - Date.now();
            const text = item.querySelector('span');
            if (text) {
                text.textContent = formatRemaining(remaining);
            }
            item.classList.toggle('expired', remaining <= 0);
            if (item.dataset.deadline) {
                const row = item.closest('[data-order-id]');
                const approveButton = row ? row.querySelector('.btn-approve') : null;
                if (approveButton && remaining <= 0) {
                    approveButton.disabled = true;
                    approveButton.textContent = '已逾時';
                }
            }
        });
    }

    updateCountdowns();
    setInterval(updateCountdowns, 1000);

    const orderStatusUrl = /*[[@{/activity/front/order/status}]]*/ '/activity/front/order/status';
    const activitySummaryUrl = /*[[@{/activity/front/memberList/summary}]]*/ '/activity/front/memberList/summary';
    const approveAjaxUrl = /*[[@{/activity/front/memberList/approve/ajax}]]*/ '/activity/front/memberList/approve/ajax';
    const rejectAjaxUrl = /*[[@{/activity/front/memberList/reject/ajax}]]*/ '/activity/front/memberList/reject/ajax';
    let isPollingOrderStatus = false;

    function bindReviewForms() {
        document.querySelectorAll('.action form').forEach(function(form) {
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const row = form.closest('[data-order-id]');
                const buttons = form.closest('.action').querySelectorAll('button');
                buttons.forEach(function(button) {
                    button.disabled = true;
                });
                if (row) {
                    row.classList.add('row-updating');
                }

                const ajaxUrl = form.action.indexOf('/approve') !== -1 ? approveAjaxUrl : rejectAjaxUrl;
                fetch(ajaxUrl, {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Accept': 'application/json'
                    },
                    body: new FormData(form)
                })
                    .then(function(response) {
                        return response.ok ? response.json() : { success: false };
                    })
                    .then(function(result) {
                        if (!result.success) {
                            if (result.message === 'reviewExpired') {
                                const url = new URL(window.location.href);
                                url.searchParams.set('approveExpired', 'true');
                                window.location.href = url.toString();
                                return;
                            }
                            window.location.reload();
                            return;
                        }
                        window.location.reload();
                    })
                    .catch(function() {
                        window.location.reload();
                    });
            });
        });
    }

    function pollOrderStatuses() {
        const rows = Array.from(document.querySelectorAll('[data-order-id][data-order-status]'));
        if (rows.length === 0 || isPollingOrderStatus) {
            return;
        }
        isPollingOrderStatus = true;
        const orderIds = rows.map(function(row) {
            return row.dataset.orderId;
        }).join(',');

        fetch(orderStatusUrl + '?orderIds=' + encodeURIComponent(orderIds) + '&_=' + Date.now(), {
            cache: 'no-store',
            headers: { 'Accept': 'application/json' }
        })
            .then(function(response) {
                return response.ok ? response.json() : {};
            })
            .then(function(data) {
                const hasChanged = rows.some(function(row) {
                    const current = data[row.dataset.orderId];
                    return current && String(current.orderStatus) !== String(row.dataset.orderStatus);
                });
                if (hasChanged) {
                    window.location.reload();
                }
            })
            .catch(function() {})
            .finally(function() {
                isPollingOrderStatus = false;
            });
    }

    function pollActivitySummary() {
        const container = document.querySelector('[data-activity-id][data-order-count][data-latest-order-id]');
        if (!container) {
            return;
        }

        fetch(activitySummaryUrl + '?activityId=' + encodeURIComponent(container.dataset.activityId) + '&_=' + Date.now(), {
            cache: 'no-store',
            headers: { 'Accept': 'application/json' }
        })
            .then(function(response) {
                return response.ok ? response.json() : {};
            })
            .then(function(summary) {
                if (!summary.success) {
                    return;
                }
                const countChanged = String(summary.orderCount) !== String(container.dataset.orderCount);
                const latestChanged = String(summary.latestOrderId) !== String(container.dataset.latestOrderId);
                if (countChanged || latestChanged) {
                    window.location.reload();
                }
            })
            .catch(function() {});
    }

    pollOrderStatuses();
    pollActivitySummary();
    setInterval(pollOrderStatuses, 1000);
    setInterval(pollActivitySummary, 1000);
    bindReviewForms();
</script>

<script th:src="@{/js/front-end/activity/activityStatusPolling.js}"></script>
</body>
</html>
