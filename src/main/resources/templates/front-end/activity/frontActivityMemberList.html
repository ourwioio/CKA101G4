<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>報名名單</title>

<style>
body{
    margin:0;
    padding:40px;
    background:#f8fafc;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    margin:0;
    color:#0f172a;
}

.sub{
    color:#64748b;
    margin-top:8px;
    font-weight:bold;
}

.btn-back{
    background:#64748b;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-weight:bold;
}

.table-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#e2e8f0;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #e5e7eb;
}

tr:hover{
    background:#f8fafc;
}

.status{
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.finish{
    background:#dcfce7;
    color:#166534;
}

.cancel{
    background:#fee2e2;
    color:#991b1b;
}

.refund{
    background:#fef3c7;
    color:#92400e;
}

.pending{
    background:#dbeafe;
    color:#1d4ed8;
}

.paying{
    background:#e0e7ff;
    color:#3730a3;
}

.action{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.btn-approve,
.btn-reject{
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-approve{
    background:#16a34a;
}

.btn-reject{
    background:#dc2626;
}

.notice{
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:16px;
    font-weight:bold;
}

.success{
    background:#dcfce7;
    color:#166534;
    border:1px solid #bbf7d0;
}

.error{
    background:#fee2e2;
    color:#991b1b;
    border:1px solid #fecaca;
}

.group-status{
    background:white;
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
    color:#334155;
    font-weight:bold;
}

.group-status strong{
    color:#0f172a;
}

.group-ok{
    color:#166534;
}

.group-wait{
    color:#92400e;
}

.group-full{
    color:#991b1b;
}

.empty{
    text-align:center;
    padding:50px;
    color:#94a3b8;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h1>👥 報名名單</h1>
            <div class="sub">
                活動：
                <span th:text="${activityVO.activityTitle}"></span>
            </div>
        </div>

        <a th:href="@{/activity/front/myHostActivity}" class="btn-back">
            🔙 返回我舉辦的活動
        </a>
    </div>

    <div th:if="${param.approveSuccess}" class="notice success">已通過申請，等待會員付款。</div>
    <div th:if="${param.rejectSuccess}" class="notice success">已退回報名申請。</div>
    <div th:if="${param.approveFailed}" class="notice error">通過失敗：活動可能已額滿、下架或不開放報名。</div>

    <div class="group-status">
        目前已付款人數：
        <strong th:text="${activityVO.attendeesCount ?: 0}">0</strong>
        /
        <strong th:text="${activityVO.maxParticipants}">0</strong>
        <span th:if="${hasReachedMinimum}" class="group-ok">已達成團人數</span>
        <span th:unless="${hasReachedMinimum}" class="group-wait">
            尚未成團，最低需要
            <strong th:text="${activityVO.minParticipants}">1</strong>
            人
        </span>
        <span th:if="${isFull}" class="group-full">，活動已額滿，剩餘待審核申請會自動退回</span>
    </div>

    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>訂單編號</th>
                    <th>會員ID</th>
                    <th>報名人數</th>
                    <th>總金額</th>
                    <th>付款方式</th>
                    <th>訂單狀態</th>
                    <th>申請備註</th>
                    <th>審核操作</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(orderListData)}">
                    <td colspan="8" class="empty">
                        目前尚無會員報名此活動
                    </td>
                </tr>

                <tr th:each="order : ${orderListData}">
                    <td th:text="${order.activityOrderId}"></td>
                    <td th:text="${order.buyerMemberId}"></td>
                    <td th:text="${order.bookingCount}"></td>

                    <td>
                        NT$ <span th:text="${order.totalAmount}"></span>
                    </td>

                    <td>
                        <span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
                        <span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
                    </td>

                    <td>
                        <span th:if="${order.orderStatus == 0}" class="status finish">
                            已完成
                        </span>

                        <span th:if="${order.orderStatus == 1}" class="status cancel">
                            已取消
                        </span>

                        <span th:if="${order.orderStatus == 2}" class="status refund">
                            退款申請中
                        </span>

                        <span th:if="${order.orderStatus == 3}" class="status pending">
                            待主辦審核
                        </span>

                        <span th:if="${order.orderStatus == 4}" class="status paying">
                            待付款
                        </span>
                    </td>
                    <td th:text="${order.orderNote ?: '-'}"></td>
                    <td>
                        <div class="action" th:if="${order.orderStatus == 3}">
                            <form th:action="@{/activity/front/memberList/approve}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-approve" type="submit">通過</button>
                            </form>

                            <form th:action="@{/activity/front/memberList/reject}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-reject" type="submit">退回</button>
                            </form>
                        </div>
                        <span th:unless="${order.orderStatus == 3}">-</span>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

</body>
</html>
