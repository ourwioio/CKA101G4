<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>報名名單</title>

<style>
body{
    margin:0;
    padding:40px;
    background:#f8fafc;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    margin:0;
    color:#0f172a;
}

.sub{
    color:#64748b;
    margin-top:8px;
    font-weight:bold;
}

.btn-back{
    background:#64748b;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-weight:bold;
}

.table-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#e2e8f0;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #e5e7eb;
}

tr:hover{
    background:#f8fafc;
}

.status{
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.finish{
    background:#dcfce7;
    color:#166534;
}

.cancel{
    background:#fee2e2;
    color:#991b1b;
}

.refund{
    background:#fef3c7;
    color:#92400e;
}

.empty{
    text-align:center;
    padding:50px;
    color:#94a3b8;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h1>👥 報名名單</h1>
            <div class="sub">
                活動：
                <span th:text="${activityVO.activityTitle}"></span>
            </div>
        </div>

        <a th:href="@{/activity/front/myHostActivity}" class="btn-back">
            🔙 返回我舉辦的活動
        </a>
    </div>

    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>訂單編號</th>
                    <th>會員ID</th>
                    <th>報名人數</th>
                    <th>總金額</th>
                    <th>付款方式</th>
                    <th>訂單狀態</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(orderListData)}">
                    <td colspan="6" class="empty">
                        目前尚無會員報名此活動
                    </td>
                </tr>

                <tr th:each="order : ${orderListData}">
                    <td th:text="${order.activityOrderId}"></td>
                    <td th:text="${order.buyerMemberId}"></td>
                    <td th:text="${order.bookingCount}"></td>

                    <td>
                        NT$ <span th:text="${order.totalAmount}"></span>
                    </td>

                    <td>
                        <span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
                        <span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
                    </td>

                    <td>
                        <span th:if="${order.orderStatus == 0}" class="status finish">
                            已完成
                        </span>

                        <span th:if="${order.orderStatus == 1}" class="status cancel">
                            已取消
                        </span>

                        <span th:if="${order.orderStatus == 2}" class="status refund">
                            已退款
                        </span>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

</body>
</html>
