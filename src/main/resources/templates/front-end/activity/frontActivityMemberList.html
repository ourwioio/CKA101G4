<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>&#22577;&#21517;&#23529;&#26680;</title>

<style>
body{
    margin:0;
    padding:40px;
    background:#f8fafc;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    margin:0;
    color:#0f172a;
}

.sub{
    color:#64748b;
    margin-top:8px;
    font-weight:bold;
}

.btn-back{
    background:#64748b;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-weight:bold;
}

.table-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#e2e8f0;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #e5e7eb;
}

tr:hover{
    background:#f8fafc;
}

.status{
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.finish{
    background:#dcfce7;
    color:#166534;
}

.cancel{
    background:#fee2e2;
    color:#991b1b;
}

.refund{
    background:#fef3c7;
    color:#92400e;
}

.pending{
    background:#dbeafe;
    color:#1d4ed8;
}

.paying{
    background:#e0e7ff;
    color:#3730a3;
}

.action{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

                                <button class="btn-approve" type="submit">&#21516;&#24847;</button>
                                <button class="btn-reject" type="submit">&#25298;&#32085;</button>
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

                                <button class="btn-approve" type="submit">&#21516;&#24847;</button>
    background:#16a34a;
}

                                <button class="btn-reject" type="submit">&#25298;&#32085;</button>
    background:#dc2626;
}

.notice{
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:16px;
    font-weight:bold;
}

.success{
    background:#dcfce7;
    color:#166534;
    border:1px solid #bbf7d0;
}

.error{
    background:#fee2e2;
    color:#991b1b;
    border:1px solid #fecaca;
}

.group-status{
    background:white;
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
    color:#334155;
    font-weight:bold;
}

.group-status strong{
    color:#0f172a;
}

.group-ok{
    color:#166534;
}

.group-wait{
    color:#92400e;
}

.group-full{
    color:#991b1b;
}

.empty{
    text-align:center;
    padding:50px;
    color:#94a3b8;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h1>&#22577;&#21517;&#23529;&#26680;</h1>
            <div class="sub">
                &#27963;&#21205;&#65306;
                <span th:text="${activityVO.activityTitle}"></span>
            </div>
        </div>

        <a th:href="@{/activity/front/myHostActivity}" class="btn-back">
            &#36820;&#22238;&#25105;&#33289;&#36774;&#30340;&#27963;&#21205;
        </a>
    </div>

    <div th:if="${param.approveSuccess}" class="notice success">&#24050;&#21516;&#24847;&#22577;&#21517;&#65292;&#35330;&#21934;&#24050;&#25913;&#28858;&#24453;&#20184;&#27454;&#12290;</div>
    <div th:if="${param.rejectSuccess}" class="notice success">&#24050;&#25298;&#32085;&#22577;&#21517;&#30003;&#35531;&#12290;</div>
    <div th:if="${param.approveFailed}" class="notice error">&#21516;&#24847;&#22833;&#25943;&#65292;&#21517;&#38989;&#24050;&#28385;&#12290;</div>

    <div class="group-status">
        &#30446;&#21069;&#24050;&#20184;&#27454;&#20154;&#25976;&#65306;
        <strong th:text="${activityVO.attendeesCount ?: 0}">0</strong>
        /
        <strong th:text="${activityVO.maxParticipants}">0</strong>
        <span th:if="${hasReachedMinimum}" class="group-ok">&#24050;&#36948;&#25104;&#25104;&#22296;&#20154;&#25976;</span>
        <span th:unless="${hasReachedMinimum}" class="group-wait">
            &#23578;&#26410;&#25104;&#22296;&#65292;&#33267;&#23569;&#38656;&#35201;
            <strong th:text="${activityVO.minParticipants}">1</strong>
            &#20154;
        </span>
        <span th:if="${isFull}" class="group-full">&#21517;&#38989;&#24050;&#28385;&#65292;&#24453;&#20184;&#27454;&#35330;&#21934;&#23559;&#28961;&#27861;&#20184;&#27454;&#12290;</span>
    </div>

    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>&#35330;&#21934;&#32232;&#34399;</th>
                    <th>&#26371;&#21729;ID</th>
                    <th>&#22577;&#21517;&#20154;&#25976;</th>
                    <th>&#32317;&#37329;&#38989;</th>
                    <th>&#20184;&#27454;&#26041;&#24335;</th>
                    <th>&#35330;&#21934;&#29376;&#24907;</th>
                    <th>&#22577;&#21517;&#20633;&#35387;</th>
                    <th>&#23529;&#26680;&#25805;&#20316;</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(orderListData)}">
                    <td colspan="8" class="empty">
                        &#30446;&#21069;&#27794;&#26377;&#26371;&#21729;&#22577;&#21517;&#36039;&#26009;
                    </td>
                </tr>

                <tr th:each="order : ${orderListData}">
                    <td th:text="${order.activityOrderId}"></td>
                    <td th:text="${order.buyerMemberId}"></td>
                    <td th:text="${order.bookingCount}"></td>

                    <td>
                        NT$ <span th:text="${order.totalAmount}"></span>
                    </td>

                    <td>
                        <span th:if="${order.activityPaymentMethod == 0}">&#20449;&#29992;&#21345;</span>
                        <span th:if="${order.activityPaymentMethod == 1}">ATM&#36681;&#24115;</span>
                    </td>

                    <td>
                        <span th:if="${order.orderStatus == 0}" class="status finish">&#24050;&#20184;&#27454;</span>
                        <span th:if="${order.orderStatus == 1}" class="status cancel">&#24050;&#21462;&#28040;</span>
                        <span th:if="${order.orderStatus == 2}" class="status pending">&#24453;&#20027;&#36774;&#23529;&#26680;</span>
                        <span th:if="${order.orderStatus == 3}" class="status paying">&#24453;&#20184;&#27454;</span>
                        <span th:if="${order.orderStatus == 4}" class="status finish">&#24050;&#23436;&#25104;</span>
                    </td>
                    <td th:text="${order.orderNote ?: '-'}"></td>
                    <td>
                        <div class="action" th:if="${order.orderStatus == 2}">
                            <form th:action="@{/activity/front/memberList/approve}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-approve" type="submit">&#21516;&#24847;</button>
                            </form>

                            <form th:action="@{/activity/front/memberList/reject}" method="post">
                                <input type="hidden" name="activityOrderId"
                                    th:value="${order.activityOrderId}">
                                <button class="btn-reject" type="submit">&#25298;&#32085;</button>
                            </form>
                        </div>
                        <span th:unless="${order.orderStatus == 2}">-</span>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

<script th:if="${shouldAutoRefreshOrder}">
    setTimeout(function() {
        window.location.reload();
    }, 1000);
</script>

</body>
</html>
