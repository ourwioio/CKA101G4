<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新增活動訂單</title>

<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.header {
	max-width: 900px;
	margin: auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 25px;
}

.header h2 {
	color: #0f172a;
}

.btn-back {
	background: white;
	border: 1px solid #cbd5e1;
	color: #475569;
	text-decoration: none;
	padding: 10px 20px;
	border-radius: 8px;
}

.btn-back:hover {
	background: #f1f5f9;
}

.card {
	background: white;
	max-width: 900px;
	margin: auto;
	border-radius: 12px;
	padding: 35px;
	box-shadow: 0 4px 8px rgba(0, 0, 0, .08);
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	font-weight: bold;
}

.required {
	color: red;
}

.form-control {
	width: 100%;
	padding: 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	box-sizing: border-box;
	font-size: 15px;
}

.form-control:focus {
	outline: none;
	border-color: #3b82f6;
	box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
}

.error {
	color: red;
	font-size: 14px;
	margin-top: 5px;
	font-weight: bold;
}

.input-error {
	border: 2px solid red !important;
}

.actions {
	margin-top: 30px;
	display: flex;
	justify-content: flex-end;
	gap: 10px;
}

.btn-save {
	background: #3b82f6;
	color: white;
	border: none;
	padding: 12px 24px;
	border-radius: 8px;
	cursor: pointer;
}

.btn-save:hover {
	background: #2563eb;
}

.btn-cancel {
	background: white;
	border: 1px solid #cbd5e1;
	padding: 12px 24px;
	border-radius: 8px;
	text-decoration: none;
	color: #475569;
}

.btn-cancel:hover {
	background: #f1f5f9;
}
</style>

</head>

<body>

	<div class="header">

		<h2>➕ 新增活動訂單</h2>

		<a th:href="@{/activityOrder/listAllActivityOrder}" class="btn-back">
			🔙 返回列表 </a>

	</div>

	<div class="card">

		<form th:action="@{/activityOrder/insert}"
			th:object="${activityOrderVO}" method="post">

			<div class="form-grid">

				<!-- 活動 -->

				<div class="form-group">

					<label> 活動 <span class="required">*</span>
					</label> <select th:field="*{activityId}" class="form-control"
						th:classappend="${#fields.hasErrors('activityId')}?' input-error'">

						<option value="">請選擇活動</option>

						<option th:each="act:${activityListData}"
							th:value="${act.activityId}" th:text="${act.activityTitle}">
						</option>

					</select>

					<div class="error" th:if="${#fields.hasErrors('activityId')}"
						th:errors="*{activityId}"></div>

				</div>

				<!-- 會員 -->

				<div class="form-group">

					<label> 會員ID <span class="required">*</span>
					</label> <input type="number" th:field="*{memberId}" class="form-control"
						placeholder="請輸入會員ID"
						th:classappend="${#fields.hasErrors('memberId')}?' input-error'">

					<div class="error" th:if="${#fields.hasErrors('memberId')}"
						th:errors="*{memberId}"></div>

				</div>

				<!-- 金額 -->

				<div class="form-group">

					<label> 訂單金額 <span class="required">*</span>
					</label> <input type="number" th:field="*{orderTotal}" class="form-control"
						th:classappend="${#fields.hasErrors('orderTotal')}?' input-error'">

					<div class="error" th:if="${#fields.hasErrors('orderTotal')}"
						th:errors="*{orderTotal}"></div>

				</div>

				<!-- 狀態 -->

				<div class="form-group">

					<label> 付款狀態 <span class="required">*</span>
					</label> <select th:field="*{paymentStatus}" class="form-control">

						<option value="0">未付款</option>

						<option value="1">已付款</option>

					</select>

				</div>

			</div>

			<div class="actions">

				<a th:href="@{/activityOrder/listAllActivityOrder}"
					class="btn-cancel"> 取消 </a>

				<button type="submit" class="btn-save">💾 儲存訂單</button>

			</div>

		</form>

	</div>

</body>
</html>
