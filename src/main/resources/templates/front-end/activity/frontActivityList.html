<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動列表</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

  <style>
/* ==========================================================
   Webond 活動列表頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271;

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

  --nav-height: 76px;
}

*{ box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-family: var(--font-display); margin: 0; }
a { text-decoration: none; color: inherit; }

/* ==========================================================
   頂部大標頭區
   ========================================================== */
.header {
  max-width: 1200px;
  margin: calc(var(--nav-height) + 40px) auto 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
  padding: 0 20px;
}

.header h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--color-ink);
  position: relative;
  padding-left: 18px;
  margin-bottom: 6px;
}
.header h1::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--color-yellow-deep);
}

/* ==========================================================
   藥丸型捷徑按鈕
   ========================================================== */
.back-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface);
  color: var(--color-ink);
  border: 1.5px solid var(--color-border);
  font-weight: 800;
  font-size: 13.5px;
  padding: 10px 20px;
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-sm);
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.back-btn:hover {
  transform: translateY(-2px);
  border-color: var(--color-ink);
  box-shadow: var(--shadow-md);
  background: var(--color-surface-soft);
}

/* ==========================================================
   搜尋面板
   ========================================================== */
.search-panel {
  max-width: 1200px;
  margin: 0 auto 32px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}

.search-form {
  display: grid;
  grid-template-columns: 2.2fr 1fr 1fr 1.1fr auto auto;
  gap: 16px;
  align-items: flex-end;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 13px;
  font-weight: 800;
  color: var(--color-ink);
  padding-left: 4px;
}

.form-control {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-ink);
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  outline: none;
  transition: border-color .15s ease, background .15s ease;
}
.form-control:focus {
  border-color: var(--color-yellow-deep);
  background: var(--color-surface);
}

/* 下拉選單組件 */
.custom-select-wrapper { position: relative; width: 100%; }
.custom-select-trigger {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-ink);
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  padding-right: 38px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .15s ease, background .15s ease;
  position: relative;
  user-select: none;
}
.custom-select-trigger:hover { border-color: var(--color-ink-soft); }
.custom-select-trigger.active { border-color: var(--color-yellow-deep); background: var(--color-surface); }
.custom-select-trigger .trigger-arrow {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2317140F' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
  background-size: contain; background-repeat: no-repeat;
  transition: transform .22s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}
.custom-select-trigger.active .trigger-arrow { transform: translateY(-50%) rotate(180deg); }

.custom-dropdown-menu {
  display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: 24px; box-shadow: var(--shadow-md); padding: 12px; z-index: 100;
  max-height: 280px; overflow-y: auto; scrollbar-width: none;
}
.custom-dropdown-menu::-webkit-scrollbar { display: none; }
.custom-dropdown-menu.show { display: block; }
.custom-option {
  padding: 12px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700;
  color: var(--color-ink-soft); cursor: pointer; transition: background .15s ease, color .15s ease; user-select: none;
}
.custom-option:hover { background: var(--color-surface-soft); color: var(--color-ink); }
.custom-option.selected { background: var(--color-yellow); color: var(--color-ink); }

.checkbox-group {
  display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 800;
  color: var(--color-ink); cursor: pointer; padding: 12px 10px; user-select: none;
}
.checkbox-group input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--color-yellow-deep); cursor: pointer; }

.btn-search, .btn-reset {
  display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-body);
  font-weight: 800; font-size: 14px; padding: 11px 22px; border-radius: var(--radius-full);
  transition: transform .18s ease, box-shadow .18s ease, background .15s ease; cursor: pointer; border: none;
}
.btn-search { background: var(--color-ink); color: #fff; box-shadow: var(--shadow-sm); }
.btn-search:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); background: var(--color-yellow-deep); color: var(--color-ink); }
.btn-reset { background: var(--color-surface); color: var(--color-ink); border: 1.5px solid var(--color-border); }
.btn-reset:hover { transform: translateY(-2px); border-color: var(--color-ink); }

.result-info { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; font-size: 13.5px; color: var(--color-ink-soft); font-weight: 800; }

/* ==========================================================
   卡片網格佈局
   ========================================================== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  align-items: stretch;
}

.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
  display: flex;
  position: relative; /* 鎖定絕對定位基準 */
  flex-direction: column;
  height: 100%;
}
.card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }

.card > a {
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  text-decoration: none;
  color: inherit;
}

/* 圖片容器 */
.card__thumb-wrap {
  width: 100%;
  aspect-ratio: 16/10;
  overflow: hidden;
  position: relative;
}
.activity-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: var(--color-surface-soft);
  display: block;
  transition: transform .35s ease;
}
.card:hover .activity-image { transform: scale(1.04); }

/* 🌟 完美移至整張卡片最右上角的活動狀態徽章 */
.registration-status {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 3;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  padding: 4px 12px;
  border-radius: 10px;
  white-space: nowrap;
  background: var(--color-blue);
  color: var(--color-ink);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card__body {
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  padding: 20px;
}

/* 🌟 【區塊一】標體 + 金額：強制鎖定固定高度 */
.card__header-group {
  height: 82px; /* 固定高度，確保上下對齊 */
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  margin-bottom: 8px;
}

.card h2 {
  font-size: 15.5px;
  font-weight: 800;
  color: var(--color-ink);
  line-height: 1.4;
  margin: 0 0 4px 0;
  text-align: left;
  /* 限制最多兩行，超出顯示 ... */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.price {
  font-family: var(--font-display);
  color: var(--color-ink);
  font-size: 17px;
  font-weight: 800;
  margin: auto 0 0 0; /* 永遠貼在區塊一的最底端 */
  display: flex;
  align-items: center;
  gap: 3px;
}
.price::before { content: 'NT$'; font-size: 11px; font-weight: 800; color: var(--color-ink-soft); }

/* 🌟 【區塊二】目前人數 + 截止時間：強制鎖定固定高度 */
.meta {
  border-top: 1px dashed var(--color-border);
  padding-top: 10px;
  color: var(--color-ink-soft);
  font-size: 12.5px;
  line-height: 1.6;
  margin-bottom: 12px;
  font-weight: 600;
  height: 56px; /* 固定高度，完美防跑版 */
}
.meta div { display: flex; justify-content: space-between; margin-bottom: 2px; }
.meta span { color: var(--color-ink); font-weight: 700; }

/* 查看詳情按鈕 */
.card__footer {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  margin-top: auto;
}
.btn-detail {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  font-weight: 800;
  color: var(--color-ink);
  background: var(--color-yellow);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  transition: background .15s ease, transform .15s ease;
}
.card:hover .btn-detail {
  background: var(--color-yellow-deep);
  transform: translateX(2px);
}

.empty {
  max-width: 1200px; margin: 0 auto 60px; background: var(--color-surface-soft);
  border: 1.5px dashed var(--color-border); border-radius: var(--radius-lg);
  padding: 54px 24px; text-align: center; color: var(--color-ink-soft); font-size: 15px; font-weight: 800;
}

/* 分頁控制 */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 10px auto 60px; }
.page-btn {
  display: inline-flex; align-items: center; justify-content: center; background: var(--color-surface);
  color: var(--color-ink); border: 1.5px solid var(--color-border); padding: 8px 16px; font-size: 13.5px;
  font-weight: 700; border-radius: var(--radius-full); transition: all 0.2s ease;
}
.page-btn:hover:not(.disabled) { background: var(--color-yellow); border-color: var(--color-ink); transform: translateY(-2px); }
.page-btn.active { background: var(--color-ink); color: #fff; border-color: var(--color-ink); }
.page-btn.disabled { opacity: 0.4; pointer-events: none; }

/* RWD 響應式 */
@media (max-width: 1100px) { .container { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 880px)  { .container { grid-template-columns: repeat(2, 1fr); } .search-form { grid-template-columns: 1.5fr 1fr 1fr; } }
@media (max-width: 760px) {
  .header { flex-direction: column; align-items: flex-start; margin-top: calc(var(--nav-height) + 20px); }
  .header div[style*="display: flex"] { flex-direction: column; width: 100%; gap: 10px; }
  .back-btn { width: 100%; text-align: center; }
  .search-panel { padding: 18px; }
  .search-form { grid-template-columns: 1fr; gap: 14px; }
  .checkbox-group { padding: 6px 0; }
  .btn-search, .btn-reset { width: 100%; }
}
@media (max-width: 520px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<body>

  <!-- ========== 頂部大標頭 ========== -->
  <div class="header">
    <div>
      <h1>活動列表</h1>
    </div>

    <div style="display: flex; gap: 12px;">
      <a th:href="${isLoginMember} ? @{/activity/front/myOrder} : @{/member/login}" class="back-btn">報名列表</a>
      <a th:href="${isLoginMember} ? @{/activity/front/myHostActivity} : @{/member/login}" class="back-btn">舉辦活動</a>
    </div>
  </div>

  <!-- ========== 搜尋篩選控制面板 ========== -->
  <div class="search-panel">
    <form class="search-form" th:action="@{/activity/front/list}" method="get">
      
      <!-- 1. 關鍵字 -->
      <div class="form-group">
        <label>活動搜尋</label>
        <input class="form-control" type="text" name="keyword"
               placeholder="輸入關鍵字..." th:value="${keyword}">
      </div>

      <!-- 2. 活動類別 -->
      <div class="form-group">
        <label>活動類別</label>
        <div class="custom-select-wrapper">
          <input type="hidden" name="typeId" th:value="${selectedTypeId != null ? selectedTypeId : ''}">
          <div class="custom-select-trigger">
            <span class="trigger-text">全部類別</span>
            <span class="trigger-arrow"></span>
          </div>
          <div class="custom-dropdown-menu">
            <div class="custom-option" data-value="">全部類別</div>
            <div class="custom-option" th:each="type : ${typeListData}"
                 th:data-value="${type.activityTypeId}"
                 th:text="${type.activityTypeName}">類別</div>
          </div>
        </div>
      </div>

<!--       3. 活動狀態 -->
<!--       <div class="form-group"> -->
<!--         <label>活動狀態</label> -->
<!--         <div class="custom-select-wrapper"> -->
<!--           <input type="hidden" name="status" th:value="${selectedStatus != null ? selectedStatus : ''}"> -->
<!--           <div class="custom-select-trigger"> -->
<!--             <span class="trigger-text">全部狀態</span> -->
<!--             <span class="trigger-arrow"></span> -->
<!--           </div> -->
<!--           <div class="custom-dropdown-menu"> -->
<!--             <div class="custom-option" data-value="">全部狀態</div> -->
<!--             <div class="custom-option" data-value="0">正常舉行</div> -->
<!--             <div class="custom-option" data-value="1">活動延期</div> -->
<!--             <div class="custom-option" data-value="2">活動取消</div> -->
<!--           </div> -->
<!--         </div> -->
<!--       </div> -->

      <!-- 4. 排列順序 -->
      <div class="form-group">
        <label>排列順序</label>
        <div class="custom-select-wrapper">
          <input type="hidden" name="sort" th:value="${sort != null ? sort : ''}">
          <div class="custom-select-trigger">
            <span class="trigger-text">最新建立優先</span>
            <span class="trigger-arrow"></span>
          </div>
          <div class="custom-dropdown-menu">
            <div class="custom-option" data-value="">最新建立優先</div>
            <div class="custom-option" data-value="priceAsc">價格：低到高</div>
            <div class="custom-option" data-value="priceDesc">價格：高到低</div>
            <div class="custom-option" data-value="endTimeAsc">活動時間：近到遠</div>
          </div>
        </div>
      </div>

      <!-- 5. 勾選框 -->
      <label class="checkbox-group">
        <input type="checkbox" name="onlyAvailable" value="true" th:checked="${onlyAvailable}">
        篩選未額滿活動
      </label>

      <!-- 6. 按鈕列 -->
      <div style="display: flex; gap: 8px;">
        <button type="submit" class="btn-search">進行搜尋</button>
        <a th:href="@{/activity/front/list}" class="btn-reset">重置清除</a>
      </div>
    </form>
  </div>

  <!-- ========== 筆數統計 ========== -->
  <div class="result-info">
    共找到 <span th:text="${#lists.size(activityListData)}">0</span> 筆活動
  </div>

  <!-- ========== 空狀態 ========== -->
  <div class="empty" th:if="${#lists.isEmpty(activityListData)}">
    目前沒有找到符合篩選條件的揪團活動
  </div>

  <!-- ========== 卡片網格 (已套用全新的區塊高度固定邏輯) ========== -->
  <div class="container" th:unless="${#lists.isEmpty(activityListData)}">
    <div class="card" th:each="activity : ${activityListData}"  th:if="${registrationStatusMap[activity.activityId]} != '活動已結束'">
      <a th:href="@{/activity/front/detail(id=${activity.activityId})}">
        
        <!-- 圖片容器 + 飄浮在右上角的狀態標籤 -->
        <div class="card__thumb-wrap">
          <img class="activity-image" th:src="@{/activity/front/image(id=${activity.activityId})}" alt="活動圖片">
<!--           <span class="registration-status" th:text="${registrationStatusMap[activity.activityId]}">報名中</span> -->
          
              	<span th:if="${registrationStatusMap[activity.activityId]} == '即將截止'"
		      	class="registration-status"
		      	th:text="${registrationStatusMap[activity.activityId]}">即將截止</span>
		
				<span th:if="${registrationStatusMap[activity.activityId]} == '報名中'"
				      class="registration-status"
				      th:text="${registrationStatusMap[activity.activityId]}">報名中</span>
				
				<span th:if="${registrationStatusMap[activity.activityId]} == '尚未開放報名'"
				      class="registration-status"
				      th:text="${registrationStatusMap[activity.activityId]}">尚未開始報名</span>
				
				<span th:if="${registrationStatusMap[activity.activityId]} == '報名已截止'"
				      class="registration-status"
				      th:text="${registrationStatusMap[activity.activityId]}">報名已截止</span>
				
             
        </div>
        
        <div class="card__body">
          
          <!-- 🌟 區塊一：標題 + 金額 (固定高 82px) -->
          <div class="card__header-group">
            <h2 th:text="${activity.activityTitle}">活動名稱</h2>
            <div class="price">
              <span th:text="${activity.activityPrice}">0</span>
            </div>
          </div>

          <!-- 🌟 區塊二：目前人數 + 截止時間 (固定高 56px) -->
          <div class="meta">
            <div>
              <span>目前報名人數</span>
              <span>
              <span th:text="${activity.attendeesCount ?: 0}">0</span> / 
              <span th:text="${activity.maxParticipants}">0</span> 人</span>
            </div>
            <div th:if="${registrationStatusMap[activity.activityId] == '報名中'}">
              <span>報名截止時間</span>
              <span th:text="${#temporals.format(activity.registrationDeadline, 'yyyy-MM-dd')}">--</span>
            </div>
            <div th:if="${registrationStatusMap[activity.activityId] == '即將截止'}">
              <span>報名截止時間</span>
              <span th:text="${#temporals.format(activity.registrationDeadline, 'yyyy-MM-dd')}">--</span>
            </div>
            <div th:if="${registrationStatusMap[activity.activityId] == '尚未開放報名'}">
              <span>報名開始時間</span>
              <span th:text="${#temporals.format(activity.registrationStartTime, 'yyyy-MM-dd')}">--</span>
            </div>
          </div>

          <!-- 查看詳情按鈕 -->
          <div class="card__footer">
            <span class="btn-detail">查看詳情 →</span>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- ========== 膠囊風分頁控制頁碼 ========== -->
  <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
    <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" 
       th:href="@{/activity/front/list(page=${currentPage - 1}, keyword=${keyword}, typeId=${selectedTypeId}, status=${selectedStatus}, sort=${sort}, onlyAvailable=${onlyAvailable})}">‹ 上一頁</a>
    
    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
      <a class="page-btn" th:classappend="${i == currentPage} ? 'active'"
         th:href="@{/activity/front/list(page=${i}, keyword=${keyword}, typeId=${selectedTypeId}, status=${selectedStatus}, sort=${sort}, onlyAvailable=${onlyAvailable})}"
         th:text="${i + 1}">1</a>
    </th:block>
    
    <a class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
       th:href="@{/activity/front/list(page=${currentPage + 1}, keyword=${keyword}, typeId=${selectedTypeId}, status=${selectedStatus}, sort=${sort}, onlyAvailable=${onlyAvailable})}">下一頁 ›</a>
  </div>

  <!-- ==========================================================
       核心 JavaScript：模擬下拉式選單交互與數據同步
       ========================================================== -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const selectWrappers = document.querySelectorAll('.custom-select-wrapper');
      
      selectWrappers.forEach(wrapper => {
        const trigger = wrapper.querySelector('.custom-select-trigger');
        const menu = wrapper.querySelector('.custom-dropdown-menu');
        const hiddenInput = wrapper.querySelector('input[type="hidden"]');
        const options = wrapper.querySelectorAll('.custom-option');
        const triggerText = trigger.querySelector('.trigger-text');
        
        const defaultValue = hiddenInput.value;
        let hasActiveSelection = false;

        options.forEach(option => {
          if (option.getAttribute('data-value') === defaultValue) {
            option.classList.add('selected');
            triggerText.textContent = option.textContent;
            hasActiveSelection = true;
          } else {
            option.classList.remove('selected');
          }
        });

        if (!hasActiveSelection && options.length > 0) {
          options[0].classList.add('selected');
          triggerText.textContent = options[0].textContent;
        }
        
        trigger.addEventListener('click', function(e) {
          e.stopPropagation();
          document.querySelectorAll('.custom-dropdown-menu').forEach(otherMenu => {
            if (otherMenu !== menu) otherMenu.classList.remove('show');
          });
          document.querySelectorAll('.custom-select-trigger').forEach(otherTrigger => {
            if (otherTrigger !== trigger) otherTrigger.classList.remove('active');
          });
          menu.classList.toggle('show');
          trigger.classList.toggle('active');
        });
        
        options.forEach(option => {
          option.addEventListener('click', function(e) {
            e.stopPropagation();
            const selectedValue = this.getAttribute('data-value');
            const selectedText = this.textContent;
            hiddenInput.value = selectedValue;
            triggerText.textContent = selectedText;
            options.forEach(opt => opt.classList.remove('selected'));
            this.classList.add('selected');
            menu.classList.remove('show');
            trigger.classList.remove('active');
          });
        });
      });
      
      document.addEventListener('click', function() {
        document.querySelectorAll('.custom-dropdown-menu').forEach(menu => menu.classList.remove('show'));
        document.querySelectorAll('.custom-select-trigger').forEach(trigger => trigger.classList.remove('active'));
      });
    });
  </script>

</body>
</html>
