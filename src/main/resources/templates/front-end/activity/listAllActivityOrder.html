<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>活動訂單管理</title>

<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.header {
	max-width: 1200px;
	margin: auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 25px;
}

.header h2 {
	color: #0f172a;
}

.btn-add {
	background: #3b82f6;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.btn-add:hover {
	background: #2563eb;
}

.table-card {
	background: white;
	max-width: 1200px;
	margin: auto;
	border-radius: 12px;
	padding: 25px;
	box-shadow: 0 4px 8px rgba(0, 0, 0, .08);
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
}

tr:hover {
	background: #f8fafc;
}

.btn-edit {
	background: #10b981;
	color: white;
	padding: 8px 15px;
	border-radius: 6px;
	text-decoration: none;
}

.btn-edit:hover {
	background: #059669;
}

.btn-delete {
	background: #ef4444;
	color: white;
	border: none;
	padding: 8px 15px;
	border-radius: 6px;
	cursor: pointer;
}

.btn-delete:hover {
	background: #dc2626;
}

.action {
	display: flex;
	justify-content: center;
	gap: 8px;
}
</style>

</head>

<body>

	<div class="header">

		<h2>📋 活動訂單管理</h2>

		<a th:href="@{/activityOrder/addActivityOrder}" class="btn-add"> ➕
			新增訂單 </a>

	</div>

	<div class="table-card">

		<table>

			<thead>

				<tr>
					<th>訂單ID</th>
					<th>活動名稱</th>
					<th>會員ID</th>
					<th>訂單金額</th>
					<th>付款狀態</th>
					<th>建立時間</th>
					<th>操作</th>
				</tr>

			</thead>

			<tbody>

				<tr th:each="order : ${orderListData}">

					<td th:text="${order.activityOrderId}"></td>

					<!-- 活動名稱 -->
					<td><span th:each="activity : ${activityListData}"
						th:if="${activity.activityId == order.activityId}"
						th:text="${activity.activityTitle}"> </span></td>

					<td th:text="${order.memberId}"></td>

					<td th:text="${order.orderTotal}"></td>

					<td><span th:if="${order.paymentStatus==0}"> 未付款 </span> <span
						th:if="${order.paymentStatus==1}"> 已付款 </span></td>

					<td
						th:text="${#temporals.format(order.createdAt,'yyyy-MM-dd HH:mm')}"></td>

					<td>

						<div class="action">

							<a class="btn-edit"
								th:href="@{/activityOrder/updateActivityOrder(id=${order.activityOrderId})}">
								修改 </a>

							<form th:action="@{/activityOrder/deleteActivityOrder}"
								method="post">

								<input type="hidden" name="activityOrderId"
									th:value="${order.activityOrderId}">

								<button class="btn-delete" onclick="return confirm('確定刪除此訂單？')">
									刪除</button>

							</form>

						</div>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

</body>
</html>
