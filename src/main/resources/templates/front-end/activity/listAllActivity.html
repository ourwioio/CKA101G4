<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動管理</title>
    <link rel="stylesheet" th:href="@{/css/back-end/activity/activityAdmin.css}">
</head>
<body>
<div class="wb-admin-layout">
    <div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>

    <main class="wb-admin-content">
        <div class="activity-page">
            <header class="activity-page-header">
                <div>
                    <h1 class="activity-title">活動管理</h1>
                    <p class="activity-description">查看平台活動狀態、報名人數，並處理需要下架的活動。</p>
                    <div class="employee-info" th:if="${session.employeeVO != null}">
                        目前登入員工：<span th:text="${session.employeeVO.employeeId}">1</span>
                    </div>
                </div>

                <nav class="activity-nav" aria-label="活動後台功能">
                    <a class="activity-nav-link activity-nav-link--active" th:href="@{/admin/activity/listAllActivity}">活動管理</a>
                    <a class="activity-nav-link" th:href="@{/admin/activity/type/listAllActivityType}">類別管理</a>
                    <a class="activity-nav-link" th:href="@{/admin/activity/order/listAllActivityOrder}">訂單紀錄</a>
                    <a class="activity-nav-link" th:href="@{/admin/activity/order/finance}">撥退款作業</a>
                    <a class="activity-nav-link" th:href="@{/admin/activity/actRptList}">檢舉審核</a>
                    <a class="activity-nav-link" th:href="@{/admin/activity/home}">活動首頁</a>
                </nav>
            </header>

            <section class="activity-table-card">
                <div class="activity-table-scroll">
                    <table class="activity-table">
                        <thead>
                            <tr>
                                <th style="width: 8%;">ID</th>
                                <th style="width: 29%;">活動名稱</th>
                                <th style="width: 13%;">活動價格</th>
                                <th style="width: 15%;">目前人數</th>
                                <th style="width: 15%;">活動狀態</th>
                                <th class="cell-center" style="width: 20%;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(activityListData)}">
                                <td colspan="6" class="empty-row">目前沒有活動資料</td>
                            </tr>
                            <tr th:each="activity : ${activityListData}">
                                <td th:text="${activity.activityId}">1</td>
                                <td class="activity-name" th:text="${activity.activityTitle}">活動名稱</td>
                                <td>NT$ <span th:text="${activity.activityPrice}">0</span></td>
                                <td>
                                    <span th:text="${activity.attendeesCount ?: 0}">0</span>
                                    /
                                    <span th:text="${activity.maxParticipants}">0</span> 人
                                </td>
                                <td>
                                    <span th:if="${activity.activityStatus == 0}" class="activity-status activity-status--active">正常舉行</span>
                                    <span th:if="${activity.activityStatus == 1}" class="activity-status activity-status--delay">延期</span>
                                    <span th:if="${activity.activityStatus == 2}" class="activity-status activity-status--cancel">已取消</span>
                                </td>
                                <td class="cell-center">
                                    <div class="activity-actions">
                                        <a th:href="@{/activity/front/detail(id=${activity.activityId}, from='admin')}"
                                           class="activity-action activity-action--secondary">詳情</a>
                                        <form th:if="${activity.activityStatus != 2}"
                                              th:action="@{/admin/activity/takeDown}" method="post"
                                              onsubmit="return confirm('確定要下架這個活動嗎？');">
                                            <input type="hidden" name="activityId" th:value="${activity.activityId}">
                                            <button type="submit" class="activity-action activity-action--danger">下架</button>
                                        </form>
                                        <span th:if="${activity.activityStatus == 2}" style="color:#9aa1a8;">—</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
