<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動管理</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body class="bg-gray-100 p-8">

	<div class="max-w-6xl mx-auto bg-white shadow-md rounded-lg p-6">
		<div class="flex justify-between items-center mb-6">
			<h1 class="text-2xl font-bold text-gray-800">活動管理</h1>
			<a th:href="@{/activity/admin/home}"
				class="bg-slate-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-600 transition">
				回後台首頁
			</a>
		</div>

		<table class="w-full text-left border-collapse">
			<thead>
				<tr class="bg-gray-200 text-gray-700">
					<th class="p-3">ID</th>
					<th class="p-3">活動名稱</th>
					<th class="p-3">價格</th>
					<th class="p-3">人數</th>
					<th class="p-3">狀態</th>
					<th class="p-3 text-center">操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="activity : ${activityListData}"
					class="border-b hover:bg-gray-50">
					<td class="p-3" th:text="${activity.activityId}">1</td>
					<td class="p-3 font-semibold" th:text="${activity.activityTitle}">活動名稱</td>
					<td class="p-3">NT$ <span th:text="${activity.activityPrice}">0</span></td>
					<td class="p-3">
						<span th:text="${activity.attendeesCount ?: 0}">0</span>
						/
						<span th:text="${activity.maxParticipants}">0</span>
					</td>
					<td class="p-3">
						<span th:if="${activity.activityStatus == 0}"
							class="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-bold">上架中</span>
						<span th:if="${activity.activityStatus == 1}"
							class="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs font-bold">延期</span>
						<span th:if="${activity.activityStatus == 2}"
							class="px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-bold">已下架</span>
					</td>
					<td class="p-3 text-center">
						<a th:href="@{/activity/front/detail(id=${activity.activityId}, from='admin')}"
							class="inline-block bg-indigo-600 text-white px-3 py-2 rounded-lg font-bold hover:bg-indigo-700 mr-2">
							詳情
						</a>
						<form th:if="${activity.activityStatus != 2}"
							th:action="@{/activity/takeDown}" method="post"
							class="inline-block"
							onsubmit="return confirm('確定要下架這個活動嗎？');">
							<input type="hidden" name="activityId" th:value="${activity.activityId}">
							<button type="submit"
								class="bg-rose-600 text-white px-3 py-2 rounded-lg font-bold hover:bg-rose-700">
								下架
							</button>
						</form>
						<span th:if="${activity.activityStatus == 2}" class="text-gray-400">-</span>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

</body>
</html>
