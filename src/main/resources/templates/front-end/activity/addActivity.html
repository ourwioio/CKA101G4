<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增活動</title>
    <style>
        
        body {
            background-color: #1a1a1a;
            color: #f3f4f6;
            font-family: 'Inter', 'PingFang TC', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .header-container {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        .header-title { font-size: 1.8rem; font-weight: bold; color: #4b5563; }
        
        .btn-secondary { background-color: #f3f4f6; color: #1f2937; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; }

        .form-card {
            background-color: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 12px;
            padding: 30px 40px;
            color: #1f2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 表單專屬樣式 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .full-width { grid-column: span 2; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #374151; font-size: 0.95rem; }
        .required { color: #ef4444; }
        
        .form-control { 
            width: 100%; padding: 12px; border: 1px solid #d1d5db; 
            border-radius: 8px; box-sizing: border-box; font-size: 1rem; 
            background-color: #f9fafb; transition: all 0.2s;
        }
        .form-control:focus { 
            outline: none; border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); 
            background-color: #ffffff;
        }

        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
        .btn-submit { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-submit:hover { background-color: #2563eb; }
        .btn-cancel { background-color: #ffffff; color: #4b5563; border: 1px solid #d1d5db; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; text-decoration: none; }
        .btn-cancel:hover { background-color: #f3f4f6; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-title">➕ 新增揪團活動</div>
        <a th:href="@{/activity/listAllActivity}" class="btn-secondary">🔙 返回列表</a>
    </div>

    <div class="form-card">
        <!-- 這裡使用 th:action 導向後端的 insert 方法，並用 th:object 綁定 activityVO -->
        <form th:action="@{/activity/insert}" th:object="${activityVO}" method="post">
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>活動標題 <span class="required">*</span></label>
                    <input type="text" class="form-control" th:field="*{activityTitle}" placeholder="請輸入活動標題" required>
                </div>

                <div class="form-group">
                    <label>活動類型 <span class="required">*</span></label>
                    <select class="form-control" th:field="*{activityTypeId}" required>
                        <option value="" disabled selected>請選擇活動類型</option>
                        <!-- 動態載入分類選單 -->
                        <option th:each="type : ${typeListData}" 
                                th:value="${type.activityTypeId}" 
                                th:text="${type.activityTypeName}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>報名價格 ($)</label>
                    <input type="number" class="form-control" th:field="*{activityPrice}" min="0" value="0">
                </div>

                <div class="form-group">
                    <label>最高人數限制</label>
                    <input type="number" class="form-control" th:field="*{maxParticipants}" min="1" value="10">
                </div>

                <div class="form-group">
                    <label>活動狀態</label>
                    <select class="form-control" th:field="*{activityStatus}">
                        <option value="0">正常</option>
                        <option value="1">延期</option>
                        <option value="2">取消</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/activity/listAllActivity}" class="btn-cancel">取消</a>
                <button type="submit" class="btn-submit">💾 儲存活動</button>
            </div>
            
        </form>
    </div>

</body>
</html>
