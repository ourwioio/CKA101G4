<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>我的報名</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/activity/activity-navbar-offset.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
body {
	margin: 0;
	padding: 40px;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
}

.container {
	max-width: 1200px;
	margin: auto;
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 30px;
}

.header h1 {
	color: #0f172a;
	margin: 0;
}

.member {
	color: #64748b;
	font-weight: bold;
	margin-top: 8px;
}

.btn {
	padding: 12px 22px;
	text-decoration: none;
	color: white;
	border-radius: 8px;
	font-weight: bold;
}

.btn-back {
	background: #64748b;
}

.table-card {
	background: white;
	border-radius: 15px;
	box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 15px;
	white-space: nowrap;
}

td {
	padding: 15px;
	text-align: center;
	border-bottom: 1px solid #e5e7eb;
	vertical-align: top;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.countdown {
	margin-top: 8px;
	color: #475569;
	font-size: 13px;
	font-weight: bold;
}

.countdown.expired {
	color: #b91c1c;
}

.actions {
	display: grid;
	gap: 10px;
	width: 220px;
	margin: 0 auto;
	justify-items: stretch;
}

.actions form {
	width: 100%;
}

.btn-small {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	min-height: 48px;
	box-sizing: border-box;
	border: 0;
	border-radius: 8px;
	padding: 10px 14px;
	color: white;
	font-weight: bold;
	cursor: pointer;
	text-decoration: none;
	text-align: center;
	font-size: 16px;
	line-height: 1.25;
}

.btn-cancel {
	background: #dc2626;
}

.btn-pay,
.btn-refund {
	background: #d97706;
}

.btn-rating {
	background: #7c3aed;
}

.payment-select {
	color: #0f172a;
	background: #e2e8f0;
	border: 0;
	border-radius: 8px;
	padding: 8px 12px;
	font-weight: bold;
}

.empty {
	text-align: center;
	padding: 50px;
	color: #94a3b8;
	font-size: 18px;
}

.alert-error,
.alert-success {
	padding: 14px 18px;
	border-radius: 8px;
	margin-bottom: 20px;
	font-weight: bold;
}

.alert-error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.alert-success {
	background: #dcfce7;
	color: #166534;
	border: 1px solid #bbf7d0;
}
</style>

</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>

	<div class="container">
		<div class="header">
			<div>
				<h1>我的報名</h1>
				<div class="member">
					目前登入：<span th:text="${loginMemberName}"></span>
					（會員編號 <span th:text="${loginMemberId}"></span>）
				</div>
			</div>
			<a th:href="@{/activity/front/list}" class="btn btn-back">回到活動列表</a>
		</div>

		<div th:if="${param.cannotCancelEnded}" class="alert-error">
			活動已結束，無法取消報名。
		</div>

		<div th:if="${param.cannotPay}" class="alert-error">
			名額已满，無法付款。
		</div>

		<div th:if="${param.paymentCancelled}" class="alert-error">
			付款失敗，訂單已取消。
		</div>

		<div th:if="${param.paySuccess}" class="alert-success">
			付款成功，已完成報名。
		</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>報名人數</th>
						<th>總金額</th>
						<th>付款方式</th>
						<th>訂單狀態</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="7" class="empty">目前沒有報名活動</td>
					</tr>

					<tr th:each="order : ${orderListData}"
						th:attr="data-order-id=${order.activityOrderId},data-order-status=${order.orderStatus}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<span th:each="activity : ${activityListData}"
								th:if="${activity.activityId == order.activityId}"
								th:text="${activity.activityTitle}">
							</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
							<span th:if="${order.activityPaymentMethod == null}">未付款</span>
						</td>

						<td>
							<span th:if="${order.orderStatus == 0}" class="status active">已付款</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">已取消</span>
							<span th:if="${order.orderStatus == 2}" class="status pending">待審核</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">待付款</span>
							<span th:if="${order.orderStatus == 4}" class="status active">已完成</span>
							<th:block th:if="${order.orderStatus == 2}" th:each="activity : ${activityListData}">
								<div class="countdown"
									th:if="${activity.activityId == order.activityId}"
									th:attr="data-deadline=${#temporals.format(activity.registrationDeadline, 'yyyy-MM-dd''T''HH:mm:ss')}">
									待主辦審核剩餘：<span>計算中</span>
								</div>
							</th:block>
							<div class="countdown"
								th:if="${order.orderStatus == 3 and order.approvedAt != null}"
								th:attr="data-start=${#temporals.format(order.approvedAt, 'yyyy-MM-dd''T''HH:mm:ss')},data-seconds=60">
								付款剩餘：<span>計算中</span>
							</div>
							<div th:if="${order.totalAmount == null or order.totalAmount <= 0}" style="margin-top: 6px;">
								<span class="status active">無退款</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1}" style="margin-top: 6px;">
								<span class="status refund">待退款</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 2}" style="margin-top: 6px;">
								<span class="status active">已退款</span>
							</div>
						</td>

						<td>
							<div class="actions" th:if="${order.orderStatus == 0}">
								<a class="btn-small btn-pay"
									th:href="@{/activity/front/chat(activityId=${order.activityId}, from='order')}">
									進入聊天室
								</a>
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>

							</div>

							<div class="actions" th:if="${order.orderStatus == 2}">
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 3}">
								<form th:action="@{/activity/front/order/pay}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<select name="activityPaymentMethod" class="payment-select">
										<option value="0">信用卡</option>
										<option value="1">ATM轉帳</option>
									</select>
									<button type="submit" class="btn-small btn-pay">付款</button>
								</form>

								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 4 and order.buyerRateSeller == null}" >
								<a class="btn-small btn-rating" th:href="@{/activity/review(orderId=${order.activityOrderId})}" >評價</a>
							</div>

							<span th:if="${order.orderStatus == 4 and order.buyerRateSeller != null}" class="status active">已評價</span>
							<span th:unless="${order.orderStatus == 0 or order.orderStatus == 2 or order.orderStatus == 3 or order.orderStatus == 4}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<script th:inline="javascript">
		function formatRemaining(milliseconds) {
			if (milliseconds <= 0) {
				return '\u5df2\u903e\u6642';
			}
			const totalSeconds = Math.floor(milliseconds / 1000);
			const days = Math.floor(totalSeconds / 86400);
			const hours = Math.floor((totalSeconds % 86400) / 3600);
			const minutes = Math.floor((totalSeconds % 3600) / 60);
			const seconds = totalSeconds % 60;
			if (days > 0) {
				return days + '\u5929 ' + hours + '\u5c0f\u6642 ' + minutes + '\u5206';
			}
			if (hours > 0) {
				return hours + '\u5c0f\u6642 ' + minutes + '\u5206 ' + seconds + '\u79d2';
			}
			return minutes + '\u5206 ' + seconds + '\u79d2';
		}

		function updateCountdowns() {
			document.querySelectorAll('.countdown').forEach(function(item) {
				let deadline = null;
				if (item.dataset.deadline) {
					deadline = new Date(item.dataset.deadline).getTime();
				} else if (item.dataset.start && item.dataset.seconds) {
					deadline = new Date(item.dataset.start).getTime() + Number(item.dataset.seconds) * 1000;
				}
				if (!deadline || Number.isNaN(deadline)) {
					return;
				}
				const remaining = deadline - Date.now();
				const text = item.querySelector('span');
				if (text) {
					text.textContent = formatRemaining(remaining);
				}
				item.classList.toggle('expired', remaining <= 0);
			});
		}

		updateCountdowns();
		setInterval(updateCountdowns, 1000);

		const orderStatusUrl = /*[[@{/activity/front/order/status}]]*/ '/activity/front/order/status';
		let isPollingOrderStatus = false;

		function pollOrderStatuses() {
			const rows = Array.from(document.querySelectorAll('[data-order-id][data-order-status]'));
			if (rows.length === 0 || isPollingOrderStatus) {
				return;
			}
			isPollingOrderStatus = true;
			const orderIds = rows.map(function(row) {
				return row.dataset.orderId;
			}).join(',');

			fetch(orderStatusUrl + '?orderIds=' + encodeURIComponent(orderIds) + '&_=' + Date.now(), {
				cache: 'no-store',
				headers: { 'Accept': 'application/json' }
			})
				.then(function(response) {
					return response.ok ? response.json() : {};
				})
				.then(function(data) {
					const hasChanged = rows.some(function(row) {
						const current = data[row.dataset.orderId];
						return current && String(current.orderStatus) !== String(row.dataset.orderStatus);
					});
					if (hasChanged) {
						window.location.reload();
					}
				})
				.catch(function() {})
				.finally(function() {
					isPollingOrderStatus = false;
				});
		}

		pollOrderStatuses();
		setInterval(pollOrderStatuses, 1000);
	</script>

</body>
</html>
