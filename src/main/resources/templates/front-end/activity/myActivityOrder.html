<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>我的報名</title>

<style>
body {
	margin: 0;
	padding: 40px;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
}

.container {
	max-width: 1200px;
	margin: auto;
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 30px;
}

.header h1 {
	color: #0f172a;
	margin: 0;
}

.member {
	color: #64748b;
	font-weight: bold;
	margin-top: 8px;
}

.btn {
	padding: 12px 22px;
	text-decoration: none;
	color: white;
	border-radius: 8px;
	font-weight: bold;
}

.btn-back {
	background: #64748b;
}

.table-card {
	background: white;
	border-radius: 15px;
	box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 15px;
	white-space: nowrap;
}

td {
	padding: 15px;
	text-align: center;
	border-bottom: 1px solid #e5e7eb;
	vertical-align: top;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.actions {
	display: grid;
	gap: 10px;
	min-width: 180px;
}

.btn-small {
	border: 0;
	border-radius: 8px;
	padding: 8px 12px;
	color: white;
	font-weight: bold;
	cursor: pointer;
}

.btn-cancel {
	background: #dc2626;
}

.btn-pay,
.btn-refund {
	background: #d97706;
}

.payment-select {
	color: #0f172a;
	background: #e2e8f0;
	border: 0;
	border-radius: 8px;
	padding: 8px 12px;
	font-weight: bold;
}

.empty {
	text-align: center;
	padding: 50px;
	color: #94a3b8;
	font-size: 18px;
}

.alert-error,
.alert-success {
	padding: 14px 18px;
	border-radius: 8px;
	margin-bottom: 20px;
	font-weight: bold;
}

.alert-error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.alert-success {
	background: #dcfce7;
	color: #166534;
	border: 1px solid #bbf7d0;
}
</style>

</head>

<body>

	<div class="container">
		<div class="header">
			<div>
				<h1>我的報名</h1>
				<div class="member">
					目前登入：<span th:text="${loginMemberName}"></span>
					（會員編號 <span th:text="${loginMemberId}"></span>）
				</div>
			</div>

			<a th:href="@{/activity/front/list}" class="btn btn-back">回活動列表</a>
		</div>

		<div th:if="${param.cannotCancelEnded}" class="alert-error">
			活動已結束，不能取消報名。
		</div>

		<div th:if="${param.cannotPay}" class="alert-error">
			目前無法付款，活動可能已額滿、下架或不開放報名。
		</div>

		<div th:if="${param.paySuccess}" class="alert-success">
			付款完成，報名已生效。
		</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>報名人數</th>
						<th>總金額</th>
						<th>付款方式</th>
						<th>訂單狀態</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="7" class="empty">目前沒有報名活動</td>
					</tr>

					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<span th:each="activity : ${activityListData}"
								th:if="${activity.activityId == order.activityId}"
								th:text="${activity.activityTitle}">
							</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
							<span th:if="${order.activityPaymentMethod == null}">未付款</span>
						</td>

						<td>
							<span th:if="${order.orderStatus == 0}" class="status active">已付款</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">已取消</span>
							<span th:if="${order.orderStatus == 2}" class="status refund">退款申請中</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">待審核</span>
							<span th:if="${order.orderStatus == 4}" class="status pending">待付款</span>
						</td>

						<td>
							<div class="actions" th:if="${order.orderStatus == 0}">
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消這筆報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>

								<form th:action="@{/activity/front/order/refund}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-refund">送出退款審核</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 3}">
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消這筆申請嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消申請</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 4}">
								<form th:action="@{/activity/front/order/pay}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<select name="activityPaymentMethod" class="payment-select">
										<option value="0">信用卡</option>
										<option value="1">ATM轉帳</option>
									</select>
									<button type="submit" class="btn-small btn-pay">付款</button>
								</form>

								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消這筆報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>
							</div>

							<span th:unless="${order.orderStatus == 0 or order.orderStatus == 3 or order.orderStatus == 4}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

</body>
</html>
