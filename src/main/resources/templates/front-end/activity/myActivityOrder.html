<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的報名</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/activity/activity-navbar-offset.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--color-pink: #FFB5C1;
	--color-green: #B7E1D1;
	--color-blue: #A9D3FF;
	--color-red: #FF5271;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, .06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, .10);
}

* { box-sizing: border-box; }

body {
	margin: 0;
	padding: 0;
	background: var(--color-bg);
	color: var(--color-ink);
	font-family: var(--font-body);
	line-height: 1.6;
	-webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ==========================================================
   活動中心子導覽列 (與我的場地共用同一套視覺樣式)
   ========================================================== */
.activity-topbar{
	background: var(--color-surface);
	border-bottom: 1px solid var(--color-border);
	margin-top: calc(var(--nav-height) + 16px);
}
.activity-topbar__inner{
	max-width: 1200px;
	margin: 0 auto;
	padding: 22px 20px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	flex-wrap: wrap;
	gap: 16px;
}
.activity-topbar__title{
	font-family: var(--font-display);
	font-size: 22px;
	font-weight: 800;
	margin: 0;
}
.activity-tabs{
	display: flex;
	align-items: center;
	gap: 22px;
	flex-wrap: wrap;
	font-size: 13.5px;
	font-weight: 700;
}
.activity-tabs a{
	position: relative;
	padding: 4px 10px;
	color: var(--color-ink-soft);
	transition: color .15s ease;
}
.activity-tabs a:hover{ color: var(--color-ink); }
.activity-tabs a.is-active{ color: var(--color-ink); }
.activity-tabs a.is-active::after{
	content: '';
	position: absolute;
	left: 0; right: 0; bottom: -2px;
	height: 2px;
	background: var(--color-yellow-deep);
}
.activity-tabs__cta{
	background: var(--color-ink);
	color: #fff !important;
	padding: 8px 18px;
	border-radius: var(--radius-full);
	transition: background .15s ease, color .15s ease, transform .15s ease;
}
.activity-tabs__cta:hover{
	background: var(--color-yellow-deep);
	color: var(--color-ink) !important;
	transform: translateY(-2px);
}

.container {
	max-width: 1240px;
	margin: 0 auto;
	padding: 40px 20px 60px;
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: flex-end;
	gap: 20px;
	margin-bottom: 24px;
}

.header h1 {
	position: relative;
	margin: 0 0 6px;
	padding-left: 18px;
	color: var(--color-ink);
	font-family: var(--font-display);
	font-size: 28px;
	font-weight: 800;
}

.header h1::before {
	content: '';
	position: absolute;
	left: 0;
	top: 50%;
	width: 9px;
	height: 9px;
	transform: translateY(-50%);
	border-radius: 50%;
	background: var(--color-yellow-deep);
}

.alert-error,
.alert-success {
	margin-bottom: 16px;
	padding: 12px 16px;
	border: 1px solid var(--color-border);
	border-radius: var(--radius-md);
	color: var(--color-ink);
	font-size: 13.5px;
	font-weight: 700;
}

.alert-error { background: #FFD9DF; }
.alert-success { background: var(--color-green); }

.table-card {
	overflow-x: auto;
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-radius: var(--radius-lg);
	box-shadow: var(--shadow-sm);
	scrollbar-color: var(--color-border) transparent;
}

table {
	width: 100%;
	min-width: 960px;
	border-collapse: collapse;
}

th {
	padding: 16px 14px;
	background: var(--color-surface-soft);
	border-bottom: 1px solid var(--color-border);
	color: var(--color-ink);
	font-size: 13px;
	font-weight: 800;
	white-space: nowrap;
}

td {
	padding: 18px 14px;
	border-bottom: 1px dashed var(--color-border);
	color: var(--color-ink-soft);
	font-size: 13.5px;
	font-weight: 600;
	text-align: center;
	vertical-align: top;
}

tbody tr { transition: background .15s ease; }
tbody tr:hover { background: var(--color-surface-soft); }
tbody tr:last-child td { border-bottom: 0; }
td:nth-child(2) { color: var(--color-ink); font-weight: 800; }

.status {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	padding: 5px 13px;
	border-radius: var(--radius-full);
	color: var(--color-ink);
	font-size: 12px;
	font-weight: 800;
	letter-spacing: .3px;
	white-space: nowrap;
}

.active { background: var(--color-green); }
.cancel { background: #FFD9DF; }
.refund { background: var(--color-yellow); }
.pending { background: var(--color-blue); }

.countdown {
	display: block;
	width: 230px;
	margin: 8px auto 0;
	color: var(--color-ink-soft);
	font-size: 12px;
	font-weight: 700;
	font-variant-numeric: tabular-nums;
	text-align: center;
	white-space: nowrap;
}

.countdown.expired { color: #C8324C; }

.actions {
	display: grid;
	gap: 8px;
	width: 180px;
	margin: 0 auto;
}

.actions form {
	display: grid;
	gap: 8px;
	width: 100%;
}

.btn-small {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	min-height: 40px;
	padding: 9px 14px;
	border: 0;
	border-radius: var(--radius-full);
	box-shadow: var(--shadow-sm);
	color: var(--color-ink);
	font-family: var(--font-body);
	font-size: 13px;
	font-weight: 800;
	line-height: 1.25;
	cursor: pointer;
	transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.btn-small:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-md);
	filter: saturate(1.08);
}

.btn-cancel { background: var(--color-pink); }
.btn-pay, .btn-refund { background: var(--color-yellow-deep); }
.btn-rating { background: var(--color-blue); }

.payment-select {
	width: 100%;
	padding: 10px 12px;
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	outline: none;
	background: var(--color-surface-soft);
	color: var(--color-ink);
	font-family: var(--font-body);
	font-size: 13px;
	font-weight: 700;
}

.payment-select:focus { border-color: var(--color-yellow-deep); }

.empty {
	padding: 54px 24px;
	color: var(--color-ink-soft);
	font-size: 15px;
	font-weight: 800;
	text-align: center;
}

@media (max-width: 760px) {
	.container { padding: 32px 16px 40px; }
	.header { align-items: stretch; flex-direction: column; }
	.header h1 { font-size: 25px; }
	.table-card { border-radius: 20px; }
}
</style>

</head>

<body>

	<div th:replace="~{front-end/activity/activityHeader :: header('myActivityOrder')}"></div>

	<div class="container">
		<div class="header">
			<div>
				<h1>我的報名</h1>
			</div>
		</div>

		<div th:if="${param.cannotCancelEnded}" class="alert-error">
			活動已結束，無法取消報名。
		</div>

		<div th:if="${param.cannotPay}" class="alert-error">
			名額已满，無法付款。
		</div>

		<div th:if="${param.paymentCancelled}" class="alert-error">
			付款失敗，訂單已取消。
		</div>

		<div th:if="${param.paySuccess}" class="alert-success">
			付款成功，已完成報名。
		</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>報名人數</th>
						<th>總金額</th>
						<th>付款方式</th>
						<th>訂單狀態</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="7" class="empty">目前沒有報名活動</td>
					</tr>

					<tr th:each="order : ${orderListData}"
						th:attr="data-order-id=${order.activityOrderId},data-order-status=${order.orderStatus}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<span th:each="activity : ${activityListData}"
								th:if="${activity.activityId == order.activityId}"
								th:text="${activity.activityTitle}">
							</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
							<span th:if="${order.activityPaymentMethod == null}">未付款</span>
						</td>

						<td>
							<span th:if="${order.orderStatus == 0}" class="status active">已付款</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">已取消</span>
							<span th:if="${order.orderStatus == 2}" class="status pending">待審核</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">待付款</span>
							<span th:if="${order.orderStatus == 4}" class="status active">已完成</span>
							<th:block th:if="${order.orderStatus == 2}" th:each="activity : ${activityListData}">
								<div class="countdown"
									th:if="${activity.activityId == order.activityId}"
									th:attr="data-deadline=${#temporals.format(activity.registrationDeadline, 'yyyy-MM-dd''T''HH:mm:ss')}">
									待主辦審核剩餘：<span>計算中</span>
								</div>
							</th:block>
							<div class="countdown"
								th:if="${order.orderStatus == 3 and order.approvedAt != null}"
								th:attr="data-start=${#temporals.format(order.approvedAt, 'yyyy-MM-dd''T''HH:mm:ss')},data-seconds=60">
								付款剩餘：<span>計算中</span>
							</div>
							<div th:if="${order.totalAmount == null or order.totalAmount <= 0}" style="margin-top: 6px;">
								<span class="status active">無退款</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1}" style="margin-top: 6px;">
								<span class="status refund">待退款</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 2}" style="margin-top: 6px;">
								<span class="status active">已退款</span>
							</div>
						</td>

						<td>
							<div class="actions" th:if="${order.orderStatus == 0}">
								<a class="btn-small btn-pay"
									th:href="@{/activity/front/chat(activityId=${order.activityId}, from='order')}">
									進入聊天室
								</a>
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>

							</div>

							<div class="actions" th:if="${order.orderStatus == 2}">
								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 3}">
								<form th:action="@{/activity/front/order/pay}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<select name="activityPaymentMethod" class="payment-select">
										<option value="0">信用卡</option>
										<option value="1">ATM轉帳</option>
									</select>
									<button type="submit" class="btn-small btn-pay">付款</button>
								</form>

								<form th:action="@{/activity/front/order/cancel}" method="post"
									onsubmit="return confirm('確定要取消報名嗎？');">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button type="submit" class="btn-small btn-cancel">取消報名</button>
								</form>
							</div>

							<div class="actions" th:if="${order.orderStatus == 4 and order.buyerRateSeller == null}" >
								<a class="btn-small btn-rating" th:href="@{/activity/review(orderId=${order.activityOrderId})}" >評價</a>
							</div>

							<span th:if="${order.orderStatus == 4 and order.buyerRateSeller != null}" class="status active">已評價</span>
							<span th:unless="${order.orderStatus == 0 or order.orderStatus == 2 or order.orderStatus == 3 or order.orderStatus == 4}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>

	<script th:inline="javascript">
		function formatRemaining(milliseconds) {
			if (milliseconds <= 0) {
				return '\u5df2\u903e\u6642';
			}
			const totalSeconds = Math.floor(milliseconds / 1000);
			const days = Math.floor(totalSeconds / 86400);
			const hours = Math.floor((totalSeconds % 86400) / 3600);
			const minutes = Math.floor((totalSeconds % 3600) / 60);
			const seconds = totalSeconds % 60;
			if (days > 0) {
				return days + '\u5929 ' + hours + '\u5c0f\u6642 ' + minutes + '\u5206';
			}
			if (hours > 0) {
				return hours + '\u5c0f\u6642 ' + minutes + '\u5206 ' + seconds + '\u79d2';
			}
			return minutes + '\u5206 ' + seconds + '\u79d2';
		}

		function updateCountdowns() {
			document.querySelectorAll('.countdown').forEach(function(item) {
				let deadline = null;
				if (item.dataset.deadline) {
					deadline = new Date(item.dataset.deadline).getTime();
				} else if (item.dataset.start && item.dataset.seconds) {
					deadline = new Date(item.dataset.start).getTime() + Number(item.dataset.seconds) * 1000;
				}
				if (!deadline || Number.isNaN(deadline)) {
					return;
				}
				const remaining = deadline - Date.now();
				const text = item.querySelector('span');
				if (text) {
					text.textContent = formatRemaining(remaining);
				}
				item.classList.toggle('expired', remaining <= 0);
			});
		}

		updateCountdowns();
		setInterval(updateCountdowns, 1000);

		const orderStatusUrl = /*[[@{/activity/front/order/status}]]*/ '/activity/front/order/status';
		let isPollingOrderStatus = false;

		function pollOrderStatuses() {
			const rows = Array.from(document.querySelectorAll('[data-order-id][data-order-status]'));
			if (rows.length === 0 || isPollingOrderStatus) {
				return;
			}
			isPollingOrderStatus = true;
			const orderIds = rows.map(function(row) {
				return row.dataset.orderId;
			}).join(',');

			fetch(orderStatusUrl + '?orderIds=' + encodeURIComponent(orderIds) + '&_=' + Date.now(), {
				cache: 'no-store',
				headers: { 'Accept': 'application/json' }
			})
				.then(function(response) {
					return response.ok ? response.json() : {};
				})
				.then(function(data) {
					const hasChanged = rows.some(function(row) {
						const current = data[row.dataset.orderId];
						return current && String(current.orderStatus) !== String(row.dataset.orderStatus);
					});
					if (hasChanged) {
						window.location.reload();
					}
				})
				.catch(function() {})
				.finally(function() {
					isPollingOrderStatus = false;
				});
		}

		pollOrderStatuses();
		setInterval(pollOrderStatuses, 1000);
	</script>

</body>
</html>
