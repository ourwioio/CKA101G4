<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>我要辦活動</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
body {
	background: #f8fafc;
	color: #1e293b;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.header-container {
	max-width: 950px;
	margin: 0 auto 20px auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 2px solid #e2e8f0;
	padding-bottom: 20px;
}

.header-title {
	font-size: 1.8rem;
	font-weight: bold;
	color: #0f172a;
}

.btn-secondary {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 10px 20px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}

.form-card {
	background: white;
	max-width: 950px;
	margin: auto;
	border-radius: 12px;
	padding: 30px 40px;
	box-shadow: 0 4px 8px rgba(0, 0, 0, .08);
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
}

.col-span-2 {
	grid-column: span 2;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	font-weight: bold;
}

.required {
	color: red;
}

.form-control {
	width: 100%;
	padding: 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	box-sizing: border-box;
	font-size: 15px;
}

textarea.form-control {
	min-height: 120px;
	resize: vertical;
}

.error {
	color: red;
	font-size: 14px;
	margin-top: 5px;
	font-weight: bold;
}

.input-error {
	border: 2px solid red !important;
}

.hint {
	color: #64748b;
	font-size: 13px;
	margin-top: 6px;
}

.image-preview {
	width: 160px;
	height: 120px;
	object-fit: cover;
	border-radius: 8px;
	border: 1px solid #e2e8f0;
	margin: 8px 0;
	display: block;
}

.form-actions {
	display: flex;
	justify-content: flex-end;
	gap: 12px;
	margin-top: 30px;
	padding-top: 20px;
	border-top: 1px solid #e2e8f0;
}

.btn-submit {
	background: #8b5cf6;
	color: white;
	border: none;
	padding: 12px 24px;
	border-radius: 8px;
	cursor: pointer;
	font-weight: bold;
}

.btn-cancel {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 12px 24px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}
</style>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>

	<div class="header-container">
		<div class="header-title" th:text="${formTitle ?: '我要辦活動'}">我要辦活動</div>

		<a th:href="${cancelUrl ?: '/'}" class="btn-secondary"
			th:text="${cancelText ?: '返回使用者首頁'}">返回使用者首頁</a>
	</div>

	<div class="form-card">

		<form th:action="@{/activity/front/insertHostActivity}"
			th:object="${activityVO}" method="post" enctype="multipart/form-data">

			<input type="hidden" th:field="*{memberId}"> <input
				type="hidden" th:field="*{attendeesCount}"> <input
				type="hidden" th:field="*{activityStatus}">
			<input type="hidden" name="sourceActivityId" th:value="${sourceActivityId}">

			<div class="form-grid">

				<div class="form-group col-span-2">
					<label>活動標題 <span class="required">*</span></label> <input
						type="text" th:field="*{activityTitle}" class="form-control"
						placeholder="請輸入活動標題"
						th:readonly="${sourceActivityId != null}"
						th:classappend="${#fields.hasErrors('activityTitle')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('activityTitle')}"
						th:errors="*{activityTitle}"></div>
				</div>

				<div class="form-group">
					<label>活動類型 <span class="required">*</span></label> <select
						th:field="*{activityTypeId}" class="form-control"
						th:disabled="${sourceActivityId != null}"
						th:classappend="${#fields.hasErrors('activityTypeId')} ? ' input-error'">
						<option value="">請選擇活動類別</option>
						<option th:each="type : ${typeListData}"
							th:value="${type.activityTypeId}"
							th:text="${type.activityTypeName}"></option>
					</select>
					<input th:if="${sourceActivityId != null}" type="hidden"
						th:field="*{activityTypeId}">

					<div class="error" th:if="${#fields.hasErrors('activityTypeId')}"
						th:errors="*{activityTypeId}"></div>
				</div>

				<div class="form-group">
					<label>活動費用 <span class="required">*</span></label> <input
						type="number" th:field="*{activityPrice}" class="form-control"
						min="0"
						th:readonly="${sourceActivityId != null}"
						th:classappend="${#fields.hasErrors('activityPrice')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('activityPrice')}"
						th:errors="*{activityPrice}"></div>
				</div>

				<div class="form-group">
					<label>最低成團人數 <span class="required">*</span></label> <input
						type="number" th:field="*{minParticipants}" class="form-control"
						min="1"
						th:readonly="${sourceActivityId != null}"
						th:classappend="${#fields.hasErrors('minParticipants')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('minParticipants')}"
						th:errors="*{minParticipants}"></div>
				</div>

				<div class="form-group">
					<label>最高人數限制 <span class="required">*</span></label> <input
						type="number" th:field="*{maxParticipants}" class="form-control"
						min="1"
						th:readonly="${sourceActivityId != null}"
						th:classappend="${#fields.hasErrors('maxParticipants')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('maxParticipants')}"
						th:errors="*{maxParticipants}"></div>
				</div>

				<div class="form-group">
					<label>報名開始時間 <span class="required">*</span></label> <input
						type="datetime-local" th:field="*{registrationStartTime}"
						class="form-control" step="300" lang="zh-TW"
						th:classappend="${#fields.hasErrors('registrationStartTime')} ? ' input-error'">

					<div class="error"
						th:if="${#fields.hasErrors('registrationStartTime')}"
						th:errors="*{registrationStartTime}"></div>
				</div>

				<div class="form-group">
					<label>報名截止時間 <span class="required">*</span></label> <input
						type="datetime-local" th:field="*{registrationDeadline}"
						class="form-control" step="300" lang="zh-TW"
						th:classappend="${#fields.hasErrors('registrationDeadline')} ? ' input-error'">

					<div class="error"
						th:if="${#fields.hasErrors('registrationDeadline')}"
						th:errors="*{registrationDeadline}"></div>
				</div>

				<div class="form-group">
					<label>活動開始時間 <span class="required">*</span></label> <input
						type="datetime-local" th:field="*{startTime}" class="form-control"
						step="300" lang="zh-TW"
						th:classappend="${#fields.hasErrors('startTime')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('startTime')}"
						th:errors="*{startTime}"></div>
				</div>

				<div class="form-group">
					<label>活動結束時間 <span class="required">*</span></label> <input
						type="datetime-local" th:field="*{endTime}" class="form-control"
						step="300" lang="zh-TW"
						th:classappend="${#fields.hasErrors('endTime')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('endTime')}"
						th:errors="*{endTime}"></div>
				</div>

				<div class="form-group col-span-2">
					<label>活動描述 <span class="required">*</span></label>
					<textarea th:field="*{activityDescription}" class="form-control"
						placeholder="請輸入活動描述"
						th:classappend="${#fields.hasErrors('activityDescription')} ? ' input-error'"></textarea>

					<div class="error"
						th:if="${#fields.hasErrors('activityDescription')}"
						th:errors="*{activityDescription}"></div>
				</div>

				<div class="form-group col-span-2">
					<label>活動圖片</label>
					<img id="activityImagePreview" class="image-preview"
						th:src="${previewImageUrl ?: '/images/activity/default-activity.jpg'}"
						alt="活動圖片預覽">
					<input th:if="${sourceActivityId == null}" id="activityImageFile" type="file" name="activityImageFile" class="form-control"
						accept="image/jpeg,image/png">
					<div class="hint" th:if="${sourceActivityId == null}">未選擇圖片時會顯示預設活動圖片，圖片格式限 JPG 或 PNG。</div>
					<div class="hint" th:if="${sourceActivityId != null}">再次舉辦會沿用原活動圖片。</div>
					<div class="error" th:if="${imageError}" th:text="${imageError}"></div>
				</div>

			</div>

			<div class="form-actions">
				<a th:href="${cancelUrl ?: '/'}" class="btn-cancel">取消</a>
				<button type="submit" class="btn-submit" th:text="${submitText ?: '建立活動'}">建立活動</button>
			</div>

		</form>

	</div>

	<script>
		const activityImageFile = document.getElementById('activityImageFile');
		const activityImagePreview = document.getElementById('activityImagePreview');
		const defaultPreviewSrc = activityImagePreview.src;

		if (activityImageFile) {
			activityImageFile.addEventListener('change', function() {
				const file = this.files && this.files[0];
				if (!file) {
					activityImagePreview.src = defaultPreviewSrc;
					return;
				}

				activityImagePreview.src = URL.createObjectURL(file);
			});
		}
	</script>

</body>
</html>
