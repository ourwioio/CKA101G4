<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webond 會員系統 - 送出檢舉案</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);
}

body {
	background: var(--color-bg);
	min-height: 100vh;
	font-family: var(--font-body);
	color: var(--color-ink);
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 50px 20px;
}

.report-container {
	max-width: 750px;
	width: 100%;
	background: var(--color-surface);
	padding: 45px 50px;
	border-radius: var(--radius-lg);
	border: 1px solid var(--color-border);
	box-shadow: var(--shadow-md);
}

.form-title {
	font-family: var(--font-display);
	font-weight: 800;
	color: var(--color-ink);
	text-align: center;
	margin-bottom: 12px;
}

.form-subtitle {
	color: var(--color-ink-soft);
	text-align: center;
	font-size: 14px;
	margin-bottom: 35px;
}

.section-divider {
	font-family: var(--font-display);
	color: var(--color-ink);
	font-weight: 700;
	border-bottom: 2px solid var(--color-border);
	padding-bottom: 10px;
	margin-bottom: 30px;
}

.success-msg {
	color: #065f46;
	background: #d1fae5;
	padding: 12px 20px;
	border-radius: var(--radius-md);
	margin-bottom: 25px;
	font-size: 14px;
	border: 1px solid #6ee7b7;
}

.form-control, .form-select {
	background-color: var(--color-surface-soft);
	border: 1.5px solid var(--color-border) !important;
	border-radius: var(--radius-md) !important;
	padding: 12px 16px;
	color: var(--color-ink);
	width: 100%;
	max-width: 100%;
	box-sizing: border-box;
	font-family: inherit;
	transition: all 0.2s ease;
}

/* 文字內容欄位固定寬度，僅允許上下拉高，不允許左右拖曳超出範圍 */
textarea.form-control {
	resize: vertical;
	max-width: 100%;
}

.form-control:focus, .form-select:focus {
	background-color: #ffffff;
	border-color: var(--color-yellow-deep) !important;
	box-shadow: 0 0 0 4px rgba(255, 201, 77, 0.25) !important;
}

.form-label {
	display: block;
	font-weight: 700;
	color: var(--color-ink);
	margin-bottom: 10px;
	font-size: 15px;
}

/* 欄位之間的呼吸空間：避免上一個欄位與下一個標籤太靠近 */
.row .col-md-6.mb-4,
.mb-4 {
	margin-bottom: 30px !important;
}

.field-error {
	color: #be123c;
	font-size: 12px;
	font-weight: 500;
	margin-top: 5px;
	display: block;
}

/* 📸 多張圖片預覽網格樣式 */
.preview-grid {
	display: flex;
	flex-wrap: wrap;
	gap: 12px;
	margin-top: 15px;
}

.preview-item {
	position: relative;
	width: 100px;
	height: 100px;
	border-radius: var(--radius-md);
	overflow: hidden;
	border: 1px solid var(--color-border);
	background-color: var(--color-surface-soft);
}

.preview-item img {
	width: 100%;
	height: 100%;
	object-fit: cover;
}

/* 刪除按鈕 (紅色 ✕) */
.delete-btn {
	position: absolute;
	top: 4px;
	right: 4px;
	background: rgba(190, 18, 60, 0.85);
	color: white;
	border: none;
	border-radius: 50%;
	width: 22px;
	height: 22px;
	font-size: 13px;
	line-height: 20px;
	text-align: center;
	cursor: pointer;
	padding: 0;
	transition: background 0.2s;
}

.delete-btn:hover {
	background: rgba(190, 18, 60, 1);
}

/* 🎯 底部按鈕區塊 */
.button-group-container {
	margin-top: 35px;
	padding-top: 15px;
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 15px;
}

.btn-submit-webond {
	background-color: var(--color-ink);
	color: white;
	border: none;
	border-radius: var(--radius-full);
	padding: 12px 32px;
	font-weight: 700;
	font-family: var(--font-display);
	transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.btn-submit-webond:hover {
	background-color: var(--color-ink);
	color: white;
	transform: translateY(-2px);
	box-shadow: var(--shadow-md);
}

.btn-cancel-webond {
	background-color: transparent;
	color: var(--color-ink-soft);
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-full);
	padding: 12px 32px;
	font-weight: 700;
	text-decoration: none;
	text-align: center;
	transition: color 0.15s ease, border-color 0.15s ease;
}
.btn-cancel-webond:hover {
	color: var(--color-ink);
	border-color: var(--color-ink-soft);
}
</style>
</head>
<body>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

	<div class="report-container">
		<h2 class="form-title">我要檢舉!</h2>
		<p class="form-subtitle">請填寫以下欄位，提交後將由系統管理員盡速為您審核辦理</p>

		<div class="success-msg" th:if="${successMsg != null}" th:text="${successMsg}"></div>

		<form id="reportForm" th:action="@{/backend/memberreport/addReport}" th:object="${addMemberReportDTO}" method="post" enctype="multipart/form-data">

			<div class="section-divider">
				🛡️ 案件基本資料
			</div>

			<div class="row">
				<div class="col-md-6 mb-4">
					<label for="reporterId" class="form-label">您的會員編號 <span class="text-danger">*</span></label>
					<input type="number" class="form-control" id="reporterId" th:field="*{reporterId}" placeholder="請輸入您的會員編號">
					<span class="field-error" th:if="${#fields.hasErrors('reporterId')}" th:errors="*{reporterId}"></span>
				</div>

				<div class="col-md-6 mb-4">
					<label for="reportedId" class="form-label">想檢舉誰? <span class="text-danger">*</span></label>
					<input type="number" class="form-control" id="reportedId" th:field="*{reportedId}" placeholder="請輸入對方的會員編號">
					<span class="field-error" th:if="${#fields.hasErrors('reportedId')}" th:errors="*{reportedId}"></span>
				</div>
			</div>

			<div class="mb-4">
				<label for="reportCategory" class="form-label">檢舉違規類別 <span class="text-danger">*</span></label>
				<select class="form-select" id="reportCategory" th:field="*{reportCategory}">
					<option value="">-- 請選擇檢舉原因 --</option>
					<option value="0">不當言論</option>
					<option value="1">惡意騷擾</option>
					<option value="2">詐騙行為</option>
					<option value="3">其他原因</option>
				</select>
				<span class="field-error" th:if="${#fields.hasErrors('reportCategory')}" th:errors="*{reportCategory}"></span>
			</div>

			<div class="mb-4">
				<label for="reportContent" class="form-label">詳細內容描述 <span class="text-danger">*</span></label>
				<textarea class="form-control" id="reportContent" th:field="*{reportContent}" rows="5"
					placeholder="請詳細敘述違規事件經過（時間、聊天室內容等）..."></textarea>
				<span class="field-error" th:if="${#fields.hasErrors('reportContent')}" th:errors="*{reportContent}"></span>
			</div>

			<div class="mb-4">
				<label for="evidenceInput" class="form-label">上傳證據截圖 (可複選多張) <span class="text-danger">*</span></label>
				<input class="form-control" type="file" id="evidenceInput" accept="image/*" multiple onchange="handleFileSelect(this)">

				<input type="file" id="realEvidenceInput" th:field="*{evidencePath}" multiple style="display: none;">

				<span class="field-error" th:if="${#fields.hasErrors('evidencePath')}" th:errors="*{evidencePath}"></span>

				<div class="preview-grid" id="previewContainer"></div>
			</div>

			<div class="button-group-container">
				<a th:href="@{/}" class="btn btn-cancel-webond">返回首頁</a>
				<button type="submit" class="btn btn-submit-webond">確認送出檢舉</button>
			</div>
		</form>
	</div>

	<script>
	// 使用 DataTransfer 來管理即將提交給後端的 File 物件
	const fileStore = new DataTransfer();

	document.addEventListener("DOMContentLoaded", function () {
		// 檢測若有成功訊息，則清空圖片暫存
		const successMsg = document.querySelector('.success-msg');
		if (successMsg && successMsg.innerText.trim() !== '') {
			sessionStorage.removeItem('uploaded_evidence_files');
			return;
		}

		// 頁面載入時自動還原暫存照片
		restoreFromSessionStorage();

		// 綁定表單提交事件，確保最後一刻同步 fileStore 到 realEvidenceInput
		const form = document.getElementById('reportForm');
		if (form) {
			form.addEventListener('submit', function (e) {
				syncFileInput();
			});
		}
	});

	// 當使用者選取檔案時
	async function handleFileSelect(input) {
		const files = input.files;
		if (!files || files.length === 0) return;

		for (let i = 0; i < files.length; i++) {
			const file = files[i];
			fileStore.items.add(file);

			try {
				// 使用 Promise 確保 Base64 讀取完成後再存入 Session
				const base64 = await readFileAsBase64(file);
				saveFileToSession(file.name, base64);
			} catch (err) {
				console.error("圖片讀取失敗:", err);
			}
		}

		// 同步檔案與重新繪製預覽
		syncFileInput();
		renderPreviews();

		// 清空選擇器，讓使用者可重複選擇同名檔案
		input.value = '';
	}

	function removeFile(index) {
		const fileToRemove = fileStore.files[index];
		if (fileToRemove) {
			removeFileFromSession(fileToRemove.name);
		}

		// 刪除指定索引的檔案
		fileStore.items.remove(index);

		// 同步與重新繪製
		syncFileInput();
		renderPreviews();
	}

	function syncFileInput() {
		const realInput = document.getElementById('realEvidenceInput');
		if (realInput) {
			// 將 DataTransfer 儲存的檔案賦予給實際提交的 input
			realInput.files = fileStore.files;
		}
	}

	// 🎨 預覽渲染邏輯 (使用 URL.createObjectURL，即時且不卡頓)
	function renderPreviews() {
		const container = document.getElementById('previewContainer');
		if (!container) return;

		container.innerHTML = ''; // 清空舊預覽

		const files = fileStore.files;
		for (let i = 0; i < files.length; i++) {
			const file = files[i];
			const objectUrl = URL.createObjectURL(file);

			const itemWrapper = document.createElement('div');
			itemWrapper.className = 'preview-item';

			itemWrapper.innerHTML = `
				<img src="${objectUrl}" alt="預覽照片" onload="URL.revokeObjectURL(this.src)">
				<button type="button" class="delete-btn" onclick="removeFile(${i})" title="刪除照片">✕</button>
			`;

			container.appendChild(itemWrapper);
		}
	}

	// Helper: 將檔案轉成 Base64 字串 (供 SessionStorage 備份)
	function readFileAsBase64(file) {
		return new Promise((resolve, reject) => {
			const reader = new FileReader();
			reader.onload = () => resolve(reader.result);
			reader.onerror = error => reject(error);
			reader.readAsDataURL(file);
		});
	}

	// =========================================================================
	// 💾 SessionStorage 管理 (驗證失敗重載時還原圖片)
	// =========================================================================

	function getStoredFiles() {
		try {
			return JSON.parse(sessionStorage.getItem('uploaded_evidence_files') || '[]');
		} catch (e) {
			return [];
		}
	}

	function saveFileToSession(name, base64) {
		const list = getStoredFiles();
		if (!list.some(item => item.name === name)) {
			list.push({ name: name, base64: base64 });
			sessionStorage.setItem('uploaded_evidence_files', JSON.stringify(list));
		}
	}

	function removeFileFromSession(name) {
		let list = getStoredFiles();
		list = list.filter(item => item.name !== name);
		sessionStorage.setItem('uploaded_evidence_files', JSON.stringify(list));
	}

	function base64ToFile(base64, filename) {
		const arr = base64.split(',');
		const mime = arr[0].match(/:(.*?);/)[1];
		const bstr = atob(arr[1]);
		let n = bstr.length;
		const u8arr = new Uint8Array(n);
		while (n--) {
			u8arr[n] = bstr.charCodeAt(n);
		}
		return new File([u8arr], filename, { type: mime });
	}

	function restoreFromSessionStorage() {
		const list = getStoredFiles();
		if (list.length > 0) {
			// 先防呆清空 fileStore，避免重複載入
			while (fileStore.items.length > 0) {
				fileStore.items.remove(0);
			}

			list.forEach(item => {
				try {
					const file = base64ToFile(item.base64, item.name);
					fileStore.items.add(file);
				} catch (e) {
					console.error("還原圖片失敗:", e);
				}
			});
			syncFileInput();
			renderPreviews();
		}
	}
</script>

</body>
</html>
