<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webond - 忘記密碼</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
	rel="stylesheet">

<style>
:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);
}

* {
	box-sizing: border-box;
}

body {
	font-family: var(--font-body);
	background-color: var(--color-bg);
	min-height: 100vh;
	margin: 0;
	padding: 40px 20px;
	display: flex;
	justify-content: center;
	align-items: center;
	color: var(--color-ink);
}

.box {
	width: 100%;
	max-width: 420px;
	background: var(--color-surface);
	padding: 44px 40px;
	border-radius: var(--radius-lg);
	border: 1px solid var(--color-border);
	box-shadow: var(--shadow-md);
}

.auth-mascot {
	position: relative;
	width: 100%;
	max-width: 120px;
	aspect-ratio: 1/0.95;
	margin: 0 auto 16px;
}

.auth-mascot__blob {
	position: absolute;
	inset: 12% 6% 10% 18%;
	background: var(--color-yellow);
	border-radius: 58% 42% 48% 52%/44% 55% 45% 56%;
}

.auth-mascot__head {
	position: absolute;
	top: 0;
	right: 6%;
	width: 66%;
	height: 66%;
	background: var(--color-surface-soft);
	border: 1.5px solid var(--color-border);
	border-radius: 56% 44% 45% 55%/58% 50% 50% 42%;
	box-shadow: var(--shadow-sm);
}

.auth-mascot__head .eye {
	position: absolute;
	top: 44%;
	width: 8px;
	height: 10px;
	background: var(--color-ink);
	border-radius: 50%;
}

.auth-mascot__head .eye--l {
	left: 30%;
}

.auth-mascot__head .eye--r {
	left: 52%;
}

.auth-brand {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 8px;
	margin-bottom: 4px;
}

.auth-brand-mark {
	display: flex;
	gap: 4px;
}

.auth-brand-eye {
	position: relative;
	width: 12px;
	height: 12px;
	background: var(--color-ink);
	border-radius: 50%;
}

.auth-brand-eye::after {
	content: '';
	position: absolute;
	width: 3px;
	height: 3px;
	top: 2.5px;
	left: 2.5px;
	background: #fff;
	border-radius: 50%;
}

.auth-brand-text {
	font-family: var(--font-display);
	font-weight: 800;
	font-size: 14px;
	letter-spacing: 0.5px;
	color: var(--color-ink);
}

h2 {
	font-family: var(--font-display);
	text-align: center;
	color: var(--color-ink);
	font-weight: 800;
	font-size: 24px;
	margin: 0 0 6px;
}

.subtitle {
	text-align: center;
	color: var(--color-ink-soft);
	font-size: 14px;
	margin: 0 0 26px;
}

.form-group {
	margin-bottom: 20px;
}

label {
	display: block;
	font-weight: 700;
	margin-bottom: 8px;
	color: var(--color-ink);
	font-size: 14px;
}

input {
	width: 100%;
	padding: 14px 16px;
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	background: var(--color-surface-soft);
	font-size: 15px;
	font-family: inherit;
	box-sizing: border-box;
	transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input:focus {
	outline: none;
	border-color: var(--color-yellow-deep);
	background-color: #fff;
	box-shadow: 0 0 0 3px rgba(255, 201, 77, 0.35);
}

.btn-block {
	width: 100%;
	padding: 16px;
	background: var(--color-ink);
	color: white;
	border: none;
	border-radius: var(--radius-full);
	cursor: pointer;
	font-weight: 800;
	font-family: var(--font-display);
	font-size: 15px;
	margin-top: 10px;
	transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.btn-block:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-md);
}

.field-error {
	color: #be123c;
	font-size: 13px;
	margin-top: 6px;
	display: block;
	font-weight: 500;
}

.success-msg {
	color: #15803d;
	font-size: 13px;
	margin-top: 6px;
	display: block;
	font-weight: 500;
}

.input-group {
	display: flex;
	gap: 8px;
}

.input-group input {
	flex: 1;
}

.btn-sm {
	padding: 0 16px;
	background: var(--color-ink);
	color: white;
	border: none;
	border-radius: var(--radius-full);
	cursor: pointer;
	white-space: nowrap;
	font-weight: 700;
	font-size: 13px;
	transition: transform 0.15s ease;
}

.btn-sm:hover {
	transform: translateY(-2px);
}

.btn-sm:disabled {
	background: #b8b0a2;
	cursor: not-allowed;
	transform: none;
}

.back-link {
	text-align: center;
	margin-top: 24px;
	font-size: 14px;
}

.back-link a {
	color: var(--color-ink-soft);
	text-decoration: underline;
	transition: color 0.15s ease;
}

.back-link a:hover {
	color: var(--color-ink);
}

/* ⬅️ 左上角返回按鈕，各驗證頁面共用同一套樣式（小尺寸、貼齊角落） */
.back-nav {
	display: inline-flex;
	align-items: center;
	gap: 5px;
	margin: -14px 0 16px -10px; /* 往卡片左上角收攏 */
	padding: 5px 10px;
	font-size: 12px;
	font-weight: 700;
	color: var(--color-ink-soft);
	background: transparent;
	border-radius: var(--radius-full);
	text-decoration: none;
	transition: color 0.15s ease, background 0.15s ease;
}

.back-nav:hover {
	color: var(--color-ink);
	background: var(--color-bg);
}

.back-nav svg {
	width: 12px;
	height: 12px;
	stroke: currentColor;
	flex-shrink: 0;
}
</style>
</head>
<body>

	<div class="box">
		<a th:href="@{/}" class="back-nav"> <svg viewBox="0 0 24 24"
				fill="none" stroke="currentColor" stroke-width="2.5"
				stroke-linecap="round" stroke-linejoin="round">
				<path d="M19 12H5" />
				<path d="M12 19l-7-7 7-7" /></svg> 返回首頁
		</a>

		<div class="auth-mascot" aria-hidden="true">
			<div class="auth-mascot__blob"></div>
			<div class="auth-mascot__head">
				<span class="eye eye--l"></span> <span class="eye eye--r"></span>
			</div>
		</div>

		<div class="auth-brand">
			<span class="auth-brand-mark"> <span class="auth-brand-eye"></span>
				<span class="auth-brand-eye"></span>
			</span> <span class="auth-brand-text">Webond 閒人出租</span>
		</div>

		<h2>重設密碼</h2>
		<p class="subtitle">請驗證您的 Email 帳號後設定新密碼</p>

		<form th:action="@{/member/resetPassword}" method="post">

			<div class="form-group">
				<label for="email">註冊 Email *</label>
				<div class="input-group">
					<input type="email" id="email" name="email" th:value="${email}"
						placeholder="請輸入註冊的 Email" required>
					<button type="button" class="btn-sm" id="sendOtpBtn"
						onclick="sendForgotPasswordOtp()">發送驗證碼</button>
				</div>
				<span id="otpMsg"></span> <span class="field-error"
					th:if="${emailError != null}" th:text="${emailError}"></span>
			</div>

			<div class="form-group">
				<label for="otpCode">6 位數驗證碼 *</label> <input type="text"
					id="otpCode" name="otpCode" maxlength="6"
					placeholder="請輸入 Email 收到之驗證碼" required> <span
					class="field-error" th:if="${otpError != null}"
					th:text="${otpError}"></span>
			</div>

			<div class="form-group">
				<label for="newPassword">新密碼 *</label> <input type="password"
					id="newPassword" name="newPassword" placeholder="請設定新密碼"
					autocomplete="new-password" required> <span
					class="field-error" th:if="${passwordError != null}"
					th:text="${passwordError}"></span>
			</div>

			<button type="submit" class="btn-block">重設密碼並儲存</button>
		</form>

		<div class="back-link">
			<a th:href="@{/member/login}">返回登入頁面</a>
		</div>
	</div>

	<script>
let cooldown = 0;
let timer = null;

// 💡 2. 頁面載入完畢後，強制清空密碼欄位
window.addEventListener('DOMContentLoaded', () => {
	const newPwdInput = document.getElementById('newPassword');
	if (newPwdInput) {
		newPwdInput.value = '';
	}
});

function sendForgotPasswordOtp() {
	const email = document.getElementById('email').value.trim();
	const otpMsg = document.getElementById('otpMsg');
	const btn = document.getElementById('sendOtpBtn');

	if (!email) {
		otpMsg.className = 'field-error';
		otpMsg.innerText = '請先輸入 Email！';
		return;
	}

	btn.disabled = true;
	otpMsg.className = 'success-msg';
	otpMsg.innerText = '發送中...';

	const params = new URLSearchParams();
	params.append('email', email);

	fetch('/member/send-forgot-otp', {
		method: 'POST',
		headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		body: params
	})
	.then(res => res.json())
	.then(data => {
		if (data.success) {
			otpMsg.className = 'success-msg';
			otpMsg.innerText = '✓ ' + data.message;
			startTimer(60);
		} else {
			otpMsg.className = 'field-error';
			otpMsg.innerText = '✕ ' + data.message;
			btn.disabled = false;
		}
	})
	.catch(() => {
		otpMsg.className = 'field-error';
		otpMsg.innerText = '系統錯誤，請稍後再試！';
		btn.disabled = false;
	});
}

function startTimer(seconds) {
	cooldown = seconds;
	const btn = document.getElementById('sendOtpBtn');
	clearInterval(timer);
	timer = setInterval(() => {
		if (cooldown > 0) {
			btn.innerText = `${cooldown}s`;
			cooldown--;
		} else {
			clearInterval(timer);
			btn.innerText = '發送驗證碼';
			btn.disabled = false;
		}
	}, 1000);
}
</script>

</body>
</html>
