<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Webond - 忘記密碼</title>
<style>
body {
	font-family: "Microsoft JhengHei", sans-serif;
	background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	margin: 0;
}
.box {
	width: 100%;
	max-width: 400px;
	background: #fff;
	padding: 35px;
	border-radius: 12px;
	box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}
h2 { text-align: center; color: #0369a1; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: 600; margin-bottom: 6px; color: #334155; font-size: 14px; }
input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
.btn-block { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
.btn-block:hover { background: #0284c7; }
.field-error { color: #b91c1c; font-size: 13px; margin-top: 4px; display: block; }
.success-msg { color: #16a34a; font-size: 13px; margin-top: 4px; display: block; }
.input-group { display: flex; gap: 8px; }
.btn-sm { padding: 0 12px; background: #0284c7; color: white; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
.btn-sm:disabled { background: #94a3b8; cursor: not-allowed; }
</style>
</head>
<body>

<div class="box">
	<h2>重設密碼</h2>

	<form th:action="@{/member/resetPassword}" method="post">
		
		<div class="form-group">
			<label for="email">註冊 Email *</label>
			<div class="input-group">
				<input type="email" id="email" name="email" th:value="${email}" placeholder="請輸入註冊的 Email" required>
				<button type="button" class="btn-sm" id="sendOtpBtn" onclick="sendForgotPasswordOtp()">發送驗證碼</button>
			</div>
			<span id="otpMsg"></span>
			<span class="field-error" th:if="${emailError != null}" th:text="${emailError}"></span>
		</div>

		<div class="form-group">
			<label for="otpCode">6 位數驗證碼 *</label>
			<input type="text" id="otpCode" name="otpCode" maxlength="6" placeholder="請輸入 Email 收到之驗證碼" required>
			<span class="field-error" th:if="${otpError != null}" th:text="${otpError}"></span>
		</div>

		<div class="form-group">
			<label for="newPassword">新密碼 *</label>
			<input type="password" id="newPassword" name="newPassword" placeholder="請設定新密碼" autocomplete="new-password" required>
			<span class="field-error" th:if="${passwordError != null}" th:text="${passwordError}"></span>
		</div>

		<button type="submit" class="btn-block">重設密碼並儲存</button>
	</form>

	<div style="text-align: center; margin-top: 20px;">
		<a th:href="@{/member/login}" style="color: #64748b; font-size: 14px; text-decoration: none;">返回登入頁面</a>
	</div>
</div>

<script>
let cooldown = 0;
let timer = null;

// 💡 2. 頁面載入完畢後，強制清空密碼欄位
window.addEventListener('DOMContentLoaded', () => {
	const newPwdInput = document.getElementById('newPassword');
	if (newPwdInput) {
		newPwdInput.value = '';
	}
});

function sendForgotPasswordOtp() {
	const email = document.getElementById('email').value.trim();
	const otpMsg = document.getElementById('otpMsg');
	const btn = document.getElementById('sendOtpBtn');

	if (!email) {
		otpMsg.className = 'field-error';
		otpMsg.innerText = '請先輸入 Email！';
		return;
	} 

	btn.disabled = true;
	otpMsg.className = 'success-msg';
	otpMsg.innerText = '發送中...';

	const params = new URLSearchParams();
	params.append('email', email);

	fetch('/member/send-forgot-otp', {
		method: 'POST',
		headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		body: params
	})
	.then(res => res.json())
	.then(data => {
		if (data.success) {
			otpMsg.className = 'success-msg';
			otpMsg.innerText = '✓ ' + data.message;
			startTimer(60);
		} else {
			otpMsg.className = 'field-error';
			otpMsg.innerText = '✕ ' + data.message;
			btn.disabled = false;
		}
	})
	.catch(() => {
		otpMsg.className = 'field-error';
		otpMsg.innerText = '系統錯誤，請稍後再試！';
		btn.disabled = false;
	});
}

function startTimer(seconds) {
	cooldown = seconds;
	const btn = document.getElementById('sendOtpBtn');
	clearInterval(timer);
	timer = setInterval(() => {
		if (cooldown > 0) {
			btn.innerText = `${cooldown}s`;
			cooldown--;
		} else {
			clearInterval(timer);
			btn.innerText = '發送驗證碼';
			btn.disabled = false;
		}
	}, 1000);
}
</script>

</body>
</html>
