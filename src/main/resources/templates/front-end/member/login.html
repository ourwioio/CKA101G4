<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Webond 會員登入</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei"; 
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); 
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box { 
            width: 100%;
            max-width: 450px; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(186, 230, 253, 0.6); 
        }
        h2 { 
            text-align: center; 
            color: #0369a1; 
            margin-top: 0;
            margin-bottom: 5px; 
            font-size: 26px;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group { 
            margin-bottom: 20px; 
            text-align: left;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        label { 
            font-weight: 600; 
            color: #0c4a6e; 
            font-size: 14px;
        }
        .forgot-link {
            font-size: 13px;
            color: #0284c7;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .forgot-link:hover {
            color: #0369a1;
            text-decoration: underline;
        }
        input[type="text"], input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1.5px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: background 0.2s ease;
            margin-top: 10px;
        }
        button:hover { 
            background: #0284c7; 
        }
        
        /* 🎯 高質感錯誤訊息提示框 (紅色) */
        .error-message {
            padding: 0.75rem; 
            font-size: 0.875rem; 
            color: #b91c1c; 
            background-color: #fee2e2; 
            border: 1px solid #fca5a5; 
            border-radius: 0.5rem; 
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            text-align: left;
        }

        .error-message svg {
            width: 1.25rem; 
            height: 1.25rem; 
            margin-right: 0.5rem; 
            fill: currentColor;
            flex-shrink: 0;
        }

        /* 🟢 高質感成功訊息提示框 (綠色) */
        .success-message {
            padding: 0.75rem; 
            font-size: 0.875rem; 
            color: #15803d; 
            background-color: #dcfce7; 
            border: 1px solid #86efac; 
            border-radius: 0.5rem; 
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            text-align: left;
        }

        .success-message svg {
            width: 1.25rem; 
            height: 1.25rem; 
            margin-right: 0.5rem; 
            fill: currentColor;
            flex-shrink: 0;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }
        .register-link a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>歡迎回來 Webond</h2>
    <p class="subtitle">請輸入您的帳號密碼進行登入</p>
    
    <div class="success-message" th:if="${successMsg != null}">
        <svg viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
        </svg>
        <span th:text="${successMsg}">操作成功！</span>
    </div>

    <div class="error-message" th:if="${errorMsgs != null}">
        <svg viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
        </svg>
        <span th:text="${errorMsgs}">帳號或密碼錯誤，請稍後再試。</span>
    </div>

    <form th:action="@{/member/logincontroller}" method="post">
        
        <div class="form-group">
            <label for="email">Email 帳號 *</label>
            <input type="email" id="email" name="email" th:value="${email}" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
            <div class="label-row">
                <label for="password">密碼 *</label>
                <a th:href="@{/member/forgotPassword}" class="forgot-link">忘記密碼？</a>
            </div>
            <input type="password" id="password" name="password" placeholder="請輸入密碼" required>
        </div>

        <button type="submit">立即登入</button>
    </form>
    
    <div class="register-link">
        還沒有帳號嗎？ <a th:href="@{/member/register}">立即註冊</a>
    </div>
</div>

</body>
</html>
