<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Webond 會員註冊與實名認證</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
	rel="stylesheet">

<style>
:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);
}

* {
	box-sizing: border-box;
}

body {
	font-family: var(--font-body);
	background-color: var(--color-bg);
	min-height: 100vh;
	margin: 0;
	padding: 40px 20px;
	display: flex;
	justify-content: center;
	align-items: center;
	color: var(--color-ink);
}

.register-box {
	width: 100%;
	max-width: 650px;
	background: var(--color-surface);
	padding: 44px 40px;
	border-radius: var(--radius-lg);
	border: 1px solid var(--color-border);
	box-shadow: var(--shadow-md);
}

.auth-mascot {
	position: relative;
	width: 100%;
	max-width: 110px;
	aspect-ratio: 1/0.95;
	margin: 0 auto 14px;
}

.auth-mascot__blob {
	position: absolute;
	inset: 12% 6% 10% 18%;
	background: var(--color-yellow);
	border-radius: 58% 42% 48% 52%/44% 55% 45% 56%;
}

.auth-mascot__head {
	position: absolute;
	top: 0;
	right: 6%;
	width: 66%;
	height: 66%;
	background: var(--color-surface-soft);
	border: 1.5px solid var(--color-border);
	border-radius: 56% 44% 45% 55%/58% 50% 50% 42%;
	box-shadow: var(--shadow-sm);
}

.auth-mascot__head .eye {
	position: absolute;
	top: 44%;
	width: 8px;
	height: 10px;
	background: var(--color-ink);
	border-radius: 50%;
}

.auth-mascot__head .eye--l {
	left: 30%;
}

.auth-mascot__head .eye--r {
	left: 52%;
}

.auth-brand {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 8px;
	margin-bottom: 4px;
}

.auth-brand-mark {
	display: flex;
	gap: 4px;
}

.auth-brand-eye {
	position: relative;
	width: 12px;
	height: 12px;
	background: var(--color-ink);
	border-radius: 50%;
}

.auth-brand-eye::after {
	content: '';
	position: absolute;
	width: 3px;
	height: 3px;
	top: 2.5px;
	left: 2.5px;
	background: #fff;
	border-radius: 50%;
}

.auth-brand-text {
	font-family: var(--font-display);
	font-weight: 800;
	font-size: 14px;
	letter-spacing: 0.5px;
	color: var(--color-ink);
}

h2 {
	text-align: center;
	font-family: var(--font-display);
	color: var(--color-ink);
	margin-top: 0;
	margin-bottom: 5px;
	font-size: 26px;
	font-weight: 800;
}

p.subtitle {
	text-align: center;
	color: var(--color-ink-soft);
	font-size: 14px;
	margin-bottom: 30px;
}

.section-title {
	text-align: left;
	font-size: 15px;
	font-weight: 800;
	font-family: var(--font-display);
	color: var(--color-ink);
	border-bottom: 2px solid var(--color-border);
	padding-bottom: 8px;
	margin-top: 25px;
	margin-bottom: 15px;
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 15px;
}

.form-group {
	margin-bottom: 15px;
	text-align: left;
}

.form-group.full-width {
	grid-column: span 2;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: 700;
	color: var(--color-ink);
	font-size: 14px;
}

input[type="text"], input[type="email"], input[type="password"], select,
	input[type="file"] {
	width: 100%;
	padding: 12px;
	box-sizing: border-box;
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	font-size: 14px;
	font-family: inherit;
	background-color: var(--color-surface-soft);
	transition: all 0.2s ease;
}

input:focus, select:focus {
	outline: none;
	border-color: var(--color-yellow-deep);
	background-color: #fff;
	box-shadow: 0 0 0 3px rgba(255, 201, 77, 0.35);
}

.radio-group {
	display: flex;
	gap: 20px;
	padding-top: 10px;
}

button[type="submit"] {
	width: 100%;
	padding: 16px;
	background: var(--color-ink);
	color: white;
	border: none;
	border-radius: var(--radius-full);
	cursor: pointer;
	font-size: 16px;
	font-weight: 800;
	font-family: var(--font-display);
	transition: transform 0.18s ease, box-shadow 0.18s ease;
	margin-top: 25px;
}

button[type="submit"]:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-md);
}

/* 🎯 統一的欄位下方紅字錯誤訊息樣式 */
.field-error {
	color: #be123c;
	font-size: 12px;
	font-weight: 500;
	margin-top: 6px;
	display: block;
}

/* 📸 預覽圖樣式 */
.img-preview {
	margin-top: 8px;
	max-width: 100%;
	max-height: 120px;
	border-radius: var(--radius-md);
	border: 1px dashed var(--color-border);
	object-fit: cover;
}

.img-preview-container {
	font-size: 12px;
	color: var(--color-ink-soft);
	margin-top: 6px;
	margin-bottom: 4px;
}

/* ✉️ Email 驗證按鈕組合樣式 */
.input-with-btn {
	display: flex;
	gap: 8px;
}

.input-with-btn input {
	flex: 1;
}

.btn-send-otp {
	width: auto;
	padding: 0 16px;
	margin-top: 0;
	background: var(--color-ink);
	color: white;
	border: none;
	font-size: 13px;
	font-weight: 700;
	white-space: nowrap;
	border-radius: var(--radius-full);
	cursor: pointer;
	transition: transform 0.15s ease;
}

.btn-send-otp:hover {
	transform: translateY(-2px);
}

.btn-send-otp:disabled {
	background: #b8b0a2;
	cursor: not-allowed;
	transform: none;
}

.otp-msg {
	font-size: 12px;
	margin-top: 5px;
	display: block;
	font-weight: 500;
}

.login-link {
	text-align: center;
	margin-top: 20px;
	font-size: 14px;
	color: var(--color-ink-soft);
}

.login-link a {
	color: var(--color-ink);
	text-decoration: underline;
	font-weight: 700;
}
/* ⬅️ 左上角返回按鈕，各驗證頁面共用同一套樣式（小尺寸、貼齊角落） */
.back-nav {
	display: inline-flex;
	align-items: center;
	gap: 5px;
	margin: -14px 0 16px -10px; /* 往卡片左上角收攏 */
	padding: 5px 10px;
	font-size: 12px;
	font-weight: 700;
	color: var(--color-ink-soft);
	background: transparent;
	border-radius: var(--radius-full);
	text-decoration: none;
	transition: color 0.15s ease, background 0.15s ease;
}

.back-nav:hover {
	color: var(--color-ink);
	background: var(--color-bg);
}

.back-nav svg {
	width: 12px;
	height: 12px;
	stroke: currentColor;
	flex-shrink: 0;
}
</style>
</head>
<body>

	<div class="register-box">
		<a th:href="@{/}" class="back-nav"> <svg viewBox="0 0 24 24"
				fill="none" stroke="currentColor" stroke-width="2.5"
				stroke-linecap="round" stroke-linejoin="round">
				<path d="M19 12H5" />
				<path d="M12 19l-7-7 7-7" /></svg> 返回首頁
		</a>

		<div class="auth-mascot" aria-hidden="true">
			<div class="auth-mascot__blob"></div>
			<div class="auth-mascot__head">
				<span class="eye eye--l"></span> <span class="eye eye--r"></span>
			</div>
		</div>

		<div class="auth-brand">
			<span class="auth-brand-mark"> <span class="auth-brand-eye"></span>
				<span class="auth-brand-eye"></span>
			</span> <span class="auth-brand-text">Webond 閒人出租</span>
		</div>

		<h2>加入 Webond 會員</h2>
		<p class="subtitle">請填寫以下欄位，註冊同時完成 KYC 實名認證與金流綁定</p>

		<form th:action="@{/member/doRegister}" method="post"
			th:object="${memberVO}" enctype="multipart/form-data"
			onsubmit="return validateFormBeforeSubmit()">

			<div class="section-title">🔒 帳戶基本資料</div>
			<div class="form-grid">

				<div class="form-group">
					<label for="password">登入密碼 *</label> <input type="password"
						id="password" name="password" th:value="${rawPassword}"
						placeholder="請設定登入密碼"> <span class="field-error"
						th:if="${#fields.hasErrors('passwordHash')}"
						th:errors="*{passwordHash}"></span>
				</div>

				<div class="form-group">
					<label for="nickname">會員暱稱 *</label> <input type="text"
						id="nickname" th:field="*{nickname}" placeholder="填寫社群暱稱">
					<span class="field-error" th:if="${#fields.hasErrors('nickname')}"
						th:errors="*{nickname}"></span>
				</div>

				<div class="form-group">
					<label for="phone">手機號碼 *</label> <input type="text" id="phone"
						th:field="*{phone}" placeholder="0912345678"> <span
						class="field-error" th:if="${#fields.hasErrors('phone')}"
						th:errors="*{phone}"></span>
				</div>

				<div class="form-group">
					<label>性別 *</label>
					<div class="radio-group">
						<label><input type="radio" th:field="*{gender}" value="1">
							男</label> <label><input type="radio" th:field="*{gender}"
							value="0"> 女</label> <label><input type="radio"
							th:field="*{gender}" value="2"> 其他</label>
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('gender')}"
						th:errors="*{gender}"></span>
				</div>

				<div class="form-group">
					<label for="memberPicFile">個人大頭貼</label> <input type="file"
						id="memberPicFile" name="memberPicFile" accept="image/*">
					<input type="hidden" name="tempMemberPic"
						th:value="${tempMemberPic}">
					<div class="img-preview-container"
						th:if="${tempMemberPic != null and !tempMemberPic.isEmpty()}">
						<span>✓ 已暫存先前選擇的照片：</span><br> <img class="img-preview"
							th:src="'data:image/jpeg;base64,' + ${tempMemberPic}" alt="大頭貼預覽">
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('memberPic')}"
						th:errors="*{memberPic}"></span>
				</div>

				<div class="form-group full-width">
					<label for="memberIntro">個人簡介</label> <input type="text"
						id="memberIntro" th:field="*{memberIntro}"
						placeholder="一兩句話介紹一下自己吧！"> <span class="field-error"
						th:if="${#fields.hasErrors('memberIntro')}"
						th:errors="*{memberIntro}"></span>
				</div>
			</div>

			<div class="section-title">🪪 KYC 實名認證資料</div>
			<div class="form-grid">

				<div class="form-group">
					<label for="realName">真實姓名 *</label> <input type="text"
						id="realName" th:field="*{realName}" placeholder="需與身分證相同">
					<span class="field-error" th:if="${#fields.hasErrors('realName')}"
						th:errors="*{realName}"></span>
				</div>

				<div class="form-group">
					<label for="idNumber">身分證字號 *</label> <input type="text"
						id="idNumber" th:field="*{idNumber}" placeholder="A123456789">
					<span class="field-error" th:if="${#fields.hasErrors('idNumber')}"
						th:errors="*{idNumber}"></span>
				</div>

				<div class="form-group">
					<label for="idFrontImageFile">身分證正面照片 *</label> <input type="file"
						id="idFrontImageFile" name="idFrontImageFile" accept="image/*">
					<input type="hidden" id="tempIdFrontImage" name="tempIdFrontImage"
						th:value="${tempIdFrontImage}">
					<div class="img-preview-container"
						th:if="${tempIdFrontImage != null and !tempIdFrontImage.isEmpty()}">
						<span>✓ 已暫存身分證正面照片：</span><br> <img class="img-preview"
							th:src="'data:image/jpeg;base64,' + ${tempIdFrontImage}"
							alt="身分證正面預覽">
					</div>
					<span class="field-error" th:if="${idFrontImageError != null}"
						th:text="${idFrontImageError}"></span>
				</div>

				<div class="form-group">
					<label for="idBackImageFile">身分證反面照片 *</label> <input type="file"
						id="idBackImageFile" name="idBackImageFile" accept="image/*">
					<input type="hidden" id="tempIdBackImage" name="tempIdBackImage"
						th:value="${tempIdBackImage}">
					<div class="img-preview-container"
						th:if="${tempIdBackImage != null and !tempIdBackImage.isEmpty()}">
						<span>✓ 已暫存身分證反面照片：</span><br> <img class="img-preview"
							th:src="'data:image/jpeg;base64,' + ${tempIdBackImage}"
							alt="身分證反面預覽">
					</div>
					<span class="field-error" th:if="${idBackImageError != null}"
						th:text="${idBackImageError}"></span>
				</div>

				<div class="form-group full-width">
					<label for="faceImageFile">自拍人臉照片 *</label> <input type="file"
						id="faceImageFile" name="faceImageFile" accept="image/*">
					<input type="hidden" id="tempFaceImage" name="tempFaceImage"
						th:value="${tempFaceImage}">
					<div class="img-preview-container"
						th:if="${tempFaceImage != null and !tempFaceImage.isEmpty()}">
						<span>✓ 已暫存先前上傳的人臉照片：</span><br> <img class="img-preview"
							th:src="'data:image/jpeg;base64,' + ${tempFaceImage}" alt="自拍照預覽">
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('faceImage')}"
						th:errors="*{faceImage}"></span>
				</div>
			</div>

			<div class="section-title">💰 提領銀行帳戶綁定</div>
			<div class="form-grid">

				<div class="form-group">
					<label for="bankCode">銀行代碼 (3碼) *</label> <input type="text"
						id="bankCode" th:field="*{bankCode}" placeholder="例如：822">
					<span class="field-error" th:if="${#fields.hasErrors('bankCode')}"
						th:errors="*{bankCode}"></span>
				</div>

				<div class="form-group">
					<label for="bankAccount">銀行帳號 *</label> <input type="text"
						id="bankAccount" th:field="*{bankAccount}" placeholder="10-14位數字">
					<span class="field-error"
						th:if="${#fields.hasErrors('bankAccount')}"
						th:errors="*{bankAccount}"></span>
				</div>
			</div>

			<!-- 📧 最後一步：Email 驗證與送出（避免驗證碼在填完前面一長串資料後過期） -->
			<div class="section-title">📧 Email 驗證（最後一步）</div>
			<div class="form-grid">

				<div class="form-group full-width">
					<label for="email">Email 帳號 (登入用) *</label>
					<div class="input-with-btn">
						<input type="email" id="email" th:field="*{email}"
							placeholder="example@email.com">
						<button type="button" class="btn-send-otp" id="sendOtpBtn"
							onclick="sendOtp()">取得驗證碼</button>
					</div>
					<span id="otpMsg" class="otp-msg"></span> <span class="field-error"
						th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
				</div>

				<div class="form-group full-width">
					<label for="otpCode">Email 驗證碼 *</label>
					<div class="input-with-btn">
						<input type="text" id="otpCode" name="otpCode" maxlength="6"
							th:value="${inputOtpCode}" placeholder="請輸入 6 位數字驗證碼">
						<button type="button" class="btn-send-otp" id="verifyOtpBtn"
							style="background: #15803d;" onclick="verifyOtp()">核對驗證碼</button>
					</div>
					<span id="verifyMsg" class="otp-msg"></span> <span
						class="field-error" th:if="${otpError != null}"
						th:text="${otpError}"></span>
				</div>
			</div>

			<button type="submit">提交註冊並送出實名審核</button>
		</form>

		<div class="login-link">
			已經有帳號了？ <a th:href="@{/member/login}">立即登入</a>
		</div>
	</div>

	<script>
		let cooldownSeconds = 0;
		let timer = null;
		let isEmailVerified = false;

		function sendOtp() {
			const emailInput = document.getElementById('email');
			const email = emailInput.value.trim();
			const otpMsg = document.getElementById('otpMsg');
			const sendBtn = document.getElementById('sendOtpBtn');

			if (!email) {
				otpMsg.style.color = '#b91c1c';
				otpMsg.innerText = '⚠️ 請先輸入 Email 帳號！';
				return;
			}

			sendBtn.disabled = true;
			otpMsg.style.color = '#0284c7';
			otpMsg.innerText = '⏳ 驗證碼發送中，請稍候...';

			const params = new URLSearchParams();
			params.append('email', email);

			fetch('/member/send-otp', {
				method: 'POST',
				headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
				body: params
			})
			.then(response => response.json().then(data => ({ status: response.status, body: data })))
			.then(res => {
				if (res.status === 200 && res.body.success) {
					otpMsg.style.color = '#16a34a';
					otpMsg.innerText = '✓ ' + (res.body.message || '驗證碼已寄出，請至信箱查收！');
					startCooldown(60);
				} else {
					otpMsg.style.color = '#b91c1c';
					otpMsg.innerText = '❌ ' + (res.body.message || '發送失敗，請確認 Email 格式！');
					sendBtn.disabled = false;
				}
			})
			.catch(err => {
				otpMsg.style.color = '#b91c1c';
				otpMsg.innerText = '❌ 系統發送失敗，請稍後再試！';
				sendBtn.disabled = false;
			});
		}

		function verifyOtp() {
		    const emailInput = document.getElementById('email');
		    const otpCodeInput = document.getElementById('otpCode');
		    const email = emailInput.value.trim();
		    const otpCode = otpCodeInput.value.trim();
		    const verifyMsg = document.getElementById('verifyMsg');

		    if (!email || !otpCode) {
		        verifyMsg.style.color = '#b91c1c';
		        verifyMsg.innerText = '⚠️ 請完整填寫 Email 與 6 位數驗證碼！';
		        return;
		    }

		    const params = new URLSearchParams();
		    params.append('email', email);
		    params.append('inputOtp', otpCode);

		    fetch('/member/verify-otp', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		        body: params
		    })
		    .then(response => response.json().then(data => ({ status: response.status, body: data })))
		    .then(res => {
		        if (res.status === 200 && res.body.success) {
		            verifyMsg.style.color = '#16a34a';
		            verifyMsg.innerText = '🎉 ' + (res.body.message || 'Email 驗證成功！');
		            isEmailVerified = true;
		            
		            document.getElementById('verifyOtpBtn').disabled = true;
		            document.getElementById('sendOtpBtn').disabled = true;
		        } else {
		            verifyMsg.style.color = '#b91c1c';
		            verifyMsg.innerText = '❌ ' + (res.body.message || '驗證碼錯誤或已過期！');
		            isEmailVerified = false;
		        }
		    })
		    .catch(err => {
		        verifyMsg.style.color = '#b91c1c';
		        verifyMsg.innerText = '❌ 驗證失敗，請再試一次！';
		    });
		}

		function startCooldown(seconds) {
			cooldownSeconds = seconds;
			const sendBtn = document.getElementById('sendOtpBtn');
			
			clearInterval(timer);
			timer = setInterval(() => {
				if (cooldownSeconds > 0) {
					sendBtn.innerText = `重新發送 (${cooldownSeconds}s)`;
					cooldownSeconds--;
				} else {
					clearInterval(timer);
					sendBtn.innerText = '取得驗證碼';
					sendBtn.disabled = false;
				}
			}, 1000);
		}

		function validateFormBeforeSubmit() {
			// 如果頁面上已經有 OTP 錯誤訊息或未驗證，防止表單送出
			if (!isEmailVerified) {
				alert('請先點擊「核對驗證碼」成功完成 Email 驗證後，再提交註冊表單！');
				return false;
			}

			// 人臉照片檢查：需上傳檔案，或已有先前驗證失敗回填的暫存照片
			const faceFile = document.getElementById('faceImageFile');
			const tempFace = document.getElementById('tempFaceImage');
			if (faceFile.files.length === 0 && (!tempFace.value || tempFace.value.trim() === '')) {
				alert('請上傳自拍人臉照片！');
				return false;
			}
			return true;
		}
	</script>

</body>
</html>
