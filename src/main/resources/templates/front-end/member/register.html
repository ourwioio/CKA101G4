<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Webond 會員註冊與實名認證</title>
<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
	background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
	min-height: 100vh;
	margin: 0;
	padding: 40px 20px;
	display: flex;
	justify-content: center;
	align-items: center;
}

.register-box {
	width: 100%;
	max-width: 650px;
	background: #ffffff;
	padding: 40px;
	border-radius: 16px;
	box-shadow: 0 10px 25px rgba(186, 230, 253, 0.6);
}

h2 {
	text-align: center;
	color: #0369a1;
	margin-top: 0;
	margin-bottom: 5px;
	font-size: 26px;
}

p.subtitle {
	text-align: center;
	color: #64748b;
	font-size: 14px;
	margin-bottom: 30px;
}

.section-title {
	text-align: left;
	font-size: 16px;
	font-weight: bold;
	color: #0c4a6e;
	border-bottom: 2px solid #e2e8f0;
	padding-bottom: 6px;
	margin-top: 25px;
	margin-bottom: 15px;
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 15px;
}

.form-group {
	margin-bottom: 15px;
	text-align: left;
}

.form-group.full-width {
	grid-column: span 2;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: 600;
	color: #0c4a6e;
	font-size: 14px;
}

input[type="text"], input[type="email"], input[type="password"], select, input[type="file"] {
	width: 100%;
	padding: 10px;
	box-sizing: border-box;
	border: 1.5px solid #cbd5e1;
	border-radius: 8px;
	font-size: 14px;
	background-color: #f8fafc;
	transition: all 0.3s ease;
}

input:focus, select:focus {
	outline: none;
	border-color: #38bdf8;
	background-color: #fff;
	box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
}

.radio-group {
	display: flex;
	gap: 20px;
	padding-top: 10px;
}

button[type="submit"] {
	width: 100%;
	padding: 14px;
	background: #0ea5e9;
	color: white;
	border: none;
	border-radius: 8px;
	cursor: pointer;
	font-size: 16px;
	font-weight: bold;
	transition: background 0.2s ease;
	margin-top: 25px;
}

button[type="submit"]:hover {
	background: #0284c7;
}

/* 🎯 統一的欄位下方紅字錯誤訊息樣式 */
.field-error {
	color: #b91c1c;
	font-size: 12px;
	font-weight: 500;
	margin-top: 6px;
	display: block;
}

/* 📸 預覽圖樣式 */
.img-preview {
	margin-top: 8px;
	max-width: 100%;
	max-height: 120px;
	border-radius: 6px;
	border: 1px dashed #cbd5e1;
	object-fit: cover;
}

.img-preview-container {
	font-size: 12px;
	color: #0284c7;
	margin-top: 6px;
	margin-bottom: 4px;
}

/* ✉️ Email 驗證按鈕組合樣式 */
.input-with-btn {
	display: flex;
	gap: 8px;
}

.input-with-btn input {
	flex: 1;
}

.btn-send-otp {
	width: auto;
	padding: 0 14px;
	margin-top: 0;
	background: #0284c7;
	color: white;
	border: none;
	font-size: 13px;
	font-weight: 600;
	white-space: nowrap;
	border-radius: 8px;
	cursor: pointer;
	transition: background 0.2s ease;
}

.btn-send-otp:hover {
	background: #0369a1;
}

.btn-send-otp:disabled {
	background: #94a3b8;
	cursor: not-allowed;
}

.otp-msg {
	font-size: 12px;
	margin-top: 5px;
	display: block;
	font-weight: 500;
}
</style>
</head>
<body>

	<div class="register-box">
		<h2>加入 Webond 會員</h2>
		<p class="subtitle">請填寫以下欄位，註冊同時完成 KYC 實名認證與金流綁定</p>

		<form th:action="@{/member/doRegister}" method="post"
			th:object="${memberVO}" enctype="multipart/form-data" onsubmit="return validateFormBeforeSubmit()">

			<div class="section-title">🔒 帳戶基本資料</div>
			<div class="form-grid">

				<div class="form-group full-width">
					<label for="email">Email 帳號 (登入用) *</label>
					<div class="input-with-btn">
						<input type="email" id="email" th:field="*{email}" placeholder="example@email.com">
						<button type="button" class="btn-send-otp" id="sendOtpBtn" onclick="sendOtp()">取得驗證碼</button>
					</div>
					<span id="otpMsg" class="otp-msg"></span>
					<span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
				</div>

				<div class="form-group full-width">
					<label for="otpCode">Email 驗證碼 *</label>
					<div class="input-with-btn">
						<input type="text" id="otpCode" name="otpCode" maxlength="6" 
							   th:value="${inputOtpCode}" placeholder="請輸入 6 位數字驗證碼">
						<button type="button" class="btn-send-otp" id="verifyOtpBtn" style="background:#059669;" onclick="verifyOtp()">核對驗證碼</button>
					</div>
					<span id="verifyMsg" class="otp-msg"></span>
					<span class="field-error" th:if="${otpError != null}" th:text="${otpError}"></span>
				</div>

				<div class="form-group">
					<label for="password">登入密碼 *</label>
					<input type="password" id="password" name="password" th:value="${rawPassword}" placeholder="請設定登入密碼">
					<span class="field-error" th:if="${#fields.hasErrors('passwordHash')}" th:errors="*{passwordHash}"></span>
				</div>

				<div class="form-group">
					<label for="nickname">會員暱稱 *</label>
					<input type="text" id="nickname" th:field="*{nickname}" placeholder="填寫社群暱稱">
					<span class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></span>
				</div>

				<div class="form-group">
					<label for="phone">手機號碼 *</label>
					<input type="text" id="phone" th:field="*{phone}" placeholder="0912345678">
					<span class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
				</div>

				<div class="form-group">
					<label>性別 *</label>
					<div class="radio-group">
						<label><input type="radio" th:field="*{gender}" value="1"> 男</label> 
						<label><input type="radio" th:field="*{gender}" value="0"> 女</label> 
						<label><input type="radio" th:field="*{gender}" value="2"> 其他</label>
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></span>
				</div>

				<div class="form-group">
					<label for="memberPicFile">個人大頭貼</label>
					<input type="file" id="memberPicFile" name="memberPicFile" accept="image/*">
					<input type="hidden" name="tempMemberPic" th:value="${tempMemberPic}">
					<div class="img-preview-container" th:if="${tempMemberPic != null and !tempMemberPic.isEmpty()}">
						<span>✓ 已暫存先前選擇的照片：</span><br>
						<img class="img-preview" th:src="'data:image/jpeg;base64,' + ${tempMemberPic}" alt="大頭貼預覽">
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('memberPic')}" th:errors="*{memberPic}"></span>
				</div>

				<div class="form-group full-width">
					<label for="memberIntro">個人簡介</label>
					<input type="text" id="memberIntro" th:field="*{memberIntro}" placeholder="一兩句話介紹一下自己吧！">
					<span class="field-error" th:if="${#fields.hasErrors('memberIntro')}" th:errors="*{memberIntro}"></span>
				</div>
			</div>

			<div class="section-title">🪪 KYC 實名認證資料</div>
			<div class="form-grid">

				<div class="form-group">
					<label for="realName">真實姓名 *</label>
					<input type="text" id="realName" th:field="*{realName}" placeholder="需與身分證相同">
					<span class="field-error" th:if="${#fields.hasErrors('realName')}" th:errors="*{realName}"></span>
				</div>

				<div class="form-group">
					<label for="idNumber">身分證字號 *</label>
					<input type="text" id="idNumber" th:field="*{idNumber}" placeholder="A123456789">
					<span class="field-error" th:if="${#fields.hasErrors('idNumber')}" th:errors="*{idNumber}"></span>
				</div>

				<div class="form-group">
					<label for="idFrontImageFile">身分證正面照片 *</label>
					<input type="file" id="idFrontImageFile" name="idFrontImageFile" accept="image/*"> 
					<input type="hidden" id="tempIdFrontImage" name="tempIdFrontImage" th:value="${tempIdFrontImage}">
					<div class="img-preview-container" th:if="${tempIdFrontImage != null and !tempIdFrontImage.isEmpty()}">
						<span>✓ 已暫存身分證正面照片：</span><br>
						<img class="img-preview" th:src="'data:image/jpeg;base64,' + ${tempIdFrontImage}" alt="身分證正面預覽">
					</div>
					<span class="field-error" th:if="${idFrontImageError != null}" th:text="${idFrontImageError}"></span>
				</div>

				<div class="form-group">
					<label for="idBackImageFile">身分證反面照片 *</label>
					<input type="file" id="idBackImageFile" name="idBackImageFile" accept="image/*"> 
					<input type="hidden" id="tempIdBackImage" name="tempIdBackImage" th:value="${tempIdBackImage}">
					<div class="img-preview-container" th:if="${tempIdBackImage != null and !tempIdBackImage.isEmpty()}">
						<span>✓ 已暫存身分證反面照片：</span><br>
						<img class="img-preview" th:src="'data:image/jpeg;base64,' + ${tempIdBackImage}" alt="身分證反面預覽">
					</div>
					<span class="field-error" th:if="${idBackImageError != null}" th:text="${idBackImageError}"></span>
				</div>

				<div class="form-group full-width">
					<label for="faceImageFile">現場自拍人臉照片 *</label>
					<input type="file" id="faceImageFile" name="faceImageFile" accept="image/*">
					<input type="hidden" id="tempFaceImage" name="tempFaceImage" th:value="${tempFaceImage}">
					<div class="img-preview-container" th:if="${tempFaceImage != null and !tempFaceImage.isEmpty()}">
						<span>✓ 已暫存先前上傳的人臉照片：</span><br>
						<img class="img-preview" th:src="'data:image/jpeg;base64,' + ${tempFaceImage}" alt="自拍照預覽">
					</div>
					<span class="field-error" th:if="${#fields.hasErrors('faceImage')}" th:errors="*{faceImage}"></span>
				</div>
			</div>

			<div class="section-title">💰 提領銀行帳戶綁定</div>
			<div class="form-grid">

				<div class="form-group">
					<label for="bankCode">銀行代碼 (3碼) *</label>
					<input type="text" id="bankCode" th:field="*{bankCode}" placeholder="例如：822">
					<span class="field-error" th:if="${#fields.hasErrors('bankCode')}" th:errors="*{bankCode}"></span>
				</div>

				<div class="form-group">
					<label for="bankAccount">銀行帳號 *</label>
					<input type="text" id="bankAccount" th:field="*{bankAccount}" placeholder="10-14位數字">
					<span class="field-error" th:if="${#fields.hasErrors('bankAccount')}" th:errors="*{bankAccount}"></span>
				</div>
			</div>

			<button type="submit">提交註冊並送出實名審核</button>
		</form>

		<div class="login-link">
			已經有帳號了？ <a th:href="@{/member/login}">立即登入</a>
		</div>
	</div>

	<script>
		let cooldownSeconds = 0;
		let timer = null;
		let isEmailVerified = false;

		function sendOtp() {
			const emailInput = document.getElementById('email');
			const email = emailInput.value.trim();
			const otpMsg = document.getElementById('otpMsg');
			const sendBtn = document.getElementById('sendOtpBtn');

			if (!email) {
				otpMsg.style.color = '#b91c1c';
				otpMsg.innerText = '⚠️ 請先輸入 Email 帳號！';
				return;
			}

			sendBtn.disabled = true;
			otpMsg.style.color = '#0284c7';
			otpMsg.innerText = '⏳ 驗證碼發送中，請稍候...';

			const params = new URLSearchParams();
			params.append('email', email);

			fetch('/member/send-otp', {
				method: 'POST',
				headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
				body: params
			})
			.then(response => response.json().then(data => ({ status: response.status, body: data })))
			.then(res => {
				if (res.status === 200 && res.body.success) {
					otpMsg.style.color = '#16a34a';
					otpMsg.innerText = '✓ ' + (res.body.message || '驗證碼已寄出，請至信箱查收！');
					startCooldown(60);
				} else {
					otpMsg.style.color = '#b91c1c';
					otpMsg.innerText = '❌ ' + (res.body.message || '發送失敗，請確認 Email 格式！');
					sendBtn.disabled = false;
				}
			})
			.catch(err => {
				otpMsg.style.color = '#b91c1c';
				otpMsg.innerText = '❌ 系統發送失敗，請稍後再試！';
				sendBtn.disabled = false;
			});
		}

		function verifyOtp() {
		    const emailInput = document.getElementById('email');
		    const otpCodeInput = document.getElementById('otpCode');
		    const email = emailInput.value.trim();
		    const otpCode = otpCodeInput.value.trim();
		    const verifyMsg = document.getElementById('verifyMsg');

		    if (!email || !otpCode) {
		        verifyMsg.style.color = '#b91c1c';
		        verifyMsg.innerText = '⚠️ 請完整填寫 Email 與 6 位數驗證碼！';
		        return;
		    }

		    const params = new URLSearchParams();
		    params.append('email', email);
		    params.append('inputOtp', otpCode);

		    fetch('/member/verify-otp', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		        body: params
		    })
		    .then(response => response.json().then(data => ({ status: response.status, body: data })))
		    .then(res => {
		        if (res.status === 200 && res.body.success) {
		            verifyMsg.style.color = '#16a34a';
		            verifyMsg.innerText = '🎉 ' + (res.body.message || 'Email 驗證成功！');
		            isEmailVerified = true;
		            
		            document.getElementById('verifyOtpBtn').disabled = true;
		            document.getElementById('sendOtpBtn').disabled = true;
		        } else {
		            verifyMsg.style.color = '#b91c1c';
		            verifyMsg.innerText = '❌ ' + (res.body.message || '驗證碼錯誤或已過期！');
		            isEmailVerified = false;
		        }
		    })
		    .catch(err => {
		        verifyMsg.style.color = '#b91c1c';
		        verifyMsg.innerText = '❌ 驗證失敗，請再試一次！';
		    });
		}

		function startCooldown(seconds) {
			cooldownSeconds = seconds;
			const sendBtn = document.getElementById('sendOtpBtn');
			
			clearInterval(timer);
			timer = setInterval(() => {
				if (cooldownSeconds > 0) {
					sendBtn.innerText = `重新發送 (${cooldownSeconds}s)`;
					cooldownSeconds--;
				} else {
					clearInterval(timer);
					sendBtn.innerText = '取得驗證碼';
					sendBtn.disabled = false;
				}
			}, 1000);
		}

		function validateFormBeforeSubmit() {
			// 如果頁面上已經有 OTP 錯誤訊息或未驗證，防止表單送出
			if (!isEmailVerified) {
				alert('請先點擊「核對驗證碼」成功完成 Email 驗證後，再提交註冊表單！');
				return false;
			}
			return true;
		}
	</script>

</body>
</html>
