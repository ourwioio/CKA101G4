<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>會員通知</title>
</head>

<body>
	<div>
		<h1>全部通知</h1>

		<span th:if="${session.memberVO != null}">
			當前登入會員編號：
			<strong th:text="${session.memberVO?.memberId}"></strong>
		</span>

		<span th:if="${session.memberVO == null}">
			目前登入狀態： <strong>未登入</strong>
		</span>

		<a th:href="@{/front/notification/listAllNotification}">返回通知列表</a>
	</div>
	<table th:object="${notificationVO}">
		<tr>
			<input type="hidden" th:field="*{notificationId}" />
			<td th:text="*{title}"></td>
			<td th:text="*{content}"></td>
			<td th:text="*{notificationType}"></td>
			<td th:text="*{isRead}"></td>
			<td th:text="*{createdAt}"></td>
		</tr>
	</table>
</body>

</html>
