<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>編輯會員個人頁面</title>
  <link rel="stylesheet" th:href="@{/css/front-end/member/profileEdit.css}" />
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/common/footer.css}">
  <link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
  <style>
/* ==========================================================
   Webond 會員編輯頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271;
  --color-red-deep:     #D93856;

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

  --nav-height: 76px;
}

*{ box-sizing: border-box; }

body.page-body{
  margin:0;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ==========================================================
   版面容器
   ========================================================== */
.container{
  max-width: 680px;
  margin: 0 auto;
  padding: calc(var(--nav-height) + 40px) 20px 60px;
}

/* ==========================================================
   Q 萌編輯大卡片
   ========================================================== */
.profile-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 40px;
  margin-bottom: 24px;
}

.section-title {
  font-size: 20px;
  font-weight: 800;
  position: relative;
  padding-left: 18px;
  margin-bottom: 28px;
  font-family: var(--font-display);
}
.section-title::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--color-yellow-deep);
}
/* ==========================================================
   頭貼更換互動區（點擊圖片直接上傳）
   ========================================================== */
   
   .avatar-edit-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-bottom: 32px;
  border-bottom: 2px dashed var(--color-border);
  margin-bottom: 32px;
}

.avatar-preview-wrapper {
  position: relative;
  display: inline-block;
  cursor: pointer;
  border-radius: 50%;
  border: 4px solid var(--color-surface);
  box-shadow: var(--shadow-md);
  overflow: hidden; /* 確保遮罩與縮放動畫完美切齊圓形 */
  width: 130px;
  height: 130px;
  background: var(--color-surface-soft);
  transition: transform .2s ease;
}

.avatar-preview-wrapper:hover {
  transform: scale(1.04) rotate(1deg); /* 輕微放大與旋轉，符合 Q 萌動感 */
}

.avatar-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 點擊頭貼提示遮罩 */
.avatar-overlay {
  position: absolute;
  inset: 0;
  background: rgba(23, 20, 15, 0.55); /* 半透明墨色 */
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.avatar-preview-wrapper:hover .avatar-overlay {
  opacity: 1; /* 滑鼠移入時優雅顯現 */
}

/* ==========================================================
   表單輸入欄位與錯誤泡泡
   ========================================================== */
.profile-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
}

.field-label {
  font-size: 14.5px;
  font-weight: 800;
  color: var(--color-ink);
  padding-left: 4px;
}

.field-input, .field-select {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--color-ink);
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  transition: border-color .15s ease, background .15s ease;
  outline: none;
}

.field-input:focus, .field-select:focus {
  border-color: var(--color-yellow-deep);
  background: var(--color-surface);
}

/* Q 萌對話泡泡錯誤提示 */
.field-error {
  align-self: flex-start;
  background: var(--color-red);
  color: #fff;
  font-size: 12px;
  font-weight: 400;
  padding: 5px 12px;
  border-radius: 8px;
  position: relative;
  margin-top: 4px;
  box-shadow: var(--shadow-sm);
}
.field-error::after {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 14px;
  border: 5px solid transparent;
  border-bottom-color: var(--color-red);
}

/* ==========================================================
   通用按鈕樣式
   ========================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 14px;
  padding: 11px 24px;
  border-radius: var(--radius-full);
  transition: transform .18s ease, box-shadow .18s ease, background .15s ease;
}

/* 儲存：經典深黑 */
.btn-primary {
  background: var(--color-ink);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  background: var(--color-yellow-deep);
  color: var(--color-ink);
}

/* 關閉/取消：奶油白框 */
.btn-secondary {
  background: var(--color-surface);
  color: var(--color-ink);
  border: 1.5px solid var(--color-border);
}
.btn-secondary:hover {
  transform: translateY(-2px);
  border-color: var(--color-ink);
}
.btn-secondary a {
  color: inherit;
  text-decoration: none;
}

/* 刪除頭貼/帳號：珊瑚粉紅 */
.btn-danger {
  background: var(--color-pink);
  color: var(--color-ink);
}
.btn-danger:hover {
  transform: translateY(-2px);
  background: var(--color-red);
  color: #fff;
}

.btn-sm {
  font-size: 12px;
  padding: 6px 14px;
}

/* 修改密碼：藍色藥丸 */
.btn-change-pw {
  background: var(--color-blue);
  color: var(--color-ink);
  margin-right: auto;
}
.btn-change-pw:hover {
  transform: translateY(-2px);
  background: #003D79;
  color: #fff;
}
.btn-change-pw a {
  color: inherit;
  text-decoration: none;
}

/* ==========================================================
   動作列配置
   ========================================================== */
.action-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 36px;
  gap: 12px;
}

.action-row__right {
  display: flex;
  gap: 12px;
}

/* ==========================================================
   安全性與危險區 (修改密碼 / 刪除帳號)
   ========================================================== */
.security-card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 32px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.security-text h3 {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 4px;
}
.security-text p {
  font-size: 13px;
  color: var(--color-ink-soft);
  margin: 0;
}

/* ==========================================================
   Q 萌彈跳視窗 (Modal Overlay & Content)
   ========================================================== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(23, 20, 15, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  background: var(--color-surface);
  border: 0.1px solid var(--color-yellow);
  border-radius: var(--radius-lg);
  padding: 36px;
  max-width: 440px;
  width: 90%;
  animation: modalPop .25s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
}

@keyframes modalPop {
  from { transform: scale(0.9) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.modal-content h3 {
  font-size: 19px;
  font-weight: 800;
  margin-bottom: 12px;
  color: var(--color-ink);
}

.modal-content p {
  font-size: 14px;
  color: var(--color-ink-soft);
  line-height: 1.6;
  margin-bottom: 20px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 24px;
}

/* ==========================================================
   RWD
   ========================================================== */
@media (max-width: 520px) {
  .profile-card, .security-card { padding: 24px 20px; }
  .action-row { flex-direction: column-reverse; align-items: stretch; }
  .action-row__right { flex-direction: column-reverse; }
  .security-card { flex-direction: column; align-items: stretch; text-align: center; }
  .btn-change-pw { justify-content: center; }
}
  </style>
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<body class="page-body">

  <div class="container">
    
    <!-- 主要編輯表單 -->
    <form class="profile-form" th:action="@{/front/memberPage/update}" method="post" th:object="${profileUpdateDTO}" enctype="multipart/form-data">
      
      <!-- 保留原有的隱藏 memberId 數據繫結 -->
      <input type="hidden" th:field="*{memberId}" />

      <!-- 個人基本資料卡 -->
      <div class="profile-card">
        <h2 class="section-title">編輯個人檔案</h2>

        <!-- 頭貼上傳與刪除交互區 -->
        <div class="avatar-edit-section">
          
          <!-- 整個頭貼包裝成 label，點擊就能直接開檔案選擇器 -->
          <label for="picFileInput" class="avatar-preview-wrapper" title="點擊更換頭貼">
            <img id="avatarImg" th:src="@{'/front/memberPage/pic/' + ${profileUpdateDTO.memberId}}" 
                 alt="會員頭貼" class="avatar-img" th:onerror="'this.src=\'' + @{/images/member/file.jpeg} + '\''" />
            <!-- Hover 時會出現的可愛黑色提示遮罩 -->
            <div class="avatar-overlay">
              <span>更換照片</span>
            </div>
          </label>

          <!-- 隱藏真正的 file input，並給它一個 id 用於 label 觸發 -->
          <input id="picFileInput" class="file-input" type="file" name="picFile" accept="image/*" style="display:none;" onchange="previewImage(this)" />

          <!-- 保留原來的按鈕作為第二種選擇，同樣對應到同一個 id -->
          <label for="picFileInput" class="avatar-upload-btn">
            
          </label>

          <!-- 刪除頭貼按鈕 -->
          <button type="button" id="deletePicBtn" class="btn btn-danger btn-sm" th:if="${hasProfilePic}">刪除頭貼</button>
        </div>

        <!-- 暱稱輸入欄 -->
        <div class="profile-info">
          <label class="field-label">暱稱</label>
          <input class="field-input" type="text" th:field="*{nickname}" placeholder="請輸入暱稱" />
          <!-- 錯誤泡泡提示 -->
          <div class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
        </div>

        <!-- 自我介紹輸入欄 -->
        <div class="profile-info">
          <label class="field-label">自我介紹</label>
          <input class="field-input" type="text" th:field="*{memberIntro}" placeholder="介紹一下自己吧！" />
        </div>

        <!-- 性別選單 -->
        <div class="profile-info">
          <label class="field-label">性別</label>
          <select class="field-select" th:field="*{gender}">
            <option value="0">男性</option>
            <option value="1">女性</option>
            <option value="2">其他</option>
          </select>
          <div class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
        </div>

        <!-- 信箱輸入欄 -->
        <div class="profile-info">
          <label class="field-label">電子信箱 Email</label>
          <input class="field-input" type="text" th:field="*{email}" placeholder="example@webond.com">
          <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <!-- 電話輸入欄 -->
        <div class="profile-info">
          <label class="field-label">聯絡電話</label>
          <input class="field-input" type="text" th:field="*{phone}" placeholder="09xxxxxxxx">
          <div class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
        </div>

        <!-- 操作底列 -->
        <div class="action-row">
          <!-- 關閉按鈕 -->
          <button class="btn btn-secondary" type="button">
            <a th:href="@{/front/memberPage/my(memberId=${profileUpdateDTO.memberId})}">關閉返回</a>
          </button>
          
          <!-- 儲存按鈕 -->
          <button class="btn btn-primary btn-submit" type="submit">儲存變更</button>
        </div>

      </div>
    </form>

    <!-- 安全性與帳號維護卡 (與主要表單分開，讓版面更舒暢) -->
    <div class="security-card">
      <div class="security-text">
        <h3>帳號密碼與安全</h3>
        <p>您可以隨時更改密碼，或在必要時申請停用您的帳號。</p>
      </div>
      <div class="action-row__right" style="display: flex; gap: 20px; margin: 0;">
        <button class="btn btn-danger" type="button" id="deleteAccountBtn"> 停用帳號 </button>
        <button class="btn btn-change-pw">
          <a th:href="@{/front/memberPage/changePassword}">修改密碼</a>
        </button>
      </div>
    </div>

  </div>

  <!-- ========== Q 萌確認刪除帳號彈跳視窗 (Modal) ========== -->
  <div id="deleteAccountModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>確認停用帳號？</h3>
      <p>此操作將會暫時停用您的 Webond 帳號。<br>為了確保安全，請輸入您的密碼以確認此操作。</p>
      <input type="password" id="deleteAccountPassword" class="field-input" placeholder="請輸入您的密碼確認" />
      <div class="field-error" id="deletePasswordError" style="display: none; margin-bottom: 12px;"></div>
      <div class="modal-actions">
        <button type="button" id="cancelDeleteBtn" class="btn btn-secondary">取消返回</button>
        <button type="button" id="confirmDeleteBtn" class="btn btn-danger">確認停用</button>
      </div>
    </div>
  </div>
	  <div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>
	  <div th:replace="~{front-end/common/footer :: footer}"></div>
  <!-- ========== 頭貼刪除與即時預覽腳本 ========== -->
  <script th:inline="javascript">
    // 超實用：頭貼選擇檔案後即時預覽 (不必等儲存送出就能看到效果)
    function previewImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById('avatarImg').src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    // 刪除頭貼 AJAX
    document.getElementById('deletePicBtn').addEventListener('click', function () {
        if (!confirm('確定要刪除目前的頭貼嗎？')) {
            return;
        }
    
        fetch(/*[[@{/front/memberPage/deletePic}]]*/ '/front/memberPage/deletePic', {
            method: 'POST'
        })
        .then(res => {
            if (!res.ok) {
                throw new Error('刪除失敗');
            }
            // 換成預設圖
            document.getElementById('avatarImg').src = '/images/file.jpeg';
            this.style.display = 'none'; 
            alert('頭貼已成功刪除');
        })
        .catch(err => {
            alert(err.message);
        });
    });
  </script>
	
  <!-- ========== 刪除帳號 Modal 交互腳本 ========== -->
  <script th:inline="javascript">
    const memberId = /*[[${profileUpdateDTO.memberId}]]*/ null;
    
    const modal = document.getElementById('deleteAccountModal');
    const pwdInput = document.getElementById('deleteAccountPassword');
    const errorDiv = document.getElementById('deletePasswordError');
    
    document.getElementById('deleteAccountBtn').addEventListener('click', () => {
        modal.style.display = 'flex';
    });
    
    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
        modal.style.display = 'none';
        pwdInput.value = '';
        errorDiv.textContent = '';
        errorDiv.style.display = 'none';
    });
    
    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        const password = pwdInput.value;
        errorDiv.textContent = '';
        errorDiv.style.display = 'none';
    
        if (!password) {
            errorDiv.textContent = '請輸入密碼';
            errorDiv.style.display = 'inline-block';
            return;
        }
    
        fetch(`/front/memberPage/delete/${memberId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password })
        })
        .then(async (res) => {
            const data = await res.json();
            if (res.ok && data.success) {
                alert('帳號已成功刪除');
                window.location.href = '/member/login';
            } else {
                errorDiv.textContent = data.message || '密碼錯誤';
                errorDiv.style.display = 'inline-block';
            }
        })
        .catch(() => {
            errorDiv.textContent = '刪除失敗，請稍後再試';
            errorDiv.style.display = 'inline-block';
        });
    });
  </script>
  
</body>

</html>
