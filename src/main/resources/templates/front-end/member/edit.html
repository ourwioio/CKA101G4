<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" th:href="@{/css/front-end/member/profileEdit.css}" />
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<title>編輯會員個人頁面</title>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body class="page-body">
    <form class="profile-form" th:action="@{/front/memberPage/update}" method="post" th:object="${profileUpdateDTO}" enctype="multipart/form-data">
        <input type="hidden" th:field="*{memberId}" />

        <!-- ========== 頭部檔案 ========== -->
        <div class="profile-header">
            <div class="profile-avatar">
                <img id="avatarImg" th:src="@{'/front/memberPage/pic/' + ${profileUpdateDTO.memberId}}" 
                alt="會員頭貼" class="avatar-img" th:onerror="'this.src=\'' + @{/images/file.jpeg} + '\''" />
            </div>

            <input class="file-input" type="file" name="picFile" accept="image/*" />
            <button type="button" id="deletePicBtn" class="btn btn-danger btn-sm" th:if="${hasProfilePic}">刪除頭貼</button>

            <div class="profile-info">
                <label class="field-label">暱稱</label>
                <input class="field-input" type="text" th:field="*{nickname}" />
                <div class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
            </div>

            <div class="profile-info">
                <label class="field-label">自我介紹</label>
                <input class="field-input" type="text" th:field="*{memberIntro}" />
            </div>

            <!-- <div class="">
                <input type="text" th:field="*{passwordHash}">
            </div> -->

            <div class="profile-info">
                <label class="field-label">性別</label>
                <select class="field-select" th:field="*{gender}">
                    <option value="0">男性</option>
                    <option value="1">女性</option>
                    <option value="2">其他</option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
            </div>

            <div class="profile-info">
                <label class="field-label">Email</label>
                <input class="field-input" type="text" th:field="*{email}">
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="profile-info">
                <label class="field-label">電話</label>
                <input class="field-input" type="text" th:field="*{phone}">
                <div class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>

            <div class="action-row">
                <button class="btn btn-danger" type="button" id="deleteAccountBtn">刪除帳號</button>
                <button class="btn btn-secondary" type="button">
                    <a th:href="@{/front/memberPage/my(memberId=${profileUpdateDTO.memberId})}" onclick="">關閉</a>
                </button>
            </div>

            <button class="btn btn-primary btn-submit" type="submit">儲存</button>
        </div>
    </form>

    <button class="btn btn-outline btn-change-pw">
        <a th:href="@{/front/memberPage/changePassword}">修改密碼</a>
    </button>
    
    <div id="deleteAccountModal" class="modal" style="display:none;">
	    <div class="modal-content">
	        <h3>確認刪除帳號</h3>
	        <p>此操作將停用您的帳號，請輸入密碼以確認。</p>
	        <input type="password" id="deleteAccountPassword" class="field-input" placeholder="請輸入密碼" />
	        <div class="field-error" id="deletePasswordError"></div>
	        <div class="modal-actions">
	            <button type="button" id="confirmDeleteBtn" class="btn btn-danger">確認刪除</button>
	            <button type="button" id="cancelDeleteBtn" class="btn btn-secondary">取消</button>
	        </div>
	    </div>
	</div>
	    
</body>
	<script th:inline="javascript">
	document.getElementById('deletePicBtn').addEventListener('click', function () {
	    if (!confirm('確定要刪除目前的頭貼嗎？')) {
	        return;
	    }
	
	    fetch(/*[[@{/front/memberPage/deletePic}]]*/ '/front/memberPage/deletePic', {
	        method: 'POST'
	    })
	    .then(res => {
	        if (!res.ok) {
	            throw new Error('刪除失敗');
	        }
	        // 換成預設圖，不用整頁重整
	        document.getElementById('avatarImg').src = '/images/file.jpeg';
	        this.style.display = 'none'; 
	        alert('頭貼已刪除');
	    })
	    .catch(err => {
	        alert(err.message);
	    });
	});
	</script>
	
	<script th:inline="javascript">
		const memberId = /*[[${profileUpdateDTO.memberId}]]*/ null;
		
		const modal = document.getElementById('deleteAccountModal');
		const pwdInput = document.getElementById('deleteAccountPassword');
		const errorDiv = document.getElementById('deletePasswordError');
		
		document.getElementById('deleteAccountBtn').addEventListener('click', () => {
		    modal.style.display = 'flex';
		});
		
		document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
		    modal.style.display = 'none';
		    pwdInput.value = '';
		    errorDiv.textContent = '';
		});
		
		document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
		    const password = pwdInput.value;
		    errorDiv.textContent = '';
		
		    if (!password) {
		        errorDiv.textContent = '請輸入密碼';
		        return;
		    }
		
		    fetch(`/front/memberPage/delete/${memberId}`, {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/json' },
		        body: JSON.stringify({ password: password })
		    })
		    .then(async (res) => {
		        const data = await res.json();
		        if (res.ok && data.success) {
		            alert('帳號已成功刪除');
		            window.location.href = '/member/login';
		        } else {
		            errorDiv.textContent = data.message || '密碼錯誤';
		        }
		    })
		    .catch(() => {
		        errorDiv.textContent = '刪除失敗，請稍後再試';
		    });
		});
		</script>
</html>
