<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員全部通知</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <style>
/* ==========================================================
   Webond 全部通知頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271; /* 通知紅點專用色 */

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

  --nav-height: 76px;
}

*{ box-sizing: border-box; }

body{
  margin:0;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

h1,h2,h3,h4{ font-family: var(--font-display); margin:0; }
a{ text-decoration: none; color: inherit; }

/* ==========================================================
   版面容器
   ========================================================== */
.container{
  max-width: 800px; /* 通知中心適合較集中的窄版面，閱讀更舒適 */
  margin: 0 auto;
  padding: calc(var(--nav-height) + 40px) 20px 60px;
}

/* ==========================================================
   主區塊與頂部標題（右上角按鈕定位）
   ========================================================== */
.section{
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 36px;
}

.section__head{
  display: flex;
  align-items: center;
  justify-content: space-between; /* 標題在左、按鈕在右 */
  margin-bottom: 28px;
  gap: 16px;
}

.section__title{
  font-size: 24px;
  font-weight: 800;
  position: relative;
  padding-left: 18px;
}
.section__title::before{
  content:'';
  position: absolute;
  left:0; top:50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--color-yellow-deep);
}

/* ==========================================================
   右上角「全部標為已讀」按鈕
   ========================================================== */
.btn-edit{
  display: inline-flex;
  align-items: center;
  border: none;
  cursor: pointer;
  background: var(--color-surface-soft);
  color: var(--color-ink);
  border: 1.5px solid var(--color-border);
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 13.5px;
  padding: 8px 20px;
  border-radius: var(--radius-full);
  transition: transform .18s ease, border-color .18s ease, background .15s ease;
}
.btn-edit:hover{
  transform: translateY(-2px);
  border-color: var(--color-ink);
  background: var(--color-surface);
}

/* ==========================================================
   Facebook 風格 — 整條可點擊通知列表
   ========================================================== */
.notification-list{
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.notification-item{
  display: flex;
  align-items: center;
  gap: 18px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  transition: transform .18s ease, box-shadow .18s ease, background .15s ease;
}

/* 滑鼠 Hover：微微浮起與陰影 */
.notification-item:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
  background: var(--color-surface-soft);
}

/* 未讀通知：底色呈現非常柔和的極淺黃底 */
.notification-item.unread{
  background: #FFFDF4;
  border-color: #F3EBD3;
}

/* 狀態區（紅點定位） */
.notification-status{
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  flex-shrink: 0;
}

/* 精緻的小紅點 (帶脈衝動畫，提醒效果絕佳) */
.unread-dot{
  width: 10px;
  height: 10px;
  background-color: var(--color-red);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--color-red);
  display: inline-block;
}

/* 內容主體 */
.notification-body{
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* 頂部中繼資料 (類型與時間) */
.notification-meta{
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
}

/* 分類標籤 (pastel 膠囊包裝) */
.notification-type{
  background: var(--color-blue);
  color: var(--color-ink);
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
}

.notification-time{
  color: var(--color-ink-soft);
  font-weight: 500;
}

/* 通知標題 */
.notification-item-title{
  font-size: 15.5px;
  font-weight: 800;
  margin: 0;
  color: var(--color-ink);
}

/* 通知內容 (utext 解析) */
.notification-content{
  font-size: 13.5px;
  color: var(--color-ink-soft);
  line-height: 1.5;
}
.notification-content p {
  margin: 0;
}

/* 右側點擊指示箭頭 */
.notification-arrow{
  color: var(--color-border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color .15s ease, transform .15s ease;
}
.notification-arrow svg{
  width: 16px;
  height: 16px;
}
.notification-item:hover .notification-arrow{
  color: var(--color-ink);
  transform: translateX(3px);
}

/* ==========================================================
   無通知空狀態
   ========================================================== */
.empty-state{
  padding: 56px 20px;
  text-align: center;
  color: var(--color-ink-soft);
  background: var(--color-surface-soft);
  border: 1.5px dashed var(--color-border);
  border-radius: var(--radius-lg);
}
.empty-state .blob{
  display: block;
  width: 56px; height: 56px;
  background: var(--color-border);
  border-radius: 46% 54% 62% 38% / 46% 42% 58% 54%;
  margin: 0 auto 16px;
}

/* ==========================================================
   RWD 響應式排版
   ========================================================== */
@media (max-width: 520px){
  .section{ padding: 24px; }
  .section__head { flex-direction: row; align-items: center; }
  .notification-item { gap: 12px; padding: 14px 16px; }
  .notification-item-title { font-size: 14px; }
  .notification-content { font-size: 12.5px; }
}
  </style>
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<body>

  <div class="container">
    <div class="section">
      
      <!-- 頂部標題區：全部標為已讀置於右上角 -->
      <div class="section__head">
        <h1 class="section__title">全部通知</h1>
        <button type="button" id="markAllReadBtn" class="btn-edit">全部標為已讀</button>
      </div>

      <!-- 列表區：整條資訊均可點擊跳轉 (仿 FB 功能) -->
      <div class="notification-list" th:if="${notificationVO != null and !#lists.isEmpty(notificationVO)}">
        
        <a th:each="n : ${notificationVO}" 
           th:href="@{/front/notification/goTo(notificationId=${n.notificationId})}" 
           class="notification-item"
           th:classappend="${n.isRead == null or n.isRead == 0} ? 'unread' : ''">
          
          <!-- 是否已讀改成紅點 (僅在未讀狀態下顯示) -->
          <div class="notification-status">
            <span class="unread-dot" th:if="${n.isRead == null or n.isRead == 0}"></span>
          </div>

          <!-- 通知主體資訊 -->
          <div class="notification-body">
            <div class="notification-meta">
<!--               <span class="notification-type" th:text="${n.notificationType}">通知類型</span> -->
              <span class="notification-time" th:text="${n.createdAt}">建立時間</span>
            </div>
            <h3 class="notification-item-title" th:text="${n.title}">通知標題</h3>
            <div class="notification-content" th:utext="${n.content}">通知內容</div>
          </div>

          <!-- 右側箭頭指引指示 -->
<!--           <div class="notification-arrow"> -->
<!--             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"> -->
<!--               <path d="M9 18l6-6-6-6"/> -->
<!--             </svg> -->
<!--           </div> -->
          
        </a>
        
      </div>

      <!-- 暫無通知空狀態 -->
      <div class="empty-state" th:if="${notificationVO == null or #lists.isEmpty(notificationVO)}">
        <span class="blob"></span>
        <p>您沒有任何通知</p>
      </div>

    </div>
  </div>

  <!-- 原封不動的 AJAX 後端已讀請求腳本 -->
  <script type="text/javascript">
    document.getElementById('markAllReadBtn').addEventListener('click', function () {
        fetch('/front/notification/markAllRead', {
            method: 'POST'
        })
        .then(res => {
            if (!res.ok) throw new Error('未登入或發生錯誤');
            return res.text();
        })
        .then(() => {
            location.reload(); // 重新整理，navbar 角標和列表的已讀狀態都會自動更新
        })
        .catch(err => console.error(err));
    });
  </script>

</body>
</html>
