<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>會員全部通知</title>
</head>
<body>

    <div>
        <h1>全部通知</h1>

        <span th:if="${session.memberVO != null}">
            當前登入會員編號：
            <strong th:text="${session.memberVO?.memberId}"></strong>
        </span>

        <span th:if="${session.memberVO == null}">
            目前登入狀態： <strong>未登入</strong>
        </span>
    </div>

    <table>
        <thead>
            <td>標題</td>
            <td>內容</td>
            <td>通知類型</td>
            <td>是否已讀</td>
            <td>建立時間</td>
        </thead>
        <tbody>
            <tr th:each="n:${notificationVO}">
                <td th:text="${n.title}"></td>
                <td th:text="${n.content}"></td>
                <td th:text="${n.notificationType}"></td>
                <td th:text="${n.isRead}"></td>
                <td th:text="${n.createdAt}"></td>
            </tr>
        </tbody>
    </table>


	

</body>
</html>
