<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密碼</title>
  <link rel="stylesheet" th:href="@{/css/front-end/member/profileEdit.css}" />
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <style>
/* ==========================================================
   Webond 修改密碼頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271;

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

  --nav-height: 76px;
}

*{ box-sizing: border-box; }

body.page-body{
  margin:0;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ==========================================================
   版面容器
   ========================================================== */
.container{
  max-width: 560px; /* 密碼修改頁面採用更集中的小寬度 */
  margin: 0 auto;
  padding: calc(var(--nav-height) + 40px) 20px 60px;
}

/* ==========================================================
   Q 萌修改密碼大卡片
   ========================================================== */
.password-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 40px;
}

.section-title {
  font-size: 20px;
  font-weight: 800;
  position: relative;
  padding-left: 18px;
  margin-bottom: 28px;
  font-family: var(--font-display);
}
.section-title::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--color-yellow-deep);
}

/* ==========================================================
   全域錯誤提示橫幅 (大粉紅膠囊)
   ========================================================== */
.global-error-banner {
  background: var(--color-pink);
  color: var(--color-ink);
  font-size: 13.5px;
  font-weight: 800;
  padding: 12px 18px;
  border-radius: var(--radius-md);
  margin-bottom: 24px;
  border: 1.5px solid var(--color-ink);
  box-shadow: 2px 2px 0px var(--color-ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ==========================================================
   表單輸入欄位與錯誤泡泡
   ========================================================== */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
}

.form-group label {
  font-size: 14.5px;
  font-weight: 800;
  color: var(--color-ink);
  padding-left: 4px;
}

.form-control {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--color-ink);
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  transition: border-color .15s ease, background .15s ease;
  outline: none;
}

.form-control:focus {
  border-color: var(--color-yellow-deep);
  background: var(--color-surface);
}

/* Q 萌對話泡泡錯誤提示 */
.field-error {
  align-self: flex-start;
  background: var(--color-red);
  color: #fff;
  font-size: 12.5px;
  font-weight: 400;
  padding: 5px 12px;
  border-radius: 8px;
  position: relative;
  margin-top: 4px;
  box-shadow: var(--shadow-sm);
}
.field-error::after {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 14px;
  border: 5px solid transparent;
  border-bottom-color: var(--color-red);
}

/* ==========================================================
   通用按鈕樣式
   ========================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 14px;
  padding: 11px 24px;
  border-radius: var(--radius-full);
  transition: transform .18s ease, box-shadow .18s ease, background .15s ease;
}

/* 修改密碼：經典深黑 */
.btn-primary {
  background: var(--color-ink);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  background: var(--color-yellow-deep);
  color: var(--color-ink);
}

/* 取消返回：奶油白框 */
.btn-secondary {
  background: var(--color-surface);
  color: var(--color-ink);
  border: 1.5px solid var(--color-border);
}
.btn-secondary:hover {
  transform: translateY(-2px);
  border-color: var(--color-ink);
}

/* ==========================================================
   動作列配置
   ========================================================== */
.action-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 36px;
  gap: 12px;
}

/* ==========================================================
   RWD
   ========================================================== */
@media (max-width: 520px) {
  .password-card { padding: 32px 20px; }
  .action-row { flex-direction: column-reverse; align-items: stretch; }
  .btn { width: 100%; }
}
  </style>
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<body class="page-body">

  <div class="container">
    
    <!-- 密碼修改主卡片 -->
    <div class="password-card">
      <h2 class="section-title">修改您的密碼</h2>

      <!-- 全域錯誤橫幅：僅在 error 存在時，以高辨識度的可愛粉色 Banner 顯示 -->
      <div th:if="${error}" class="global-error-banner">
        <span>⚠️</span>
        <span th:text="${error}">錯誤訊息</span>
      </div>

      <form class="profile-form" th:action="@{/front/memberPage/changePassword}" th:object="${memberVO}" method="post">
        
        <!-- 保留原本的隱藏 memberId -->
        <input type="hidden" th:field="*{memberId}" />

        <!-- 原密碼輸入欄 -->
        <div class="form-group">
          <label>原密碼</label>
          <input type="password" th:field="*{oldPassword}" autocomplete="current-password" class="form-control" placeholder="請輸入您目前的密碼" />
          <!-- 錯誤泡泡 -->
          <div class="field-error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
        </div>

        <!-- 新密碼輸入欄 -->
        <div class="form-group">
          <label>新密碼</label>
          <input type="password" th:field="*{newPassword}" autocomplete="new-password" class="form-control" placeholder="請輸入 8-20 碼新密碼" />
          <!-- 錯誤泡泡 -->
          <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <!-- 確認新密碼輸入欄 -->
        <div class="form-group">
          <label>確認新密碼</label>
          <input type="password" th:field="*{confirmPassword}" autocomplete="new-password" class="form-control" placeholder="請再次輸入新密碼確認" />
          <!-- 錯誤泡泡 -->
          <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <!-- 按鈕列：左「取消返回」、右「修改密碼 🔑」 -->
        <div class="action-row">
          <button class="btn btn-secondary" type="button" onclick="history.back()">
            取消返回
          </button>
          <button type="submit" class="btn btn-primary">
            修改密碼
          </button>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
