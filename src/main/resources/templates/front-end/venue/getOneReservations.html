<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>訂單詳細資訊</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/getOneReservations.css}">
</head>
<body>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<main class="form-page">

	<a class="back-link" th:href="@{/front/venueOrder/myVenuesReservations}">← 回到我的場地資訊</a>

	<div class="card">
		<h2 class="card-title">查詢結果</h2>

		<div class="info-list">
			<div class="info-row">
				<span class="info-label">訂單編號</span>
				<span class="info-value" th:text="${venueOrderVO.venueOrderId}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">買方會員姓名</span>
				<a class="info-value info-link" th:href="@{/front/memberPage/my(memberId=${venueOrderVO.member.memberId})}"
				   th:text="${venueOrderVO.member.realName}"></a>
			</div>
			<div class="info-row">
				<span class="info-label">買方會員電話</span>
				<span class="info-value" th:text="${venueOrderVO.member.phone}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">場地名稱</span>
				<span class="info-value" th:text="${venueOrderVO.venueVO.venueName}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">場地地址</span>
				<span class="info-value" th:text="${venueOrderVO.venueVO.address}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">預約日期</span>
				<span class="info-value" th:text="${venueOrderVO.bookDate}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">預約時段</span>
				<span class="info-value" th:text="${venueOrderVO.startAt} + '~' + ${venueOrderVO.endAt}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">訂單建立時間</span>
				<span class="info-value" th:text="${#temporals.format(venueOrderVO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">總金額</span>
				<span class="info-value" th:text="${venueOrderVO.totalAmount} + ' 元'"></span>
			</div>
			<div class="info-row">
				<span class="info-label">訂單狀態</span>
				<span class="status-badge" th:switch="${venueOrderVO.orderStatus}">
					<span th:case="0">待撥款</span>
					<span th:case="1">已付款</span>
					<span th:case="2">已取消</span>
					<span th:case="3">已完成</span>
				</span>
			</div>
<!-- 			<div class="info-row"> -->
<!-- 				<span class="info-label">撥款狀態</span> -->
<!-- 				<span class="status-badge" th:switch="${venueOrderVO.payoutAmount}"> -->
<!-- 					<span th:case="0">未撥款</span> -->
<!-- 					<span th:case="1">已撥款</span> -->
<!-- 				</span> -->
<!-- 			</div> -->
			<div class="info-row" th:if="${venueOrderVO.refundStatus == 0 || venueOrderVO.refundStatus == 1}">
				<span class="info-label">退款狀態</span>
				<span class="status-badge" th:switch="${venueOrderVO.refundStatus}">
					<span th:case="0">進行中</span>
					<span th:case="1">完成</span>
					<span th:case="2">未申請</span>
				</span>
			</div>
		</div>
	</div>

</main>
</body>
</html>
