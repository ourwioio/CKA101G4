<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>場地列表</title>
<style>
body {
	font-family: sans-serif;
	background: #f5f5f5;
	padding: 2rem;
	margin: 0;
}

h1 {
	font-size: 22px;
	font-weight: 500;
	margin-bottom: 1.5rem;
}

.venue-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
	gap: 1.25rem;
}

.venue-card {
	background: white;
	border-radius: 12px;
	border: 1px solid #e0e0e0;
	overflow: hidden;
}

.card-img {
	width: 100%;
	height: 160px;
	object-fit: cover;
	display: block;
}

.card-body {
	padding: 1rem;
}

.card-body h3 {
	font-size: 16px;
	font-weight: 500;
	margin: 0 0 6px;
}

.card-body p {
	font-size: 14px;
	color: #666;
	margin: 4px 0;
}

.card-body a {
	display: inline-block;
	margin-top: 12px;
	padding: 6px 16px;
	background: #1d9e75;
	color: white;
	border-radius: 6px;
	font-size: 13px;
	text-decoration: none;
}

.card-body a:hover {
	background: #0f6e56;
}
</style>
</head>
<body>
	<div
		style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
		<h1>場地列表</h1>
	<div class="user-info">
	    <span th:if="${session.memberVO != null}">
	        當前登入會員：<strong th:text="${session.memberVO.nickname}"></strong>
	    </span>

	    <span th:if="${session.memberVO == null}">
	        目前狀態：<strong>未登入 (訪客)</strong>
	    </span>
	</div>

		<!-- 未登入才顯示「登入」按鈕，導去真正的登入頁 -->
		<a th:if="${session.memberVO == null}" th:href="@{/member/login}"
			style="display: inline-block; padding: 8px 16px; background: #1d9e75; color: white; border-radius: 6px; font-size: 14px; text-decoration: none;">
			登入 </a>
			
		<a th:if="${session.memberVO != null}" th:href="@{/member/logout}"
			style="display: inline-block; padding: 8px 16px; background: #1d9e75; color: white; border-radius: 6px; font-size: 14px; text-decoration: none;">
			登出 </a>

		<a th:href="@{/front/venue/myVenue}"
			style="display: inline-block; padding: 8px 16px; background: #1d9e75; color: white; border-radius: 6px; font-size: 14px; text-decoration: none;">
			我的場地 </a>
		<a th:href="@{/front/venue/addVenue}"
			style="display: inline-block; padding: 8px 16px; background: #1d9e75; color: white; border-radius: 6px; font-size: 14px; text-decoration: none;">
			新增場地 </a>
	</div>
	<form th:action="@{/front/venue/listVenues_ByCompositeQuery}" method="post"
	      style="background:white; padding:1rem; border-radius:12px; margin-bottom:1.5rem;">
	    場地名稱: <input type="text" name="venueName" th:value="${param.venueName}"><br>
	    地址關鍵字: <input type="text" name="address" th:value="${param.address}"><br>
	
	    容納人數：
	    最少 <input type="number" name="capacityMin" th:value="${param.capacityMin}" style="width:80px">
	    ～
	    最多 <input type="number" name="capacityMax" th:value="${param.capacityMax}" style="width:80px"><br>
	
	    每小時費用：
	    最低 <input type="number" name="hourlyRateMin" th:value="${param.hourlyRateMin}" style="width:80px">
	    ～
	    最高 <input type="number" name="hourlyRateMax" th:value="${param.hourlyRateMax}" style="width:80px"><br>
	
	    場地類型:
	    <select name="venueTypeId">
	        <option value="">--不限--</option>
	        <option th:each="type : ${venueTypeData}"
	                th:value="${type.venueTypeId}"
	                th:selected="${param.venueTypeId != null and param.venueTypeId[0] == type.venueTypeId.toString()}"
	                th:text="${type.typeName}"></option>
	    </select><br>
	
	    <input type="submit" value="查詢">
	    <a th:href="@{/front/venue/listAllVenue}"
	       style="display:inline-block; padding:6px 16px; background:#999; color:white; border-radius:6px; font-size:13px; text-decoration:none; margin-left:8px;">
	       清除條件
	    </a>
	</form>
	<div class="venue-grid">
		<div th:each="venue : ${venueListData}" class="venue-card">
			<img
				th:if="${venue.coverImage != null}"
				th:src="@{/venue/getImage(imagesId=${venue.coverImage.imagesId})}"
				class="card-img" />
			<div class="card-body">
				<h3 th:text="${venue.venueName}"></h3>
				<p th:text="${venue.address}"></p>
				<p>
					容納人數：<span th:text="${venue.capacity}"></span> 人
				</p>
				<p>
					每小時：<span th:text="${venue.hourlyRate}"></span> 元
				</p>
				<a th:href="@{/front/venue/getOneVenue(venueId=${venue.venueId})}">查看詳情</a>
			</div>
		</div>
	</div>
</body>
</html>
