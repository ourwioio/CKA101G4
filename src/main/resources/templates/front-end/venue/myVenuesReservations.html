<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>場地預約狀況</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<link rel="stylesheet" th:href="@{/css/front-end/common/footer.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenue.css}">
<link rel="stylesheet" th:href="@{/css/front-end/chat/chatWidget.css}">
</head>
<body>
<div th:replace="~{front-end/venue/venueHeader :: header('myVenuesReservations')}"></div>

<main class="myvenue-page">

	<h2 class="section-title">場地預約狀況</h2>

	<div class="status-filter" th:if="${not #lists.isEmpty(myReservationslist)}">
<!-- 		<label for="sortDirFilter">排序方式</label> -->
		<select id="sortDirFilter">
			<option value="">排序方式</option>
			<option value="desc">預約日期：新到舊</option>
			<option value="asc">預約日期：舊到新</option>
		</select>
	</div>

	<div class="table-card" th:if="${not #lists.isEmpty(myReservationslist)}">
		<table class="data-table">
			<thead>
				<tr>
					<th>訂單編號</th>
					<th>場地編號</th>
					<th>場地名稱</th>
					<th>預約日期</th>
					<th>預約時段</th>
					<th>訂單狀態</th>
					<th>詳細資訊</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="venueOrderVO : ${myReservationslist}"
				    th:attr="data-book-date=${#temporals.format(venueOrderVO.bookDate, 'yyyy-MM-dd')}">
					<td th:text="${venueOrderVO.venueOrderId}"></td>
					<td th:text="${venueOrderVO.venueVO.venueId}"></td>
					<td th:text="${venueOrderVO.venueVO.venueName}"></td>
					<td th:text="${venueOrderVO.bookDate}"></td>
					<td th:text="${venueOrderVO.startAt} + '~' + ${venueOrderVO.endAt}"></td>
					<td th:switch="${venueOrderVO.orderStatus}">
						<span th:case="1" class="status-badge status-badge--up">已付款</span>
						<span th:case="4" class="status-badge status-badge--down">已取消</span>
						<span th:case="*" class="status-badge"
						      th:text="${venueOrderVO.orderStatus}"></span>
					</td>
					<td>
						<form th:action="@{/front/venueOrder/getOneReservations}" method="get">
							<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}">
							<button type="submit" class="btn-table">詳細</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="empty-state" th:if="${#lists.isEmpty(myReservationslist)}">
		<span class="blob"></span>
		目前沒有場地預約紀錄
	</div>

</main>

<div th:replace="~{front-end/chat/chatWidget :: chatWidget}"></div>
<div th:replace="~{front-end/common/footer :: footer}"></div>

<script>
	document.addEventListener('DOMContentLoaded', function () {
		const sortDirFilter = document.getElementById('sortDirFilter');
		if (!sortDirFilter) return;

		const tbody = document.querySelector('.data-table tbody');
		const originalRows = Array.from(tbody.querySelectorAll('tr'));

		sortDirFilter.addEventListener('change', function () {
			const dir = sortDirFilter.value;

			// 還沒選排序方式時，還原成後端給的原始順序（訂單編號）
			if (!dir) {
				originalRows.forEach(row => tbody.appendChild(row));
				return;
			}

			const sortedRows = originalRows.slice().sort((a, b) => {
				const dateA = a.dataset.bookDate;
				const dateB = b.dataset.bookDate;
				return dir === 'asc'
					? dateA.localeCompare(dateB)
					: dateB.localeCompare(dateA);
			});
			sortedRows.forEach(row => tbody.appendChild(row));
		});
	});
</script>
</body>
</html>
