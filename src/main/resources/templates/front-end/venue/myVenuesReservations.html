<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>場地預約狀況</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenue.css}">
<style>
    table {
        border-collapse: collapse;
        width: 100%;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: center;
    }
    thead tr {
        border-bottom: 2px solid #333;
    }
</style>
</head>
<body>
	<div th:replace="~{front-end/venue/venueHeader :: header}"></div>
	<span>場地預約狀況 myVenuesReservations.html</span>
<!-- 	<a th:href="@{/front/venue/myVenue}" class="btn-primary"> 回到我的場地 </a> -->
	<table>
		<thead>
			<tr>
				<th>訂單編號</th>
				<th>場地編號</th>
				<th>場地名稱</th>
				<th>撥款狀態</th>
				<th>預約日期</th>
				<th>預約時段</th>
				<th>詳細資訊</th>
			</tr>
		</thead>
		<tbody>
			<th:block th:each="venueOrderVO : ${myReservationslist}">
				<tr>
					<td th:text="${venueOrderVO.venueOrderId}"></td>
					<td th:text="${venueOrderVO.venueVO.venueId}"></td>
			        <td th:text="${venueOrderVO.venueVO.venueName}"></td>
			        <td th:switch="${venueOrderVO.payoutAmount}">
			        	<span th:case="0">未撥款</span>
			        	<span th:case="1">已撥款</span>
			        </td>
			        <td th:text="${venueOrderVO.bookDate}"></td>
			        <td th:text="${venueOrderVO.startAt} + '~' + ${venueOrderVO.endAt}"></td>
			        <td>
			        	<form th:action="@{/front/venueOrder/getOneReservations}" method="get">
			        		<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}">
			        		<button type="submit">詳細</button>
			        	</form>
			        </td>
				</tr>
			</th:block>
		</tbody>
	</table>
</body>
</html>
