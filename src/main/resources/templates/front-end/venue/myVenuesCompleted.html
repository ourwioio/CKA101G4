<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>我的場地評價</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenue.css}">
</head>
<body>
<div th:replace="~{front-end/venue/venueHeader :: header('myVenuesCompleted')}"></div>

<main class="myvenue-page">

	<h2 class="section-title">我的場地評價</h2>

	<div class="table-card" th:if="${not #lists.isEmpty(myAllCompletedlist)}">
		<table class="data-table">
			<thead>
				<tr>
					<th>訂單編號</th>
					<th>場地編號</th>
					<th>買方會員編號</th>
					<th>場地名稱</th>
					<th>撥款狀態</th>
					<th>預約日期</th>
					<th>預約時段</th>
					<th>評價星數</th>
					<th>評價內容</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="venueOrderVO : ${myAllCompletedlist}">
					<td th:text="${venueOrderVO.venueOrderId}"></td>
					<td th:text="${venueOrderVO.venueVO.venueId}"></td>
					<td th:text="${venueOrderVO.member.memberId}"></td>
					<td th:text="${venueOrderVO.venueVO.venueName}"></td>
					<td th:switch="${venueOrderVO.payoutAmount}">
						<span th:case="0" class="status-badge status-badge--down">未撥款</span>
						<span th:case="1" class="status-badge status-badge--up">已撥款</span>
					</td>
					<td th:text="${venueOrderVO.bookDate}"></td>
					<td th:text="${venueOrderVO.startAt} + '~' + ${venueOrderVO.endAt}"></td>
					<td>
						<span class="stars-readonly" th:if="${venueOrderVO.venueRating != null}">
							<span th:each="i : ${#numbers.sequence(1,5)}"
							      th:text="'★'"
							      th:class="${i <= venueOrderVO.venueRating} ? 'filled' : ''"></span>
						</span>
						<span th:if="${venueOrderVO.venueRating == null}">尚未評價</span>
					</td>
					<td th:text="${venueOrderVO.venueComment}"></td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="empty-state" th:if="${#lists.isEmpty(myAllCompletedlist)}">
		<span class="blob"></span>
		目前沒有已完成的場地評價紀錄
	</div>

</main>
</body>
</html>
