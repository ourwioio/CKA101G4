<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增場地</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .card-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #1d9e75;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-row select {
            width: auto;
        }

        .time-row span {
            font-size: 14px;
            color: #666;
        }

        .error {
            color: #c0392b;
            font-size: 12px;
            margin-top: 4px;
        }

        .error-msg {
            color: #c0392b;
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-submit {
            background: #1d9e75;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-back {
            background: white;
            color: #666;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px 24px;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">新增場地</div>

        <form th:action="@{/front/venue/insert}" th:object="${venueVO}" method="post" enctype="multipart/form-data">
            
            <!-- 場地名稱 -->
            <div class="form-group">
                <label>場地名稱</label> 
                <input type="text" th:field="*{venueName}" placeholder="請輸入場地名稱" />
                <div class="error" th:if="${#fields.hasErrors('venueName')}" th:errors="*{venueName}"></div>
            </div>

            <!-- 地址連動選擇器 -->
            <div class="form-group">
                <label>地址</label>
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <select id="citySelect" onchange="updateDistrict()" style="flex: 1;">
                        <option value="">請選擇縣市</option>
                    </select> 
                    <select id="districtSelect" style="flex: 1;">
                        <option value="">請選擇區域</option>
                    </select> 
                    <input type="text" id="streetInput" placeholder="請輸入詳細地址" style="flex: 2;" />
                </div>
                <input type="hidden" th:field="*{address}" id="addressHidden" />
                <div class="error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
            </div>

            <!-- 容納人數 -->
            <div class="form-group">
                <label>容納人數</label> 
                <input type="number" th:field="*{capacity}" placeholder="請輸入容納人數" />
                <div class="error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
            </div>

            <!-- 時租金額 -->
            <div class="form-group">
                <label>時租金額（元）</label> 
                <input type="number" th:field="*{hourlyRate}" placeholder="請輸入時租金額" />
                <div class="error" th:if="${#fields.hasErrors('hourlyRate')}" th:errors="*{hourlyRate}"></div>
            </div>

            <!-- 場地類型 -->
            <div class="form-group">
                <label>場地類型</label> 
                <select th:field="*{venueTypeVO.venueTypeId}">
                    <option value="">請選擇場地類型</option>
                    <option th:each="type : ${venueTypeData}" th:value="${type.venueTypeId}" th:text="${type.typeName}"></option>
                </select>
                <div class="error" th:if="${venueTypeError}" th:text="${venueTypeError}"></div>
            </div>

            <!-- 每週開放日 -->
            <div class="form-group">
                <label>每週開放日</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="openDays" value="0" /> 週一</label> 
                    <label><input type="checkbox" name="openDays" value="1" /> 週二</label> 
                    <label><input type="checkbox" name="openDays" value="2" /> 週三</label> 
                    <label><input type="checkbox" name="openDays" value="3" /> 週四</label> 
                    <label><input type="checkbox" name="openDays" value="4" /> 週五</label> 
                    <label><input type="checkbox" name="openDays" value="5" /> 週六</label> 
                    <label><input type="checkbox" name="openDays" value="6" /> 週日</label>
                </div>
            </div>

            <!-- 營業時間 -->
            <div class="form-group">
                <label>營業時間</label>
                <div class="time-row">
                    <select name="startHour">
                        <option th:each="h : ${#numbers.sequence(0, 23)}" th:value="${h}" th:text="${h} + ':00'"></option>
                    </select> 
                    <span>到</span> 
                    <select name="endHour">
                        <option th:each="h : ${#numbers.sequence(1, 24)}" th:value="${h}" th:text="${h} + ':00'"></option>
                    </select>
                </div>
            </div>

            <!-- 上傳照片 -->
            <div class="form-group">
                <label>場地照片（可多選）</label> 
                <input type="file" name="upFiles" multiple accept="image/*" />
                <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            </div>

            <!-- 按鈕組 -->
            <div class="btn-row">
                <button type="submit" class="btn-submit">新增場地</button>
                <a class="btn-back" th:href="@{/front/venue/listAllVenue}">取消</a>
            </div>
        </form>
    </div>

    <script>
        const addressData = {
            "基隆市": ["仁愛區","信義區","中正區","中山區","安樂區","暖暖區","七堵區"],
            "臺北市": ["中正區","大同區","中山區","松山區","大安區","萬華區","信義區","士林區","北投區","內湖區","南港區","文山區"],
            "新北市": ["板橋區","新莊區","中和區","永和區","土城區","樹林區","三峽區","鶯歌區","三重區","蘆洲區","五股區","泰山區","林口區","八里區","淡水區","三芝區","石門區","金山區","萬里區","汐止區","平溪區","瑞芳區","雙溪區","貢寮區","新店區","深坑區","石碇區","坪林區","烏來區"],
            "桃園市": ["桃園區","中壢區","大溪區","楊梅區","蘆竹區","大園區","龜山區","八德區","龍潭區","平鎮區","新屋區","觀音區","復興區"],
            "新竹市": ["東區","北區","香山區"],
            "新竹縣": ["竹北市","竹東鎮","新埔鎮","關西鎮","湖口鄉","新豐鄉","芎林鄉","橫山鄉","北埔鄉","寶山鄉","峨眉鄉","尖石鄉","五峰鄉"],
            "苗栗縣": ["苗栗市","頭份市","竹南鎮","後龍鎮","通霄鎮","苑裡鎮","卓蘭鎮","造橋鄉","西湖鄉","頭屋鄉","公館鄉","銅鑼鄉","三義鄉","大湖鄉","獅潭鄉","三灣鄉","南庄鄉","泰安鄉"],
            "臺中市": ["中區","東區","南區","西區","北區","北屯區","西屯區","南屯區","太平區","大里區","霧峰區","烏日區","豐原區","后里區","石岡區","東勢區","和平區","新社區","潭子區","大雅區","神岡區","大肚區","沙鹿區","龍井區","梧棲區","清水區","大甲區","外埔區","大安區"],
            "彰化縣": ["彰化市","員林市","和美鎮","鹿港鎮","溪湖鎮","二林鎮","田中鎮","北斗鎮","花壇鄉","芬園鄉","大村鄉","永靖鄉","伸港鄉","線西鄉","福興鄉","秀水鄉","埔心鄉","埔鹽鄉","大城鄉","芳苑鄉","竹塘鄉","社頭鄉","二水鄉","田尾鄉","埤頭鄉","溪州鄉"],
            "南投縣": ["南投市","埔里鎮","草屯鎮","竹山鎮","集集鎮","名間鄉","鹿谷鄉","中寮鄉","魚池鄉","國姓鄉","水里鄉","信義鄉","仁愛鄉"],
            "雲林縣": ["斗六市","斗南鎮","虎尾鎮","西螺鎮","土庫鎮","北港鎮","林內鄉","古坑鄉","大埤鄉","莿桐鄉","褒忠鄉","臺西鄉","崙背鄉","麥寮鄉","東勢鄉","四湖鄉","口湖鄉","水林鄉"],
            "嘉義市": ["東區","西區"],
            "嘉義縣": ["太保市","朴子市","布袋鎮","大林鎮","民雄鄉","溪口鄉","新港鄉","六腳鄉","東石鄉","義竹鄉","鹿草鄉","水上鄉","中埔鄉","竹崎鄉","梅山鄉","番路鄉","大埔鄉","阿里山鄉"],
            "臺南市": ["新營區","鹽水區","白河區","柳營區","後壁區","東山區","麻豆區","下營區","六甲區","官田區","大內區","佳里區","學甲區","西港區","七股區","將軍區","北門區","新化區","善化區","新市區","安定區","山上區","玉井區","楠西區","南化區","左鎮區","仁德區","歸仁區","關廟區","龍崎區","永康區","東區","南區","北區","安南區","安平區","中西區"],
            "高雄市": ["鹽埕區","鼓山區","左營區","楠梓區","三民區","新興區","前金區","苓雅區","前鎮區","旗津區","小港區","鳳山區","林園區","大寮區","大樹區","仁武區","鳥松區","岡山區","橋頭區","燕巢區","田寮區","阿蓮區","路竹區","湖內區","茄萣區","永安區","彌陀區","梓官區","旗山區","美濃區","六龜區","甲仙區","杉林區","內門區","茂林區","桃源區","那瑪夏區"],
            "屏東縣": ["屏東市","潮州鎮","東港鎮","恆春鎮","萬丹鄉","長治鄉","麟洛鄉","九如鄉","里港鄉","鹽埔鄉","高樹鄉","萬巒鄉","內埔鄉","竹田鄉","新埤鄉","枋寮鄉","新園鄉","崁頂鄉","林邊鄉","南州鄉","佳冬鄉","琉球鄉","車城鄉","滿州鄉","枋山鄉","三地門鄉","霧台鄉","瑪家鄉","泰武鄉","來義鄉","春日鄉","獅子鄉","牡丹鄉"],
            "臺東縣": ["臺東市","成功鎮","關山鎮","卑南鄉","大武鄉","太麻里鄉","東河鄉","長濱鄉","鹿野鄉","池上鄉","綠島鄉","蘭嶼鄉","延平鄉","海端鄉","金峰鄉","達仁鄉"],
            "花蓮縣": ["花蓮市","鳳林鎮","玉里鎮","新城鄉","吉安鄉","壽豐鄉","光復鄉","豐濱鄉","瑞穗鄉","富里鄉","秀林鄉","萬榮鄉","卓溪鄉"],
            "澎湖縣": ["馬公市","湖西鄉","白沙鄉","西嶼鄉","望安鄉","七美鄉"],
            "金門縣": ["金城鎮","金湖鎮","金沙鎮","金寧鄉","烈嶼鄉","烏坵鄉"],
            "連江縣": ["南竿鄉","北竿鄉","莒光鄉","東引鄉"]
        };

        // 將所有初始化邏輯統一在 DOMContentLoaded 內執行
        document.addEventListener("DOMContentLoaded", function() {
            const citySelect = document.getElementById("citySelect");
            const districtSelect = document.getElementById("districtSelect");
            const streetInput = document.getElementById("streetInput");

            // 1. 初始化縣市選單
            for (const city in addressData) {
                let option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            }

            // 2. 還原之前填過的地址（表單驗證未通過回填時使用）
            const savedAddress = document.getElementById("addressHidden").value;
            if (savedAddress) {
                for (const city in addressData) {
                    if (savedAddress.startsWith(city)) {
                        citySelect.value = city;

                        // 更新區域選單
                        districtSelect.innerHTML = '<option value="">請選擇區域</option>';
                        addressData[city].forEach(function(district) {
                            let option = document.createElement("option");
                            option.value = district;
                            option.textContent = district;
                            districtSelect.appendChild(option);
                        });

                        // 設定區域與詳細地址
                        const remaining = savedAddress.substring(city.length);
                        for (const district of addressData[city]) {
                            if (remaining.startsWith(district)) {
                                districtSelect.value = district;
                                streetInput.value = remaining.substring(district.length);
                                break;
                            }
                        }
                        break;
                    }
                }
            }

            // 3. 綁定監聽事件（取代舊寫法以維持邏輯乾淨）
            districtSelect.addEventListener("change", updateAddress);
            streetInput.addEventListener("input", updateAddress);
        });

        // 縣市改變時更新區域選單
        function updateDistrict() {
            const citySelect = document.getElementById("citySelect");
            const districtSelect = document.getElementById("districtSelect");
            const city = citySelect.value;

            districtSelect.innerHTML = '<option value="">請選擇區域</option>';

            if (city && addressData[city]) {
                addressData[city].forEach(function(district) {
                    let option = document.createElement("option");
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }

            updateAddress();
        }

        // 組合地址並存入 hidden input 供後端接收
        function updateAddress() {
            const city = document.getElementById("citySelect").value;
            const district = document.getElementById("districtSelect").value;
            const street = document.getElementById("streetInput").value;
            document.getElementById("addressHidden").value = city + district + street;
        }
    </script>
</body>
</html>
