<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>付款頁面</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/mockPayment.css}" href="payment.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1 th:text="${order.paymentMethod == 0} ? '信用卡付款' : '銀行轉帳付款'"></h1>

        <div class="timer-box">
            <div class="timer-label">請在時限內完成付款，逾時訂單將自動取消</div>
            <div class="timer-value" id="countdown">05:00</div>
        </div>

        <div class="order-info">
            <p><strong>訂單編號：</strong>#<span th:text="${order.venueOrderId}"></span></p>
            <p><strong>場地：</strong><span th:text="${order.venueVO.venueName}"></span></p>
            <p><strong>時段：</strong><span th:text="${order.startAt} + ' ～ ' + ${order.endAt}"></span></p>
        </div>

        <div class="amount">NT$ <span th:text="${order.totalAmount}"></span></div>

        <div class="method-note" th:if="${order.paymentMethod == 0}">
		    <div class="form-group">
		        <label for="card-name">持卡人姓名</label>
		        <input type="text" id="card-name" autocomplete="cc-name" required placeholder="王小明">
		    </div>
		
		    <div class="form-group">
		        <label for="card-number">信用卡卡號</label>
		        <input type="text" id="card-number" inputmode="numeric" pattern="\d{13,19}" autocomplete="cc-number" maxlength="19" required placeholder="XXXX XXXX XXXX XXXX">
		    </div>
		
		    <div class="row">
		        <div class="form-group">
		            <label for="expiry-date">有效年月</label>
		            <input type="text" id="expiry-date" inputmode="numeric" pattern="\d{2}/\d{2}" autocomplete="cc-exp" maxlength="5" required placeholder="MM/YY">
		        </div>
		        <div class="form-group">
		            <label for="cvv">安全碼 (CVV)</label>
		            <input type="text" id="cvv" inputmode="numeric" pattern="\d{3,4}" autocomplete="cc-csc" maxlength="4" required placeholder="123">
		        </div>
		    </div>
        </div>
        <div class="method-note" th:if="${order.paymentMethod == 1}">
            請於時限內轉帳至指定帳戶，轉帳完成後點擊下方按鈕確認。<br>
            822-00000000000000
        </div>

        <form th:action="@{/front/venueOrder/confirmPayment}" method="post">
            <input type="hidden" name="venueOrderId" th:value="${order.venueOrderId}" />
            <button type="submit" class="btn-confirm">付款</button>
        </form>
        <!-- 取消付款 -->
		<form th:action="@{/front/venueOrder/cancelPayment}" method="post" style="margin-top: 10px;">
		    <input type="hidden" name="venueOrderId" th:value="${order.venueOrderId}" />
		    <button type="submit" class="btn-cancel-pay">取消付款</button>
		</form>
    </div>
</div>

<!-- 逾時自動取消用的隱藏表單 -->
<form id="expireForm" th:action="@{/front/venueOrder/cancelExpired}" method="post" style="display:none;">
    <input type="hidden" name="venueOrderId" th:value="${order.venueOrderId}" />
</form>

<!-- 這個變數需要 Thymeleaf 注入後端的 secondsLeft，無法搬到純外部 .js 檔案，須留在此處 -->
<script th:inline="javascript">
var secondsLeft = /*[[${secondsLeft}]]*/ 300;
</script>
<script th:src="@{/js/front-end/venue/mockPayment.js}"></script>

</body>
</html>
