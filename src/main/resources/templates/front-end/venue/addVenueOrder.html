<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>預約場地</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/addVenueOrder.css}" href="venue-order.css">
</head>
<body>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<main class="form-page">

	<a class="back-link" th:href="@{/front/venue/getOneVenue(venueId=${venueVO.venueId})}">← 回場地詳情</a>

	<div class="card">
		<div class="venue-info">
			<h2 th:text="${venueVO.venueName}"></h2>
			<p th:text="${venueVO.address}"></p>
			<p>每小時 <span th:text="${venueVO.hourlyRate}"></span> 元</p>
		</div>

		<form th:action="@{/front/venueOrder/insert}" th:object="${venueOrderDTO}" method="post">
			<input type="hidden" name="venueId" th:value="${venueVO.venueId}"/>
			<input type="hidden" id="hourlyRate" th:value="${venueVO.hourlyRate}"/>

			<!-- 選擇日期 -->
			<div class="form-group">
				<label>選擇日期</label>
				<div class="slot-grid">
					<div th:each="slot : ${venueVO.venueSlots}" th:if="${!slot.slotDate.isBefore(T(java.time.LocalDate).now())}">
						<button type="button"
						        th:if="${slot.slotStatus != null and slot.slotStatus.contains('0')}"
						        class="slot-btn slot-available"
						        th:text="${slot.slotDate}"
						        th:attr="data-slot-id=${slot.venueSlotId}, data-slot-date=${slot.slotDate}, data-slot-status=${slot.slotStatus}">
						</button>
						<button type="button"
						        th:if="${slot.slotStatus == null or !slot.slotStatus.contains('0')}"
						        class="slot-btn slot-unavailable"
						        th:text="${slot.slotDate}"
						        disabled>
						</button>
					</div>
				</div>
				<input type="hidden" th:field="*{venueSlotId}" id="selectedSlotId"/>
				<input type="hidden" th:field="*{bookDate}" id="selectedSlotDate"/>

				<span th:if="${#fields.hasErrors('venueSlotId')}" th:errors="*{venueSlotId}" class="error"></span>
				<span th:if="${#fields.hasErrors('bookDate')}" th:errors="*{bookDate}" class="error"></span>
			</div>

			<!-- 選擇時段 -->
			<div class="form-group" id="timeSection">
				<label>選擇時段</label>
				<div class="time-row">
					<select name="startHour" id="startHour">
						<option value="">開始時間</option>
					</select>
					<span>到</span>
					<select name="endHour" id="endHour">
						<option value="">結束時間</option>
					</select>
				</div>

				<span th:if="${#fields.hasErrors('startHour')}" th:errors="*{startHour}" class="error"></span>
				<span th:if="${#fields.hasErrors('endHour')}" th:errors="*{endHour}" class="error"></span>
			</div>

			<!-- 付款方式 -->
			<div class="form-group">
				<label>付款方式</label>
				<select th:field="*{paymentMethod}">
					<option value="">付款方式</option>
					<option value="0">信用卡</option>
					<option value="1">銀行轉帳</option>
				</select>
				<span th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}" class="error"></span>
			</div>

			<!-- 費用計算 -->
			<div class="total-amount" id="totalAmount" style="display:none;">
				預估費用：<span id="totalAmountText"></span> 元
			</div>

			<div class="btn-row">
				<button type="submit" class="btn-submit" onclick="return validateForm()">確認預約</button>
				<a class="btn-back" th:href="@{/front/venue/getOneVenue(venueId=${venueVO.venueId})}">取消</a>
			</div>
		</form>
	</div>

</main>

<!-- 把驗證失敗後、後端保留的值，轉成 JS 變數，方便頁面載入時重建畫面狀態 -->
<!-- 這段需要 Thymeleaf 注入後端資料，無法抽成純外部 .js 檔案，須留在此處 -->
<script th:inline="javascript">
var restoreVenueSlotId = /*[[${venueOrderDTO.venueSlotId}]]*/ null;
</script>

<script th:src="@{/js/front-end/venue/addVenueOrder.js}"></script>
</body>
</html>
