<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>修改場地</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/update_venue_input.css}" href="edit-venue.css">
</head>
<body>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<div class="container">
	<div class="page-header">
		<h1 class="page-title">修改場地</h1>
		<a th:href="@{/front/venue/myVenue}" class="btn btn-secondary">返回我的場地</a>
	</div>

	<div class="card">
		<form th:action="@{/front/venue/update}" method="post" th:object="${venueVO}" enctype="multipart/form-data">
			<input type="hidden" th:field="*{venueId}" />
			<div class="form-grid">
			    <div class="form-group">
			        <label>建立時間</label>
			        <input type="text" th:value="${#temporals.format(venueVO.createdAt, 'yyyy-MM-dd HH:mm')}" disabled />
			    </div>

			    <div class="form-group">
			        <label>場地狀態</label>
			        <input type="hidden" th:field="*{venueStatus}" id="venueStatusInput"/>
			        <button type="button" class="btn btn-secondary" id="statusToggleBtn"
			                th:if="${venueVO.venueStatus != 2}"
			                th:text="${venueVO.venueStatus == 0 ? '目前：下架（點擊改為上架）' : '目前：上架（點擊改為下架）'}"
			                onclick="toggleVenueStatusField()"></button>
			        <input type="text" th:if="${venueVO.venueStatus == 2}" value="審核中" disabled />
			    </div>
			</div>

			<div class="section-title">場地名稱</div>
			<div class="form-group">
				<label for="venueName">場地名稱</label>
				<input type="text" th:field="*{venueName}" placeholder="請輸入場地名稱" />
				<span class="error-text" th:if="${#fields.hasErrors('venueName')}" th:errors="*{venueName}"></span>
			</div>

			<div class="section-title">場地資訊</div>

			<div class="form-group">
				<label>場地地址</label>
				<p class="current-address-note">目前地址：<span th:text="${venueVO.address}"></span></p>
				<div class="address-row">
					<select id="citySelect" class="address-select" onchange="updateDistrict()">
						<option value="">請選擇縣市</option>
					</select>
					<select id="districtSelect" class="address-select">
						<option value="">請選擇區域</option>
					</select>
					<input type="text" id="streetInput" class="address-street" placeholder="請輸入詳細地址" />
				</div>
				<input type="hidden" th:field="*{address}" id="addressHidden" />
				<span class="error-text" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
			</div>

			<div class="form-group">
			    <label for="capacity">容納人數</label>
			    <input type="text" th:field="*{capacity}" placeholder="請輸入容納人數" />
			    <span class="error-text" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
			</div>

			<div class="form-group">
			    <label for="hourlyRate">租借費用</label>
			    <input type="text" th:field="*{hourlyRate}" placeholder="請輸入每小時租借費用" />
			    <span class="error-text" th:if="${#fields.hasErrors('hourlyRate')}" th:errors="*{hourlyRate}"></span>
			</div>

			<div class="form-group">
			    <label for="venueTypeId">場地類型</label>
			    <select th:field="*{venueTypeVO.venueTypeId}">
			        <option th:each="type : ${venueTypeData}"
			                th:value="${type.venueTypeId}"
			                th:text="${type.typeName}"></option>
			    </select>
			    <span class="error-text" th:if="${#fields.hasErrors('venueTypeVO')}" th:errors="*{venueTypeVO}"></span>
			</div>


			<div class="section-title">營運時間配置</div>

			<div class="form-group">
				<label>每週開放日</label>
				<div class="checkbox-cluster">
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="0"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(0,1) == '1'}" /> 週一
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="1"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(1,2) == '1'}" /> 週二
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="2"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(2,3) == '1'}" /> 週三
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="3"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(3,4) == '1'}" /> 週四
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="4"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(4,5) == '1'}" /> 週五
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="5"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(5,6) == '1'}" /> 週六
					</label>
					<label class="checkbox-item">
						<input type="checkbox" name="openDays" value="6"
							   th:checked="*{openDays != null && openDays.length() == 7 && openDays.substring(6,7) == '1'}" /> 週日
					</label>
				</div>
			</div>

			<div class="form-group" th:with="
				hoursStr=*{availableHours},
				hasZero=${hoursStr != null && hoursStr.contains('0')},
				startH=${hasZero ? hoursStr.indexOf('0') : 9},
				endH=${hasZero ? hoursStr.lastIndexOf('0') + 1 : 18}">

				<label>每日營業時段</label>
				<div class="time-select-group">
					<select name="startHour" id="startHour" onchange="updateEndHourOptions()">
						<option th:each="h : ${#numbers.sequence(0, 23)}" th:value="${h}" th:text="${h} + ':00'" th:selected="${h == startH}"></option>
					</select>
					<span>至</span>
					<select name="endHour" id="endHour">
						<option th:each="h : ${#numbers.sequence(1, 24)}" th:value="${h}" th:text="${h} + ':00'" th:selected="${h == endH}"></option>
					</select>
				</div>
			</div>

			<!-- 場地簡介 -->
			<div class="form-group">
			    <label>場地介紹</label>
			    <textarea th:field="*{venueDescription}"
			              placeholder="請輸入場地介紹、特色說明等"
			              rows="5"></textarea>
			    <div class="error-text" th:if="${#fields.hasErrors('venueDescription')}" th:errors="*{venueDescription}"></div>
			</div>

			<div class="section-title">場地封面</div>
			<div class="form-group">
			    <label>點選照片設為封面</label>
			    <div th:if="*{venueImages == null || venueImages.isEmpty()}" class="empty-note">
			        目前本場地沒有上傳任何照片。
			    </div>
				<div class="gallery" th:if="*{venueImages != null && !venueImages.isEmpty()}">
				    <div class="gallery-item" th:each="img : *{venueImages}"
				         th:id="${'img-item-' + img.imagesId}"
				         th:classappend="${img.cover != null and img.cover == 1} ? 'is-cover' : ''"
				         th:onclick="|setExistingCover(${img.imagesId}, this)|">
				        <img th:src="@{/front/venue/getImage(imagesId=${img.imagesId})}" alt="場地環境圖" />
				        <div class="cover-tag" th:text="${img.cover != null and img.cover == 1} ? '目前封面' : '設為封面'"></div>
				        <a href="#" class="btn-delete-img"
				           th:onclick="|event.stopPropagation(); event.preventDefault(); toggleDeleteMark(${img.imagesId}, this)|">
				           刪除
				        </a>
				        <input type="checkbox" name="deleteImageIds" th:value="${img.imagesId}"
				               th:id="${'del-check-' + img.imagesId}" style="display:none;" />
				    </div>
				</div>
			    <input type="hidden" name="coverImageId" id="coverImageId" value=""/>
			    <input type="hidden" name="coverNewIndex" id="coverNewIndex" value=""/>
			</div>

			<div class="form-group">
			    <label for="upFiles">上傳新照片</label>
			    <input type="file" name="upFiles" id="upFiles" accept="image/*" multiple onchange="handleFileSelect(event)" />
			    <div class="gallery" id="newPreviewGallery"></div>
			</div>

			<div class="action-bar">
			    <a th:href="@{/front/venue/myVenue}" class="btn btn-secondary">取消並返回</a>
			    <button type="submit" class="btn btn-primary">儲存變更</button>
			</div>
		</form>
	</div>
</div>

<script th:src="@{/js/front-end/venue/addressSelector.js}"></script>
<script th:src="@{/js/front-end/venue/update_venue_input.js}"></script>

</body>
</html>
