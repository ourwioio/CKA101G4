<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>場地詳情</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/listOneVenue.css}" href="venue-detail.css">
</head>
<body>
	<a class="back-link" th:href="@{/front/venue/listAllVenue}">← 回場地列表</a>
	<div class="card">
		<img class="main-img"
			th:if="${venueVO.coverImage != null}"
			th:src="@{/front/venue/getImage(imagesId=${venueVO.coverImage.imagesId})}" />
		<div class="body">
			<div class="venue-name" th:text="${venueVO.venueName}"></div>
			<div class="venue-addr" th:text="${venueVO.address}"></div>
			<div class="info-row">
				<div class="info-item">
					<div class="info-label">容納人數</div>
					<div class="info-value">
						<span th:text="${venueVO.capacity}"></span> 人
					</div>
				</div>
				<div class="info-item">
					<div class="info-label">每小時費用</div>
					<div class="info-value">
						<span th:text="${venueVO.hourlyRate}"></span> 元
					</div>
				</div>
			</div>
			<div class="section-title">場地介紹：</div>
			<div class="venue-desc" th:if="${venueVO.venueDescription != null and !venueVO.venueDescription.isEmpty()}" 
     th:text="${venueVO.venueDescription}"></div>
			<hr />
			<div class="section-title">場地照片</div>
			<div class="img-grid">
				<img th:each="img : ${venueVO.venueImages}"
					th:src="@{/front/venue/getImage(imagesId=${img.imagesId})}" />
			</div>
			<div class="book-row">
				<div class="price-note">
					每小時 <span th:text="${venueVO.hourlyRate}"></span> 元
				</div>
				<a class="btn-book"
					th:href="@{/front/venueOrder/addVenueOrder(venueId=${venueVO.venueId})}">預約此場地</a>
			</div>
		</div>
	</div>

		<hr />
		
		<div class="section-title">場地評價</div>
		
		<!-- 平均分數摘要 -->
		<div class="rating-summary">
<!-- 		    <span th:if="${venueVO.ratingCount == null or venueVO.ratingCount == 0}">尚未有人評分</span> -->
		    <span th:unless="${venueVO.ratingCount == null or venueVO.ratingCount == 0}"
		          th:text="${#numbers.formatDecimal(venueVO.averageRating, 1, 1)} + '/5 星（共 ' + ${venueVO.ratingCount} + ' 則評價）'">
		    </span>
		</div>
		
		<!-- 逐筆評價卡片 -->
		<div class="review-grid" th:if="${!#lists.isEmpty(reviewList)}">
		    <div class="review-card" th:each="review : ${reviewList}">
		        <div class="review-header">
		            <span class="reviewer-name" th:text="${review.member.nickname}"></span>
		            <span class="review-date"
		                  th:text="${#temporals.format(review.handledAt, 'yyyy-MM-dd')}"></span>
		        </div>
		
		        <div class="stars-readonly">
		            <span th:each="i : ${#numbers.sequence(1,5)}"
		                  th:text="'★'"
		                  th:class="${i <= review.venueRating} ? 'filled' : ''"></span>
		        </div>
		
		        <p class="review-comment"
		           th:if="${review.venueComment != null and !review.venueComment.isEmpty()}"
		           th:text="${review.venueComment}"></p>
		        <p class="review-comment review-empty"
		           th:if="${review.venueComment == null or review.venueComment.isEmpty()}">
		            （這位使用者沒有留下文字評論）
		        </p>
		    </div>
		</div>
		
		<div class="no-reviews" th:if="${#lists.isEmpty(reviewList)}">
		    目前還沒有評價
		</div>

</body>
</html>
