<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>我的場地</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenue.css}">
</head>
<body>
<div th:replace="~{front-end/venue/venueHeader :: header('myVenue')}"></div>

<main class="myvenue-page">

	<div class="status-filter" th:if="${not #lists.isEmpty(venueListData)}">
		<label for="statusFilter">場地狀態</label>
		<select id="statusFilter" onchange="filterMyVenues()">
			<option value="all">全部</option>
			<option value="1">上架</option>
			<option value="0">下架</option>
			<option value="2">審核中</option>
		</select>
	</div>

	<section class="card-grid" th:if="${not #lists.isEmpty(venueListData)}">
		<div class="item-card" th:each="venue : ${venueListData}" th:attr="data-status=${venue.venueStatus}">
			<a th:href="@{/front/venue/getOneMyVenue(venueId=${venue.venueId})}" class="item-card__link">

				<div class="item-card__thumb-wrap">
					<img th:if="${venue.coverImage != null}"
					     th:src="@{/front/venue/getImage(imagesId=${venue.coverImage.imagesId})}"
					     alt="場地圖片" onerror="this.src='/images/default-venue.jpeg'">
					<img th:if="${venue.coverImage == null}"
					     src="/images/default-venue.jpeg" alt="暫無圖片">
				</div>

				<div class="item-card__body">
					<span class="status-badge"
					      th:classappend="${venue.venueStatus == 1} ? 'status-badge--up' : (${venue.venueStatus == 2} ? 'status-badge--pending' : 'status-badge--down')"
					      th:switch="${venue.venueStatus}">
						<span th:case="0">下架</span>
						<span th:case="1">上架</span>
						<span th:case="2">審核中</span>
					</span>

					<h3 class="item-card__title" th:text="${venue.venueName}"></h3>
					<p class="item-card__addr" th:text="${venue.address}"></p>

					<div class="item-card__meta">
						<span>容納 <span th:text="${venue.capacity}"></span> 人</span>
					</div>
					<div class="item-card__meta">
						<span>NT$ <span th:text="${venue.hourlyRate}"></span> / 小時</span>
					</div>

					<p class="item-card__created">
						建立時間：<span th:text="${#temporals.format(venue.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
					</p>

					<span class="item-card__detail">查看</span>
				</div>

			</a>
		</div>
	</section>

	<div class="empty-state" th:if="${#lists.isEmpty(venueListData)}">
		<span class="blob"></span>
		你還沒有任何場地
		<br>
		<a th:href="@{/front/venue/addVenue}" class="btn-primary empty-state__cta">立即新增場地</a>
	</div>

</main>

<script th:src="@{/js/front-end/venue/addressShorten.js}"></script>
<script>
	function filterMyVenues() {
		const selected = document.getElementById('statusFilter').value;
		document.querySelectorAll('.item-card').forEach(function (card) {
			const matches = selected === 'all' || card.dataset.status === selected;
			card.style.display = matches ? '' : 'none';
		});
	}
</script>
</body>
</html>
