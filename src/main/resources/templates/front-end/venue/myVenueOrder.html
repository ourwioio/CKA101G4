<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>我的場地訂單</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenueOrder.css}" href="my-orders.css">
</head>
<body>

<div class="container">
    <a class="back-link" th:href="@{/front/venue/listAllVenue}">← 返回場地瀏覽</a>
    <h1>我的場地訂單</h1>

    <div class="no-orders" th:if="${#lists.isEmpty(venueOrderListData)}">
        <p>目前沒有任何預約訂單紀錄。</p>
        <a th:href="@{/front/venue/listAllVenue}" class="btn-browse">立即探索場地</a>
    </div>

    <div th:unless="${#lists.isEmpty(venueOrderListData)}">
    	<div id="orderListContainer">
        <div class="order-card" th:each="order : ${venueOrderListData}">

            <div class="order-header">
                <span class="order-id" th:text="'訂單編號：#' + ${order.venueOrderId}"></span>
                <span class="order-date"
			      th:text="'下單時間：' + ${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">
				</span>
            </div>

            <div class="order-body">
                <div class="venue-details">
                    <h2 th:text="${order.venueVO.venueName}"></h2>
					<p>
					    <strong>預約日期：</strong>
					    <span th:text="${#temporals.format(order.bookDate, 'yyyy-MM-dd')}"></span>
					</p>
                    <p>
                        <strong>預約時段：</strong>
                        <span th:text="${order.startAt} + ' ～ ' + ${order.endAt}"></span>
                    </p>

                    <div>
                        <!-- 付款方式：只剩信用卡／銀行轉帳 -->
                        <span class="badge badge-payment"
                              th:text="${order.paymentMethod == 0} ? '信用卡' : '銀行轉帳'">
                        </span>

                        <!--  訂單狀態：0待付款 1已付款 2已取消 3已完成 -->
                        <span class="badge"
                              th:classappend="${order.orderStatus == 0} ? 'status-pending' : (${order.orderStatus == 1} ? 'status-paid' : (${order.orderStatus == 2} ? 'status-cancel' : 'status-done'))"
                              th:text="${order.orderStatus == 0} ? '待付款' : (${order.orderStatus == 1} ? '已付款' : (${order.orderStatus == 2} ? '已取消' : '已完成'))">
                        </span>

                        <!-- 退款申請狀態 -->
						<span class="badge badge-status"
						      th:if="${order.refundStatus == 0 or order.refundStatus == 1}"
						      th:classappend="${order.refundStatus == 0} ? 'status-0' : 'status-1'"
						      th:text="${order.refundStatus == 0} ? '退款進行中' : '退款已完成'">
						</span>
                    </div>
                </div>

                <div class="order-right">
                    <div class="total-amount">
                        <span class="currency">NT$ </span>
                        <th:block th:text="${order.totalAmount}"></th:block>
                    </div>

                    <!-- 已評價：顯示星星＋留言 -->
                    <div class="review-display" th:if="${order.venueRating != null}">
                        <span class="stars-readonly">
                            <span th:each="i : ${#numbers.sequence(1,5)}"
                                  th:text="'★'"
                                  th:class="${i <= order.venueRating} ? 'filled' : ''"></span>
                        </span>
                        <p class="comment-text" th:if="${order.venueComment != null and !order.venueComment.isEmpty()}"
                           th:text="${order.venueComment}"></p>
                    </div>

                    <div class="actions">

                        <!-- 🌟 待付款：導去付款頁 -->
                        <a th:if="${order.orderStatus == 0}"
                           th:href="@{/front/venueOrder/mockPayment(venueOrderId=${order.venueOrderId})}"
                           class="btn-pay">前往付款</a>

                        <!-- 🌟 已付款或已完成：可評價、可檢舉 -->
                        <th:block th:if="${order.orderStatus == 1 or order.orderStatus == 3}">
                            <button type="button" class="btn-review"
                                    th:attr="data-order-id=${order.venueOrderId},
                                             data-rating=${order.venueRating},
                                             data-comment=${order.venueComment}"
                                    onclick="openReviewModal(this)"
                                    th:text="${order.venueRating != null} ? '編輯評價' : '評價場地'">
                            </button>

                            <a th:href="@{/front/report/add(venueOrderId=${order.venueOrderId})}" class="btn-report">檢舉</a>
                        </th:block>
			        </div>
                </div>
            </div>

        </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- 評價 Modal -->
<div class="modal-overlay" id="reviewModalOverlay">
    <div class="modal-box">
        <h3>評價這個場地</h3>
        <form th:action="@{/front/venueOrder/updateReview}" method="post">
            <input type="hidden" name="venueOrderId" id="reviewOrderId" />

            <div class="star-rating">
                <input type="radio" id="star5" name="venueRating" value="5" required><label for="star5">★</label>
                <input type="radio" id="star4" name="venueRating" value="4"><label for="star4">★</label>
                <input type="radio" id="star3" name="venueRating" value="3"><label for="star3">★</label>
                <input type="radio" id="star2" name="venueRating" value="2"><label for="star2">★</label>
                <input type="radio" id="star1" name="venueRating" value="1"><label for="star1">★</label>
            </div>

            <textarea name="venueComment" id="reviewComment" placeholder="留下你對這個場地的感想..."></textarea>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeReviewModal()">取消</button>
                <button type="submit" class="btn-submit">送出評價</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/front-end/venue/myVenueOrder.js}"></script>

</body>
</html>
