<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>我的場地訂單</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenue.css}">
<link rel="stylesheet" th:href="@{/css/front-end/venue/myVenueOrder.css}">
</head>
<body>
<div th:replace="~{front-end/venue/venueHeader :: header}"></div>

<div class="container">
    <a class="back-link" th:href="@{/front/venue/myVenue}">← 返回我的場地</a>
    <h1>我的場地訂單</h1>

    <div class="no-orders" th:if="${#lists.isEmpty(venueOrderListData)}">
        <p>目前沒有任何預約訂單紀錄。</p>
        <a th:href="@{/front/venue/listAllVenue}" class="btn-browse">立即探索場地</a>
    </div>

	<div class="filter-bar">
	    <select id="venueTypeFilter">
	        <option value="">全部類型</option>
	        <option th:each="venueTypeVO : ${venueTypeData}" th:text="${venueTypeVO.typeName}"></option>
	    </select>
	
	    <select id="sortDirFilter">
	        <option value="desc">預約日期：新到舊</option>
	        <option value="asc">預約日期：舊到新</option>
	    </select>
	</div>
	
    <div th:unless="${#lists.isEmpty(venueOrderListData)}">
    	<div id="orderListContainer">
        <div class="order-card" th:each="order : ${venueOrderListData}"
        	 th:attr="data-venue-type=${order.venueVO.venueTypeVO.typeName},
              data-book-date=${#temporals.format(order.bookDate, 'yyyy-MM-dd')}">

            <div class="order-header">
                <span class="order-id" th:text="'訂單編號：#' + ${order.venueOrderId}"></span>
                <span class="order-date"
			      th:text="'下單時間：' + ${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">
				</span>
            </div>

            <div class="order-body">
                <div class="venue-details">
                    <h2 th:text="${order.venueVO.venueName}"></h2>
					<p>
					    <strong>預約日期：</strong>
					    <span th:text="${#temporals.format(order.bookDate, 'yyyy-MM-dd')}"></span>
					</p>
                    <p>
                        <strong>預約時段：</strong>
                        <span th:text="${order.startAt} + ' ～ ' + ${order.endAt}"></span>
                    </p>

                    <div>
                        <!-- 付款方式：只剩信用卡／銀行轉帳 -->
                        <span class="badge badge-payment"
                              th:text="${order.paymentMethod == 0} ? '信用卡' : '銀行轉帳'">
                        </span>

                        <!--  訂單狀態：0待付款 1已付款 2已取消 3已完成 -->
                        <th:block th:switch="${order.orderStatus}">
						    <span th:case="0" class="badge status-pending">待付款</span>
						    <span th:case="1" class="badge status-paid">已付款</span>
						    <span th:case="2" class="badge status-cancel">已取消</span>
						    <span th:case="3" class="badge status-done">已完成</span>
						    <span th:case="4" class="badge status-done">已取消</span>
						</th:block>

                        <!-- 退款申請狀態 -->
						<span class="badge badge-status"
						      th:if="${order.refundStatus == 0 or order.refundStatus == 1}"
						      th:classappend="${order.refundStatus == 0} ? 'status-0' : 'status-1'"
						      th:text="${order.refundStatus == 0} ? '退款進行中' : '退款已完成'">
						</span>
                    </div>
                </div>

                <div class="order-right">
                    <div class="total-amount">
                        <span class="currency">NT$ </span>
                        <th:block th:text="${order.totalAmount}"></th:block>
                    </div>

                    <!-- 已評價：顯示星星＋留言 -->
                    <div class="review-display" th:if="${order.venueRating != null}">
                        <span class="stars-readonly">
                            <span th:each="i : ${#numbers.sequence(1,5)}"
                                  th:text="'★'"
                                  th:class="${i <= order.venueRating} ? 'filled' : ''"></span>
                        </span>
                        <p class="comment-text" th:if="${order.venueComment != null and !order.venueComment.isEmpty()}"
                           th:text="${order.venueComment}"></p>
                    </div>

                    <div class="actions">

                        <!-- 🌟 待付款：導去付款頁 -->
                        <a th:if="${order.orderStatus == 0}"
                           th:href="@{/front/venueOrder/mockPayment(venueOrderId=${order.venueOrderId})}"
                           class="btn-pay">前往付款</a>

						<th:block th:if="${order.orderStatus == 1 and order.bookDate.isAfter(cancelCutoff)}">
						    <button type="button" class="btn-pay"
						            th:attr="data-order-id=${order.venueOrderId}"
						            onclick="openCancelModal(this)">取消訂單</button>
						</th:block>

                        <!-- 🌟 已付款或已完成：可評價、可檢舉 -->
                        <th:block th:if="${order.orderStatus == 3}">
						    <button type="button" class="btn-review"
						            th:if="${order.venueRating == null}"
						            th:attr="data-order-id=${order.venueOrderId}"
						            onclick="openReviewModal(this)">評價場地</button>
						
						    <a th:href="@{/venueReports/addVenueReport(venueOrderId=${order.venueOrderId})}" class="btn-report">檢舉</a>
						    <span class="badge status-done" th:if="${order.venueRating != null}">已評價</span>
						</th:block>
			        </div>
                </div>
            </div>

        </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- 評價 Modal -->
<div class="modal-overlay" id="reviewModalOverlay">
    <div class="modal-box">
        <h3>評價這個場地</h3>
        <form th:action="@{/front/venueOrder/updateReview}" method="post">
            <input type="hidden" name="venueOrderId" id="reviewOrderId" />

            <div class="star-rating">
                <input type="radio" id="star5" name="venueRating" value="5" required><label for="star5">★</label>
                <input type="radio" id="star4" name="venueRating" value="4"><label for="star4">★</label>
                <input type="radio" id="star3" name="venueRating" value="3"><label for="star3">★</label>
                <input type="radio" id="star2" name="venueRating" value="2"><label for="star2">★</label>
                <input type="radio" id="star1" name="venueRating" value="1"><label for="star1">★</label>
            </div>

            <textarea name="venueComment" id="reviewComment" placeholder="留下你對這個場地的感想..."></textarea>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeReviewModal()">取消</button>
                <button type="submit" class="btn-submit">送出評價</button>
            </div>
        </form>
    </div>
</div>
<!-- 取消訂單 Modal -->
<div class="modal-overlay" id="cancelModalOverlay">
    <div class="modal-box">
        <h3>取消訂單</h3>
        <form th:action="@{/front/venueOrder/cancelOrder}" method="post" id="cancelForm">
            <input type="hidden" name="venueOrderId" id="cancelOrderId" />

            <label for="cancelReason" class="cancel-label">請告訴我們取消的原因：</label>
            <textarea name="refundReason" id="cancelReason"
                      placeholder="請輸入取消原因..." required></textarea>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeCancelModal()">返回</button>
                <button type="submit" class="btn-submit btn-danger-submit">確認取消訂單</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/front-end/venue/myVenueOrder.js}"></script>

</body>
</html>
