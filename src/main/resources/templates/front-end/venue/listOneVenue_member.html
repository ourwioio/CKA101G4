<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>場地詳情（會員管理）</title>
<link rel="stylesheet" th:href="@{/css/front-end/venue/listOneVenue_member.css}" href="venue-detail-manage.css">
</head>
<body>

    <a class="back-link" th:href="@{/front/venue/myVenue}">← 回我的場地</a>

    <div class="card">
        <img class="main-img"
             th:if="${venueVO.coverImage != null}"
             th:src="@{/venue/getImage(imagesId=${venueVO.coverImage.imagesId})}" />
             
        <div class="body">
            <div class="venue-name" th:text="${venueVO.venueName}"></div>
            <div class="venue-addr" th:text="${venueVO.address}"></div>
            
            <span th:class="${venueVO.venueStatus == 0 ? 'badge badge-down' : 'badge badge-up'}"
                  th:text="${venueVO.venueStatus == 0 ? '下架' : '上架'}"></span>
                
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">容納人數</div>
                    <div class="info-value">
                        <span th:text="${venueVO.capacity}"></span> 人
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">每小時費用</div>
                    <div class="info-value">
                        <span th:text="${venueVO.hourlyRate}"></span> 元
                    </div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">場地類型</div>
                    <div class="info-value">
                        <span th:text="${venueVO.venueTypeVO != null ? venueVO.venueTypeVO.typeName : '未設定'}"></span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">場地狀態</div>
                    <div class="info-value">
                        <span th:text="${venueVO.venueStatus == 0 ? '下架' : '上架'}"></span>
                    </div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">建立時間</div>
                    <div class="info-value">
                        <span th:text="${#temporals.format(venueVO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>
            </div>
                
            <hr />
            
            <div class="section-title">場地照片</div>
            <div class="img-grid">
                <img th:each="img : ${venueVO.venueImages}"
                     th:src="@{/venue/getImage(imagesId=${img.imagesId})}" />
            </div>
            
            <div class="book-row">
                <div class="price-note">
                    每小時 <span th:text="${venueVO.hourlyRate}"></span> 元
                </div>
                <div class="btn-group">
                    <form th:action="@{/front/venue/getOne_For_Update}" method="post">
                        <input type="hidden" name="venueId" th:value="${venueVO.venueId}"/>
                        <button type="submit" class="btn-book">修改場地</button>
                    </form>
                    <form th:action="@{/front/venue/toggleStatus}" method="post">
                        <input type="hidden" name="venueId" th:value="${venueVO.venueId}"/>
                        <button type="submit" class="btn-toggle">
                            <span th:text="${venueVO.venueStatus == 0 ? '上架' : '下架'}"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
