<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>場地詳情（會員管理）</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background: #f5f5f5;
        padding: 2rem;
        font-family: sans-serif;
    }

    .back-link {
        display: inline-block;
        margin-bottom: 1rem;
        font-size: 13px;
        color: #888;
        text-decoration: none;
    }

    .card {
        background: white;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        max-width: 820px;
        margin: 0 auto;
        overflow: hidden;
    }

    .main-img {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
    }

    .body {
        padding: 1.5rem;
    }

    .venue-name {
        font-size: 22px;
        font-weight: 500;
        color: #1a1a1a;
        margin-bottom: 0.5rem;
    }

    .venue-addr {
        font-size: 14px;
        color: #888;
        margin-bottom: 1.25rem;
    }

    .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 1.25rem;
    }

    .badge-up {
        background: #e1f5ee;
        color: #0f6e56;
    }

    .badge-down {
        background: #f5f5f5;
        color: #888;
        border: 1px solid #e0e0e0;
    }

    .info-row {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
    }

    .info-item {
        background: #f8f8f8;
        border-radius: 8px;
        padding: 0.75rem 1.25rem;
        flex: 1;
    }

    .info-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 4px;
    }

    .info-value {
        font-size: 16px;
        font-weight: 500;
        color: #1a1a1a;
    }

    hr {
        border: none;
        border-top: 1px solid #e0e0e0;
        margin: 1.25rem 0;
    }

    .section-title {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 0.75rem;
    }

    .img-grid {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .img-grid img {
        width: 160px;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
    }

    .book-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 1.5rem;
    }

    .price-note {
        font-size: 13px;
        color: #888;
    }

    .price-note span {
        font-size: 20px;
        font-weight: 500;
        color: #1a1a1a;
    }

    .btn-group {
        display: flex;
        gap: 10px;
    }

    .btn-book {
        background: #1d9e75;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 28px;
        font-size: 15px;
        cursor: pointer;
        text-decoration: none;
    }

    .btn-toggle {
        background: #888;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 28px;
        font-size: 15px;
        cursor: pointer;
    }
</style>
</head>
<body>

    <a class="back-link" th:href="@{/front/venue/myVenue}">← 回我的場地</a>

    <div class="card">
        <img class="main-img"
             th:if="${venueVO.coverImage != null}"
             th:src="@{/venue/getImage(imagesId=${venueVO.coverImage.imagesId})}" />
             
        <div class="body">
            <div class="venue-name" th:text="${venueVO.venueName}"></div>
            <div class="venue-addr" th:text="${venueVO.address}"></div>
            
            <span th:class="${venueVO.venueStatus == 0 ? 'badge badge-down' : 'badge badge-up'}"
                  th:text="${venueVO.venueStatus == 0 ? '下架' : '上架'}"></span>
                
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">容納人數</div>
                    <div class="info-value">
                        <span th:text="${venueVO.capacity}"></span> 人
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">每小時費用</div>
                    <div class="info-value">
                        <span th:text="${venueVO.hourlyRate}"></span> 元
                    </div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">場地類型</div>
                    <div class="info-value">
                        <span th:text="${venueVO.venueTypeVO != null ? venueVO.venueTypeVO.typeName : '未設定'}"></span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">場地狀態</div>
                    <div class="info-value">
                        <span th:text="${venueVO.venueStatus == 0 ? '下架' : '上架'}"></span>
                    </div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">建立時間</div>
                    <div class="info-value">
                        <span th:text="${#temporals.format(venueVO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>
            </div>
                
            <hr />
            
            <div class="section-title">場地照片</div>
            <div class="img-grid">
                <img th:each="img : ${venueVO.venueImages}"
                     th:src="@{/venue/getImage(imagesId=${img.imagesId})}" />
            </div>
            
            <div class="book-row">
                <div class="price-note">
                    每小時 <span th:text="${venueVO.hourlyRate}"></span> 元
                </div>
                <div class="btn-group">
                    <form th:action="@{/front/venue/getOne_For_Update}" method="post">
                        <input type="hidden" name="venueId" th:value="${venueVO.venueId}"/>
                        <button type="submit" class="btn-book">修改場地</button>
                    </form>
                    <form th:action="@{/front/venue/toggleStatus}" method="post">
                        <input type="hidden" name="venueId" th:value="${venueVO.venueId}"/>
                        <button type="submit" class="btn-toggle">
                            <span th:text="${venueVO.venueStatus == 0 ? '上架' : '下架'}"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
