<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>聊天室功能測試入口</title>
</head>
<body style="padding: 30px; font-family: sans-serif;">

    <h2>💬 獨立開發 - 聊天室私訊功能測試入口</h2>
    <h2>當前登入者：<span th:text="${currentUserName}">未登入</span></h2>
    <p style="color: gray;">(這裡已接上資料庫，動態為每位真實會員生成私訊測試按鈕)</p>
    <hr><br>

    <div style="display: flex; flex-wrap: wrap; gap: 15px;">
        
        <div th:each="member : ${otherMembers}">
            <a th:href="@{/member/chat(to=${member.memberId})}" 
               style="display:inline-block; padding: 12px 24px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                💬 私訊會員：<span th:text="${member.realName}">會員名稱</span> (ID: <span th:text="${member.memberId}">0</span>)
            </a>
        </div>
        
        <p th:if="${#lists.isEmpty(otherMembers)}" style="color: red; font-weight: bold;">
            目前資料庫中除你以外沒有其他會員，請先至資料庫新增其他測試會員資料！
        </p>
    </div>

</body>
</html>
