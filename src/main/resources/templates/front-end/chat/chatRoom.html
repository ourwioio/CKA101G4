<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私訊聊天室</title>
    <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
    <!-- 保留你原有的 chatRoom.css 連結，若想完全改由本頁 style 掌控，可直接參考下方樣式 -->
<!--     <link rel="stylesheet" th:href="@{/css/front-end/chat/chatRoom.css}"> -->
    <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--color-pink: #FFB5C1;
	--color-blue: #A9D3FF;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, .06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, .10);
}

* { box-sizing: border-box; }

body {
	margin: 0;
	padding: 0;
	height: 100vh;
	height: 100dvh;
	overflow: hidden;
	background: var(--color-bg);
	color: var(--color-ink);
	font-family: var(--font-body);
	line-height: 1.6;
	-webkit-font-smoothing: antialiased;
}

/* 頂部當前登入者提示列 - 與下方容器無縫接軌 */
.user-info-bar {
	max-width: 1100px;
	margin: 115px auto 0;
	padding: 14px 28px;
	font-size: 13.5px;
	font-weight: 800;
	color: var(--color-ink-soft);
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-bottom: none;
	border-radius: var(--radius-lg) var(--radius-lg) 0 0;
	box-shadow: var(--shadow-sm);
	display: flex;
	align-items: center;
	gap: 8px;
}

.user-info-bar span {
	color: var(--color-ink);
	background: var(--color-yellow);
	padding: 2px 12px;
	border-radius: var(--radius-full);
	font-size: 13px;
	border: 1.5px solid #F3D36C;
}

/* 雙欄主容器 */
.chat-container {
	display: flex;
	max-width: 1100px;
	height: calc(100dvh - 245px);
	margin: 0 auto 60px;
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-radius: 0 0 var(--radius-lg) var(--radius-lg);
	box-shadow: var(--shadow-sm);
	overflow: hidden;
}

/* ==========================================
   【左欄：真實會員清單】- 已縮小外框、消除滾動條
   ========================================== */
.left-sidebar {
	width: 200px; /* 大幅縮小寬度（原為 280px） */
	min-width: 180px; /* 調整最小寬度限制（原為 250px） */
	background: var(--color-surface-soft);
	border-right: 1px solid var(--color-border);
	display: flex;
	flex-direction: column;
	padding: 20px 14px; /* 稍微縮小內距，讓視覺更緊湊 */
	overflow: hidden; /* 確保主容器絕對不出現任何溢出滾動條 */
}

.left-sidebar h3 {
	margin: 0 0 16px;
	color: var(--color-ink);
	font-family: var(--font-display);
	font-size: 16px; /* 標題字型稍微縮小 */
	font-weight: 800;
	display: flex;
	align-items: center;
	gap: 8px;
}

.left-sidebar h3::before {
	content: '';
	display: inline-block;
	width: 7px;
	height: 7px;
	border-radius: 50%;
	background: var(--color-yellow-deep);
}

.contact-list {
	list-style: none;
	padding: 0;
	margin: 0;
	overflow-y: auto; /* 只有當聯絡人高度「超出上下範圍」時，才出現上下滾動條 */
	overflow-x: hidden; /* 🌟 徹底消除左右水平滾動條 */
	flex: 1;
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.contact-item {
	margin: 0;
}

/* 聯絡人按鈕超連結 - 已縮小尺寸 */
.contact-link {
	display: block;
	padding: 8px 12px; /* 縮小上下與左右內距（原為 12px 16px） */
	border: 1.5px solid transparent;
	border-radius: var(--radius-md);
	color: var(--color-ink-soft);
	text-decoration: none;
	font-size: 13.5px; /* 字型微調小一點點 */
	font-weight: 800;
	transition: all .2s ease;
}

.contact-link:hover {
	color: var(--color-ink);
	background: var(--color-surface);
	border-color: var(--color-border);
}

/* 當前選中的聊天對象 */
.contact-link.active-chat {
	color: var(--color-ink);
	background: var(--color-yellow);
	border-color: #F3D36C;
	box-shadow: var(--shadow-sm);
}

/* ==========================================
   【右欄：對話視窗】
   ========================================== */
.right-chatbox {
	flex: 1;
	display: flex;
	flex-direction: column;
	background: var(--color-surface);
}

/* 對話視窗頂部標題 */
.chat-header {
	padding: 10px 5px;
	border-bottom: 1px solid var(--color-border);
	background: var(--color-surface);
}

.chat-header h3 {
	margin: 0;
	color: var(--color-ink);
	font-family: var(--font-display);
	font-size: 14px;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 8px;
}

.chat-header h3::before {
	content: '';
	display: inline-block;
	width: 8px;
	height: 8px;
	border-radius: 50%;
	background: var(--color-pink);
}

/* 訊息顯示滾動區 */
.messages-display {
	flex: 1;
	min-height: 0;
	padding: 28px;
	overflow-y: auto;
	background: var(--color-surface-soft);
	scrollbar-width: thin;
	scrollbar-color: var(--color-border) transparent;
}

.messages-list {
	list-style: none;
	padding: 0;
	margin: 0;
	display: flex;
	flex-direction: column;
	gap: 16px;
}

/* 系統狀態提示樣式 */
.system-status {
	align-self: center;
	margin: 8px 0;
	padding: 6px 16px;
	background: var(--color-surface);
	border: 1.5px dashed var(--color-border);
	border-radius: var(--radius-full);
	color: var(--color-ink-soft);
	font-size: 12px;
	font-weight: 800;
	letter-spacing: 0.5px;
}

/* 對話框基礎設定 (對接 JS 的 .me 與 .friend) */
.messages-list li {
	max-width: min(72%, 560px);
	padding: 13px 16px;
	border: 1px solid var(--color-border);
	background: var(--color-surface);
	box-shadow: var(--shadow-sm);
	font-size: 14px;
	font-weight: 500;
	line-height: 1.6;
	overflow-wrap: anywhere;
	white-space: pre-wrap;
	
	display: block !important;
	
	width: fit-content !important;
}

/* 對方的訊息樣式 */
.messages-list li.friend {
	margin-right: auto !important;
	margin-left: 0 !important;
	
	border-radius: 8px 20px 20px 20px;
	color: var(--color-ink);
}

/* 我的訊息樣式 */
.messages-list li.me {
	margin-left: auto !important;
	margin-right: 0 !important;
	
	border-color: #F3D36C;
	border-radius: 20px 8px 20px 20px;
	background: var(--color-yellow);
	color: var(--color-ink);
}

/* 內部動態生成已讀/未讀字樣 */
.messages-list li.me span {
	font-weight: 800 !important;
	font-size: 10px;
	vertical-align: bottom;
}

/* 底部輸入與發送功能 */
.chat-input-area {
	display: flex;
	align-items: center;
	gap: 12px;
	padding: 18px 28px;
	border-top: 1px solid var(--color-border);
	background: var(--color-surface);
}

.chat-input-area input[type="text"] {
	flex: 1;
	height: 44px;
	padding: 10px 16px;
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	outline: none;
	background: var(--color-surface-soft);
	color: var(--color-ink);
	font-family: var(--font-body);
	font-size: 14px;
	font-weight: 500;
	transition: border-color .15s ease, background .15s ease;
}

.chat-input-area input[type="text"]:focus {
	border-color: var(--color-yellow-deep);
	background: var(--color-surface);
}

.chat-input-area input[type="text"]:disabled {
	background: var(--color-bg);
	cursor: not-allowed;
	opacity: 0.7;
}

.chat-input-area button {
	min-width: 92px;
	height: 44px;
	padding: 0 22px;
	border: none;
	border-radius: var(--radius-full);
	background: var(--color-ink);
	box-shadow: var(--shadow-sm);
	color: #ffffff;
	font-family: var(--font-body);
	font-size: 14px;
	font-weight: 800;
	cursor: pointer;
	transition: transform .18s ease, background .15s ease, box-shadow .18s ease, color .15s ease;
}

.chat-input-area button:hover:not(:disabled) {
	transform: translateY(-2px);
	background: var(--color-yellow-deep);
	box-shadow: var(--shadow-md);
	color: var(--color-ink);
}

.chat-input-area button:disabled {
	background: var(--color-border);
	color: var(--color-ink-soft);
	cursor: not-allowed;
	box-shadow: none;
}

/* ==========================================
   【響應式手機版佈局】
   ========================================== */
@media (max-width: 760px) {
	.user-info-bar {
		margin: 80px 16px 0;
		border-radius: 20px 20px 0 0;
		padding: 10px 20px;
	}

	.chat-container {
		flex-direction: column;
		height: calc(100dvh - 165px);
		margin: 0 16px 32px;
		border-radius: 0 0 20px 20px;
	}

	/* 手機版：左側聯絡人轉成頂部水平橫向滑動區 */
	.left-sidebar {
		width: 100%;
		min-width: 100%;
		max-height: 110px;
		padding: 10px;
		border-right: none;
		border-bottom: 1px solid var(--color-border);
	}

	.left-sidebar h3 {
		font-size: 14px;
		margin-bottom: 6px;
	}

	.contact-list {
		flex-direction: row;
		overflow-x: auto;
		gap: 8px;
		padding-bottom: 4px;
	}

	.contact-link {
		padding: 6px ;
		font-size: 13px;
		white-space: nowrap;
	}

	.contact-link:hover {
		transform: none;
	}

	/* 手機版：右側訊息區縮放 */
	.right-chatbox {
		flex: 1;
		min-height: 0;
	}

	.chat-header {
		padding: 16px 20px;
	}

	.chat-header h3 {
		font-size: 17px;
	}

	.messages-display {
		padding: 20px 16px;
	}

	.messages-list li {
		max-width: 86%;
	}

	.chat-input-area {
		padding: 14px 16px;
	}
}

/* 🚀 讓時間與已讀完美在文字「左邊」與「右邊」的黃金排版 */
.messages-list li {
    position: relative !important;
    margin-bottom: 24px !important; /* 留出下方或旁邊的餘裕 */
}

/* 訊息專用時間狀態標籤 */
.msg-side-meta {
    position: absolute;
    bottom: 0;
    font-size: 10px !important;
    font-weight: 800 !important;
    line-height: 1.2;
    color: var(--color-ink-soft);
    display: flex;
    flex-direction: column;
    user-select: none;
    white-space: nowrap;
}

/* 自己發的訊息 (.me)：把時間狀態標籤釘在氣泡的【左邊】 */
.messages-list li.me .msg-side-meta {
    left: -55px; /* 精準把時間和已讀逼到黃色氣泡的左邊 */
    align-items: flex-end;
}

/* 對方發的訊息 (.friend)：把時間標籤釘在氣泡的【右邊】 */
.messages-list li.friend .msg-side-meta {
    right: -45px; /* 精準把時間逼到白色氣泡的右邊 */
    align-items: flex-start;
}

/* 左側聯絡人清單的未讀氣泡樣式 */
.sidebar-unread-badge {
    background-color: var(--color-pink) !important;
    color: var(--color-surface) !important;
    border-radius: var(--radius-full) !important;
    padding: 2px 8px !important;
    font-size: 11px !important;
    font-weight: 800 !important;
    margin-left: auto !important;
    line-height: 1.3 !important;
    box-shadow: var(--shadow-sm) !important;
    border: 1px solid #FFA2B0 !important;
}

.messages-list li {
    display: block !important;       /* 1. 強制宣告為區塊，不被 align-self 扭曲 */
    width: -webkit-fit-content !important; /* 2. 舊版瀏覽器相容 */
    width: -moz-fit-content !important;    /* 3. 火狐瀏覽器相容 */
    width: fit-content !important;         /* 4. 【核心指令】逼迫泡泡寬度，死死貼緊文字有多長就縮多小！ */
}

</style>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<!-- 完美保留你原有的 connect 機制 -->
<body onload="connect();">

	<!-- 上方人員狀態提示 -->
	<div class="user-info-bar">
		當前登入者：<span th:text="${currentUserName}">未登入</span>
	</div>

	<!-- 隱藏欄位：用來存放當前對話者的名字，供 sendMessage() 讀取 -->
	<span id="statusOutput" th:text="${targetName}" style="display: none;"></span>

	<!-- 💡 核心置中大面板結構 -->
	<div class="chat-container">

		<!-- 【左欄：真實會員清單】 -->
		<div class="left-sidebar">
			<h3>選擇聯絡人</h3>
			<ul class="contact-list">
				<li th:each="mem : ${memList}" class="contact-item" th:id="'contact-item-' + ${mem.memberId}">
					<!-- 利用動態 class 決定是否套用 active-chat 樣式 -->
					<a th:if="${mem.memberId != currentUserId}"
					   th:href="@{/member/chatRoom(to=${mem.memberId})}"
					   th:text="${mem.realName}"
					   th:class="${mem.memberId == targetUserId} ? 'contact-link active-chat' : 'contact-link'">
					</a>
				</li>
			</ul>
		</div>

		<!-- 【右欄：對話視窗】 -->
		<div class="right-chatbox">
			<!-- 對話視窗頂部標題 -->
			<div class="chat-header">
				<h3 th:text="${targetName != null} ? '與 ' + ${targetName} + ' 聊天中' : '請選擇對象'"></h3>
			</div>

			<!-- 訊息滾動顯示區 -->
			<div id="messagesArea" class="messages-display">
				<ul id="area" class="messages-list">
					<!-- 連線成功系統提示 -->
					<p th:if="${targetName != null}" class="system-status">--- 已建立專屬私訊連線 ---</p>
				</ul>
			</div>

			<!-- 底部輸入與發送功能 -->
			<div class="chat-input-area">
				<input type="text" id="message" placeholder="請輸入私訊內容..." th:disabled="${targetName == null}">
				<button id="sendMessage" onclick="sendMessage()" th:disabled="${targetName == null}">發送</button>
			</div>
		</div>

	</div>

	<!-- 💡 原生 JavaScript 邏輯完全保留，不影響你的 WebSocket 機制 -->
	<script th:inline="javascript">
		let webSocket = null;
		const selfId = /*[[${currentUserId}]]*/'guest';
		const targetId = /*[[${targetUserId}]]*/null;
		const targetName = /*[[${targetName}]]*/'';

		const MyPoint = "/FriendWS/" + selfId;
		const endPointURL = "ws://" + window.location.host + MyPoint;

		const statusOutput = document.getElementById("statusOutput");
		const messagesArea = document.getElementById("messagesArea");

		function connect() {
			if (!targetId) return;

			webSocket = new WebSocket(endPointURL);

			webSocket.onopen = function(event) {
				document.getElementById('sendMessage').disabled = false;

				const historyReq = {
					"type" : "history",
					"senderId" : selfId,
					"receiverId" : targetId,
					"message" : ""
				};
				webSocket.send(JSON.stringify(historyReq));

				const readReq = {
						"type" : "read",
						"senderId" : Number(selfId),
						"receiverId" : Number(targetId),
						"message" : ""
					};
				webSocket.send(JSON.stringify(readReq));
			};

			webSocket.onmessage = function(event) {
				const jsonObj = JSON.parse(event.data);

				// 🅰️ 情況 A：載入歷史紀錄
				if ("history" === jsonObj.type) {
					messagesArea.innerHTML = '<ul id="area" class="messages-list"></ul>';
					
					const messages = jsonObj.historyList;
					
					if (messages && messages.length > 0) {
						for (let i = 0; i < messages.length; i++) {
							const msgObj = messages[i];
							const historyData = (typeof msgObj === 'object') ? msgObj : JSON.parse(msgObj);
							
							const li = document.createElement('li');
							const isMe = String(historyData.senderId) === String(selfId);
							li.className = isMe ? 'me' : 'friend';
							
							const timeStr = historyData.lastTime || historyData.sentAt || getCurrentTime();
							appendMessageContent(li, historyData.message, isMe, historyData.getIsRead || historyData.msgRead, timeStr);

							document.getElementById("area").appendChild(li);
						}
					}
                    
					document.querySelectorAll("li.friend .unread-marker").forEach(label => {
						label.innerText = "已讀";
						label.style.color = "lightgray";
						label.classList.remove("unread-marker");
					});
					
					if (targetId) {
						localStorage.setItem(`chat_unread_${selfId}_to_${targetId}`, 0);
					}
                    
					messagesArea.scrollTop = messagesArea.scrollHeight;
				

				// 🅱️ 情況 B：收到即時新訊息
				} else if ("chat" === jsonObj.type) {
					const isMe = String(jsonObj.senderId) === String(selfId);
					const isFromCurrentPartner = String(jsonObj.senderId) === String(targetId);
					
					const timeStr = getCurrentTime();

					// 情況 1：是我自己發的，或是目前正開著視窗在聊天的對象發來的 -> 直接上屏
					if (isMe || isFromCurrentPartner) {
						const li = document.createElement('li');
						li.className = isMe ? 'me' : 'friend';
						
						// 自己發的預設為未讀(0)，對方發來的因為我正盯著看所以算已讀(1)
						appendMessageContent(li, jsonObj.message, isMe, isMe ? 0 : 1, timeStr);
						
						if (isFromCurrentPartner) {
							const autoRead = {
								"type" : "read",
								"senderId" : Number(selfId),
								"receiverId" : Number(targetId),
								"message" : ""
							};
							webSocket.send(JSON.stringify(autoRead));
						}
						
						document.getElementById("area").appendChild(li);
						messagesArea.scrollTop = messagesArea.scrollHeight;
					} else {
						// 💡 核心優化 2：別人在背景傳訊息來，即時點亮左側聯絡人名單的小紅點數字提示
						updateLeftSidebarBadge(jsonObj.senderId);
					}
					
				// 🅲 情況 C：對方點開對話，即時將畫面上的「未讀」集體改為「已讀」
				} else if("read" === jsonObj.type){
					const readerId = jsonObj.senderId; 

					// 💡 修正 2：加強防禦性判定，如果 targetId 剛好是 null、或者字串比對有些微時差，我們印出 log 協助確認
				    if (!targetId || String(readerId) === String(targetId)) {
				        const unreadLabels = document.querySelectorAll(".unread-marker");
				        unreadLabels.forEach(label => {
				            label.innerText = "已讀";
				            label.style.color = "lightgray";
				            label.classList.remove("unread-marker"); 
				        });
				    }
				}
			};
		}


		function sendMessage() {
			const inputMessage = document.getElementById("message");
			const message = inputMessage.value.trim();

			if (message === "") {
				inputMessage.focus();
			} else {
				const jsonObj = {
					"type" : "chat",
					"senderId" : selfId, 
					"receiverId" : targetId, 
					"message" : message
				};
				webSocket.send(JSON.stringify(jsonObj));
				inputMessage.value = "";
				inputMessage.focus();
			}
		}
		
		// 💡 輔助方法 A：精準封裝右側結構 (時間與已讀在文字左邊)
		function appendMessageContent(liElement, rawText, isMe, msgRead, timeStr) {
			const safeText = escapeHtml(rawText);
			
			if (isMe) {
				const statusText = (Number(msgRead) === 1) ? '已讀' : '未讀';
				const statusColor = (Number(msgRead) === 1) ? 'lightgray' : 'var(--color-ink-soft)';
				const markerClass = (Number(msgRead) === 1) ? '' : 'class="unread-marker"';
				
				// 我發的訊息：靠右對齊 (justify-content: flex-end)，時間在黃色泡泡「左邊」
				liElement.style.cssText = "background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: 100% !important; display: flex !important; justify-content: flex-end !important; align-items: flex-end !important; gap: 8px; position: relative; list-style: none; margin-bottom: 12px;";
				
				liElement.innerHTML = `
					<!-- 左邊：小巧精緻的時間與已讀狀態 -->
					<div class="msg-meta-left" style="display: flex; flex-direction: column; align-items: flex-end; font-size: 10px; font-weight: 800; line-height: 1.3; user-select: none; flex-shrink: 0; margin-bottom: 2px;">
						<span style="color: var(--color-ink-soft); font-weight: 800;">${timeStr}</span>
						<span ${markerClass} style="color: ${statusColor}; font-weight: 800;">${statusText}</span>
					</div>
					<!-- 右邊：實體文字氣泡，打 123 就縮到 123 的大小 -->
					<div class="msg-bubble-actual" style="display: inline-block !important; width: max-content !important; min-width: 0 !important; max-width: min(72%, 560px); padding: 13px 16px; border: 1px solid #F3D36C; border-radius: 20px 8px 20px 20px; background: var(--color-yellow); color: var(--color-ink); box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 500; overflow-wrap: break-word !important; word-break: break-word !important; white-space: normal !important; text-align: left;">
						${safeText}
					</div>
				`;
			} else {
				// 💡 對方傳來的訊息（左邊訊息）：靠左對齊 (justify-content: flex-start)
				liElement.style.cssText = "background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: 100% !important; display: flex !important; justify-content: flex-start !important; align-items: flex-end !important; gap: 8px; position: relative; list-style: none; margin-bottom: 12px;";
				
				// 💡 核心修正：先渲染「白底氣泡」，後面緊接著「時間」，利用 flex-start 特性，時間就會百分之百死死貼在氣泡的【右邊旁邊】！
				liElement.innerHTML = `
					<!-- 左邊：實體白底氣泡，打 123 就縮到 123 的大小 -->
					<div class="msg-bubble-actual" style="display: inline-block !important; width: max-content !important; min-width: 0 !important; max-width: min(72%, 560px); padding: 13px 16px; border: 1px solid var(--color-border); border-radius: 8px 20px 20px 20px; background: var(--color-surface); color: var(--color-ink); box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 500; overflow-wrap: break-word !important; word-break: break-word !important; white-space: normal !important; text-align: left;">
						${safeText}
					</div>
					<!-- 右邊：緊貼在白色氣泡旁邊的時間盒子 -->
					<div class="msg-meta-right" style="font-size: 10px; font-weight: 800; color: var(--color-ink-soft); user-select: none; flex-shrink: 0; margin-bottom: 2px; display: flex; align-items: flex-end;">
						<span>${timeStr}</span>
					</div>
				`;
			}
		}
		
		// 💡 輔助方法 B：即時更新左側聯絡人小紅點數字
		function updateLeftSidebarBadge(partnerId, isInitLoad = false) {
			if (!partnerId) return;

			// 1. 地毯式掃描左側所有超連結，看誰包含 to=對方ID
			const allLinks = document.querySelectorAll('.contact-list .contact-link');
			let targetLinkEl = null;
			for (let i = 0; i < allLinks.length; i++) {
				const hrefStr = allLinks[i].getAttribute('href') || '';
				if (hrefStr.indexOf(`to=${partnerId}`) !== -1) {
					targetLinkEl = allLinks[i];
					break;
				}
			}
			
			if (!targetLinkEl) return;

			// 2. 與 LocalStorage 的記憶體小本本完全對接
			const storageKey = `chat_unread_${selfId}_to_${partnerId}`;
			let currentCount = parseInt(localStorage.getItem(storageKey)) || 0;
			
			if (!isInitLoad) {
				currentCount++;
				localStorage.setItem(storageKey, currentCount); // 寫入硬碟鎖死
			}
			
			// 如果硬碟讀出來的數字是 0 或負數，現場立刻將已經存在的紅點拔掉，並中斷不渲染
			if (currentCount <= 0) {
				const existingBadge = targetLinkEl.querySelector('.sidebar-unread-badge');
				if (existingBadge) existingBadge.remove();
				return;
			}

			// 3. 現場渲染高質感粉紅徽章
			let badge = targetLinkEl.querySelector('.sidebar-unread-badge');
			
			if (!badge) {
				badge = document.createElement('span');
				badge.className = 'sidebar-unread-badge';
				badge.style.cssText = "background-color: var(--color-pink); color: var(--color-surface); border-radius: var(--radius-full); padding: 2px 8px; font-size: 11px; font-weight: 800; margin-left: auto; display: inline-block; line-height: 1.3; box-shadow: var(--shadow-sm); border: 1px solid #FFA2B0;";
				
				targetLinkEl.style.display = "flex";
				targetLinkEl.style.alignItems = "center";
				targetLinkEl.style.width = "100%";
				targetLinkEl.appendChild(badge);
			}

			badge.innerText = currentCount;
			badge.style.display = 'inline-block';
		}
		
		
		function getCurrentTime() {
			const now = new Date();
			return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
		}
		
		function escapeHtml(string) {
			return String(string).replace(/[&<>"']/g, function (s) {
				return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
			});
		}
		
		
window.addEventListener("DOMContentLoaded", function() {
			
			// 1. 🚀【字串精準切除與畫面強刷歸零】
			const allLinks = document.querySelectorAll('.contact-list .contact-link');
			allLinks.forEach(link => {
				const hrefStr = link.getAttribute('href') || '';
				let partnerId = null;

				// 💡 鐵律：只要網址裡有 'to='，我們直接抓 'to=' 後面的所有字，並只留下純數字！
				if (hrefStr.indexOf('to=') !== -1) {
					const index = hrefStr.indexOf('to=');
					const rawSub = hrefStr.substring(index + 3); 
					partnerId = rawSub.replace(/[^0-9]/g, '');   
				} else if (hrefStr.indexOf('=') !== -1) {
					const index = hrefStr.indexOf('=');
					const rawSub = hrefStr.substring(index + 1);
					partnerId = rawSub.replace(/[^0-9]/g, '');
				}
				
				// 確保有精準拿到這個好友的真實 ID 數字，且絕對不是空白
				if (partnerId && partnerId.trim() !== '') {
					// 💡 頂級防禦：強制去除所有隱形空白，並轉為純數字型態進行嚴格比對
					const pIdNum = Number(partnerId.trim());
					const currentTargetNum = targetId ? Number(targetId) : null;
					
					const storageKey = `chat_unread_${selfId}_to_${pIdNum}`;

					// 💡 已讀削平核心：如果你目前的網址剛好正在跟這個人聊天（ID 完全一致）
					if (currentTargetNum && pIdNum === currentTargetNum) {
						// A. 強制將硬碟計數「清空歸零」，確保下一次 F5 刷新也是 0
						localStorage.setItem(storageKey, 0);
						
						// B. 🚀【秒消絕殺】現場立刻去這個聯絡人的超連結內部，把任何已經跑出來的紅點氣泡當場撕掉（.remove()）！
						const existingBadge = link.querySelector('.sidebar-unread-badge');
						if (existingBadge) {
							existingBadge.remove();
						}
					} else {
						// 🌟 否則，如果是別人在背景傳訊息的人，去硬碟撈出屬於他個人的舊未讀數，還原小紅點！
						updateLeftSidebarBadge(pIdNum, true); 
					}
				}
			});

			// 2. 啟動你原本的 WebSocket 連線機制
			connect();
			
			// 3. 綁定 Enter 鍵直接發送
		    const inputMessage = document.getElementById("message");
		    if (inputMessage) {
		        inputMessage.addEventListener("keydown", function(event) {
		            if (event.key === "Enter") {
		                if (event.isComposing || event.keyCode === 229) {
		                    return;
		                }
		                event.preventDefault(); 
		                sendMessage(); 
		            }
		        });
		    }
		});
	</script>
