<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>雙欄私訊聊天室</title>
<style>
.container {
	display: flex;
	width: 600px;
	height: 350px;
	border: 1px solid black;
}

.left-list {
	width: 180px;
	border-right: 1px solid black;
	padding: 10px;
	background: #eee;
}

.right-chat {
	flex: 1;
	padding: 10px;
	display: flex;
	flex-direction: column;
	justify-content: space-between;
}

#messagesArea ul {
	list-style: none;
	padding: 0;
	margin: 0;
}

#messagesArea li {
	margin: 8px 0;
	padding: 5px 10px;
	border-radius: 4px;
	max-width: 80%;
	word-break: break-all;
}

.me {
	background-color: #dcf8c6;
	text-align: right;
	margin-left: auto !important;
}

.friend {
	background-color: #ffffff;
	text-align: left;
	border: 1px solid #ddd;
}
</style>
</head>
<body onload="connect();">

	<h2>
		當前登入者：<span th:text="${currentUserName}">未登入</span>
	</h2>

	<!-- 隱藏欄位：用來存放當前對話者的名字，供 sendMessage() 讀取 -->
	<span id="statusOutput" th:text="${targetName}" style="display: none;"></span>
	<br>

	<div class="container">

		<!-- 【左欄：Thymeleaf 真實會員清單】 -->
		<div class="left-list">
			<div style="margin-bottom: 15px;">
				<a th:href="@{/member/chatButton}"
					style="display: inline-block; width: 100%; text-align: center; padding: 6px 0; background-color: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold;">
					⬅ 返回私訊列表 </a>
			</div>

			<h3>選擇聯絡人</h3>
			<hr>
			<ul>
				<li th:each="mem : ${memList}" style="margin: 10px 0;"><a
					th:if="${mem.memberId != currentUserId}"
					th:href="@{/member/chatRoom(to=${mem.memberId})}"
					th:text="${mem.realName}"
					th:style="${mem.memberId == targetUserId} ? 'font-weight:bold; color:red;' : ''"></a>
				</li>
			</ul>
		</div>

		<!-- 【右欄：對話視窗】 -->
		<div class="right-chat">
			<div>
				<h3
					th:text="${targetName != null} ? '與 ' + ${targetName} + ' 聊天中' : '請選擇對象'"></h3>
				<hr>

				<div id="messagesArea"
					style="height: 220px; overflow-y: auto; padding: 10px; margin-top: 15px; border: 1px dashed #ccc;">
					<!-- 初始化一個 ul 給歷史紀錄塞入 -->
					<ul id="area">
						<p th:if="${targetName != null}"
							style="color: gray; font-size: 12px; text-align: center;">---
							已建立專屬私訊連線 ---</p>
					</ul>
				</div>
			</div>

			<!-- 輸入與發送 -->
			<div>
				<input type="text" id="message" placeholder="請輸入私訊內容..."
					th:disabled="${targetName == null}"
					style="width: 70%; padding: 5px;">
				<button id="sendMessage" onclick="sendMessage()"
					th:disabled="${targetName == null}" style="padding: 5px 15px;">發送</button>
			</div>
		</div>

	</div>

	<script th:inline="javascript">
		const selfId = /*[[${currentUserId}]]*/'guest';
		const targetId = /*[[${targetUserId}]]*/null;
		const targetName = /*[[${targetName}]]*/'';

		const MyPoint = "/FriendWS/" + selfId;
		const endPointURL = "ws://" + window.location.host + MyPoint;

		const statusOutput = document.getElementById("statusOutput");
		const messagesArea = document.getElementById("messagesArea");

		function connect() {
			// 只有當確實有選擇對話對象時，才建立 WebSocket 連線
			if (!targetId)
				return;

			webSocket = new WebSocket(endPointURL);

			webSocket.onopen = function(event) {
				console.log("Connect Success!");
				document.getElementById('sendMessage').disabled = false;

				const historyReq = {
					"type" : "history",
					"senderId" : selfId,
					"receiverId" : targetId,
					"message" : ""
				};
				webSocket.send(JSON.stringify(historyReq));

				const readReq = {
					"type" : "read",
					"senderId" : targetId,
					"receiverId" : selfId,
					"message" : ""
				};
				webSocket.send(JSON.stringify(readReq));
			};

			// 處理後端傳來的 json 事件型態
			webSocket.onmessage = function(event) {
				const jsonObj = JSON.parse(event.data);

				if ("history" === jsonObj.type) {
					messagesArea.innerHTML = '<ul id="area"></ul>';
					const messages = JSON.parse(jsonObj.message);
					
				    console.log("=== 後端傳過來的歷史紀錄完整 JSON 內容 ===");
				    console.log(messages); // 💡 加這一行在網頁上印出來
					
					for (let i = 0; i < messages.length; i++) {
						const historyData = JSON.parse(messages[i]);
						const li = document.createElement('li');
						const isMe = String(historyData.senderId) === String(selfId);

						li.className = isMe ? 'me' : 'friend';

						if (isMe) {
							const statusText = (historyData.msgRead === 1) ? '已讀': '未讀';
							const statusColor = (historyData.msgRead === 1) ? 'lightgray': 'gray';
							const markerClass = (historyData.msgRead === 1) ? '' : 'class="unread-marker"';	
							
							li.innerHTML = historyData.message
									+ ` <span style="font-size:10px; color:${statusColor}; margin-left:5px;">${statusText}</span>`;
						} else {
							li.innerHTML = historyData.message;
						}

						document.getElementById("area").appendChild(li);
					}
					messagesArea.scrollTop = messagesArea.scrollHeight;

				} else if ("chat" === jsonObj.type) {
					const li = document.createElement('li');
					const isMe = String(jsonObj.senderId) === String(selfId);
					
					li.className = isMe ? 'me' : 'friend';
					
					if (isMe) {
						li.innerHTML = jsonObj.message + 
						' <span class="unread-marker" style="font-size:10px; color:gray; margin-left:5px;">未讀</span>';
					} else {
						li.innerHTML = jsonObj.message;
						
						const autoRead = {
							"type" : "read",
							"senderId" : targetId,
							"receiverId" : selfId,
							"message" : ""
						};
						webSocket.send(JSON.stringify(autoRead));
					}
					
					document.getElementById("area").appendChild(li);
					messagesArea.scrollTop = messagesArea.scrollHeight;
				}else if("read" === jsonObj.type){
					const unreadLabels = document.querySelectorAll(".unread-marker");
					
					unreadLabels.forEach(label => {
						label.innerText = "已讀";
						label.style.color = "lightgray";
						
						label.classList.remove("unread-marker"); 
					});
				}
			};
		}

		function sendMessage() {
			const inputMessage = document.getElementById("message");
			const message = inputMessage.value.trim();

			if (message === "") {
				inputMessage.focus();
			} else {
				const jsonObj = {
					"type" : "chat",
					"senderId" : selfId, 
					"receiverId" : targetId, 
					"message" : message
				};
				webSocket.send(JSON.stringify(jsonObj));
				inputMessage.value = "";
				inputMessage.focus();
			}
		}
	</script>

</body>
</html>
