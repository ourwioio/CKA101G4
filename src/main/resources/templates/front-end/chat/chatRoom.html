<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私訊聊天室</title>
<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<!-- 保留你原有的 chatRoom.css 連結，若想完全改由本頁 style 掌控，可直接參考下方樣式 -->
<!--     <link rel="stylesheet" th:href="@{/css/front-end/chat/chatRoom.css}"> -->
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<style>
@import
	url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap')
	;

:root {
	--color-bg: #F7F3EC;
	--color-surface: #FFFFFF;
	--color-surface-soft: #FFFDF8;
	--color-ink: #17140F;
	--color-ink-soft: #726A5F;
	--color-border: #ECE4D6;
	--color-yellow: #FFE59A;
	--color-yellow-deep: #FFC94D;
	--color-pink: #FFB5C1;
	--color-blue: #A9D3FF;
	--font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
	--font-body: 'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;
	--radius-lg: 26px;
	--radius-md: 16px;
	--radius-full: 999px;
	--shadow-sm: 0 3px 10px rgba(23, 20, 15, .06);
	--shadow-md: 0 14px 34px rgba(23, 20, 15, .10);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	padding: 0;
	height: 100vh;
	height: 100dvh;
	overflow: hidden;
	background: var(--color-bg);
	color: var(--color-ink);
	font-family: var(--font-body);
	line-height: 1.6;
	-webkit-font-smoothing: antialiased;
}

/* 頂部當前登入者提示列 - 與下方容器無縫接軌 */
.user-info-bar {
	max-width: 1100px;
	margin: 115px auto 0;
	padding: 14px 28px;
	font-size: 13.5px;
	font-weight: 800;
	color: var(--color-ink-soft);
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-bottom: none;
	border-radius: var(--radius-lg) var(--radius-lg) 0 0;
	box-shadow: var(--shadow-sm);
	display: flex;
	align-items: center;
	gap: 8px;
}

.user-info-bar span {
	color: var(--color-ink);
	background: var(--color-yellow);
	padding: 2px 12px;
	border-radius: var(--radius-full);
	font-size: 13px;
	border: 1.5px solid #F3D36C;
}

/* 雙欄主容器 */
.chat-container {
	display: flex;
	max-width: 1100px;
	height: calc(100dvh - 245px);
	margin: 0 auto 60px;
	background: var(--color-surface);
	border: 1px solid var(--color-border);
	border-radius: 0 0 var(--radius-lg) var(--radius-lg);
	box-shadow: var(--shadow-sm);
	overflow: hidden;
}

/* ==========================================
   【左欄：真實會員清單】- 已縮小外框、消除滾動條
   ========================================== */
.left-sidebar {
	width: 200px; /* 大幅縮小寬度（原為 280px） */
	min-width: 180px; /* 調整最小寬度限制（原為 250px） */
	background: var(--color-surface-soft);
	border-right: 1px solid var(--color-border);
	display: flex;
	flex-direction: column;
	padding: 20px 14px; /* 稍微縮小內距，讓視覺更緊湊 */
	overflow: hidden; /* 確保主容器絕對不出現任何溢出滾動條 */
}

.left-sidebar h3 {
	margin: 0 0 16px;
	color: var(--color-ink);
	font-family: var(--font-display);
	font-size: 16px; /* 標題字型稍微縮小 */
	font-weight: 800;
	display: flex;
	align-items: center;
	gap: 8px;
}

.left-sidebar h3::before {
	content: '';
	display: inline-block;
	width: 7px;
	height: 7px;
	border-radius: 50%;
	background: var(--color-yellow-deep);
}

.contact-list {
	list-style: none;
	padding: 0;
	margin: 0;
	overflow-y: auto; /* 只有當聯絡人高度「超出上下範圍」時，才出現上下滾動條 */
	overflow-x: hidden; /* 🌟 徹底消除左右水平滾動條 */
	flex: 1;
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.contact-item {
	margin: 0;
}

/* 聯絡人按鈕超連結 - 已縮小尺寸 */
.contact-link {
	display: block;
	padding: 8px 12px; /* 縮小上下與左右內距（原為 12px 16px） */
	border: 1.5px solid transparent;
	border-radius: var(--radius-md);
	color: var(--color-ink-soft);
	text-decoration: none;
	font-size: 13.5px; /* 字型微調小一點點 */
	font-weight: 800;
	transition: all .2s ease;
}

.contact-link:hover {
	color: var(--color-ink);
	background: var(--color-surface);
	border-color: var(--color-border);
}

/* 當前選中的聊天對象 */
.contact-link.active-chat {
	color: var(--color-ink);
	background: var(--color-yellow);
	border-color: #F3D36C;
	box-shadow: var(--shadow-sm);
}

/* ==========================================
   【右欄：對話視窗】
   ========================================== */
.right-chatbox {
	flex: 1;
	display: flex;
	flex-direction: column;
	background: var(--color-surface);
}

/* 對話視窗頂部標題 */
.chat-header {
	padding: 10px 5px;
	border-bottom: 1px solid var(--color-border);
	background: var(--color-surface);
}

.chat-header h3 {
	margin: 0;
	color: var(--color-ink);
	font-family: var(--font-display);
	font-size: 14px;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 8px;
}

.chat-header h3::before {
	content: '';
	display: inline-block;
	width: 8px;
	height: 8px;
	border-radius: 50%;
	background: var(--color-pink);
}

/* 訊息顯示滾動區 */
.messages-display {
	flex: 1;
	min-height: 0;
	padding: 28px;
	overflow-y: auto;
	background: var(--color-surface-soft);
	scrollbar-width: thin;
	scrollbar-color: var(--color-border) transparent;
}

.messages-list {
	list-style: none;
	padding: 0;
	margin: 0;
	display: flex;
	flex-direction: column;
	gap: 16px;
}

/* 系統狀態提示樣式 */
.system-status {
	align-self: center;
	margin: 8px 0;
	padding: 6px 16px;
	background: var(--color-surface);
	border: 1.5px dashed var(--color-border);
	border-radius: var(--radius-full);
	color: var(--color-ink-soft);
	font-size: 12px;
	font-weight: 800;
	letter-spacing: 0.5px;
}

/* 對話框基礎設定 (對接 JS 的 .me 與 .friend) */
.messages-list li {
	max-width: min(72%, 560px);
	padding: 13px 16px;
	border: 1px solid var(--color-border);
	background: var(--color-surface);
	box-shadow: var(--shadow-sm);
	font-size: 14px;
	font-weight: 500;
	line-height: 1.6;
	overflow-wrap: anywhere;
	white-space: pre-wrap;
	display: block !important;
	width: fit-content !important;
}

/* 對方的訊息樣式 */
.messages-list li.friend {
	margin-right: auto !important;
	margin-left: 0 !important;
	border-radius: 8px 20px 20px 20px;
	color: var(--color-ink);
}

/* 我的訊息樣式 */
.messages-list li.me {
	margin-left: auto !important;
	margin-right: 0 !important;
	border-color: #F3D36C;
	border-radius: 20px 8px 20px 20px;
	background: var(--color-yellow);
	color: var(--color-ink);
}

/* 內部動態生成已讀/未讀字樣 */
.messages-list li.me span {
	font-weight: 800 !important;
	font-size: 10px;
	vertical-align: bottom;
}

/* 底部輸入與發送功能 */
.chat-input-area {
	display: flex;
	align-items: center;
	gap: 12px;
	padding: 18px 28px;
	border-top: 1px solid var(--color-border);
	background: var(--color-surface);
}

.chat-input-area input[type="text"] {
	flex: 1;
	height: 44px;
	padding: 10px 16px;
	border: 1.5px solid var(--color-border);
	border-radius: var(--radius-md);
	outline: none;
	background: var(--color-surface-soft);
	color: var(--color-ink);
	font-family: var(--font-body);
	font-size: 14px;
	font-weight: 500;
	transition: border-color .15s ease, background .15s ease;
}

.chat-input-area input[type="text"]:focus {
	border-color: var(--color-yellow-deep);
	background: var(--color-surface);
}

.chat-input-area input[type="text"]:disabled {
	background: var(--color-bg);
	cursor: not-allowed;
	opacity: 0.7;
}

.chat-input-area button {
	min-width: 92px;
	height: 44px;
	padding: 0 22px;
	border: none;
	border-radius: var(--radius-full);
	background: var(--color-ink);
	box-shadow: var(--shadow-sm);
	color: #ffffff;
	font-family: var(--font-body);
	font-size: 14px;
	font-weight: 800;
	cursor: pointer;
	transition: transform .18s ease, background .15s ease, box-shadow .18s
		ease, color .15s ease;
}

.chat-input-area button:hover:not(:disabled) {
	transform: translateY(-2px);
	background: var(--color-yellow-deep);
	box-shadow: var(--shadow-md);
	color: var(--color-ink);
}

.chat-input-area button:disabled {
	background: var(--color-border);
	color: var(--color-ink-soft);
	cursor: not-allowed;
	box-shadow: none;
}

/* ==========================================
   【響應式手機版佈局】
   ========================================== */
@media ( max-width : 760px) {
	.user-info-bar {
		margin: 80px 16px 0;
		border-radius: 20px 20px 0 0;
		padding: 10px 20px;
	}
	.chat-container {
		flex-direction: column;
		height: calc(100dvh - 165px);
		margin: 0 16px 32px;
		border-radius: 0 0 20px 20px;
	}

	/* 手機版：左側聯絡人轉成頂部水平橫向滑動區 */
	.left-sidebar {
		width: 100%;
		min-width: 100%;
		max-height: 110px;
		padding: 10px;
		border-right: none;
		border-bottom: 1px solid var(--color-border);
	}
	.left-sidebar h3 {
		font-size: 14px;
		margin-bottom: 6px;
	}
	.contact-list {
		flex-direction: row;
		overflow-x: auto;
		gap: 8px;
		padding-bottom: 4px;
	}
	.contact-link {
		padding: 6px;
		font-size: 13px;
		white-space: nowrap;
	}
	.contact-link:hover {
		transform: none;
	}

	/* 手機版：右側訊息區縮放 */
	.right-chatbox {
		flex: 1;
		min-height: 0;
	}
	.chat-header {
		padding: 16px 20px;
	}
	.chat-header h3 {
		font-size: 17px;
	}
	.messages-display {
		padding: 20px 16px;
	}
	.messages-list li {
		max-width: 86%;
	}
	.chat-input-area {
		padding: 14px 16px;
	}
}

/* 🚀 讓時間與已讀完美在文字「左邊」與「右邊」的黃金排版 */
.messages-list li {
	position: relative !important;
	margin-bottom: 24px !important; /* 留出下方或旁邊的餘裕 */
}

/* 訊息專用時間狀態標籤 */
.msg-side-meta {
	position: absolute;
	bottom: 0;
	font-size: 10px !important;
	font-weight: 800 !important;
	line-height: 1.2;
	color: var(--color-ink-soft);
	display: flex;
	flex-direction: column;
	user-select: none;
	white-space: nowrap;
}

/* 自己發的訊息 (.me)：把時間狀態標籤釘在氣泡的【左邊】 */
.messages-list li.me .msg-side-meta {
	left: -55px; /* 精準把時間和已讀逼到黃色氣泡的左邊 */
	align-items: flex-end;
}

/* 對方發的訊息 (.friend)：把時間標籤釘在氣泡的【右邊】 */
.messages-list li.friend .msg-side-meta {
	right: -45px; /* 精準把時間逼到白色氣泡的右邊 */
	align-items: flex-start;
}

/* 左側聯絡人清單的未讀氣泡樣式 */
.sidebar-unread-badge {
	background-color: var(--color-pink) !important;
	color: var(--color-surface) !important;
	border-radius: var(--radius-full) !important;
	padding: 2px 8px !important;
	font-size: 11px !important;
	font-weight: 800 !important;
	line-height: 1.3 !important;
	box-shadow: var(--shadow-sm) !important;
	border: 1px solid #FFA2B0 !important;
	
	display: inline-flex !important;
	align-items: center !important;
	justify-content: center !important;
	min-width: 22px !important; 
	height: 18px !important;
}

.messages-list li {
	display: block !important; /* 1. 強制宣告為區塊，不被 align-self 扭曲 */
	width: -webkit-fit-content !important; /* 2. 舊版瀏覽器相容 */
	width: -moz-fit-content !important; /* 3. 火狐瀏覽器相容 */
	width: fit-content !important; /* 4. 【核心指令】逼迫泡泡寬度，死死貼緊文字有多長就縮多小！ */
}

/* 上線圖標 */
.status-dot {
	width: 8px !important;
	height: 8px !important;
	border-radius: 50% !important;
	display: inline-block !important;
	flex-shrink: 0 !important;
	background-color: #bfbfbf !important; /* 預設小灰燈 */
	transition: background-color 0.2s ease, box-shadow 0.2s ease;
}

.status-dot.online {
	background-color: #52c41a !important; /* 綠色 */
	box-shadow: 0 0 6px #52c41a !important;  /* 螢光發光特效 */
}

.status-dot.offline {
	background-color: #bfbfbf !important;
	box-shadow: none !important;
}
</style>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<!-- 完美保留你原有的 connect 機制 -->
<body onload="connect();">

	<!-- 上方人員狀態提示 -->
	<div class="user-info-bar">
		當前登入者：<span th:text="${currentUserName}">未登入</span>
	</div>

	<!-- 隱藏欄位：用來存放當前對話者的名字，供 sendMessage() 讀取 -->
	<span id="statusOutput" th:text="${targetName}" style="display: none;"></span>

	<!-- 💡 核心置中大面板結構 -->
	<div class="chat-container">

		<!-- 【左欄：真實會員清單】 -->
		<div class="left-sidebar">
			<h3>選擇聯絡人</h3>
			<ul class="contact-list" id="dynamicContactList">
    <!-- 確保最外圍的 <li> 帶有 th:data-id 與 th:data-name，這是我們 JS 精準切換的雷達 -->
    <li th:each="contact : ${memList}" th:if="${contact.userId != currentUserId}" class="contact-item" th:id="'contact-item-' + ${contact.userId}" th:data-id="${contact.userId}" th:data-name="${contact.username}">
        
        <!-- 💡【核心修正】拔掉 th:href 刷新跳轉，改為 javascript:void(0); 全權交由前端 SPA 點擊控制 -->
        <a href="javascript:void(0);"
           th:class="${contact.userId == targetUserId} ? 'contact-link active-chat' : 'contact-link'"
           style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            
            <div style="display: flex; align-items: center; gap: 6px;">
                <span class="status-dot offline" th:id="'status-dot-' + ${contact.userId}"></span>
                <th:block th:text="${contact.username}"></th:block>
            </div> 
            
            <span class="sidebar-unread-badge"
                  th:text="${contact.userId == targetUserId} ? 0 : ${contact.unreadCount}"
                  th:style="${contact.userId == targetUserId || contact.unreadCount == 0} ? 'display: none !important;' : 'display: inline-block; background-color: var(--color-pink); color: var(--color-surface); border-radius: var(--radius-full); padding: 2px 8px; font-size: 11px; font-weight: 800; line-height: 1.3; box-shadow: var(--shadow-sm); border: 1px solid #FFA2B0;'">
                  0
            </span>
        </a>
    </li>
</ul>
		</div>

		<!-- 【右欄：對話視窗】 -->
		<div class="right-chatbox">
			<!-- 對話視窗頂部標題 -->
			<div class="chat-header"
				style="display: flex; justify-content: space-between; align-items: center;">
				<h3
					th:text="${targetName != null} ? '與 ' + ${targetName} + ' 聊天中' : '請選擇對象'"></h3>
				<span id="typingIndicator"
					style="color: var(--color-ink-soft); font-size: 0.85em; font-style: italic;"></span>
			</div>

			<!-- 訊息滾動顯示區 -->
			<div id="messagesArea" class="messages-display">
				<ul id="area" class="messages-list">
					<!-- 連線成功系統提示 -->
					<p th:if="${targetName != null}" class="system-status">---
						已建立專屬私訊連線 ---</p>
				</ul>
			</div>

			<!-- 底部輸入與發送功能 -->
			<div class="chat-input-area">
				<input type="text" id="message" placeholder="請輸入私訊內容..."
					th:disabled="${targetName == null}">
				<button id="sendMessage" onclick="sendMessage()"
					th:disabled="${targetName == null}">發送</button>
			</div>
		</div>

	</div>

	<!-- 💡 原生 JavaScript 邏輯完全保留，不影響你的 WebSocket 機制 -->
	<script th:inline="javascript">
		let webSocket = null;
		const selfId = /*[[${currentUserId}]]*/'guest';
		let targetId = /*[[${targetUserId}]]*/null;
		const targetName = /*[[${targetName}]]*/'';

		const MyPoint = "/FriendWS/" + selfId;
		const endPointURL = "ws://" + window.location.host + MyPoint;

		const statusOutput = document.getElementById("statusOutput");
		const messagesArea = document.getElementById("messagesArea");
		const chatHeaderTitle = document.getElementById("chatHeaderTitle");
		const typingIndicator = document.getElementById("typingIndicator");
		const inputMessage = document.getElementById("message");
		const sendMessageBtn = document.getElementById("sendMessage");

		let typingTimeout = null;    
		let heartbeatInterval = null;
		
		
		function connect() {
			webSocket = new WebSocket(endPointURL);

			webSocket.onopen = function(event) {
				startHeartbeat(); 
				loadContacts();  
				
				if (targetId) {
					const historyReq = {
						"type" : "history",
						"senderId" : Number(selfId),  
						"receiverId" : Number(targetId), 
						"message" : ""
					};
					webSocket.send(JSON.stringify(historyReq));

				}
			};

			webSocket.onmessage = function(event) {
				const jsonObj = JSON.parse(event.data);

				// 🅰️ 情況 A：載入歷史紀錄
				if ("history" === jsonObj.type) {
					const ulArea = document.getElementById("area");
					ulArea.innerHTML = '';
					
					const messages = jsonObj.historyList;
					
					if (messages && messages.length > 0) {
						for (let i = 0; i < messages.length; i++) {
							const msgObj = messages[i];
							const historyData = (typeof msgObj === 'object') ? msgObj : JSON.parse(msgObj);
							
							const li = document.createElement('li');
							const isMe = String(historyData.senderId) === String(selfId);
							li.className = isMe ? 'me' : 'friend';
							
							const timeStr = historyData.lastTime || historyData.sentAt || getCurrentTime();
							appendMessageContent(li, historyData.message, isMe, historyData.getIsRead || historyData.msgRead, timeStr);

							ulArea.appendChild(li);
						}
					}
                    
					sendReadReceipt();
					
					
					if (targetId) {
						localStorage.setItem(`chat_unread_${selfId}_to_${targetId}`, 0);
					}
                    
					messagesArea.scrollTop = messagesArea.scrollHeight;
				

				// 🅱️ 情況 B：收到即時新訊息
				} else if ("chat" === jsonObj.type) {
					const isMe = String(jsonObj.senderId) === String(selfId);
					const isFromCurrentPartner = String(jsonObj.senderId) === String(targetId);
					
					const timeStr = getCurrentTime();

					// 情況 1：是我自己發的，或是目前正開著視窗在聊天的對象發來的 -> 直接上屏
					if (isMe || isFromCurrentPartner) {
						const li = document.createElement('li');
						li.className = isMe ? 'me' : 'friend';
						
						// 自己發的預設為未讀(0)，對方發來的因為我正盯著看所以算已讀(1)
						appendMessageContent(li, jsonObj.message, isMe, isMe ? 0 : 1, timeStr);
						
						if (isFromCurrentPartner) {
							sendReadReceipt();
						}
						
						document.getElementById("area").appendChild(li);
						messagesArea.scrollTop = messagesArea.scrollHeight;
					} else {
						const partnerId = jsonObj.senderId;
						if (partnerId) {
							const targetLiEl = document.querySelector(`.contact-list .contact-item[data-id="${String(partnerId).trim()}"]`);
							
							if (targetLiEl) {
								let badge = targetLiEl.querySelector('.sidebar-unread-badge');
								
								let currentDisplayCount = parseInt(badge.innerText) || 0;
								
								currentDisplayCount++;
								
								badge.innerText = currentDisplayCount;
								badge.style.display = 'inline-block';
								
								let lastMsgSummary = "新訊息";
								if (jsonObj.type === "image") {
									lastMsgSummary = "[圖片訊息]";
								} else if (jsonObj.message) {
									lastMsgSummary = jsonObj.message.length > 10 ? jsonObj.message.substring(0, 10) + "..." : jsonObj.message;
								}
								const lastMsgEl = targetLiEl.querySelector('.contact-last-msg');
								if (lastMsgEl) lastMsgEl.textContent = lastMsgSummary;

								const storageKey = `chat_unread_${selfId}_to_${partnerId}`;
								localStorage.setItem(storageKey, currentDisplayCount);
							}
						}
						
						setTimeout(() => {
							loadContacts();
						}, 150);
					}
					
				// 🅲 情況 C：對方點開對話，即時將畫面上的「未讀」集體改為「已讀」
				} else if("read" === jsonObj.type){
					const readerId = jsonObj.readByUserId;; 

				    if (!targetId || String(readerId) === String(targetId)) {
				        const unreadLabels = document.querySelectorAll(".unread-marker");
				        unreadLabels.forEach(label => {
				            label.innerText = "已讀";
				            label.style.color = "lightgray";
				            label.classList.remove("unread-marker"); 
				        });
				    }
				}
				// 情況 D：即時接收對方的打字狀態 (Typing Indicator)
				else if ("typing" === jsonObj.type) {
					if (String(jsonObj.senderId) === String(targetId)) {
						typingIndicator.textContent = (jsonObj.status === "1") ? "對方正在輸入中..." : "";
					}
				}
				// 情況 E：處理系統級的好友即時「上下線狀態燈號」廣播
				else if ("userStatus" === jsonObj.type) {
					const statusDot = document.getElementById(`status-dot-${jsonObj.userId}`);
					if (statusDot) {
						statusDot.className = (jsonObj.status === "online") ? "status-dot online" : "status-dot offline";
					}
				}// 情況 F：連線成功時，接收後端主動回發的全體在線名單，一口氣集體點亮小綠燈！
				else if ("initOnlineList" === jsonObj.type) {
					const onlineIds = jsonObj.onlineUserIds; 
					if (onlineIds && onlineIds.length > 0) {
						onlineIds.forEach(onlineId => {
							const statusDot = document.getElementById(`status-dot-${onlineId}`);
							if (statusDot) {
								statusDot.className = "status-dot online";
							}
						});
					}
				}
			};
			
			webSocket.onclose = function(event) {
				console.log("Disconnected!");
				clearInterval(heartbeatInterval); // 斷線時清除定時器
			};
		}

		
	
		// 發送聊天訊息：
		function sendMessage() {
			const inputMessage = document.getElementById("message");
			const message = inputMessage.value.trim();

			if (message === "") {
				inputMessage.focus();
			} else {
				const jsonObj = {
					"type" : "chat",
					"senderId" : selfId, 
					"receiverId" : targetId, 
					"message" : message
				};
				webSocket.send(JSON.stringify(jsonObj));
				inputMessage.value = "";
				inputMessage.focus();
				
				sendTypingSignal("0");
			}
		}
		
		// 💡 輔助方法 A：精準封裝右側結構 (時間與已讀在文字左邊)
		function appendMessageContent(liElement, rawText, isMe, msgRead, timeStr) {
			const safeText = escapeHtml(rawText);
			
			if (isMe) {
				const statusText = (Number(msgRead) === 1) ? '已讀' : '未讀';
				const statusColor = (Number(msgRead) === 1) ? 'lightgray' : 'var(--color-ink-soft)';
				const markerClass = (Number(msgRead) === 1) ? '' : 'class="unread-marker"';
				
				// 我發的訊息：靠右對齊 (justify-content: flex-end)，時間在黃色泡泡「左邊」
				liElement.style.cssText = "background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: 100% !important; display: flex !important; justify-content: flex-end !important; align-items: flex-end !important; gap: 8px; position: relative; list-style: none; margin-bottom: 12px;";
				
				liElement.innerHTML = `
					<div class="msg-meta-left" style="display: flex; flex-direction: column; align-items: flex-end; font-size: 10px; font-weight: 800; line-height: 1.3; user-select: none; flex-shrink: 0; margin-bottom: 2px;">
						<span style="color: var(--color-ink-soft); font-weight: 800;">${timeStr}</span>
						<span ${markerClass} style="color: ${statusColor}; font-weight: 800;">${statusText}</span>
					</div>
					<div class="msg-bubble-actual" style="display: inline-block !important; width: max-content !important; min-width: 0 !important; max-width: min(72%, 560px); padding: 13px 16px; border: 1px solid #F3D36C; border-radius: 20px 8px 20px 20px; background: var(--color-yellow); color: var(--color-ink); box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 500; overflow-wrap: break-word !important; word-break: break-word !important; white-space: normal !important; text-align: left;">
						${safeText}
					</div>
				`;
			} else {
				liElement.style.cssText = "background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; width: 100% !important; display: flex !important; justify-content: flex-start !important; align-items: flex-end !important; gap: 8px; position: relative; list-style: none; margin-bottom: 12px;";
				
				liElement.innerHTML = `
					<!-- 左邊：實體白底氣泡，打 123 就縮到 123 的大小 -->
					<div class="msg-bubble-actual" style="display: inline-block !important; width: max-content !important; min-width: 0 !important; max-width: min(72%, 560px); padding: 13px 16px; border: 1px solid var(--color-border); border-radius: 8px 20px 20px 20px; background: var(--color-surface); color: var(--color-ink); box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 500; overflow-wrap: break-word !important; word-break: break-word !important; white-space: normal !important; text-align: left;">
						${safeText}
					</div>
					<!-- 右邊：緊貼在白色氣泡旁邊的時間盒子 -->
					<div class="msg-meta-right" style="font-size: 10px; font-weight: 800; color: var(--color-ink-soft); user-select: none; flex-shrink: 0; margin-bottom: 2px; display: flex; align-items: flex-end;">
						<span>${timeStr}</span>
					</div>
				`;
			}
		}
		
		// 💡 輔助方法 B：即時更新左側聯絡人小紅點數字
		function updateLeftSidebarBadge(partnerId) {
			// 直接調用步驟 1 的資料庫同步器，資料庫說幾筆，畫面上就顯示幾筆，絕對不遺失、不卡 0！
			loadContacts();
		}
		
		function getCurrentTime() {
			const now = new Date();
			return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
		}
		
		function escapeHtml(string) {
			if (!string) return '';
			return String(string).replace(/[&<>"']/g, function (s) {
				return { 
					'&': '&amp;', 
					'<': '&lt;', 
					'>': '&gt;', 
					'"': '&quot;', 
					"'": '&#039;'
				}[s];
			});
		}
		
		
		/**
		 * 🚀 全網頁初始化核心事件（DOMContentLoaded）
		 */
		 
		 window.addEventListener("DOMContentLoaded", function() {
				// 1. 啟動 WebSocket 連線（連線成功的 onopen 內部會去呼叫 loadContacts() 載入資料庫紅點）
				connect();
				
				// 2. 完美的中文注音輸入法防爆 Enter 鍵發送機制
				const inputMessage = document.getElementById("message");
				if (inputMessage) {
					inputMessage.addEventListener("keydown", function(event) {
						if (event.key === "Enter") {
							if (event.isComposing || event.keyCode === 229) return;
							event.preventDefault(); 
							sendMessage(); 
						}
					});

					// 3. 綁定打字提示偵測
					inputMessage.addEventListener("input", function() {
						if (!targetId) return;
						sendTypingSignal("1");
						clearTimeout(typingTimeout);
						typingTimeout = setTimeout(() => sendTypingSignal("0"), 1500);
					});
				}
			});
		
		
		//  打字中提示訊號發送器 : 透過 WebSocket 即時把「正在輸入(1)」或「停止輸入(0)」狀態轉發給對方
		 function sendTypingSignal(status) {
				if (webSocket && webSocket.readyState === WebSocket.OPEN && targetId) {
					webSocket.send(JSON.stringify({
						"type" : "typing",
						"senderId" : Number(selfId),   
						"receiverId" : Number(targetId),
						"message" : status               
					}));
				}
			}
		
		
			// 每隔 25 秒向後端發送一次輕量 ping 訊號，杜絕行動網路（進電梯、弱網）因休眠造成的假在線鎖死問題
			function startHeartbeat() {
				heartbeatInterval = setInterval(() => {
					if (webSocket && webSocket.readyState === WebSocket.OPEN) {
						webSocket.send(JSON.stringify({ 
							"type": "ping", 
							"senderId": Number(selfId), 
							"receiverId": 0, 
							"message": "" 
						}));
					}
				}, 25000);
			}
			
			
			/**
			 * 當 WebSocket 一連線成功，主動地毯式掃描左側所有好友超連結，
			 * 並從本地 LocalStorage 快取硬碟中，將其他好友累積的未讀紅點數字一一還原在畫面上！
			 */
			 function loadContacts() {
					fetch('/api/chat/contacts')
						.then(res => res.json())
						.then(contacts => {
							contacts.forEach(c => {
								// 1. 精準抓到對應這個好友的 <li> 盒子元素
								const targetLiEl = document.querySelector(`.contact-list .contact-item[data-id="${String(c.userId).trim()}"]`);
								if (!targetLiEl) return; 

								// 2. 💡【新功能：在線燈號初始加載補盲】
								// 雖然 HTML 預設是 offline 灰燈，但我們可以根據後端在線狀態（如果 API 有包含，或後面由 userStatus 事件接管）
								// 這裡我們先確保 DOM 結構節點絕對暢通。
								// 為了讓全頁重整一進來就看到綠燈，我們在下方步驟2提供一個完美的後端配合。
								
								// 3. 處理粉紅徽章元件
								let badge = targetLiEl.querySelector('.sidebar-unread-badge');
								if (!badge) {
									badge = document.createElement('span');
									badge.className = 'sidebar-unread-badge';
									const link = targetLiEl.querySelector('.contact-link');
									if (link) link.appendChild(badge);
								}

								// 4. 核心商邊判定
								const isCurrentChatting = targetId && String(c.userId) === String(targetId);
								const finalUnreadCount = isCurrentChatting ? 0 : Number(c.unreadCount);

								// 5. 絕殺覆蓋強制隱藏/顯示
								if (finalUnreadCount <= 0) {
									if (badge) {
										badge.innerText = ""; 
										badge.style.setProperty('display', 'none', 'important'); 
									}
								} else {
									if (badge) {
										badge.innerText = finalUnreadCount;
										badge.style.setProperty('display', 'inline-block', 'important'); 
									}
								}
							});
						})
						.catch(err => console.error("加載未讀數與燈號失敗:", err));
				}
			
			
			/**
			 * 當前點開視窗的人是自己(selfId)，要把對方(targetId)發過來的未讀訊息標記為已讀
			 */
			function sendReadReceipt() {
				if (webSocket && webSocket.readyState === WebSocket.OPEN && targetId) {
					webSocket.send(JSON.stringify({
						"type" : "read", 
						"senderId" : Number(selfId), 
						"receiverId" : Number(targetId),   
						"message" : "" 
					}));
				}
			}
			
			document.getElementById("dynamicContactList").addEventListener("click", function(e) {
				const item = e.target.closest(".contact-item");
				if (!item) return; // 防呆

				const friendId = parseInt(item.getAttribute("data-id"));
				const friendName = item.getAttribute("data-name");

				// 觸發純前端不閃爍換房開窗
				openChatWindow(friendId, friendName);
			});

			/**
			 * 2. 核心換房控制器：動態更換右側主聊天面板，網頁完全不刷新、不白屏、不閃爍！
			 */
			function openChatWindow(friendId, friendName) {
				// 動態變更全域當前正在聊天的目標變數
				targetId = Number(friendId);

				// A. 動態變更右側頂部 UI 標題與解鎖狀態
				if (chatHeaderTitle) chatHeaderTitle.textContent = "與 " + friendName + " 聊天中";
				if (typingIndicator) typingIndicator.textContent = ""; 
				if (inputMessage) inputMessage.disabled = false;
				if (sendMessageBtn) sendMessageBtn.disabled = false;
				
				const systemStatus = document.querySelector(".system-status");
				if (systemStatus) systemStatus.style.display = 'none';

				// B. 動態翻轉左側聯絡人的「選中藍框」高亮外框
				document.querySelectorAll(".contact-link").forEach(el => el.classList.remove("active-chat"));
				const currentLi = document.querySelector(`.contact-item[data-id="${friendId}"]`);
				if (currentLi) {
					const link = currentLi.querySelector('.contact-link');
					if (link) link.classList.add("active-chat");
					
					// 點開他的瞬間，立刻在畫面上將他的未讀粉紅徽章隱藏消滅
					const badge = currentLi.querySelector('.sidebar-unread-badge');
					if (badge) badge.style.setProperty('display', 'none', 'important');
				}

				// C. 本地硬碟 LocalStorage 計數同步歸零
				localStorage.setItem(`chat_unread_${selfId}_to_${friendId}`, 0);

				// D. 🚀【極速雙向握手】直接透過當前健康的 WebSocket 連線，向後端索取全新歷史紀錄！
				if (webSocket && webSocket.readyState === WebSocket.OPEN) {
					webSocket.send(JSON.stringify({
						"type": "history", 
						"senderId": Number(selfId), 
						"receiverId": Number(targetId), 
						"message": ""
					}));
				}
			}
		
	</script>
