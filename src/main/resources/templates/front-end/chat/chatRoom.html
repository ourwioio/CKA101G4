<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>雙欄私訊聊天室</title>
    <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/front-end/chat/chatRoom.css}">
    <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<body onload="connect();">

	<!-- 上方人員狀態提示 -->
	<div class="user-info-bar">
		當前登入者：<span th:text="${currentUserName}">未登入</span>
	</div>

	<!-- 隱藏欄位：用來存放當前對話者的名字，供 sendMessage() 讀取 -->
	<span id="statusOutput" th:text="${targetName}" style="display: none;"></span>

	<!-- 💡 核心置中大面板結構 -->
	<div class="chat-container">

		<!-- 【左欄：真實會員清單】 -->
		<div class="left-sidebar">
			<a th:href="@{/member/chatButton}" class="back-btn">⬅ 返回私訊列表</a>
			<h3>選擇聯絡人</h3>
			<hr style="border: 0; border-top: 1px solid #e9ecef; margin-bottom: 10px;">
			
			<ul class="contact-list">
				<li th:each="mem : ${memList}" class="contact-item">
					<!-- 利用動態 class 決定是否套用 active-chat 樣式 -->
					<a th:if="${mem.memberId != currentUserId}"
					   th:href="@{/member/chatRoom(to=${mem.memberId})}"
					   th:text="${mem.realName}"
					   th:class="${mem.memberId == targetUserId} ? 'contact-link active-chat' : 'contact-link'">
					</a>
				</li>
			</ul>
		</div>

		<!-- 【右欄：對話視窗】 -->
		<div class="right-chatbox">
			<!-- 對話視窗頂部標題 -->
			<div class="chat-header">
				<h3 th:text="${targetName != null} ? '與 ' + ${targetName} + ' 聊天中' : '請選擇對象'"></h3>
			</div>

			<!-- 訊息滾動顯示區 -->
			<div id="messagesArea" class="messages-display">
				<ul id="area" class="messages-list">
					<!-- 連線成功系統提示 -->
					<p th:if="${targetName != null}" class="system-status">--- 已建立專屬私訊連線 ---</p>
				</ul>
			</div>

			<!-- 底部輸入與發送功能 -->
			<div class="chat-input-area">
				<input type="text" id="message" placeholder="請輸入私訊內容..." th:disabled="${targetName == null}">
				<button id="sendMessage" onclick="sendMessage()" th:disabled="${targetName == null}">發送</button>
			</div>
		</div>

	</div>

	<!-- 💡 原生 JavaScript 邏輯完全保留，不影響你的 WebSocket 機制 -->
	<script th:inline="javascript">
		const selfId = /*[[${currentUserId}]]*/'guest';
		const targetId = /*[[${targetUserId}]]*/null;
		const targetName = /*[[${targetName}]]*/'';

		const MyPoint = "/FriendWS/" + selfId;
		const endPointURL = "ws://" + window.location.host + MyPoint;

		const statusOutput = document.getElementById("statusOutput");
		const messagesArea = document.getElementById("messagesArea");

		function connect() {
			if (!targetId) return;

			webSocket = new WebSocket(endPointURL);

			webSocket.onopen = function(event) {
				console.log("Connect Success!");
				document.getElementById('sendMessage').disabled = false;

				const historyReq = {
					"type" : "history",
					"senderId" : selfId,
					"receiverId" : targetId,
					"message" : ""
				};
				webSocket.send(JSON.stringify(historyReq));

				const readReq = {
					"type" : "read",
					"senderId" : targetId,
					"receiverId" : selfId,
					"message" : ""
				};
				webSocket.send(JSON.stringify(readReq));
			};

			webSocket.onmessage = function(event) {
				const jsonObj = JSON.parse(event.data);

				if ("history" === jsonObj.type) {
					messagesArea.innerHTML = '<ul id="area" class="messages-list"></ul>';
					const messages = JSON.parse(jsonObj.message);
					
					
					for (let i = 0; i < messages.length; i++) {
						const historyData = JSON.parse(messages[i]);
						const li = document.createElement('li');
						const isMe = String(historyData.senderId) === String(selfId);

						li.className = isMe ? 'me' : 'friend';

						if (isMe) {
							const statusText = (historyData.msgRead === 1) ? '已讀': '未讀';
							const statusColor = (historyData.msgRead === 1) ? 'lightgray': 'gray';
							
							const markerClass = (Number(historyData.msgRead) === 1) ? '' : 'class="unread-marker"';
							
							li.innerHTML = historyData.message
		                    + ` <span ${markerClass} style="font-size:10px; color:${statusColor}; margin-left:5px;">${statusText}</span>`;
						} else {
							li.innerHTML = historyData.message;
						}

						document.getElementById("area").appendChild(li);
					}
					messagesArea.scrollTop = messagesArea.scrollHeight;

				} else if ("chat" === jsonObj.type) {
					const li = document.createElement('li');
					const isMe = String(jsonObj.senderId) === String(selfId);
					
					li.className = isMe ? 'me' : 'friend';
					
					if (isMe) {
						li.innerHTML = jsonObj.message + 
						' <span class="unread-marker" style="font-size:10px; color:gray; margin-left:5px;">未讀</span>';
					} else {
						li.innerHTML = jsonObj.message;
						
						const autoRead = {
							"type" : "read",
							"senderId" : targetId,
							"receiverId" : selfId,
							"message" : ""
						};
						webSocket.send(JSON.stringify(autoRead));
					}
					
					document.getElementById("area").appendChild(li);
					messagesArea.scrollTop = messagesArea.scrollHeight;
				} else if("read" === jsonObj.type){
					const readerId = jsonObj.senderId; 

				    if (String(readerId) === String(targetId)) {
				        const unreadLabels = document.querySelectorAll(".unread-marker");
				        unreadLabels.forEach(label => {
				            label.innerText = "已讀";
				            label.style.color = "lightgray";
				            label.classList.remove("unread-marker"); 
				        });
				    }
				}
			};
		}

		function sendMessage() {
			const inputMessage = document.getElementById("message");
			const message = inputMessage.value.trim();

			if (message === "") {
				inputMessage.focus();
			} else {
				const jsonObj = {
					"type" : "chat",
					"senderId" : selfId, 
					"receiverId" : targetId, 
					"message" : message
				};
				webSocket.send(JSON.stringify(jsonObj));
				inputMessage.value = "";
				inputMessage.focus();
			}
		}
		
		window.addEventListener("DOMContentLoaded", function() {
		    const inputMessage = document.getElementById("message");
		    
		    if (inputMessage) {
		        inputMessage.addEventListener("keydown", function(event) {
		            if (event.key === "Enter") {
		                if (event.isComposing || event.keyCode === 229) {
		                    return;
		                }
		                
		                event.preventDefault(); 
		                
		                sendMessage(); 
		            }
		        });
		    }
		});
	</script>
</body>
</html>
