<!--
  navbar fragment
  存放路徑建議：src/main/resources/templates/fragments/navbar.html
  使用方式（在其他頁面 <body> 最上方）：
    <div th:replace="~{fragments/navbar :: navbar}"></div>

  注意：本 fragment 依賴的 CSS 變數（--color-* 等 design tokens）
  定義在 navbar.css 最上方的 :root 區塊，記得在頁面 <head> 一併引入 navbar.css。
  若專案已有共用的全站 :root 變數檔，也可以把 navbar.css 裡的 :root 區塊
  移到那個共用檔案，避免重複定義（重複定義不會出錯，但不必要）。
-->
<header class="navbar" th:fragment="navbar">
  <div class="navbar__inner">

    <a class="navbar__logo" href="/">
      <span class="navbar__logo-mark">
        <span class="navbar__logo-eye"></span>
        <span class="navbar__logo-eye"></span>
      </span>
      <span class="navbar__logo-text">
        <span class="t">Webond</span>
        <span class="s">閒人出租</span>
      </span>
    </a>

    <nav class="navbar__links">
      <a th:href="@{/front/services}">個人出租</a>
      <a th:href="@{/activity/front/list}">團體活動</a>
      <a th:href="@{/front/venue/listAllVenue}">場地推薦</a>

      <div class="navbar__dropdown">

        <a class="navbar__dropdown-trigger"
           href="javascript:void(0)"
           aria-haspopup="true"
           aria-expanded="false">
          系統公告
          <svg class="navbar__dropdown-caret"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2.5"
               stroke-linecap="round"
               stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </a>

        <div class="navbar__dropdown-menu"
             role="menu">
          <a th:href="@{/announcements}" role="menuitem">公告</a>
          <a th:href="@{/specifications}" role="menuitem">平台規範</a>
          <a th:href="@{/faqs}" role="menuitem">FAQ</a>
        </div>

      </div>

    </nav>

    <div class="navbar__actions">

		<!-- ==================================================
     通知新版
     同時加入通知輪詢所需的識別 class 與網址
     ================================================== -->
<a class="icon-dot icon-btn icon-btn--notify"
   th:if="${session.memberVO != null}"
   th:href="@{/front/notification/listAllNotification}"
   th:attr="data-unread-url=@{/front/notification/unread-count}"
   title="通知">

    <svg viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round"
         aria-hidden="true">

        <path d="M18 8
                 a6 6 0 0 0-12 0
                 c0 7-3 9-3 9
                 h18
                 s-3-2-3-9">
        </path>

        <path d="M13.73 21
                 a2 2 0 0 1-3.46 0">
        </path>

    </svg>

    <!--
        badge-dot：新版 Navbar CSS
        icon-badge--unread：舊版通知輪詢 JS
    -->
    <span class="badge-dot icon-badge icon-badge--unread"
          th:if="${unreadNotificationCount != null
                   and unreadNotificationCount > 0}"
          th:text="${unreadNotificationCount > 99
                   ? '99+'
                   : unreadNotificationCount}">
    </span>

</a>

      <!-- 會員個人頁面 -->
      <a th:if="${session.memberVO != null}"
        class="icon-dot icon-dot--fill"
        th:href="@{/front/memberPage/my}"
        title="自己的頁面">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a th:if="${session.memberVO == null}"
        class="icon-dot icon-dot--fill"
        th:href="@{/member/login}"
        title="自己的頁面">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
