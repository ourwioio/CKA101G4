<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>後台撥退款作業</title>
<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
}

.activity-admin-content {
	padding: 40px;
}

.page-card {
	background: white;
	max-width: 1400px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
	gap: 16px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.employee {
	color: #64748b;
	font-weight: bold;
	margin-bottom: 20px;
}

.toolbar {
	display: flex;
	justify-content: flex-end;
	align-items: center;
	gap: 10px;
	margin-bottom: 16px;
}

.toolbar label {
	color: #475569;
	font-weight: bold;
}

.toolbar select {
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	padding: 9px 12px;
	font: inherit;
	font-weight: bold;
	color: #0f172a;
	background: white;
}

.toolbar button {
	border: 0;
	border-radius: 8px;
	padding: 10px 16px;
	font-weight: bold;
	color: white;
	background: #2563eb;
	cursor: pointer;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.btn-back,
.admin-btn {
	color: white;
	text-decoration: none;
	padding: 0 20px;
	border-radius: 12px;
	font-weight: bold;
	white-space: nowrap;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-height: 48px;
	min-width: 132px;
	font-size: 18px;
}

.btn-home {
	background: #475569;
}

.btn-home:hover {
	background: #334155;
}

.btn-activity {
	background: #2563eb;
}

.btn-activity:hover {
	background: #1d4ed8;
}

.btn-type {
	background: #7c3aed;
}

.btn-type:hover {
	background: #6d28d9;
}

.btn-order {
	background: #059669;
}

.btn-order:hover {
	background: #047857;
}

.btn-finance {
	background: #d97706;
}

.btn-finance:hover {
	background: #b45309;
}

.btn-report {
	background: #e11d48;
}

.btn-report:hover {
	background: #be123c;
}

.admin-nav {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	flex-wrap: wrap;
	margin-bottom: 18px;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
	white-space: nowrap;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
	vertical-align: top;
}

.note {
	max-width: 240px;
	text-align: left;
	white-space: pre-wrap;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.completed {
	background: #ede9fe;
	color: #5b21b6;
}

.btn-detail {
	color: #2563eb;
	text-decoration: none;
	font-weight: bold;
}

.action-form {
	margin: 0 0 8px;
}

.btn-action {
	border: 0;
	border-radius: 8px;
	color: white;
	cursor: pointer;
	font-weight: bold;
	padding: 8px 14px;
	min-width: 96px;
}

.btn-refund {
	background: #d97706;
}

.btn-payout {
	background: #16a34a;
}
</style>
</head>

<body>
<div class="wb-admin-layout">
	<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>
	<main class="wb-admin-content activity-admin-content">
	<div class="page-card">
		<div class="header">
			<h2>後台撥退款作業</h2>
		</div>

		<div class="admin-nav">
			<a th:href="@{/admin/activity/listAllActivity}" class="admin-btn btn-activity">活動管理</a>
			<a th:href="@{/admin/activity/type/listAllActivityType}" class="admin-btn btn-type">類別管理</a>
			<a th:href="@{/admin/activity/order/listAllActivityOrder}" class="admin-btn btn-order">訂單紀錄</a>
			<a th:href="@{/admin/activity/actRptList}" class="admin-btn btn-report">活動檢舉審核</a>
			<a th:href="@{/admin/activity/home}" class="admin-btn btn-home">回後台首頁</a>
		</div>

		<div class="employee">
			目前員工：<span th:text="${loginEmployeeName}"></span>
			（員工編號 <span th:text="${loginEmployeeId}"></span>）
		</div>

		<div th:if="${param.hostReviewOnly}" class="notice error">
			報名審核由活動主辦人處理，後台只查看訂單、退款與撥款資訊。
		</div>

		<form class="toolbar" th:action="@{/admin/activity/order/finance}" method="get">
			<label for="orderStatus">訂單狀態</label>
			<select id="orderStatus" name="orderStatus">
				<option value="" th:selected="${selectedOrderStatus == null or selectedOrderStatus == ''}">全部</option>
				<option value="cancelled" th:selected="${selectedOrderStatus == 'cancelled'}">已取消</option>
				<option value="completed" th:selected="${selectedOrderStatus == 'completed'}">已完成</option>
			</select>

			<label for="financeStatus">撥退款狀態</label>
			<select id="financeStatus" name="financeStatus">
				<option value="" th:selected="${selectedFinanceStatus == null or selectedFinanceStatus == ''}">全部</option>
				<option value="pending" th:selected="${selectedFinanceStatus == 'pending'}">待撥退款</option>
				<option value="done" th:selected="${selectedFinanceStatus == 'done'}">已撥退款</option>
			</select>
			<button type="submit">查詢</button>
		</form>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>會員編號</th>
						<th>訂單狀態</th>
						<th>報名人數</th>
						<th>訂單金額</th>
						<th>報名備註</th>
						<th>付款方式</th>
						<th>退款 / 撥款</th>
						<th>處理員工</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<a class="btn-detail"
								th:href="@{/admin/activity/order/detail(activityOrderId=${order.activityOrderId})}">
								<span th:each="activity : ${activityListData}"
									th:if="${activity.activityId == order.activityId}"
									th:text="${activity.activityTitle}">
								</span>
							</a>
						</td>

						<td th:text="${order.buyerMemberId}"></td>

						<td>
							<span th:if="${order.orderStatus == 2}" class="status pending">待審核</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">待付款</span>
							<span th:if="${order.orderStatus == 0}" class="status completed">已完成</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">已取消</span>
							<span th:if="${order.orderStatus == 4}" class="status completed">已完成</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>
						<td class="note" th:text="${order.orderNote ?: '-'}"></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
							<span th:if="${order.activityPaymentMethod == null}">未付款</span>
						</td>

						<td>
							<div>
								<span th:if="${order.totalAmount == null or order.totalAmount <= 0}" class="status active">無退款</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 2}" class="status completed">已退款</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1}" class="status refund">待退款</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.orderStatus != 0 and order.orderStatus != 4 and (order.refundStatus == null or order.refundStatus == 0)}" class="status active">無退款</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and (order.orderStatus == 0 or order.orderStatus == 4) and order.refundStatus != 2}" style="margin-top: 6px;">
								<span th:if="${order.payoutAmount}" class="status completed">已撥款</span>
								<span th:unless="${order.payoutAmount}" class="status refund">待撥款</span>
							</div>
						</td>

						<td>
							
<span th:if="${order.employeeId != null}" th:text="|員工 ${order.employeeId}|">員工</span>
							
<span th:if="${order.employeeId == null}">尚未處理</span>
						</td>

						<td>
							<form class="action-form" th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1}"
								th:action="@{/admin/activity/order/confirmRefundFromList}" method="post"
								onsubmit="return confirm('確認此訂單已完成退款？');">
								<input type="hidden" name="activityOrderId" th:value="${order.activityOrderId}">
								<input type="hidden" name="financeStatus" th:value="${selectedFinanceStatus}">
								<input type="hidden" name="orderStatus" th:value="${selectedOrderStatus}">
								<button type="submit" class="btn-action btn-refund">確認退款</button>
							</form>

							<form class="action-form"
								th:action="@{/admin/activity/order/confirmPayoutFromList}" method="post"
								th:if="${order.totalAmount != null and order.totalAmount > 0 and (order.orderStatus == 0 or order.orderStatus == 4) and !order.payoutAmount and (order.refundStatus == null or order.refundStatus == 0)}"
								onsubmit="return confirm('確認此訂單已撥款給活動主辦人？');">
								<input type="hidden" name="activityOrderId" th:value="${order.activityOrderId}">
								<input type="hidden" name="financeStatus" th:value="${selectedFinanceStatus}">
								<input type="hidden" name="orderStatus" th:value="${selectedOrderStatus}">
								<button type="submit" class="btn-action btn-payout">確認撥款</button>
							</form>

							<span th:unless="${(order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1) or (order.totalAmount != null and order.totalAmount > 0 and (order.orderStatus == 0 or order.orderStatus == 4) and !order.payoutAmount and (order.refundStatus == null or order.refundStatus == 0))}">-</span>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="11">目前沒有符合條件的撥退款資料</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
	</main>
</div>
</body>
</html>
