<style>
body {

	margin: 0;

}

.page-card {
	background: white;
	max-width: 1400px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.employee {
	color: #64748b;
	font-weight: bold;
	margin-bottom: 20px;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.success {
	background: #dcfce7;
	color: #166534;
	border: 1px solid #bbf7d0;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.btn-back {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
	white-space: nowrap;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
	vertical-align: top;
}

.note {
	max-width: 240px;
	text-align: left;
	white-space: pre-wrap;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.completed {
	background: #ede9fe;
	color: #5b21b6;
}

.btn-detail {
	background: #2563eb;
	color: white;
	text-decoration: none;
	padding: 8px 14px;
	border-radius: 8px;
	font-weight: bold;
	display: inline-block;
}

</style>
</head>

<body>

	<div class="page-card">
