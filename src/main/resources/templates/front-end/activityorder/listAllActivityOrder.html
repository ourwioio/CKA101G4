<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>&#24460;&#21488;&#35330;&#21934;&#32000;&#37636;</title>
<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
}

.activity-admin-content {
	padding: 40px;
}

.page-card {
	background: white;
	max-width: 1400px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
	gap: 16px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.employee {
	color: #64748b;
	font-weight: bold;
	margin-bottom: 20px;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.btn-back,
.admin-btn {
	color: white;
	text-decoration: none;
	padding: 0 20px;
	border-radius: 12px;
	font-weight: bold;
	white-space: nowrap;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-height: 48px;
	min-width: 132px;
	font-size: 18px;
}

.btn-home {
	background: #475569;
}

.btn-home:hover {
	background: #334155;
}

.btn-activity {
	background: #2563eb;
}

.btn-activity:hover {
	background: #1d4ed8;
}

.btn-type {
	background: #7c3aed;
}

.btn-type:hover {
	background: #6d28d9;
}

.btn-order {
	background: #059669;
}

.btn-order:hover {
	background: #047857;
}

.btn-finance {
	background: #d97706;
}

.btn-finance:hover {
	background: #b45309;
}

.btn-report {
	background: #e11d48;
}

.btn-report:hover {
	background: #be123c;
}

.admin-nav {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	flex-wrap: wrap;
	margin-bottom: 18px;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
	white-space: nowrap;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
	vertical-align: top;
}

.note {
	max-width: 240px;
	text-align: left;
	white-space: pre-wrap;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.completed {
	background: #ede9fe;
	color: #5b21b6;
}

.btn-detail {
	color: #2563eb;
	text-decoration: none;
	font-weight: bold;
}

</style>
</head>

<body>
<div class="wb-admin-layout">
	<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>
	<main class="wb-admin-content activity-admin-content">
	<div class="page-card">
		<div class="header">
			<h2>&#24460;&#21488;&#35330;&#21934;&#32000;&#37636;</h2>
		</div>

		<div class="admin-nav">
			<a th:href="@{/activity/listAllActivity}" class="admin-btn btn-activity">&#27963;&#21205;&#31649;&#29702;</a>
			<a th:href="@{/activityType/listAllActivityType}" class="admin-btn btn-type">&#39006;&#21029;&#31649;&#29702;</a>
			<a th:href="@{/activityOrder/finance}" class="admin-btn btn-finance">&#25765;&#36864;&#27454;&#20316;&#26989;</a>
			<a th:href="@{/admin/actRptList}" class="admin-btn btn-report">活動檢舉審核</a>
			<a th:href="@{/activity/admin/home}" class="admin-btn btn-home">&#22238;&#24460;&#21488;&#39318;&#38913;</a>
		</div>

		<div class="employee">
			&#30446;&#21069;&#21729;&#24037;&#65306;<span th:text="${loginEmployeeName}"></span>
			&#65288;&#21729;&#24037;&#32232;&#34399; <span th:text="${loginEmployeeId}"></span>&#65289;
		</div>

		<div th:if="${param.hostReviewOnly}" class="notice error">
			&#22577;&#21517;&#23529;&#26680;&#30001;&#27963;&#21205;&#20027;&#36774;&#20154;&#34389;&#29702;&#65292;&#24460;&#21488;&#21482;&#26597;&#30475;&#35330;&#21934;&#12289;&#36864;&#27454;&#33287;&#25765;&#27454;&#36039;&#35338;&#12290;
		</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>&#35330;&#21934;&#32232;&#34399;</th>
						<th>&#27963;&#21205;&#21517;&#31281;</th>
						<th>&#26371;&#21729;&#32232;&#34399;</th>
						<th>&#35330;&#21934;&#29376;&#24907;</th>
						<th>&#22577;&#21517;&#20154;&#25976;</th>
						<th>&#35330;&#21934;&#37329;&#38989;</th>
						<th>&#22577;&#21517;&#20633;&#35387;</th>
						<th>&#20184;&#27454;&#26041;&#24335;</th>
						<th>&#36864;&#27454; / &#25765;&#27454;</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<a class="btn-detail"
								th:href="@{/activityOrder/detail(activityOrderId=${order.activityOrderId})}">
								<span th:each="activity : ${activityListData}"
									th:if="${activity.activityId == order.activityId}"
									th:text="${activity.activityTitle}">
								</span>
							</a>
						</td>

						<td th:text="${order.buyerMemberId}"></td>

						<td>
							<span th:if="${order.orderStatus == 2}" class="status pending">&#24453;&#23529;&#26680;</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">&#24453;&#20184;&#27454;</span>
							<span th:if="${order.orderStatus == 0}" class="status active">&#24050;&#20184;&#27454;</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">&#24050;&#21462;&#28040;</span>
							<span th:if="${order.orderStatus == 4}" class="status completed">&#24050;&#23436;&#25104;</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>
						<td class="note" th:text="${order.orderNote ?: '-'}"></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">&#20449;&#29992;&#21345;</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM&#36681;&#24115;</span>
							<span th:if="${order.activityPaymentMethod == null}">&#26410;&#20184;&#27454;</span>
						</td>

						<td>
							<div>
								<span th:if="${order.totalAmount == null or order.totalAmount <= 0}" class="status active">&#28961;&#36864;&#27454;</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 2}" class="status completed">&#24050;&#36864;&#27454;</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.refundStatus == 1}" class="status refund">&#24453;&#36864;&#27454;</span>
								<span th:if="${order.totalAmount != null and order.totalAmount > 0 and order.orderStatus != 0 and order.orderStatus != 4 and (order.refundStatus == null or order.refundStatus == 0)}" class="status active">&#28961;&#36864;&#27454;</span>
							</div>
							<div th:if="${order.totalAmount != null and order.totalAmount > 0 and (order.orderStatus == 0 or order.orderStatus == 4) and order.refundStatus != 2}" style="margin-top: 6px;">
								<span th:if="${order.payoutAmount}" class="status completed">&#24050;&#25765;&#27454;</span>
								<span th:unless="${order.payoutAmount}" class="status refund">&#24453;&#25765;&#27454;</span>
							</div>
						</td>

					</tr>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="9">&#30446;&#21069;&#27794;&#26377;&#35330;&#21934;&#36039;&#26009;</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
	</main>
</div>
</body>
</html>
