<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>報名審核</title>

<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.page-card {
	background: white;
	max-width: 1400px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.employee {
	color: #64748b;
	font-weight: bold;
	margin-bottom: 20px;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.success {
	background: #dcfce7;
	color: #166534;
	border: 1px solid #bbf7d0;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.btn-back {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
	white-space: nowrap;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
	vertical-align: top;
}

.note {
	max-width: 240px;
	text-align: left;
	white-space: pre-wrap;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.action {
	display: flex;
	justify-content: center;
	gap: 10px;
}

.btn-approve,
.btn-reject {
	color: white;
	border: none;
	padding: 8px 15px;
	border-radius: 6px;
	cursor: pointer;
	font-weight: bold;
}

.btn-approve {
	background: #16a34a;
}

.btn-reject {
	background: #dc2626;
}
</style>
</head>

<body>

	<div class="page-card">
		<div class="header">
			<h2>報名審核</h2>
			<a th:href="@{/activity/admin/home}" class="btn-back">回後台首頁</a>
		</div>

		<div class="employee">
			目前員工：<span th:text="${loginEmployeeName}"></span>
			（員工編號 <span th:text="${loginEmployeeId}"></span>）
		</div>

		<div th:if="${param.approveSuccess}" class="notice success">已通過申請，等待會員付款。</div>
		<div th:if="${param.rejectSuccess}" class="notice success">已退回報名申請。</div>
		<div th:if="${param.approveFailed}" class="notice error">通過失敗：活動可能已額滿、下架或不開放報名。</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>會員ID</th>
						<th>狀態</th>
						<th>報名人數</th>
						<th>總金額</th>
						<th>申請備註</th>
						<th>付款方式</th>
						<th>審核員工ID</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<span th:each="activity : ${activityListData}"
								th:if="${activity.activityId == order.activityId}"
								th:text="${activity.activityTitle}">
							</span>
						</td>

						<td th:text="${order.buyerMemberId}"></td>

						<td>
							<span th:if="${order.orderStatus == 3}" class="status pending">待審核</span>
							<span th:if="${order.orderStatus == 4}" class="status pending">待付款</span>
							<span th:if="${order.orderStatus == 0}" class="status active">已付款</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">已取消/退回</span>
							<span th:if="${order.orderStatus == 2}" class="status refund">退款申請中</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>
						<td class="note" th:text="${order.orderNote ?: '-'}"></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span>
							<span th:if="${order.activityPaymentMethod == null}">未付款</span>
						</td>

						<td th:text="${order.employeeId ?: '-'}"></td>

						<td>
							<div class="action" th:if="${order.orderStatus == 3}">
								<form th:action="@{/activityOrder/approve}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button class="btn-approve" type="submit">通過</button>
								</form>

								<form th:action="@{/activityOrder/reject}" method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">
									<button class="btn-reject" type="submit">退回</button>
								</form>
							</div>
							<span th:unless="${order.orderStatus == 3}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

</body>
</html>
