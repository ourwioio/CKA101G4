<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>活動訂單管理</title>

<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.page-card {
	background: white;
	max-width: 1300px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 25px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.header-actions {
	display: flex;
	gap: 12px;
}

.btn-add, .btn-back {
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
}

.btn-add {
	background: #3b82f6;
}

.btn-add:hover {
	background: #2563eb;
}

.btn-back {
	background: #64748b;
}

.btn-back:hover {
	background: #475569;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
}

tr:hover {
	background: #f8fafc;
}

.action {
	display: flex;
	justify-content: center;
	gap: 10px;
}

.btn-edit {
	background: #10b981;
	color: white;
	text-decoration: none;
	padding: 8px 15px;
	border-radius: 6px;
}

.btn-edit:hover {
	background: #059669;
}

.btn-delete {
	background: #ef4444;
	color: white;
	border: none;
	padding: 8px 15px;
	border-radius: 6px;
	cursor: pointer;
}

.btn-delete:hover {
	background: #dc2626;
}

.status {
	font-weight: bold;
}
</style>
</head>

<body>

	<div class="page-card">

		<div class="header">
			<h2>📋 活動訂單管理</h2>

			<div class="header-actions">
				<a th:href="@{/activity/admin/home}" class="btn-back"> 🏠 返回後台首頁 </a>
				<a th:href="@{/activityOrder/addActivityOrder}" class="btn-add">
					➕ 新增訂單 </a>
			</div>
		</div>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>訂單編號</th>
						<th>活動名稱</th>
						<th>會員ID</th>
						<th>訂單狀態</th>
						<th>報名人數</th>
						<th>總金額</th>
						<th>付款方式</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td><span th:each="activity : ${activityListData}"
							th:if="${activity.activityId == order.activityId}"
							th:text="${activity.activityTitle}"> </span></td>

						<td th:text="${order.buyerMemberId}"></td>

						<td><span th:if="${order.orderStatus == 0}" class="status">已完成</span>
							<span th:if="${order.orderStatus == 1}" class="status">已取消</span>
							<span th:if="${order.orderStatus == 2}" class="status">已退款</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td th:text="${order.totalAmount}"></td>

						<td><span th:if="${order.activityPaymentMethod == 0}">信用卡</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM轉帳</span></td>

						<td>
							<div class="action">
								<a class="btn-edit"
									th:href="@{/activityOrder/updateActivityOrder(id=${order.activityOrderId})}">
									修改 </a>

								<form th:action="@{/activityOrder/deleteActivityOrder}"
									method="post">
									<input type="hidden" name="activityOrderId"
										th:value="${order.activityOrderId}">

									<button class="btn-delete" onclick="return confirm('確定刪除？')">
										刪除</button>
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>
</html>
