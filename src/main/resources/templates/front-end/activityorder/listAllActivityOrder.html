<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>&#24460;&#21488;&#35330;&#21934;&#32000;&#37636;</title>
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<style>
body {
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	margin: 0;
	padding: 40px;
}

.page-card {
	background: white;
	max-width: 1400px;
	margin: 0 auto;
	border-radius: 16px;
	padding: 30px 35px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 18px;
	gap: 16px;
}

.header h2 {
	color: #0f172a;
	margin: 0;
}

.employee {
	color: #64748b;
	font-weight: bold;
	margin-bottom: 20px;
}

.toolbar {
	display: flex;
	justify-content: flex-end;
	align-items: center;
	gap: 10px;
	margin-bottom: 16px;
}

.toolbar label {
	color: #475569;
	font-weight: bold;
}

.toolbar select {
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	padding: 9px 12px;
	font: inherit;
	font-weight: bold;
	color: #0f172a;
	background: white;
}

.toolbar button {
	border: 0;
	border-radius: 8px;
	padding: 10px 16px;
	font-weight: bold;
	color: white;
	background: #2563eb;
	cursor: pointer;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.btn-back {
	background: #64748b;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	border-radius: 8px;
	font-weight: bold;
	white-space: nowrap;
}

.table-card {
	width: 100%;
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	background: #e2e8f0;
	padding: 14px;
	text-align: center;
	white-space: nowrap;
}

td {
	padding: 14px;
	text-align: center;
	border-bottom: 1px solid #eee;
	vertical-align: top;
}

.note {
	max-width: 240px;
	text-align: left;
	white-space: pre-wrap;
}

.status {
	padding: 5px 12px;
	border-radius: 20px;
	font-size: 13px;
	font-weight: bold;
	display: inline-block;
	white-space: nowrap;
}

.pending {
	background: #dbeafe;
	color: #1d4ed8;
}

.active {
	background: #dcfce7;
	color: #166534;
}

.cancel {
	background: #fee2e2;
	color: #991b1b;
}

.refund {
	background: #fef3c7;
	color: #92400e;
}

.completed {
	background: #ede9fe;
	color: #5b21b6;
}

.btn-detail {
	color: #2563eb;
	text-decoration: none;
	font-weight: bold;
}

.action-form {
	margin: 0 0 8px;
}

.btn-action {
	border: 0;
	border-radius: 8px;
	color: white;
	cursor: pointer;
	font-weight: bold;
	padding: 8px 14px;
	min-width: 96px;
}

.btn-refund {
	background: #d97706;
}

.btn-payout {
	background: #16a34a;
}
</style>
</head>

<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
	<div class="page-card">
		<div class="header">
			<h2>&#24460;&#21488;&#35330;&#21934;&#32000;&#37636;</h2>
			<a th:href="@{/activity/admin/home}" class="btn-back">&#22238;&#24460;&#21488;&#39318;&#38913;</a>
		</div>

		<div class="employee">
			&#30446;&#21069;&#21729;&#24037;&#65306;<span th:text="${loginEmployeeName}"></span>
			&#65288;&#21729;&#24037;&#32232;&#34399; <span th:text="${loginEmployeeId}"></span>&#65289;
		</div>

		<div th:if="${param.hostReviewOnly}" class="notice error">
			&#22577;&#21517;&#23529;&#26680;&#30001;&#27963;&#21205;&#20027;&#36774;&#20154;&#34389;&#29702;&#65292;&#24460;&#21488;&#21482;&#26597;&#30475;&#35330;&#21934;&#12289;&#36864;&#27454;&#33287;&#25765;&#27454;&#36039;&#35338;&#12290;
		</div>

		<form class="toolbar" th:action="@{/activityOrder/listAllActivityOrder}" method="get">
			<label for="financeStatus">&#25765;&#36864;&#27454;&#29376;&#24907;</label>
			<select id="financeStatus" name="financeStatus">
				<option value="" th:selected="${selectedFinanceStatus == null or selectedFinanceStatus == ''}">&#20840;&#37096;</option>
				<option value="pending" th:selected="${selectedFinanceStatus == 'pending'}">&#24453;&#25765;&#36864;&#27454;</option>
				<option value="done" th:selected="${selectedFinanceStatus == 'done'}">&#24050;&#25765;&#36864;&#27454;</option>
			</select>
			<button type="submit">&#26597;&#35426;</button>
		</form>

		<div class="table-card">
			<table>
				<thead>
					<tr>
						<th>&#35330;&#21934;&#32232;&#34399;</th>
						<th>&#27963;&#21205;&#21517;&#31281;</th>
						<th>&#26371;&#21729;&#32232;&#34399;</th>
						<th>&#35330;&#21934;&#29376;&#24907;</th>
						<th>&#22577;&#21517;&#20154;&#25976;</th>
						<th>&#35330;&#21934;&#37329;&#38989;</th>
						<th>&#22577;&#21517;&#20633;&#35387;</th>
						<th>&#20184;&#27454;&#26041;&#24335;</th>
						<th>&#36864;&#27454; / &#25765;&#27454;</th>
						<th>&#25805;&#20316;</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="order : ${orderListData}">
						<td th:text="${order.activityOrderId}"></td>

						<td>
							<a class="btn-detail"
								th:href="@{/activityOrder/detail(activityOrderId=${order.activityOrderId})}">
								<span th:each="activity : ${activityListData}"
									th:if="${activity.activityId == order.activityId}"
									th:text="${activity.activityTitle}">
								</span>
							</a>
						</td>

						<td th:text="${order.buyerMemberId}"></td>

						<td>
							<span th:if="${order.orderStatus == 2}" class="status pending">&#24453;&#23529;&#26680;</span>
							<span th:if="${order.orderStatus == 3}" class="status pending">&#24453;&#20184;&#27454;</span>
							<span th:if="${order.orderStatus == 0}" class="status active">&#24050;&#20184;&#27454;</span>
							<span th:if="${order.orderStatus == 1}" class="status cancel">&#24050;&#21462;&#28040;</span>
							<span th:if="${order.orderStatus == 4}" class="status completed">&#24050;&#23436;&#25104;</span>
						</td>

						<td th:text="${order.bookingCount}"></td>
						<td>NT$ <span th:text="${order.totalAmount}"></span></td>
						<td class="note" th:text="${order.orderNote ?: '-'}"></td>

						<td>
							<span th:if="${order.activityPaymentMethod == 0}">&#20449;&#29992;&#21345;</span>
							<span th:if="${order.activityPaymentMethod == 1}">ATM&#36681;&#24115;</span>
							<span th:if="${order.activityPaymentMethod == null}">&#26410;&#20184;&#27454;</span>
						</td>

						<td>
							<div>
								<span th:if="${order.refundStatus == 2}" class="status completed">&#24050;&#36864;&#27454;</span>
								<span th:if="${order.refundStatus == 1}" class="status refund">&#24453;&#36864;&#27454;</span>
								<span th:if="${order.orderStatus != 0 and order.orderStatus != 4 and (order.refundStatus == null or order.refundStatus == 0)}" class="status active">&#28961;&#36864;&#27454;</span>
							</div>
							<div th:if="${(order.orderStatus == 0 or order.orderStatus == 4) and order.refundStatus != 2}" style="margin-top: 6px;">
								<span th:if="${order.payoutAmount}" class="status completed">&#24050;&#25765;&#27454;</span>
								<span th:unless="${order.payoutAmount}" class="status refund">&#24453;&#25765;&#27454;</span>
							</div>
						</td>

						<td>
							<form class="action-form" th:if="${order.refundStatus == 1}"
								th:action="@{/activityOrder/confirmRefundFromList}" method="post"
								onsubmit="return confirm('&#30906;&#35469;&#27492;&#35330;&#21934;&#24050;&#23436;&#25104;&#36864;&#27454;&#65311;');">
								<input type="hidden" name="activityOrderId" th:value="${order.activityOrderId}">
								<input type="hidden" name="financeStatus" th:value="${selectedFinanceStatus}">
								<button type="submit" class="btn-action btn-refund">&#30906;&#35469;&#36864;&#27454;</button>
							</form>

							<form class="action-form"
								th:if="${(order.orderStatus == 0 or order.orderStatus == 4) and !order.payoutAmount and (order.refundStatus == null or order.refundStatus == 0)}"
								th:action="@{/activityOrder/confirmPayoutFromList}" method="post"
								onsubmit="return confirm('&#30906;&#35469;&#27492;&#35330;&#21934;&#24050;&#25765;&#27454;&#32102;&#27963;&#21205;&#20027;&#36774;&#20154;&#65311;');">
								<input type="hidden" name="activityOrderId" th:value="${order.activityOrderId}">
								<input type="hidden" name="financeStatus" th:value="${selectedFinanceStatus}">
								<button type="submit" class="btn-action btn-payout">&#30906;&#35469;&#25765;&#27454;</button>
							</form>

							<span th:unless="${order.refundStatus == 1 or ((order.orderStatus == 0 or order.orderStatus == 4) and !order.payoutAmount and (order.refundStatus == null or order.refundStatus == 0))}">-</span>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(orderListData)}">
						<td colspan="10">&#30446;&#21069;&#27794;&#26377;&#35330;&#21934;&#36039;&#26009;</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>
