<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>後台訂單明細</title>
<style>
body {
	margin: 0;
	background: #f8fafc;
	font-family: "Microsoft JhengHei", sans-serif;
	color: #1e293b;
}

.activity-admin-content {
	padding: 40px;
}

.page-card {
	max-width: 1000px;
	margin: 0 auto;
	background: white;
	border-radius: 16px;
	padding: 32px 38px;
	box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 16px;
	margin-bottom: 24px;
}

.header h1 {
	margin: 0;
	color: #0f172a;
}

.btn-back,
.btn-action {
	border: 0;
	border-radius: 8px;
	color: white;
	text-decoration: none;
	padding: 10px 18px;
	font-weight: bold;
	cursor: pointer;
	display: inline-block;
}

.btn-back {
	background: #64748b;
}

.btn-report {
	background: #e11d48;
}

.btn-refund {
	background: #d97706;
}

.btn-payout {
	background: #16a34a;
}

.notice {
	border-radius: 10px;
	padding: 12px 16px;
	margin-bottom: 16px;
	font-weight: bold;
}

.success {
	background: #dcfce7;
	color: #166534;
	border: 1px solid #bbf7d0;
}

.error {
	background: #fee2e2;
	color: #991b1b;
	border: 1px solid #fecaca;
}

.section {
	border-top: 1px solid #e2e8f0;
	padding-top: 22px;
	margin-top: 22px;
}

.section h2 {
	margin: 0 0 14px;
	color: #0f172a;
	font-size: 22px;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
	gap: 14px 22px;
}

.item {
	background: #f8fafc;
	border: 1px solid #e2e8f0;
	border-radius: 10px;
	padding: 14px 16px;
}

.label {
	color: #64748b;
	font-weight: bold;
	font-size: 14px;
	margin-bottom: 6px;
}

.value {
	color: #0f172a;
	font-weight: bold;
	line-height: 1.6;
	white-space: pre-wrap;
}

.actions {
	display: flex;
	gap: 12px;
	flex-wrap: wrap;
	margin-top: 18px;
}

.empty-action {
	color: #64748b;
	font-weight: bold;
}
</style>
<link rel="stylesheet" th:href="@{/css/back-end/activity/activityAdmin.css}">
</head>

<body>
<div class="wb-admin-layout">
	<div th:replace="~{back-end/fragments/adminSidebar :: adminSidebar}"></div>
	<main class="wb-admin-content activity-admin-content">
	<div class="page-card">
		<div class="header">
			<h1>後台訂單明細</h1>
			<div class="actions" style="margin-top: 0;">
				<a th:href="@{/admin/activity/actRptList}" class="btn-action btn-report">活動檢舉審核</a>
				<a th:href="@{/admin/activity/order/listAllActivityOrder}" class="btn-back">回訂單紀錄</a>
			</div>
		</div>

		<div th:if="${param.refundSuccess}" class="notice success">已確認退款完成</div>
		<div th:if="${param.refundFailed}" class="notice error">此訂單目前不符合確認退款條件。</div>
		<div th:if="${param.payoutSuccess}" class="notice success">已確認撥款完成</div>

		<div class="section">
			<h2>訂單資訊</h2>
			<div class="grid">
				<div class="item">
					<div class="label">訂單編號</div>
					<div class="value" th:text="${orderVO.activityOrderId}"></div>
				</div>

				<div class="item">
					<div class="label">訂單狀態</div>
					<div class="value">
						<span th:if="${orderVO.orderStatus == 0}">已付款</span>
						<span th:if="${orderVO.orderStatus == 1}">已取消</span>
						<span th:if="${orderVO.orderStatus == 2}">待審核</span>
						<span th:if="${orderVO.orderStatus == 3}">待付款</span>
						<span th:if="${orderVO.orderStatus == 4}">已完成</span>
					</div>
				</div>

				<div class="item">
					<div class="label">報名會員編號</div>
					<div class="value" th:text="${orderVO.buyerMemberId}"></div>
				</div>

				<div class="item">
					<div class="label">報名人數</div>
					<div class="value" th:text="${orderVO.bookingCount}"></div>
				</div>

				<div class="item">
					<div class="label">訂單金額</div>
					<div class="value">NT$ <span th:text="${orderVO.totalAmount}"></span></div>
				</div>

				<div class="item">
					<div class="label">報名備註</div>
					<div class="value" th:text="${orderVO.orderNote ?: '-'}"></div>
				</div>
			</div>
		</div>

		<div class="section">
			<h2>活動資訊</h2>
			<div class="grid">
				<div class="item">
					<div class="label">活動名稱</div>
					<div class="value" th:text="${activityVO != null ? activityVO.activityTitle : '-'}"></div>
				</div>

				<div class="item">
					<div class="label">主辦會員編號</div>
					<div class="value" th:text="${activityVO != null ? activityVO.memberId : '-'}"></div>
				</div>

				<div class="item">
					<div class="label">活動開始時間</div>
					<div class="value"
						th:text="${activityVO != null && activityVO.startTime != null ? #temporals.format(activityVO.startTime, 'yyyy-MM-dd HH:mm') : '-'}"></div>
				</div>

				<div class="item">
					<div class="label">活動結束時間</div>
					<div class="value"
						th:text="${activityVO != null && activityVO.endTime != null ? #temporals.format(activityVO.endTime, 'yyyy-MM-dd HH:mm') : '-'}"></div>
				</div>
			</div>
		</div>

		<div class="section">
			<h2>付款 / 退款 / 撥款</h2>
			<div class="grid">
				<div class="item">
					<div class="label">付款方式</div>
					<div class="value">
						<span th:if="${orderVO.activityPaymentMethod == 0}">信用卡</span>
						<span th:if="${orderVO.activityPaymentMethod == 1}">ATM轉帳</span>
						<span th:if="${orderVO.activityPaymentMethod == null}">未付款</span>
					</div>
				</div>

				<div class="item">
					<div class="label">付款時間</div>
					<div class="value"
						th:text="${orderVO.paidAt != null ? #temporals.format(orderVO.paidAt, 'yyyy-MM-dd HH:mm:ss') : '-'}"></div>
				</div>

				<div class="item">
					<div class="label">退款狀態</div>
					<div class="value">
						<span th:if="${orderVO.refundStatus == 2}">已退款</span>
						<span th:if="${orderVO.refundStatus == 1}">待退款</span>
						<span th:if="${orderVO.refundStatus == null or orderVO.refundStatus == 0}">無退款</span>
					</div>
				</div>

				<div class="item">
					<div class="label">退款原因</div>
					<div class="value" th:text="${orderVO.refundReason ?: '-'}"></div>
				</div>

				<div class="item">
					<div class="label">撥款狀態</div>
					<div class="value">
						<span th:if="${orderVO.payoutAmount}">已撥款</span>
						<span th:if="${!orderVO.payoutAmount and (orderVO.orderStatus == 0 or orderVO.orderStatus == 4) and orderVO.refundStatus != 2}">待撥款</span>
						<span th:if="${!orderVO.payoutAmount and (orderVO.orderStatus == 1 or orderVO.refundStatus == 2)}">-</span>
						<span th:if="${!orderVO.payoutAmount and orderVO.orderStatus != 0 and orderVO.orderStatus != 1 and orderVO.orderStatus != 4 and orderVO.refundStatus != 2}">-</span>
					</div>
				</div>

				<div class="item">
					<div class="label">完成時間</div>
					<div class="value"
						th:text="${orderVO.activityCompletedAt != null ? #temporals.format(orderVO.activityCompletedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}"></div>
				</div>

				
<div class="item">
					
<div class="label">處理員工編號</div>
					
<div class="value" th:text="${orderVO.employeeId != null ? orderVO.employeeId : '尚未處理'}"></div>
				
</div>
			</div>

			<div class="actions">
				<form th:if="${orderVO.refundStatus == 1}"
					th:action="@{/admin/activity/order/confirmRefund}" method="post"
					onsubmit="return confirm('確認此訂單已完成退款？');">
					<input type="hidden" name="activityOrderId" th:value="${orderVO.activityOrderId}">
					<button type="submit" class="btn-action btn-refund">確認退款</button>
				</form>

				<form th:if="${(orderVO.orderStatus == 0 or orderVO.orderStatus == 4) and !orderVO.payoutAmount and (orderVO.refundStatus == null or orderVO.refundStatus == 0)}"
					th:action="@{/admin/activity/order/confirmPayout}" method="post"
					onsubmit="return confirm('確認此訂單已撥款給活動主辦人？');">
					<input type="hidden" name="activityOrderId" th:value="${orderVO.activityOrderId}">
					<button type="submit" class="btn-action btn-payout">確認撥款</button>
				</form>

				<div class="empty-action"
					th:unless="${orderVO.refundStatus == 1 or ((orderVO.orderStatus == 0 or orderVO.orderStatus == 4) and !orderVO.payoutAmount and (orderVO.refundStatus == null or orderVO.refundStatus == 0))}">
					目前沒有可處理的退款或撥款操作
				</div>
			</div>
		</div>
	</div>
	</main>
</div>
</body>
</html>
