<style>
body {
	background: #f8fafc;
	color: #1e293b;
	font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
	margin: 0;
	padding: 40px;
}

.header-container {
	max-width: 1100px;
	margin: 0 auto 20px auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 2px solid #e2e8f0;
	padding-bottom: 20px;
}

.header-title {
	font-size: 30px;
	font-weight: bold;
}

.btn-secondary {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 10px 18px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}

.form-card {
	background: white;
	max-width: 1100px;
	margin: auto;
	padding: 35px 40px;
	border-radius: 12px;
	box-shadow: 0 4px 8px rgba(0, 0, 0, .08);
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
}

.col-span-2 {
	grid-column: span 2;
}

.form-group {
	display: flex;
	flex-direction: column;
}

.form-group label {
	margin-bottom: 8px;
	font-weight: bold;
}

.required {
	color: red;
}

.form-control {
	width: 100%;
	padding: 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	font-size: 15px;
	box-sizing: border-box;
}

.form-control:focus {
	outline: none;
	border-color: #10b981;
	box-shadow: 0 0 0 3px rgba(16, 185, 129, .15);
}

textarea {
	resize: vertical;
	min-height: 100px;
}

.error {
	color: red;
	font-size: 14px;
	margin-top: 5px;
	font-weight: bold;
}

.input-error {
	border: 2px solid red !important;
}

.section-title {
	grid-column: span 2;
	margin-top: 20px;
	padding-top: 20px;
	border-top: 1px solid #e2e8f0;
	font-size: 20px;
	font-weight: bold;
	color: #0f172a;
}

.form-actions {
	display: flex;
	justify-content: flex-end;
	gap: 12px;
	margin-top: 35px;
	padding-top: 20px;
	border-top: 1px solid #e2e8f0;
}

.btn-submit {
	background: #10b981;
	color: white;
	border: none;
	padding: 12px 24px;
	border-radius: 8px;
	cursor: pointer;
	font-weight: bold;

.btn-cancel {

	border: 1px solid #cbd5e1;
	padding: 12px 24px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}
</style>
