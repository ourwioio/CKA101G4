<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>新增活動訂單</title>

<style>
body {
	background: #f8fafc;
	color: #1e293b;
	font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
	margin: 0;
	padding: 40px;
}

.header-container {
	max-width: 1000px;
	margin: 0 auto 20px auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 2px solid #e2e8f0;
	padding-bottom: 20px;
}

.header-title {
	font-size: 30px;
	font-weight: bold;
}

.btn-secondary {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 10px 18px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}

.btn-secondary:hover {
	background: #f1f5f9;
}

.form-card {
	background: white;
	max-width: 1000px;
	margin: auto;
	padding: 35px 40px;
	border-radius: 12px;
	box-shadow: 0 4px 8px rgba(0, 0, 0, .08);
}

.form-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
}

.col-span-2 {
	grid-column: span 2;
}

.form-group {
	display: flex;
	flex-direction: column;
}

.form-group label {
	margin-bottom: 8px;
	font-weight: bold;
}

.required {
	color: red;
}

.form-control {
	width: 100%;
	padding: 12px;
	border: 1px solid #cbd5e1;
	border-radius: 8px;
	font-size: 15px;
	box-sizing: border-box;
}

.form-control:focus {
	outline: none;
	border-color: #3b82f6;
	box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
}

textarea {
	resize: vertical;
	min-height: 120px;
}

.error {
	color: red;
	font-size: 14px;
	margin-top: 5px;
	font-weight: bold;
}

.input-error {
	border: 2px solid red !important;
}

.form-actions {
	display: flex;
	justify-content: flex-end;
	gap: 12px;
	margin-top: 35px;
	padding-top: 20px;
	border-top: 1px solid #e2e8f0;
}

.btn-submit {
	background: #3b82f6;
	color: white;
	border: none;
	padding: 12px 24px;
	border-radius: 8px;
	cursor: pointer;
	font-weight: bold;
}

.btn-submit:hover {
	background: #2563eb;
}

.btn-cancel {
	background: white;
	color: #475569;
	border: 1px solid #cbd5e1;
	padding: 12px 24px;
	border-radius: 8px;
	text-decoration: none;
	font-weight: bold;
}

.btn-cancel:hover {
	background: #f1f5f9;
}
</style>

</head>

<body>

	<div class="header-container">

		<div class="header-title">➕ 新增活動訂單</div>

		<a th:href="@{/activityOrder/listAllActivityOrder}"
			class="btn-secondary"> 🔙 返回列表 </a>

	</div>

	<div class="form-card">

		<form th:action="@{/activityOrder/insert}"
			th:object="${activityOrderVO}" method="post">

			<div class="form-grid">

				<!-- 活動 -->

				<div class="form-group">

					<label> 活動 <span class="required">*</span>

					</label> <select th:field="*{activityId}" class="form-control"
						th:classappend="${#fields.hasErrors('activityId')} ? ' input-error'">

						<option value="">請選擇活動</option>

						<option th:each="activity:${activityListData}"
							th:value="${activity.activityId}"
							th:text="${activity.activityTitle}"></option>

					</select>

					<div class="error" th:if="${#fields.hasErrors('activityId')}"
						th:errors="*{activityId}"></div>

				</div>

				<!-- 買家會員 -->

				<div class="form-group">

					<label> 買家會員ID <span class="required">*</span>

					</label> <input type="number" th:field="*{buyerMemberId}"
						class="form-control" placeholder="請輸入會員ID"
						th:classappend="${#fields.hasErrors('buyerMemberId')} ? ' input-error'">

					<div class="error" th:if="${#fields.hasErrors('buyerMemberId')}"
						th:errors="*{buyerMemberId}"></div>

				</div>

				<!-- 員工 -->

				<div class="form-group">

					<label> 員工ID </label> <input type="number" th:field="*{employeeId}"
						class="form-control" placeholder="可不填">

				</div>

				<!-- 訂單狀態 -->

				<div class="form-group">

					<label> 訂單狀態 </label> <select th:field="*{orderStatus}"
						class="form-control">

						<option value="0">已完成</option>

						<option value="1">已取消</option>

						<option value="2">已退款</option>

					</select>

				</div>

				<!-- 報名人數 -->

				<div class="form-group">

					<label> 報名人數 <span class="required">*</span>

					</label> <input type="number" th:field="*{bookingCount}"
						class="form-control">

					<div class="error" th:if="${#fields.hasErrors('bookingCount')}"
						th:errors="*{bookingCount}"></div>

				</div>

				<!-- 活動價格 -->

				<div class="form-group">

					<label> 活動價格 <span class="required">*</span>

					</label> <input type="number" th:field="*{activityPrice}"
						class="form-control">

					<div class="error" th:if="${#fields.hasErrors('activityPrice')}"
						th:errors="*{activityPrice}"></div>

				</div>
				<!-- 訂單總金額 -->

				<div class="form-group">

					<label> 訂單總金額 <span class="required">*</span>

					</label> <input type="number" th:field="*{totalAmount}"
						class="form-control">

					<div class="error" th:if="${#fields.hasErrors('totalAmount')}"
						th:errors="*{totalAmount}"></div>

				</div>

				<!-- 付款方式 -->

				<div class="form-group">

					<label> 付款方式 </label> <select th:field="*{activityPaymentMethod}"
						class="form-control">

						<option value="0">信用卡</option>

						<option value="1">ATM轉帳</option>

					</select>

				</div>

				<!-- 訂單備註 -->

				<div class="form-group col-span-2">

					<label> 訂單備註 </label>

					<textarea th:field="*{orderNote}" class="form-control"
						placeholder="請輸入備註...">
    </textarea>

				</div>

			</div>

			<div class="form-actions">

				<a th:href="@{/activityOrder/listAllActivityOrder}"
					class="btn-cancel"> 取消 </a>

				<button type="submit" class="btn-submit">💾 儲存訂單</button>

			</div>

		</form>

	</div>

</body>

</html>
