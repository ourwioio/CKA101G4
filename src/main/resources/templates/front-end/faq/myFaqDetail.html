<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${faqVO.question}">FAQ內容</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
	<div class="container py-5" style="max-width: 800px;">

		<a th:href="@{/faqs}" class="btn btn-link ps-0 mb-3">← 回FAQ列表</a>

		<article>
			<h2 th:text="${faqVO.question}"></h2>
			<p class="text-muted small">
				<span th:text="${faqTypeListData.get(faqVO.faqType)}"></span> <span
					th:if="${faqVO.updatedAt != null and faqVO.createdAt != null and faqVO.updatedAt.isAfter(faqVO.createdAt)}">
					（最後更新：<span
					th:text="${#temporals.format(faqVO.updatedAt, 'yyyy-MM-dd')}"></span>）
				</span>
			</p>

			<hr />

			<p style="white-space: pre-line;" th:text="${faqVO.answer}"></p>
		</article>

	</div>
</body>
</html>
