<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>FAQ</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
	<div class="container py-5">

		<h2 class="mb-4">FAQ</h2>

		<form th:action="@{/faqs}" method="get"
			class="row g-2 mb-4 align-items-center">
			<div class="col-auto">
				<select name="faqType" class="form-select">
					<option value="" th:selected="${searchFaqType == null}">全部類型</option>
					<option th:each="entry : ${faqTypeListData}"
						th:value="${entry.key}" th:text="${entry.value}"
						th:selected="${searchFaqType != null and searchFaqType == entry.key}">
					</option>
				</select>
			</div>
			<div class="col-auto">
				<input type="text" name="keyword" class="form-control"
					placeholder="搜尋問題或答案" th:value="${searchKeyword}" />
			</div>
			<div class="col-auto">
				<button type="submit" class="btn btn-primary">搜尋</button>
			</div>
			<div class="col-auto">
				<a th:href="@{/faqs}" class="btn btn-outline-secondary">清除條件</a>
			</div>
		</form>

		<div class="list-group">
			<a th:each="faq : ${faqListData}"
				th:href="@{/faqs/{id}(id=${faq.faqId})}"
				class="list-group-item list-group-item-action">
				<div class="d-flex justify-content-between align-items-start">
					<h5 class="mb-1" th:text="${faq.question}"></h5>
					<small class="text-muted"
						th:text="${faqTypeListData.get(faq.faqType)}"></small>
				</div>
				<p class="mb-1 text-truncate text-muted" th:text="${faq.answer}"></p>
				<small class="text-muted d-block"
				th:if="${faq.updatedAt != null and faq.createdAt != null and faq.updatedAt.isAfter(faq.createdAt)}"
				th:text="'最後更新：' + ${#temporals.format(faq.updatedAt, 'yyyy-MM-dd')}"></small>
			</a>
		</div>

		<div class="text-muted mt-4" th:if="${#lists.isEmpty(faqListData)}">
			目前沒有符合條件的FAQ。</div>

	</div>
</body>
</html>
