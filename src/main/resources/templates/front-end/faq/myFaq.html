<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常見問題｜Webond</title>

    <!-- Google Fonts -->
<!--     <link rel="preconnect" href="https://fonts.googleapis.com"> -->
<!--     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Webond 前台共用 CSS -->
<!--     <link rel="stylesheet" th:href="@{/css/front-end/service/common.css}"> -->
    <!-- 前台共用 Navbar CSS -->
    <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
    <!-- FAQ 列表專屬 CSS -->
    <link rel="stylesheet" th:href="@{/css/front-end/faq/faqList.css}">

    <style></style>
</head>

<body>

<header th:replace="~{front-end/common/navbar :: navbar}"></header>

<main class="site-main">

    <!-- ========== 頁面標題 ========== -->
    <section class="faq-heading">
        <div>
<!--             <p class="faq-eyebrow">FAQ</p> -->
            <h1 class="page-title">常見問題</h1>
            <p class="faq-description">整理會員最常詢問的問題與解答，找不到答案歡迎聯繫客服。</p>
        </div>
    </section>

    <!-- ========== 搜尋區 (全面改造為自訂下拉選單) ========== -->
    <section class="panel faq-search-panel">
        <div class="faq-search-heading">
            <div>
                <h2>搜尋問題</h2>
                <p>可依問題類型或關鍵字搜尋</p>
            </div>
            <a class="faq-clear-link" th:href="@{/faqs}">清除搜尋</a>
        </div>

        <form class="faq-search-form" th:action="@{/faqs}" method="get">
            
            <!-- 問題類型 (自訂模擬選單結構) -->
            <div class="form-group">
              <label>問題類型</label>
              <div class="custom-select-wrapper">
                <input type="hidden" name="faqType" th:value="${searchFaqType != null ? searchFaqType : ''}">
                <div class="custom-select-trigger">
                  <span class="trigger-text">全部類型</span>
                  <span class="trigger-arrow"></span>
                </div>
                <div class="custom-dropdown-menu">
                  <div class="custom-option" data-value="">全部類型</div>
                  <div class="custom-option" th:each="entry : ${faqTypeListData}"
                       th:data-value="${entry.key}"
                       th:text="${entry.value}">類型</div>
                </div>
              </div>
            </div>

            <!-- 關鍵字搜尋 -->
            <div class="form-group">
                <label>關鍵字搜尋</label>
                <input class="form-control" type="text" name="keyword" placeholder="搜尋問題或答案" th:value="${searchKeyword}">
            </div>

            <button class="btn faq-search-button" type="submit">搜尋</button>
        </form>
    </section>

    <!-- ========== 結果標題 ========== -->
    <div class="faq-result-heading">
        <h2>問題列表</h2>
        <span class="faq-count" th:text="|共 ${#lists.size(faqListData)} 筆|">共 0 筆</span>
    </div>

    <!-- ========== 無資料空狀態 ========== -->
    <section class="faq-empty-state" th:if="${#lists.isEmpty(faqListData)}">
        <div class="faq-empty-icon">？</div>
        <h3>目前沒有符合條件的常見問題</h3>
        <p>可以更換搜尋條件，或重新查看全部問題。</p>
        <a class="btn btn-primary" th:href="@{/faqs}">查看全部問題</a>
    </section>

    <!-- ========== FAQ 卡片網格列表 ========== -->
    <section class="faq-list" th:if="${!#lists.isEmpty(faqListData)}">
        <a class="faq-card" th:each="faq : ${faqListData}" th:href="@{/faqs/{id}(id=${faq.faqId})}">
            <div class="faq-card-inner">
                <div class="faq-card-top">
                    <h3 class="faq-card-question">
                        <span class="faq-card-question-mark">Q</span>
                        <span th:text="${faq.question}">問題內容</span>
                    </h3>
                    <span class="faq-card-type" th:text="${faqTypeListData.get(faq.faqType)}">問題類型</span>
                </div>
                <p class="faq-card-excerpt" th:text="${faq.answer}">答案摘要</p>
                <p class="faq-card-updated"
                   th:if="${faq.updatedAt != null and faq.createdAt != null and faq.updatedAt.isAfter(faq.createdAt)}"
                   th:text="|最後更新：${#temporals.format(faq.updatedAt, 'yyyy-MM-dd')}|">
                    最後更新：2026-07-01
                </p>
            </div>
        </a>
    </section>
</main>

<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>

<!-- ==========================================================
     🌟 核心 JavaScript：控制 FAQ 自訂選單的資料讀取與同步
     ========================================================== -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const selectWrappers = document.querySelectorAll('.custom-select-wrapper');
    
    selectWrappers.forEach(wrapper => {
      const trigger = wrapper.querySelector('.custom-select-trigger');
      const menu = wrapper.querySelector('.custom-dropdown-menu');
      const hiddenInput = wrapper.querySelector('input[type="hidden"]');
      const options = wrapper.querySelectorAll('.custom-option');
      const triggerText = trigger.querySelector('.trigger-text');
      
      // 1. 初始化資料同步
      const defaultValue = hiddenInput.value;
      let hasActiveSelection = false;

      options.forEach(option => {
        if (option.getAttribute('data-value') === defaultValue) {
          option.classList.add('selected');
          triggerText.textContent = option.textContent;
          hasActiveSelection = true;
        } else {
          option.classList.remove('selected');
        }
      });

      if (!hasActiveSelection && options.length > 0) {
        options[0].classList.add('selected');
        triggerText.textContent = options[0].textContent;
      }
      
      // 2. 面板開關
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.toggle('show');
        trigger.classList.toggle('active');
      });
      
      // 3. 選項點擊寫回
      options.forEach(option => {
        option.addEventListener('click', function(e) {
          e.stopPropagation();
          const selectedValue = this.getAttribute('data-value');
          const selectedText = this.textContent;
          hiddenInput.value = selectedValue;
          triggerText.textContent = selectedText;
          options.forEach(opt => opt.classList.remove('selected'));
          this.classList.add('selected');
          menu.classList.remove('show');
          trigger.classList.remove('active');
        });
      });
    });
    
    // 空白處點擊收合
    document.addEventListener('click', function() {
      document.querySelectorAll('.custom-dropdown-menu').forEach(menu => menu.classList.remove('show'));
      document.querySelectorAll('.custom-select-trigger').forEach(trigger => trigger.classList.remove('active'));
    });
  });
</script>

</body>
</html>
