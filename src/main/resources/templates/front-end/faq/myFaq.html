<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>常見問題｜Webond</title>

    <!-- Google Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
          rel="stylesheet">

    <!-- Webond 前台共用 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/service/common.css}">

    <!-- 前台共用 Navbar CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/common/navbar.css}">

    <!-- FAQ 列表專屬 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/faq/faqList.css}">
</head>

<body>

<!-- ==========================================================
     共用固定導覽列
     ========================================================== -->
<header th:replace="~{front-end/common/navbar :: navbar}">
</header>

<!-- ==========================================================
     主要內容
     ========================================================== -->
<main class="site-main">

    <!-- ======================================================
         頁面標題
         ====================================================== -->
    <section class="faq-heading">

        <div>

            <p class="faq-eyebrow">
                FAQ
            </p>

            <h1 class="page-title">
                常見問題
            </h1>

            <p class="faq-description">
                整理會員最常詢問的問題與解答，找不到答案歡迎聯繫客服。
            </p>

        </div>

    </section>

    <!-- ======================================================
         搜尋區
         ====================================================== -->
    <section class="panel faq-search-panel">

        <div class="faq-search-heading">

            <div>

                <h2>
                    搜尋問題
                </h2>

                <p>
                    可依問題類型或關鍵字搜尋
                </p>

            </div>

            <a class="faq-clear-link"
               th:href="@{/faqs}">
                清除搜尋
            </a>

        </div>

        <form class="faq-search-form"
              th:action="@{/faqs}"
              method="get">

            <select class="form-control"
                    name="faqType">

                <option value=""
                        th:selected="${searchFaqType == null}">
                    全部類型
                </option>

                <option th:each="entry : ${faqTypeListData}"
                        th:value="${entry.key}"
                        th:text="${entry.value}"
                        th:selected="${searchFaqType != null
                                       and searchFaqType == entry.key}">
                </option>

            </select>

            <input class="form-control"
                   type="text"
                   name="keyword"
                   placeholder="搜尋問題或答案"
                   th:value="${searchKeyword}">

            <button class="btn faq-search-button"
                    type="submit">
                搜尋
            </button>

        </form>

    </section>

    <!-- ======================================================
         結果標題
         ====================================================== -->
    <div class="faq-result-heading">

        <h2>
            問題列表
        </h2>

        <span class="faq-count"
              th:text="|共 ${#lists.size(faqListData)} 筆|">
            共 0 筆
        </span>

    </div>

    <!-- ======================================================
         無資料
         ====================================================== -->
    <section class="faq-empty-state"
             th:if="${#lists.isEmpty(faqListData)}">

        <div class="faq-empty-icon">
            ？
        </div>

        <h3>
            目前沒有符合條件的常見問題
        </h3>

        <p>
            可以更換搜尋條件，或重新查看全部問題。
        </p>

        <a class="btn btn-primary"
           th:href="@{/faqs}">
            查看全部問題
        </a>

    </section>

    <!-- ======================================================
         FAQ 卡片列表
         ====================================================== -->
    <section class="faq-list"
             th:if="${!#lists.isEmpty(faqListData)}">

        <a class="faq-card"
           th:each="faq : ${faqListData}"
           th:href="@{/faqs/{id}(id=${faq.faqId})}">

            <div class="faq-card-inner">

                <div class="faq-card-top">

                    <h3 class="faq-card-question">

                        <span class="faq-card-question-mark">
                            Q
                        </span>

                        <span th:text="${faq.question}">
                            問題內容
                        </span>

                    </h3>

                    <span class="faq-card-type"
                          th:text="${faqTypeListData.get(faq.faqType)}">
                        問題類型
                    </span>

                </div>

                <p class="faq-card-excerpt"
                   th:text="${faq.answer}">
                    答案摘要
                </p>

                <p class="faq-card-updated"
                   th:if="${faq.updatedAt != null
                            and faq.createdAt != null
                            and faq.updatedAt.isAfter(faq.createdAt)}"
                   th:text="|最後更新：${#temporals.format(
                         faq.updatedAt,
                         'yyyy-MM-dd'
                     )}|">
                    最後更新：2026-07-01
                </p>

            </div>

        </a>

    </section>

</main>

<!-- 共用通知 AJAX 輪詢 -->
<script th:src="@{/js/front-end/common/notificationPolling.js}">
</script>

</body>
</html>
