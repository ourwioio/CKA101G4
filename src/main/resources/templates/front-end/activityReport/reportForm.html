<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>填寫檢舉表單</title>
  <style>
/* ==========================================================
   Webond 活動檢舉表單頁 — 圓潤角色風 (cream / ink / pastel blobs)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap');

:root{
  --color-bg:            #F7F3EC;
  --color-surface:       #FFFFFF;
  --color-surface-soft:  #FFFDF8;
  --color-ink:           #17140F;
  --color-ink-soft:      #726A5F;
  --color-border:        #ECE4D6;

  --color-yellow:       #FFE59A;
  --color-yellow-deep:  #FFC94D;
  --color-pink:         #FFB5C1;
  --color-green:        #B7E1D1;
  --color-blue:         #A9D3FF;
  --color-red:          #FF5271;

  --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
  --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);
}

*{ box-sizing: border-box; }

body {
  margin: 0;
  padding: 40px 20px;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

h1, h2, h3, h4 { font-family: var(--font-display); margin: 0; }
a { text-decoration: none; color: inherit; }

/* ==========================================================
   Q 萌檢舉大卡片
   ========================================================== */
.card {
  background: var(--color-surface);
  padding: 40px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  width: 100%;
  max-width: 520px;
  box-sizing: border-box;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  border-bottom: 2px dashed var(--color-border);
  padding-bottom: 16px;
}

h2 {
  color: var(--color-ink);
  font-size: 22px;
  font-weight: 800;
}

.alert-icon {
  color: var(--color-red); /* 🌟 套用軟萌紅 */
  width: 26px;
  height: 26px;
  flex-shrink: 0;
}

.form-group {
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

label {
  display: block;
  font-weight: 800;
  font-size: 14.5px;
  color: var(--color-ink);
  padding-left: 4px;
}

/* ==========================================================
   🌟 唯讀資訊框：套用沙色灰底風格與字重 600
   ========================================================== */
.readonly-box {
  background-color: #ECE4D6 !important;
  border: 1.5px solid var(--color-border);
  padding: 14px 18px;
  border-radius: var(--radius-md);
  font-size: 14px;
  color: var(--color-ink-soft);
  font-weight: 600; /* 🌟 唯讀狀態字重 600 */
  line-height: 1.7;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.readonly-box strong {
  color: var(--color-ink);
  font-weight: 800;
}

/* ==========================================================
   手寫感輸入框與佐證圖片 (套用全新字重 450 與霧沙墨灰)
   ========================================================== */
.form-control {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 450; /* 🌟 450 柔和字重 */
  color: var(--color-ink-soft); /* 🌟 霧沙墨灰 */
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  outline: none;
  box-sizing: border-box;
  transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
}




.form-control:focus {
  border-color: var(--color-yellow-deep);
  background: var(--color-surface);
  box-shadow: var(--shadow-sm);
}

textarea.form-control {
  resize: none; 
  overflow-y: auto;
  scrollbar-width: none;     
  -ms-overflow-style: none;
}

textarea.form-control::-webkit-scrollbar {
  display: none;
}

input[type="file"].form-control {
  padding: 10px 12px;
  cursor: pointer;
}

/* ==========================================================
   🌟 100% 自訂 Q 萌下拉選單造型 CSS
   ========================================================== */
.custom-select-wrapper {
  position: relative;
  width: 100%;
}

/* 下拉選單觸發按鈕 */
.custom-select-trigger {
  width: 100%;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-ink-soft);
  background: var(--color-surface-soft);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  padding-right: 38px; /* 為箭頭留白 */
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .15s ease, background .15s ease;
  position: relative;
  user-select: none;
}

.custom-select-trigger:hover {
  border-color: var(--color-ink-soft);
}

.custom-select-trigger.active {
  border-color: var(--color-yellow-deep);
  background: var(--color-surface);
  color: var(--color-ink);
}

/* 粗線條微胖小箭頭（展開時旋轉 180 度） */
.custom-select-trigger .trigger-arrow {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2317140F' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
  background-size: contain;
  background-repeat: no-repeat;
  transition: transform .22s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}

.custom-select-trigger.active .trigger-arrow {
  transform: translateY(-50%) rotate(180deg);
}

/* 下拉選項彈出選單（24px 大圓角與陰影效果） */
.custom-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 24px; /* 24px 大圓角 */
  box-shadow: var(--shadow-md); /* 舒適的擴散柔和陰影 */
  padding: 12px;
  z-index: 100;
  max-height: 280px;
  overflow-y: auto;
  scrollbar-width: none; /* 隱藏滾動條 */
  -ms-overflow-style: none; /* 隱藏滾動條 */
}

/* 隱藏 Chrome/Safari 滾動條 */
.custom-dropdown-menu::-webkit-scrollbar {
  display: none;
}

.custom-dropdown-menu.show {
  display: block;
}

/* 下拉選項 */
.custom-option {
  padding: 12px 16px;
  border-radius: var(--radius-md); /* 16px */
  font-size: 14px;
  font-weight: 700;
  color: var(--color-ink-soft);
  cursor: pointer;
  transition: background .15s ease, color .15s ease;
  user-select: none;
}

/* Hover 滑過時：溫和奶油黃底，字體變深 */
.custom-option:hover {
  background: var(--color-surface-soft);
  color: var(--color-ink);
}

/* 選中狀態：精緻暖黃色 */
.custom-option.selected {
  background: var(--color-yellow);
  color: var(--color-ink);
}

/* ==========================================================
   佐證圖片預覽區
   ========================================================== */
.preview-container {
  display: none;
  margin-top: 12px;
  text-align: center;
  background-color: var(--color-surface-soft);
  border: 1.5px dashed var(--color-border);
  border-radius: var(--radius-md);
  padding: 14px;
  position: relative;
}

.preview-image {
  max-width: 100%;
  max-height: 200px;
  border-radius: var(--radius-md);
  object-fit: contain;
}

/* ==========================================================
   Q 萌按鈕區
   ========================================================== */
.btn-group {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 36px;
}

.btn-submit, .btn-cancel {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 14.5px;
  padding: 11px 24px;
  border-radius: var(--radius-full);
  transition: transform .18s ease, box-shadow .18s ease, background .15s ease;
  cursor: pointer;
  border: none;
  text-decoration: none;
  box-sizing: border-box;
}

.btn-submit {
  flex: 2;
  background-color: var(--color-ink);
  color: white;
  box-shadow: var(--shadow-sm);
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  background-color: var(--color-yellow-deep);
  color: var(--color-ink);
}

.btn-cancel {
  flex: 1;
  background-color: var(--color-surface);
  color: var(--color-ink);
  border: 1.5px solid var(--color-border);
  box-shadow: var(--shadow-sm);
}

.btn-cancel:hover {
  transform: translateY(-2px);
  border-color: var(--color-ink);
  box-shadow: var(--shadow-md);
  background-color: var(--color-surface-soft);
}

/* ==========================================================
   檢核與錯誤提示輔助 (極簡無邊框無陰影，字重 700)
   ========================================================== */
.form-helper-bar {
  display: flex;
  justify-content: space-between; 
  align-items: flex-start;
  margin-top: 6px;
}

.error-msg {
  color: var(--color-red);          
  font-size: 13px;         
  margin: 4px 0;
  font-weight: 700;        
  display: inline-flex;           
  align-items: center;     
  gap: 4px;                
  text-align: left;
}

.error-msg::before {
  content: "⚠️";
  font-size: 12px;
}

.char-count-box {
  font-size: 12px;
  color: var(--color-ink-soft);
  white-space: nowrap;     
  margin-left: auto;       
  margin-top: 4px;
  font-weight: 600;
}

/* 檢核錯誤時的輸入框與下拉選單紅框反饋 */
.input-error {
  border-color: var(--color-red) !important;
  background-color: #FFF5F6 !important;
}
  </style>
</head>

<body>

  <div class="card">
    <div class="card-header">
      
      <h2>填寫活動檢舉表單</h2>
    </div>

    <form th:action="@{/activity/rptSubmit}" th:object="${actRptVO}" method="post" enctype="multipart/form-data" id="reportForm">

      <!-- 1. 被檢舉的活動資訊 (唯讀防呆沙色灰盒) -->
      <div class="form-group">
        <label>被檢舉的活動資訊</label>
        <div class="readonly-box">
          <div>
            <strong>活動編號：</strong> <span th:text="*{actId.activityId}"></span>
          </div>
          <div>
            <strong>活動名稱：</strong> <span th:text="*{actId.activityTitle}"></span>
          </div>
          <div>
            <strong>活動主辦人：</strong> <span th:text="${hostUserName}"></span>
          </div>
        </div>

        <input type="hidden" th:field="*{actId.activityId}" />
      </div>

      <!-- 2. 選擇檢舉類型 (已換裝為 100% 自訂 Q 萌下拉選單) -->
      <div class="form-group">
        <label for="rptType">檢舉類型</label> 
        
        <div class="custom-select-wrapper">
          <!-- 與原本的 Thymeleaf 欄位完全對齊綁定 -->
          <input type="hidden" th:field="*{rptType}" required>
          
          <!-- 選單觸發器 -->
          <div class="custom-select-trigger" th:classappend="${#fields.hasErrors('rptType')} ? 'input-error'">
            <span class="trigger-text">-- 請選擇原因 --</span>
            <span class="trigger-arrow"></span>
          </div>
          
          <!-- 下拉自訂選項 -->
          <div class="custom-dropdown-menu">
            <div class="custom-option" data-value="">-- 請選擇原因 --</div>
            <div class="custom-option" data-value="0">詐騙/虛假活動</div>
            <div class="custom-option" data-value="1">色情/不當活動</div>
            <div class="custom-option" data-value="2">暴力/危險活動</div>
            <div class="custom-option" data-value="3">違法行為(聚賭、毒品)</div>
            <div class="custom-option" data-value="4">其他</div>
          </div>
        </div>
        
        <!-- 檢舉類型錯誤訊息顯示 -->
        <span class="error-msg" th:if="${#fields.hasErrors('rptType')}" th:errors="*{rptType}"></span>
      </div>

      <!-- 3. 填寫詳細說明 (字重 450) -->
      <div class="form-group">
        <label for="actRptCom">詳細說明 (最少 10 個字)</label>
        <textarea id="actRptCom" th:field="*{actRptCom}" th:errorclass="input-error" class="form-control" rows="4" 
                  required maxlength="500" 
                  placeholder="請詳細說明檢舉原因，以利管理員加快審核..."
                  oninput="updateCount(this)"></textarea>

        <div class="form-helper-bar">
          <span class="error-msg" th:if="${#fields.hasErrors('actRptCom')}" th:errors="*{actRptCom}"></span>
          <span th:unless="${#fields.hasErrors('actRptCom')}"></span>
          <div class="char-count-box">
            目前字數: <span id="charCount">0</span> / 500
          </div>
        </div>
      </div>

      <!-- 4. 上傳佐證圖片 + 預覽區塊 -->
      <div class="form-group">
        <label for="imageFile">上傳佐證圖片</label> 
        <input type="file" id="imageFile" name="imageFile" accept="image/*" class="form-control"
               th:classappend="${#fields.hasErrors('actRptImg')} ? 'input-error' : ''" 
               onchange="previewImage(this)">

        <!-- 錯誤訊息顯示點 -->
        <span class="error-msg" th:if="${#fields.hasErrors('actRptImg')}" th:errors="*{actRptImg}"></span>

        <div id="previewContainer" class="preview-container">
          <img id="imagePreview" class="preview-image" src="" alt="佐證圖片預覽">
        </div>
      </div>

      <!-- 5. 按鈕操作區 -->
      <div class="btn-group">
        <a th:href="@{/activity/front/detail(id=*{actId.activityId})}" class="btn-cancel">取消返回</a>
        <button type="submit" class="btn-submit" id="submitBtn">提交檢舉</button>
      </div>
    </form>
  </div>

  <!-- ==========================================================
       🌟 核心 JS：自訂下拉控制、圖片預覽、防止連點
       ========================================================== -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 自訂下拉選單互動處理
      const selectWrappers = document.querySelectorAll('.custom-select-wrapper');
      
      selectWrappers.forEach(wrapper => {
        const trigger = wrapper.querySelector('.custom-select-trigger');
        const menu = wrapper.querySelector('.custom-dropdown-menu');
        const hiddenInput = wrapper.querySelector('input[type="hidden"]');
        const options = wrapper.querySelectorAll('.custom-option');
        const triggerText = trigger.querySelector('.trigger-text');
        
        // 1. 初始化預設選中值
        const defaultValue = hiddenInput.value;
        let hasActiveSelection = false;

        options.forEach(option => {
          if (option.getAttribute('data-value') === defaultValue) {
            option.classList.add('selected');
            triggerText.textContent = option.textContent;
            hasActiveSelection = true;
          } else {
            option.classList.remove('selected');
          }
        });

        if (!hasActiveSelection && options.length > 0) {
          options[0].classList.add('selected');
          triggerText.textContent = options[0].textContent;
        }
        
        // 2. 切換選單顯示
        trigger.addEventListener('click', function(e) {
          e.stopPropagation();
          menu.classList.toggle('show');
          trigger.classList.toggle('active');
        });
        
        // 3. 點選選項事件
        options.forEach(option => {
          option.addEventListener('click', function(e) {
            e.stopPropagation();
            
            const selectedValue = this.getAttribute('data-value');
            const selectedText = this.textContent;
            
            hiddenInput.value = selectedValue;
            triggerText.textContent = selectedText;
            
            options.forEach(opt => opt.classList.remove('selected'));
            this.classList.add('selected');
            
            menu.classList.remove('show');
            trigger.classList.remove('active');
            
            hiddenInput.dispatchEvent(new Event('change'));
          });
        });
      });
      
      // 點擊空白處自動關閉選單
      document.addEventListener('click', function() {
        document.querySelectorAll('.custom-dropdown-menu').forEach(menu => menu.classList.remove('show'));
        document.querySelectorAll('.custom-select-trigger').forEach(trigger => trigger.classList.remove('active'));
      });
    });

    // 佐證圖片即時預覽
    function previewImage(input) {
      const container = document.getElementById('previewContainer');
      const preview = document.getElementById('imagePreview');

      if (input.files && input.files[0]) {
        const reader = new FileReader();

        reader.onload = function(e) {
          preview.src = e.target.result;
          container.style.display = 'block';
        }

        reader.readAsDataURL(input.files[0]);
      } else {
        preview.src = '';
        container.style.display = 'none';
      }
    }

    // 計算字數
    function updateCount(textarea) {
      document.getElementById('charCount').innerText = textarea.value.length;
    }

    // 提交檢舉防連點處理
    document.getElementById('reportForm').addEventListener('submit', function() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = '處理中...';
      btn.style.backgroundColor = '#ECE4D6';
      btn.style.color = '#726A5F';
      btn.style.cursor = 'not-allowed';
      btn.style.transform = 'none';
      btn.style.boxShadow = 'none';
    });
  </script>

</body>

</html>
