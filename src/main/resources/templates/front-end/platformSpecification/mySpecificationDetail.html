<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${specVO.title}">規範內容</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
<div class="container py-5" style="max-width: 800px;">

    <a th:href="@{/specifications}" class="btn btn-link ps-0 mb-3">← 回規範列表</a>

    <article>
        <h2 th:text="${specVO.title}"></h2>
        <p class="text-muted small">
            <span th:text="${specTypeListData.get(specVO.specType)}"></span>
            <span th:if="${specVO.updatedAt != null and specVO.createdAt != null and specVO.updatedAt.isAfter(specVO.createdAt)}">
                （最後更新：<span th:text="${#temporals.format(specVO.updatedAt, 'yyyy-MM-dd')}"></span>）
            </span>
        </p>

        <hr/>

        <p style="white-space: pre-line;" th:text="${specVO.description}"></p>
    </article>

</div>
</body>
</html>
