<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>平台規範</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
	<div class="container py-5">

		<h2 class="mb-4">平台規範</h2>

<form th:action="@{/specifications}" method="get" class="row g-2 mb-4 align-items-center">
    <div class="col-auto">
        <select name="specType" class="form-select">
            <option value="" th:selected="${searchSpecType == null}">全部類型</option>
            <option th:each="entry : ${specTypeListData}"
                    th:value="${entry.key}"
                    th:text="${entry.value}"
                    th:selected="${searchSpecType != null and searchSpecType == entry.key}">
            </option>
        </select>
    </div>
    <div class="col-auto">
        <input type="text" name="keyword" class="form-control" placeholder="搜尋標題或內容"
               th:value="${searchKeyword}" />
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">搜尋</button>
    </div>
    <div class="col-auto">
        <a th:href="@{/specifications}" class="btn btn-outline-secondary">清除條件</a>
    </div>
		</form>

		<div class="list-group">
			<a th:each="spec : ${specListData}"
				th:href="@{/specifications/{id}(id=${spec.specId})}"
				class="list-group-item list-group-item-action">
				<div class="d-flex justify-content-between align-items-start">
					<h5 class="mb-1" th:text="${spec.title}"></h5>
					<small class="text-muted"
						th:text="${specTypeListData.get(spec.specType)}"></small>
				</div>
				<p class="mb-1 text-truncate text-muted"
					th:text="${spec.description}"></p> <small
				class="text-muted d-block"
				th:if="${spec.updatedAt != null and spec.createdAt != null and spec.updatedAt.isAfter(spec.createdAt)}"
				th:text="'最後更新：' + ${#temporals.format(spec.updatedAt, 'yyyy-MM-dd')}"></small>
			</a>
		</div>

		<div class="text-muted mt-4" th:if="${#lists.isEmpty(specListData)}">
			目前沒有符合條件的規範。</div>

	</div>
</body>
</html>
