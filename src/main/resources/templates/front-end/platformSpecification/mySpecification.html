<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>平台規範｜Webond</title>

    <!-- Google Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
          rel="stylesheet">

    <!-- Webond 前台共用 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/service/common.css}">

    <!-- 前台共用 Navbar CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/common/navbar.css}">

    <!-- 平台規範列表專屬 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/front-end/platformSpecification/specList.css}">
</head>

<body>

<!-- ==========================================================
     共用固定導覽列
     ========================================================== -->
<header th:replace="~{front-end/common/navbar :: navbar}">
</header>

<!-- ==========================================================
     主要內容
     ========================================================== -->
<main class="site-main">

    <!-- ======================================================
         頁面標題
         ====================================================== -->
    <section class="spec-heading">

        <div>

            <p class="spec-eyebrow">
                Platform Specification
            </p>

            <h1 class="page-title">
                平台規範
            </h1>

            <p class="spec-description">
                使用 Webond 前，請詳閱平台規範以保障自身與其他會員的權益。
            </p>

        </div>

    </section>

    <!-- ======================================================
         搜尋區
         ====================================================== -->
    <section class="panel spec-search-panel">

        <div class="spec-search-heading">

            <div>

                <h2>
                    搜尋規範
                </h2>

                <p>
                    可依規範類型或關鍵字搜尋
                </p>

            </div>

            <a class="spec-clear-link"
               th:href="@{/specifications}">
                清除搜尋
            </a>

        </div>

        <form class="spec-search-form"
              th:action="@{/specifications}"
              method="get">

            <select class="form-control"
                    name="specType">

                <option value=""
                        th:selected="${searchSpecType == null}">
                    全部類型
                </option>

                <option th:each="entry : ${specTypeListData}"
                        th:value="${entry.key}"
                        th:text="${entry.value}"
                        th:selected="${searchSpecType != null
                                       and searchSpecType == entry.key}">
                </option>

            </select>

            <input class="form-control"
                   type="text"
                   name="keyword"
                   placeholder="搜尋標題或內容"
                   th:value="${searchKeyword}">

            <button class="btn spec-search-button"
                    type="submit">
                搜尋
            </button>

        </form>

    </section>

    <!-- ======================================================
         結果標題
         ====================================================== -->
    <div class="spec-result-heading">

        <h2>
            規範列表
        </h2>

        <span class="spec-count"
              th:text="|共 ${#lists.size(specListData)} 筆|">
            共 0 筆
        </span>

    </div>

    <!-- ======================================================
         無資料
         ====================================================== -->
    <section class="spec-empty-state"
             th:if="${#lists.isEmpty(specListData)}">

        <div class="spec-empty-icon">
            ☰
        </div>

        <h3>
            目前沒有符合條件的規範
        </h3>

        <p>
            可以更換搜尋條件，或重新查看全部規範。
        </p>

        <a class="btn btn-primary"
           th:href="@{/specifications}">
            查看全部規範
        </a>

    </section>

    <!-- ======================================================
         規範卡片列表
         ====================================================== -->
    <section class="spec-list"
             th:if="${!#lists.isEmpty(specListData)}">

        <a class="spec-card"
           th:each="spec : ${specListData}"
           th:href="@{/specifications/{id}(id=${spec.specId})}">

            <div class="spec-card-inner">

                <div class="spec-card-top">

                    <h3 class="spec-card-title"
                        th:text="${spec.title}">
                        規範標題
                    </h3>

                    <span class="spec-card-type"
                          th:text="${specTypeListData.get(spec.specType)}">
                        規範類型
                    </span>

                </div>

                <p class="spec-card-excerpt"
                   th:text="${spec.description}">
                    規範內容摘要
                </p>

                <p class="spec-card-updated"
                   th:if="${spec.updatedAt != null
                            and spec.createdAt != null
                            and spec.updatedAt.isAfter(spec.createdAt)}"
                   th:text="|最後更新：${#temporals.format(
                         spec.updatedAt,
                         'yyyy-MM-dd'
                     )}|">
                    最後更新：2026-07-01
                </p>

            </div>

        </a>

    </section>

</main>

<!-- 共用通知 AJAX 輪詢 -->
<script th:src="@{/js/front-end/common/notificationPolling.js}">
</script>

</body>
</html>
