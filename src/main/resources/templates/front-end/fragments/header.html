<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<body>

<header class="site-header"
        th:fragment="frontHeader">

    <div class="header-inner">

        <!-- ==================================================
             Logo
             ================================================== -->
        <a class="logo"
           th:href="@{/}">

            <span class="logo-mark">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">

                    <path d="M3 11l9-7 9 7"></path>

                    <path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4
                             a1 1 0 0 0 1-1v-9">
                    </path>

                </svg>

            </span>

            <span class="logo-text">

                <span class="logo-title">
                    Webond
                </span>

                <span class="logo-sub">
                    閒人出租
                </span>

            </span>

        </a>

        <!-- ==================================================
             右側功能區
             聊天室 / 通知 / 自己的頁面
             ================================================== -->
        <nav class="header-actions">

            <!-- ==================================================
                 聊天室
                 目前尚未接聊天室路由時先保留停用狀態
                 ================================================== -->
            <a class="icon-btn icon-btn--chat"
               th:if="${session.memberVO != null}"
               href="javascript:void(0);"
               title="聊天室"
               aria-disabled="true">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">

                    <path d="M21 11.5
                             a8.38 8.38 0 0 1-.9 3.8
                             a8.5 8.5 0 0 1-7.6 4.7
                             a8.38 8.38 0 0 1-3.8-.9
                             L3 21
                             l1.9-5.7
                             a8.38 8.38 0 0 1-.9-3.8
                             a8.5 8.5 0 0 1 4.7-7.6
                             a8.38 8.38 0 0 1 3.8-.9
                             h.5
                             a8.48 8.48 0 0 1 8 8
                             v.5z">
                    </path>

                </svg>

                <!-- 聊天未讀數尚未串接時先不顯示 -->
                <!--
                <span class="icon-badge icon-badge--chat">
                    0
                </span>
                -->

            </a>

            <!-- ==================================================
                 通知
                 ================================================== -->
            <a class="icon-btn icon-btn--notify"
               th:if="${session.memberVO != null}"
               th:href="@{/front/notification/listAllNotification}"
               th:attr="data-unread-url=@{/front/notification/unread-count}"
               title="通知">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">

                    <path d="M18 8
                             a6 6 0 0 0-12 0
                             c0 7-3 9-3 9
                             h18
                             s-3-2-3-9">
                    </path>

                    <path d="M13.73 21
                             a2 2 0 0 1-3.46 0">
                    </path>

                </svg>

                <!-- 初次載入時由 Thymeleaf 顯示 -->
                <span class="icon-badge icon-badge--unread"
                      th:if="${unreadNotificationCount != null
                               and unreadNotificationCount > 0}"
                      th:text="${unreadNotificationCount > 99
                               ? '99+'
                               : unreadNotificationCount}">
                </span>

            </a>

            <!-- ==================================================
                 已登入：自己的頁面
                 ================================================== -->
            <a class="icon-btn icon-btn--member"
               th:if="${session.memberVO != null}"
               th:href="@{/front/memberPage/my(
                            memberId=${session.memberVO.memberId}
                        )}"
               title="自己的頁面">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">

                    <path d="M20 21v-2
                             a4 4 0 0 0-4-4
                             H8
                             a4 4 0 0 0-4 4
                             v2">
                    </path>

                    <circle cx="12"
                            cy="7"
                            r="4">
                    </circle>

                </svg>

            </a>

            <!-- ==================================================
                 未登入：前往登入
                 ================================================== -->
            <a class="icon-btn icon-btn--member"
               th:if="${session.memberVO == null}"
               th:href="@{/member/login}"
               title="登入">

                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true">

                    <path d="M20 21v-2
                             a4 4 0 0 0-4-4
                             H8
                             a4 4 0 0 0-4 4
                             v2">
                    </path>

                    <circle cx="12"
                            cy="7"
                            r="4">
                    </circle>

                </svg>

            </a>

        </nav>

    </div>

</header>

</body>
</html>
