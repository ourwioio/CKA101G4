<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${bulletinVO.title}">公告內容</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
  <script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
</head>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>
<body>
<div class="container py-5" style="max-width: 800px;">

    <a th:href="@{/announcements}" class="btn btn-link ps-0 mb-3">← 回公告列表</a>

    <article>
        <h2 th:text="${bulletinVO.title}"></h2>
        <p class="text-muted small">
            發布日期：<span th:text="${bulletinVO.publishDate}"></span>
            <span th:if="${bulletinVO.updatedAt != null and bulletinVO.updatedAt.isAfter(bulletinVO.createdAt)}">
                （最後更新：<span th:text="${#temporals.format(bulletinVO.updatedAt, 'yyyy-MM-dd')}"></span>）
            </span>
        </p>

        <hr/>

        <p style="white-space: pre-line;" th:text="${bulletinVO.content}"></p>

        <p class="text-muted small mt-4" th:if="${bulletinVO.tags != null}">
            標籤：<span th:text="${bulletinVO.tags}"></span>
        </p>
    </article>

</div>
</body>
</html>
