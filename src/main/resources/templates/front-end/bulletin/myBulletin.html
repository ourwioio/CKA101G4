<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>最新公告</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">

    <h2 class="mb-4">最新公告</h2>

    <form th:action="@{/announcements}" method="get" class="row g-2 mb-4 align-items-center">
        <div class="col-auto">
            <input type="text" name="keyword" class="form-control" placeholder="搜尋標題或標籤"
                   th:value="${searchKeyword}" />
        </div>
        <div class="col-auto">
            <label class="col-form-label">發布日期</label>
        </div>
        <div class="col-auto">
            <input type="date" name="startDate" class="form-control" th:value="${searchStartDate}" />
        </div>
        <div class="col-auto">～</div>
        <div class="col-auto">
            <input type="date" name="endDate" class="form-control" th:value="${searchEndDate}" />
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">搜尋</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/announcements}" class="btn btn-outline-secondary">清除條件</a>
        </div>
    </form>

    <div class="list-group">
        <a th:each="bulletin : ${bulletinListData}"
           th:href="@{/announcements/{id}(id=${bulletin.bulletinId})}"
           class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between align-items-start">
                <h5 class="mb-1" th:text="${bulletin.title}"></h5>
                <small class="text-muted" th:text="${bulletin.publishDate}"></small>
            </div>
            <p class="mb-1 text-truncate text-muted" th:text="${bulletin.content}"></p>
            <small class="text-muted" th:if="${bulletin.tags != null}" th:text="'標籤：' + ${bulletin.tags}"></small>
            <small class="text-muted d-block"
                   th:if="${bulletin.updatedAt != null and bulletin.updatedAt.isAfter(bulletin.createdAt)}"
                   th:text="'最後更新：' + ${#temporals.format(bulletin.updatedAt, 'yyyy-MM-dd')}"></small>
        </a>
    </div>

    <div class="text-muted mt-4" th:if="${#lists.isEmpty(bulletinListData)}">
        目前沒有符合條件的公告。
    </div>

</div>
</body>
</html>
