<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>檢舉場地</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">

	<div class="container py-5" style="max-width: 720px;">

		<a th:href="@{/front/venueOrder/myVenueOrder}"
			class="btn btn-link ps-0 mb-3 text-decoration-none">← 返回我的場地訂單</a>

		<h3 class="mb-4">檢舉場地</h3>

		<div th:if="${errorMsg}" class="alert alert-danger" role="alert"
			th:text="${errorMsg}"></div>

		<!-- 訂單資訊 -->
		<div class="card mb-3">
			<div class="card-body">
				<h6 class="text-muted mb-3" style="font-size: .85rem;">檢舉對象</h6>
				<dl class="row mb-0" style="font-size: .95rem;">
					<dt class="col-4 col-sm-3 text-muted fw-normal">訂單編號</dt>
					<dd class="col-8 col-sm-9" th:text="'#' + ${venueOrderVO.venueOrderId}"></dd>

					<dt class="col-4 col-sm-3 text-muted fw-normal">場地名稱</dt>
					<dd class="col-8 col-sm-9 fw-semibold"
						th:text="${venueVO != null ? venueVO.venueName : '-'}"></dd>

					<dt class="col-4 col-sm-3 text-muted fw-normal">場地地址</dt>
					<dd class="col-8 col-sm-9"
						th:text="${venueVO != null ? venueVO.address : '-'}"></dd>

					<dt class="col-4 col-sm-3 text-muted fw-normal">預約日期</dt>
					<dd class="col-8 col-sm-9"
						th:text="${venueOrderVO.bookDate != null ? venueOrderVO.bookDate : '-'}"></dd>

					<dt class="col-4 col-sm-3 text-muted fw-normal">預約時段</dt>
					<dd class="col-8 col-sm-9"
						th:text="${venueOrderVO.startAt != null ? venueOrderVO.startAt + ' ～ ' + venueOrderVO.endAt : '-'}"></dd>

					<dt class="col-4 col-sm-3 text-muted fw-normal">訂單金額</dt>
					<dd class="col-8 col-sm-9 mb-0"
						th:text="${venueOrderVO.totalAmount != null ? 'NT$ ' + venueOrderVO.totalAmount : '-'}"></dd>
				</dl>
			</div>
		</div>

		<!-- 檢舉表單 -->
		<div class="card">
			<div class="card-body">
				<form th:action="@{/venueReports/insert}" method="post" id="reportForm">
					<input type="hidden" name="venueOrderId"
						th:value="${venueOrderVO.venueOrderId}" />

					<div class="mb-3">
						<label for="serReportCom" class="form-label fw-semibold">
							檢舉內容 <span class="text-danger">*</span>
						</label>
						<textarea class="form-control" name="serReportCom"
							id="serReportCom" rows="6" maxlength="500" required
							placeholder="請具體描述您遇到的問題，例如：場地與網站描述不符、環境髒亂、設備損壞無法使用等。"></textarea>
						<div class="d-flex justify-content-between mt-1">
							<div class="form-text">送出後將由平台人員審核，請確保內容屬實。</div>
							<div class="form-text">
								<span id="charCount">0</span> / 500
							</div>
						</div>
					</div>

					<div class="alert alert-warning small">
						檢舉一經送出即進入審核流程，同一筆訂單在審核期間無法重複提出。<br>
						若檢舉成立，該場地將暫時下架並要求提供者改善。
					</div>

					<div class="d-flex justify-content-end gap-2">
						<a th:href="@{/front/venueOrder/myVenueOrder}" class="btn btn-secondary">取消</a>
						<button type="submit" class="btn btn-danger">送出檢舉</button>
					</div>
				</form>
			</div>
		</div>

	</div>

	<script>
		const reportTextarea = document.getElementById('serReportCom');
		const charCount = document.getElementById('charCount');

		reportTextarea.addEventListener('input', function () {
			charCount.textContent = this.value.length;
		});

		document.getElementById('reportForm').addEventListener('submit', function (e) {
			if (!reportTextarea.value.trim()) {
				e.preventDefault();
				alert('請填寫檢舉內容！');
				return;
			}
			if (!confirm('確定送出檢舉？送出後將由平台人員進行審核。')) {
				e.preventDefault();
			}
		});
	</script>

</body>
</html>
