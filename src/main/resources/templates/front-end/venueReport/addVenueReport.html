<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>檢舉場地</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
<script th:src="@{/js/front-end/common/notificationPolling.js}"></script>
<link rel="stylesheet" th:href="@{/css/front-end/venueReport/addVenueReport.css}">
</head>
<body>
<div th:replace="~{front-end/common/navbar :: navbar}"></div>

<main class="form-page">

	<a class="back-link" th:href="@{/front/venueOrder/myVenueOrder}">← 返回我的場地訂單</a>

	<h1 class="page-title">檢舉場地</h1>

	<div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

	<div class="card info-card">
		<div class="info-card__label">檢舉對象</div>
		<div class="info-list">
			<div class="info-row">
				<span class="info-label">訂單編號</span>
				<span class="info-value" th:text="'#' + ${venueOrderVO.venueOrderId}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">場地名稱</span>
				<span class="info-value" th:text="${venueVO != null ? venueVO.venueName : '-'}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">場地地址</span>
				<span class="info-value" th:text="${venueVO != null ? venueVO.address : '-'}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">預約日期</span>
				<span class="info-value" th:text="${venueOrderVO.bookDate != null ? venueOrderVO.bookDate : '-'}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">預約時段</span>
				<span class="info-value" th:text="${venueOrderVO.startAt != null ? venueOrderVO.startAt + ' ～ ' + venueOrderVO.endAt : '-'}"></span>
			</div>
			<div class="info-row">
				<span class="info-label">訂單金額</span>
				<span class="info-value" th:text="${venueOrderVO.totalAmount != null ? 'NT$ ' + venueOrderVO.totalAmount : '-'}"></span>
			</div>
		</div>
	</div>

	<div class="card">
		<form th:action="@{/venueReports/insert}" method="post" id="reportForm">
			<input type="hidden" name="venueOrderId" th:value="${venueOrderVO.venueOrderId}" />

			<div class="form-group">
				<label for="serReportCom">檢舉內容 <span class="required">*</span></label>
				<textarea name="serReportCom" id="serReportCom" rows="6" maxlength="500" required
					placeholder="請具體描述您遇到的問題，例如：場地與網站描述不符、環境髒亂、設備損壞無法使用等。"></textarea>
				<div class="form-hint-row">
					<span class="form-hint">送出後將由平台人員審核，請確保內容屬實。</span>
					<span class="form-hint"><span id="charCount">0</span> / 500</span>
				</div>
			</div>

			<div class="alert alert-warning">
				檢舉一經送出即進入審核流程，同一筆訂單在審核期間無法重複提出。<br>
				若檢舉成立，該場地將暫時下架並要求提供者改善。
			</div>

			<div class="btn-row">
				<a th:href="@{/front/venueOrder/myVenueOrder}" class="btn-back">取消</a>
				<button type="submit" class="btn-danger">送出檢舉</button>
			</div>
		</form>
	</div>

</main>

<script th:src="@{/js/front-end/venueReport/addVenueReport.js}"></script>
</body>
</html>
