<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一對一服務列表｜Webond</title>

    <!-- Google Fonts -->
<!--     <link rel="preconnect" href="https://fonts.googleapis.com"> -->
<!--     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Service 前台共用 CSS -->
<!--     <link rel="stylesheet" th:href="@{/css/front-end/service/common.css}"> -->
    <!-- 前台共用 Navbar CSS -->
    <link rel="stylesheet" th:href="@{/css/front-end/common/navbar.css}">
    <!-- 服務列表專屬 CSS -->
<!--     <link rel="stylesheet" th:href="@{/css/front-end/service/serviceList.css}"> -->

    <style>
        /* ==========================================================
           Webond 服務列表頁 — 圓潤角色風風格融合
           ========================================================== */
        :root {
            --color-bg:            #F7F3EC;
            --color-surface:       #FFFFFF;
            --color-surface-soft:  #FFFDF8;
            --color-ink:           #17140F;
            --color-ink-soft:      #726A5F;
            --color-border:        #ECE4D6;

            --color-yellow:       #FFE59A;
            --color-yellow-deep:  #FFC94D;
            --color-pink:         #FFB5C1;
            --color-green:        #B7E1D1;
            --color-blue:         #A9D3FF;
            --color-red:          #FF5271;

            --font-display: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
            --font-body:    'Noto Sans TC', 'M PLUS Rounded 1c', sans-serif;

            --radius-lg: 26px;
            --radius-md: 16px;
            --radius-full: 999px;

            --shadow-sm: 0 3px 10px rgba(23, 20, 15, 0.06);
            --shadow-md: 0 14px 34px rgba(23, 20, 15, 0.10);

            --nav-height: 76px;
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); margin: 0; }
        a { text-decoration: none; color: inherit; }

        .site-main {
            max-width: 1200px;
            margin: calc(var(--nav-height) + 40px) auto 60px;
            padding: 0 20px;
        }

        /* ==========================================================
           頂部大標頭區
           ========================================================== */
        .service-page-heading {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 32px;
        }

        .service-page-eyebrow {
            font-size: 13px;
            font-weight: 800;
            color: var(--color-ink-soft);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 4px 0;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--color-ink);
            position: relative;
            padding-left: 18px;
            margin: 0 0 6px 0;
        }
        .page-title::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--color-yellow-deep);
        }

        .service-page-description {
            font-size: 14px;
            color: var(--color-ink-soft);
            margin: 0;
            font-weight: 500;
        }

        /* 藥丸捷徑按鈕 */
        .service-login-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-ink-soft);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface);
            color: var(--color-ink);
            border: 1.5px solid var(--color-border);
            font-weight: 800;
            font-size: 13.5px;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-sm);
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
            cursor: pointer;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            border-color: var(--color-ink);
            box-shadow: var(--shadow-md);
            background: var(--color-surface-soft);
        }

        /* 訊息提示框 */
        .alert {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 14.5px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .alert-success { background: var(--color-green); color: var(--color-ink); border: 1px solid rgba(0,0,0,0.05); }
        .alert-error { background: var(--color-pink); color: var(--color-ink); border: 1px solid rgba(0,0,0,0.05); }

        /* ==========================================================
           側邊欄與主要內容佈局
           ========================================================== */
        .service-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
            align-items: flex-start;
        }

        .panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 24px;
        }

        /* 左側服務分類 */
        .service-category-panel {
            position: sticky;
            top: calc(var(--nav-height) + 20px);
        }

        .service-category-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--color-ink);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1.5px solid var(--color-bg);
        }

        .service-category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .service-category-item {
            display: block;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14.5px;
            font-weight: 700;
            color: var(--color-ink-soft);
            transition: background .15s ease, color .15s ease, transform .15s ease;
        }
        .service-category-item:hover {
            background: var(--color-surface-soft);
            color: var(--color-ink);
            transform: translateX(3px);
        }
        .service-category-item.active {
            background: var(--color-yellow);
            color: var(--color-ink);
            font-weight: 800;
        }

        /* 右側搜尋面板 */
        .service-search-panel {
            margin-bottom: 32px;
        }

        .service-search-heading {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .service-search-heading h2 { font-size: 18px; font-weight: 800; }
        .service-search-heading p { font-size: 13px; color: var(--color-ink-soft); margin: 2px 0 0 0; font-weight: 600; }

        .service-clear-link {
            font-size: 13px;
            font-weight: 800;
            color: var(--color-ink-soft);
            text-decoration: none;
            transition: color .15s ease;
        }
        .service-clear-link:hover { color: var(--color-red); }

        .service-search-form {
            display: flex;
            gap: 12px;
        }

        .form-control {
            flex-grow: 1;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            color: var(--color-ink);
            background: var(--color-surface-soft);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            outline: none;
            transition: border-color .15s ease, background .15s ease;
        }
        .form-control:focus {
            border-color: var(--color-yellow-deep);
            background: var(--color-surface);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            font-weight: 800;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            transition: transform .18s ease, box-shadow .18s ease, background .15s ease;
            cursor: pointer;
            border: none;
        }
        .service-search-button {
            background: var(--color-ink);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }
        .service-search-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: var(--color-yellow-deep);
            color: var(--color-ink);
        }

        /* 結果狀態列 */
        .service-result-heading {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .service-result-heading h2 { font-size: 18px; font-weight: 800; }
        .service-result-heading p { font-size: 13.5px; color: var(--color-ink-soft); margin: 4px 0 0 0; font-weight: 600; }
        .service-result-count { font-size: 13.5px; color: var(--color-ink-soft); font-weight: 800; }

        /* ==========================================================
           服務卡片網格 (防跑版優化版)
           ========================================================== */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .service-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform .2s ease, box-shadow .2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }
        .service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }

        /* 圖片容器 */
        .service-card-image-wrap {
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            position: relative;
            display: block;
        }
        .service-card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--color-surface-soft);
            display: block;
            transition: transform .35s ease;
        }
        .service-card:hover .service-card-image { transform: scale(1.04); }

        /* 🌟 完美移至整張卡片最右上角的服務類型徽章 */
        .service-type-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 3;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 10px;
            white-space: nowrap;
            background: var(--color-blue);
            color: var(--color-ink);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .service-card-body {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 20px;
        }

        /* 🌟 【區塊一】名稱與縣市地點：強制定高 104px 完美對齊 */
        .card__header-group {
            height: 104px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        .service-card-title {
            margin: 0 0 6px 0;
        }
        .service-card-title a {
            font-size: 15.5px;
            font-weight: 800;
            color: var(--color-ink);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .service-card-location, .service-card-place {
            font-size: 12.5px;
            color: var(--color-ink-soft);
            font-weight: 400;
            margin: 0 0 2px 0;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .service-location-icon::before { content: '📍'; font-size: 12px; }

        /* 🌟 【區塊二】提供者：強制定高 36px 虛線分隔線 */
        .meta {
            border-top: 1px dashed var(--color-border);
            padding-top: 10px;
            height: 36px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .service-card-provider {
            margin: 0;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--color-ink-soft);
        }
        .service-provider-link span {
            color: var(--color-ink);
            font-weight: 800;
        }
        .service-provider-link:hover span {
            color: var(--color-yellow-deep);
            text-decoration: none;
        }

        /* 價格與詳情按鈕 */
        .service-card-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .service-price {
            font-family: var(--font-display);
            color: var(--color-ink);
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .service-price-currency { font-size: 11px; font-weight: 800; color: var(--color-ink-soft); }
        .service-price strong { font-size: 19px; font-weight: 800; }
        .service-price span:last-child { font-size: 11px; font-weight: 700; color: var(--color-ink-soft); }

        .service-detail-button {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12.5px;
            font-weight: 800;
            color: var(--color-ink);
            background: var(--color-yellow);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            transition: background .15s ease, transform .15s ease;
        }
        .service-card:hover .service-detail-button {
            background: var(--color-yellow-deep);
            transform: translateX(2px);
        }

        /* 空狀態樣式 */
        .service-empty-state {
            background: var(--color-surface-soft);
            border: 1.5px dashed var(--color-border);
            border-radius: var(--radius-lg);
            padding: 54px 24px;
            text-align: center;
            color: var(--color-ink-soft);
        }
        .service-empty-icon { font-size: 40px; margin-bottom: 12px; }
        .service-empty-state h3 { font-size: 16.5px; font-weight: 800; color: var(--color-ink); margin: 0 0 8px 0; }
        .service-empty-state p { font-size: 14px; margin: 0 0 20px 0; font-weight: 600; }
        .service-empty-state .btn-primary {
            background: var(--color-ink); color: #fff; font-weight: 800;
        }
        .service-empty-state .btn-primary:hover {
            background: var(--color-yellow-deep); color: var(--color-ink); transform: translateY(-2px);
        }

        /* ==========================================================
           RWD 響應式斷點設定
           ========================================================== */
        @media (max-width: 1140px) {
            .service-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 880px) {
            .service-layout { grid-template-columns: 1fr; gap: 24px; }
            .service-category-panel { position: static; }
            .service-page-heading { flex-direction: column; align-items: flex-start; gap: 14px; }
            .service-login-status { width: 100%; justify-content: flex-start; }
        }
        @media (max-width: 580px) {
            .service-grid { grid-template-columns: 1fr; }
            .service-search-form { flex-direction: column; }
            .service-search-button { width: 100%; }
        }
    </style>
</head>

<body>

<!-- ==========================================================
     共用固定導覽列
     ========================================================== -->
<header th:replace="~{front-end/common/navbar :: navbar}">
</header>

<!-- ==========================================================
     主要內容
     ========================================================== -->
<main class="site-main">

    <!-- ======================================================
         頁面標題
         ====================================================== -->
    <section class="service-page-heading">

        <div>
<!--             <p class="service-page-eyebrow"> -->
<!--                 個人出租 -->
<!--             </p> -->
            <h1 class="page-title">
                一對一服務列表
            </h1>
            <p class="service-page-description">
                依照服務類型或關鍵字，尋找適合你的陪伴服務。
            </p>
        </div>

        <!-- ==================================================
             會員登入狀態 (套用全新膠囊藥丸風樣式)
             ================================================== -->
        <div class="service-login-status">

            <!-- 已登入 -->
            
            <span>
                <a th:if="${session.memberVO != null}"  class="back-btn" th:href="@{/member/services}">
                   服務管理
                </a>
            </span>

            <!-- 未登入 -->
<!--             <span th:if="${session.memberVO == null}"> -->
<!--                 尚未登入 ｜ -->
<!--                 <a th:href="@{/member/login}" style="color: var(--color-ink); font-weight: 800; text-decoration: underline;"> -->
<!--                     前往登入 -->
<!--                 </a> -->
<!--             </span> -->

        </div>

    </section>

    <!-- ======================================================
         成功與錯誤訊息
         ====================================================== -->
    <div class="alert alert-success" th:if="${successMsg != null}" th:text="${successMsg}">操作成功</div>
    <div class="alert alert-error" th:if="${errorMsg != null}" th:text="${errorMsg}">錯誤訊息</div>

    <!-- ======================================================
         左側分類 + 右側內容
         ====================================================== -->
    <div class="service-layout">

        <!-- ==================================================
             左側服務分類
             ================================================== -->
        <aside class="panel service-category-panel">
            <h2 class="service-category-title">
                服務類型
            </h2>
            <nav class="service-category-list">
                <!-- 全部服務 -->
                <a class="service-category-item"
                   th:classappend="${selectedServiceTypeId == null} ? ' active' : ''"
                   th:href="@{/front/services}">
                    全部服務
                </a>
                <!-- 各服務類型 -->
                <a class="service-category-item"
                   th:each="type : ${serviceTypeList}"
                   th:href="@{/front/services/type/{id}(id=${type.svcTypeID})}"
                   th:text="${type.typeName}"
                   th:classappend="${selectedServiceTypeId != null and selectedServiceTypeId == type.svcTypeID} ? ' active' : ''">
                    服務類型名稱
                </a>
            </nav>
        </aside>

        <!-- ==================================================
             右側服務內容
             ================================================== -->
        <section class="service-content">

            <!-- ==================================================
                 搜尋區
                 ================================================== -->
            <section class="panel service-search-panel">
                <div class="service-search-heading">
                    <div>
                        <h2>搜尋服務</h2>
                        <p>可依服務名稱或描述搜尋</p>
                    </div>
                    <a class="service-clear-link" th:href="@{/front/services}">
                        清除搜尋
                    </a>
                </div>

                <form class="service-search-form" th:action="@{/front/services/search}" method="get">
                    <input class="form-control service-search-input"
                           type="search"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="例如：散步、咖啡聊天、網球陪打">
                    <button class="btn service-search-button" type="submit">
                        搜尋
                    </button>
                </form>
            </section>

            <!-- ==================================================
                 結果標題
                 ================================================== -->
            <div class="service-result-heading">
                <div>
                    <h2>服務列表</h2>
                    <p th:if="${keyword != null and !keyword.trim().isEmpty()}">
                        搜尋關鍵字：<strong th:text="${keyword}">關鍵字</strong>
                    </p>
                </div>
                <span class="service-result-count" th:text="|共 ${#lists.size(serviceList)} 筆|">
                    共 0 筆
                </span>
            </div>

            <!-- ==================================================
                 無資料狀態
                 ================================================== -->
            <section class="service-empty-state" th:if="${#lists.isEmpty(serviceList)}">
                <div class="service-empty-icon">⌕</div>
                <h3>目前沒有符合條件的服務</h3>
                <p>可以更換搜尋文字，或重新查看全部服務。</p>
                <a class="btn btn-primary" th:href="@{/front/services}">
                    查看全部服務
                </a>
            </section>

            <!-- ==================================================
                 服務卡片列表 (已注入雙重高度防禦機制)
                 ================================================== -->
            <section class="service-grid" th:if="${!#lists.isEmpty(serviceList)}">
                <article class="service-card" th:each="service : ${serviceList}" >

                    <!-- 服務圖片 + 漂浮右上角的分類 Badge -->
                    <a class="service-card-image-wrap" th:href="@{/front/services/{id}(id=${service.serviceId})}">
                        <img class="service-card-image"
                             th:src="@{/front/services/image/{serviceId}(serviceId=${service.serviceId})}"
                             th:onerror="this.onerror=null; this.src='/images/activity/default-activity.jpg';"
                             alt="服務圖片">
                        <!-- 🌟 標籤位置完美定位於卡片右上角 -->
                        <span class="service-type-badge"
                              th:text="${service.serviceType != null ? service.serviceType.typeName : '無類型'}">
                            服務類型
                        </span>
                    </a>

                    <!-- 卡片主要內容 -->
                    <div class="service-card-body">

                        <!-- 🌟 區塊一：標題、縣市與地點資訊 (CSS 強制鎖定高度，防止跑版) -->
                        <div class="card__header-group">
                            <div class="service-card-title-row">
                                <h3 class="service-card-title">
                                    <a th:href="@{/front/services/{id}(id=${service.serviceId})}" th:text="${service.serviceName}">
                                        服務名稱
                                    </a>
                                </h3>
                            </div>

                            <!-- 縣市行政區 -->
                            <p class="service-card-location" th:if="${service.serviceCity != null or service.serviceDistrict != null}">
<!--                                 <span class="service-location-icon"></span> -->
                                <span th:text="|${service.serviceCity ?: ''} ${service.serviceDistrict ?: ''}|">
                                    桃園市 中壢區
                                </span>
                            </p>

                            <!-- 地點說明 -->
                            <p class="service-card-place" 
                               th:if="${service.serviceLocation != null and !#strings.isEmpty(service.serviceLocation)}"
                               th:text="${service.serviceLocation}">
                                中壢火車站附近
                            </p>
                        </div>

                        <!-- 🌟 區塊二：服務提供者 (CSS 鎖定高度 + 虛線邊框) -->
                        <div class="meta">
                            <p class="service-card-provider">
                                <a class="service-provider-link" th:href="@{/front/memberPage/oneMember(memberId=${service.memberId})}">
                                    提供者：<span th:text="${@memberService.getNickname(service.memberId)}">1</span>
                                </a>
                            </p>
                        </div>

                        <!-- 價格與詳情按鈕 -->
                        <div class="service-card-footer">
                            <div class="service-price">
                                <span class="service-price-currency">NT$</span>
                                <strong th:text="${service.hourlyRate}">500</strong>
                                <span>/ 小時</span>
                            </div>
                            <a class="btn service-detail-button" th:href="@{/front/services/{id}(id=${service.serviceId})}">
                                查看詳情 →
                            </a>
                        </div>

                    </div>

                </article>
            </section>

        </section>
    </div>

</main>
