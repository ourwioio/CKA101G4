<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>一對一服務列表｜Webond</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/front-end/common/navbar.css}">

    <link rel="stylesheet"
          th:href="@{/css/front-end/common/footer.css}">

    <link rel="stylesheet"
          th:href="@{/css/front-end/chat/chatWidget.css}">

    <link rel="stylesheet"
          th:href="@{/css/front-end/service/serviceList.css}">
</head>

<body>

<header th:replace="~{front-end/common/navbar :: navbar}">
</header>

<main class="site-main">

    <section class="service-page-heading">

        <div>
            <h1 class="page-title">
                一對一服務列表
            </h1>

            <p class="service-page-description">
                透過服務類型、地區、價格或關鍵字，尋找適合你的陪伴服務。
            </p>
        </div>

        <div class="service-login-status"
             th:if="${session.memberVO != null}">

            <a class="back-btn"
               th:href="@{/member/services}">
                服務管理
            </a>
        </div>

    </section>

    <div class="alert alert-success"
         th:if="${successMsg != null}"
         th:text="${successMsg}">
        操作成功
    </div>

    <div class="alert alert-error"
         th:if="${errorMsg != null}"
         th:text="${errorMsg}">
        錯誤訊息
    </div>

    <section class="service-search-panel">

        <div class="service-search-heading">

            <div>
                <h2>
                    搜尋服務
                </h2>

                <p>
                    可依關鍵字、服務類型、地區及價格區間篩選
                </p>
            </div>

            <a class="service-clear-link"
               th:if="${searched == true}"
               th:href="@{/front/services}">
                清除全部條件
            </a>

        </div>

        <form class="service-search-form"
              th:action="@{/front/services/search}"
              method="get">

            <div class="service-search-control service-search-control--keyword">

                <label class="service-search-label"
                       for="keyword">
                    關鍵字
                </label>

                <input id="keyword"
                       class="service-search-input"
                       type="search"
                       name="keyword"
                       maxlength="100"
                       autocomplete="off"
                       th:value="${keyword}"
                       placeholder="搜尋服務名稱或服務描述">
            </div>

            <div class="service-search-control">

                <label class="service-search-label"
                       for="serviceTypeId">
                    服務類型
                </label>

                <select id="serviceTypeId"
                        class="service-search-select"
                        name="serviceTypeId">

                    <option value="">
                        全部類型
                    </option>

                    <option th:each="type : ${serviceTypeList}"
                            th:value="${type.svcTypeID}"
                            th:text="${type.typeName}"
                            th:selected="${selectedServiceTypeId != null
                                         and selectedServiceTypeId == type.svcTypeID}">
                        陪伴聊天
                    </option>
                </select>
            </div>

            <div class="service-search-control">

                <label class="service-search-label"
                       for="serviceCity">
                    縣市
                </label>

                <input id="serviceCity"
                       class="service-search-input"
                       type="text"
                       name="serviceCity"
                       maxlength="20"
                       autocomplete="off"
                       th:value="${serviceCity}"
                       placeholder="例如：桃園市">
            </div>

            <div class="service-search-control">

                <label class="service-search-label"
                       for="serviceDistrict">
                    行政區
                </label>

                <input id="serviceDistrict"
                       class="service-search-input"
                       type="text"
                       name="serviceDistrict"
                       maxlength="20"
                       autocomplete="off"
                       th:value="${serviceDistrict}"
                       placeholder="例如：中壢區">
            </div>

            <div class="service-search-control service-search-control--price">

                <label class="service-search-label">
                    每小時價格
                </label>

                <div class="service-price-range">

                    <input class="service-search-input"
                           type="number"
                           name="minRate"
                           min="0"
                           step="50"
                           th:value="${minRate}"
                           placeholder="最低">

                    <span class="service-price-separator">
                        ～
                    </span>

                    <input class="service-search-input"
                           type="number"
                           name="maxRate"
                           min="0"
                           step="50"
                           th:value="${maxRate}"
                           placeholder="最高">
                </div>
            </div>

            <div class="service-search-submit">
                <button class="service-search-button"
                        type="submit">
                    搜尋服務
                </button>
            </div>

        </form>

        <div class="service-quick-types">

            <span class="service-quick-types-label">
                快速分類
            </span>

            <a class="service-quick-type"
               th:classappend="${selectedServiceTypeId == null} ? ' active' : ''"
               th:href="@{/front/services}">
                全部服務
            </a>

            <a class="service-quick-type"
               th:each="type : ${serviceTypeList}"
               th:href="@{/front/services/search(serviceTypeId=${type.svcTypeID})}"
               th:text="${type.typeName}"
               th:classappend="${selectedServiceTypeId != null
                                and selectedServiceTypeId == type.svcTypeID}
                               ? ' active'
                               : ''">
                陪伴聊天
            </a>

        </div>

    </section>

    <div class="service-result-heading">

        <div>
            <h2>
                服務列表
            </h2>

            <p th:if="${searched == true}">
                以下為符合目前篩選條件的服務
            </p>

            <p th:if="${searched != true}">
                瀏覽目前平台上架中的服務
            </p>
        </div>

        <span class="service-result-count"
              th:text="|共 ${serviceList != null ? #lists.size(serviceList) : 0} 筆|">
            共 0 筆
        </span>

    </div>

    <section class="service-empty-state"
             th:if="${serviceList == null or #lists.isEmpty(serviceList)}">

        <div class="service-empty-icon">
            ⌕
        </div>

        <h3>
            目前沒有符合條件的服務
        </h3>

        <p>
            可以調整搜尋條件，或重新查看全部服務。
        </p>

        <a class="btn btn-primary"
           th:href="@{/front/services}">
            查看全部服務
        </a>
    </section>

    <section class="service-grid"
             th:if="${serviceList != null and !#lists.isEmpty(serviceList)}">

        <article class="service-card"
                 th:each="service : ${serviceList}">

            <a class="service-card-image-wrap"
               th:href="@{/front/services/{id}(id=${service.serviceId})}">

                <img class="service-card-image"
                     th:src="@{/front/services/image/{serviceId}(serviceId=${service.serviceId})}"
                     th:onerror="this.onerror=null; this.src='/images/activity/default-activity.jpg';"
                     alt="服務圖片">

                <span class="service-type-badge"
                      th:text="${service.serviceType != null
                               ? service.serviceType.typeName
                               : '無類型'}">
                    服務類型
                </span>
            </a>

            <div class="service-card-body">

                <div class="card-header-group">

                    <h3 class="service-card-title">
                        <a th:href="@{/front/services/{id}(id=${service.serviceId})}"
                           th:text="${service.serviceName}">
                            服務名稱
                        </a>
                    </h3>

                    <p class="service-card-location"
                       th:if="${service.serviceCity != null or service.serviceDistrict != null}">

                        <span class="service-location-icon">
                        </span>

                        <span th:text="|${service.serviceCity ?: ''} ${service.serviceDistrict ?: ''}|">
                            桃園市 中壢區
                        </span>
                    </p>

                    <p class="service-card-place"
                       th:if="${service.serviceLocation != null
                              and !#strings.isEmpty(service.serviceLocation)}"
                       th:text="${service.serviceLocation}">
                        中壢火車站附近
                    </p>
                </div>

                <div class="service-card-provider-row">

                    <p class="service-card-provider">
                        <a class="service-provider-link"
                           th:href="@{/front/memberPage/oneMember(memberId=${service.memberId})}">

                            提供者：

                            <span th:text="${@memberService.getNickname(service.memberId)}">
                                會員名稱
                            </span>
                        </a>
                    </p>
                </div>

                <div class="service-card-footer">

                    <div class="service-price">
                        <span class="service-price-currency">
                            NT$
                        </span>

                        <strong th:text="${service.hourlyRate}">
                            500
                        </strong>

                        <span>
                            / 小時
                        </span>
                    </div>

                    <a class="btn service-detail-button"
                       th:href="@{/front/services/{id}(id=${service.serviceId})}">
                        查看詳情 →
                    </a>
                </div>

            </div>

        </article>

    </section>

</main>

<div th:replace="~{front-end/chat/chatWidget :: chatWidget}">
</div>

<script th:src="@{/js/front-end/common/notificationPolling.js}">
</script>

<div th:replace="~{front-end/common/footer :: footer}">
</div>

</body>
</html>
