<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檢舉成功</title>
<style>
    body {
        font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        background: #f6f4fc;
    }

    .success-card {
        max-width: 420px;
        margin: 100px auto;
        padding: 40px 32px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(75, 0, 130, 0.08);
        border: 1px solid #ece9f7;
        text-align: center;
    }

    .success-card .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: #6c4fd3;
        color: #fff;
        font-size: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .success-card h3 {
        margin: 0 0 12px;
        font-size: 20px;
        color: #3f2b7a;
    }

    .success-card p {
        margin: 0 0 28px;
        font-size: 14px;
        color: #666;
        line-height: 1.6;
    }

    .success-card a {
        display: inline-block;
        padding: 10px 28px;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #7c5cf0, #5a3fc0);
        border-radius: 10px;
        text-decoration: none;
        transition: opacity 0.2s ease;
    }

    .success-card a:hover {
        opacity: 0.92;
    }
</style>
</head>
<body>
<div class="success-card">
    <div class="icon">✓</div>
    <h3>檢舉已成功送出</h3>
    <p>我們已收到您的檢舉，將盡快進行處理。</p>
    <a th:href="@{/member/service-orders/buyer}">返回訂單列表</a>
</div>
</body>
</html>
